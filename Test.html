<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TalentBuzz Role Workspace (Fixed V10)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ===== V10 FINAL (ONLY GENERATOR IN FILE) =====

function transformSignalToScenario(signal){
  const s = (signal || '').toLowerCase();

  if(/gds|amadeus|sabre/.test(s)){
    return "a booking or rebooking that failed due to system or availability issues";
  }
  if(/booking|flight|rebooking/.test(s)){
    return "a customer booking or rebooking that did not go as expected";
  }
  if(/pnr/.test(s)){
    return "a PNR issue such as missing segments or incorrect details";
  }
  if(/fare/.test(s)){
    return "a case where fare rules affected the booking decision";
  }
  if(/customer|call|voice/.test(s)){
    return "a difficult customer interaction";
  }
  if(/kpi|csat|aht/.test(s)){
    return "a situation where your metrics were at risk";
  }
  if(/months|years/.test(s)){
    return "a real issue you handled frequently in your recent role";
  }

  return null;
}

function generateHumanQuestion(signal){
  const scenario = transformSignalToScenario(signal);

  if(scenario){
    return `Tell me about a time you handled ${scenario}. What happened and what did you do?`;
  }

  return `Tell me about a real case where ${signal} affected your work. What happened and what did you do?`;
}

function generateQuestions(signals){
  return signals.map(s => generateHumanQuestion(s));
}

// BUTTON
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("generateBtn");
  const output = document.getElementById("output");

  btn.onclick = () => {
    const signals = [
      "GDS Navigation",
      "PNR Handling",
      "Customer Service",
      "Fare Rules",
      "6 months experience"
    ];

    const questions = generateQuestions(signals);

    output.innerHTML = questions.map(q => `<li>${q}</li>`).join("");

    alert("AI Questions Generated (V10 Scenario Engine)");
  };
});
</script>
</head>

<body style="font-family:Arial; padding:40px;">
<h2>TalentBuzz Question Generator (Fixed)</h2>

<button id="generateBtn">Generate Questions</button>

<ul id="output" style="margin-top:20px;"></ul>

</body>
</html>
