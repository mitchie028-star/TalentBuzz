<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Client | TalentBuzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--blue:#1e3a8a;
--blue-light:#2563eb;
--text:#0f172a;
--muted:#64748b;
--line:#e2e8f0;
--bg:#f8fbff;
--white:#ffffff;
--success:#166534;
--error:#b91c1c;
--shadow:0 18px 40px rgba(30,58,138,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Manrope, sans-serif;
background:linear-gradient(180deg,#f8fbff 0%,#f3f7ff 100%);
color:var(--text);
}

.page{
max-width:1000px;
margin:auto;
padding:30px 20px 50px;
}

.brand{
display:flex;
align-items:center;
gap:18px;
margin-bottom:20px;
}

.brand-logo{
height:48px;
width:auto;
}

h1{
margin:0;
font-size:28px;
color:var(--blue);
}

.subtitle{
font-size:14px;
color:var(--muted);
margin-top:4px;
}

.card{
background:white;
border:1px solid var(--line);
border-radius:18px;
padding:24px;
box-shadow:var(--shadow);
margin-top:18px;
}

form{
display:grid;
gap:14px;
}

label{
font-weight:700;
font-size:14px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--line);
font-family:inherit;
}

input:focus{
outline:none;
border-color:#93c5fd;
box-shadow:0 0 0 3px rgba(147,197,253,.25);
}

button{
background:linear-gradient(135deg,var(--blue),var(--blue-light));
color:white;
border:none;
padding:14px;
border-radius:14px;
font-weight:800;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.result{
margin-top:20px;
border:1px dashed #cbd5e1;
padding:18px;
border-radius:14px;
background:#f8fafc;
}

.result-label{
font-size:12px;
text-transform:uppercase;
color:var(--muted);
font-weight:700;
}

.result-value{
font-size:16px;
font-weight:800;
margin-bottom:12px;
}

.notice{
margin-top:15px;
padding:12px;
border-radius:12px;
display:none;
font-weight:700;
}

.notice.success{
background:#ecfdf5;
color:var(--success);
display:block;
}

.notice.error{
background:#fef2f2;
color:var(--error);
display:block;
}

</style>
</head>

<body>

<div class="page">

<div class="brand">
<img src="/logo.png" class="brand-logo">
<div>
<h1>Add Client</h1>
<div class="subtitle">Create client portal login credentials</div>
</div>
</div>

<div class="card">

<form id="clientForm">

<div>
<label>Client Name</label>
<input id="clientName" required placeholder="Healthy Options">
</div>

<div>
<label>Primary Contact Name</label>
<input id="pocName" required placeholder="Anna Santos">
</div>

<div>
<label>Primary Contact Email</label>
<input id="pocEmail" type="email" required placeholder="anna@company.com">
</div>

<button id="createBtn">Create Client Login</button>

</form>

<div id="notice" class="notice"></div>

</div>

<div class="card">

<h3>Generated Login</h3>

<div class="result">

<div class="result-label">Client</div>
<div id="resultClient" class="result-value">-</div>

<div class="result-label">Portal Email</div>
<div id="resultEmail" class="result-value">-</div>

<div class="result-label">Temporary Password</div>
<div id="resultPassword" class="result-value">-</div>

<div class="result-label">Login URL</div>
<div class="result-value">https://talentbuzz.pro/client.html</div>

</div>

</div>

</div>

<script>

const SUPABASE_URL="https://dilalntcxmvdcmwxjcct.supabase.co"
const SUPABASE_ANON_KEY="sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs"

const supabase=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)

const form=document.getElementById("clientForm")
const notice=document.getElementById("notice")

function showNotice(msg,type){
notice.innerText=msg
notice.className="notice "+type
}

async function createClient(payload){

const {data,error}=await supabase.functions.invoke(
"create-client-login",
{body:payload}
)

if(error) throw error
if(data?.error) throw new Error(data.error)

return data
}

form.addEventListener("submit",async(e)=>{

e.preventDefault()

const btn=document.getElementById("createBtn")
btn.disabled=true
btn.innerText="Creating..."

try{

const payload={
client_name:document.getElementById("clientName").value.trim(),
poc_name:document.getElementById("pocName").value.trim(),
poc_email:document.getElementById("pocEmail").value.trim().toLowerCase()
}

const result=await createClient(payload)

document.getElementById("resultClient").innerText=payload.client_name
document.getElementById("resultEmail").innerText=result.email
document.getElementById("resultPassword").innerText=result.temporary_password

showNotice("Client login created successfully","success")

form.reset()

}catch(err){

console.error(err)
showNotice(err.message || "Failed to create client login","error")

}

btn.disabled=false
btn.innerText="Create Client Login"

})

</script>

</body>
</html>
