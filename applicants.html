<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Careers | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background:#f8fbff; margin:0; }
    .container { max-width:1100px; margin:auto; padding:20px; }
    .job { background:#fff; padding:16px; border-radius:12px; margin-bottom:12px; }
  </style>
</head>
<body>

<div class="container">
  <h2>Open Roles</h2>
  <div id="jobsContainer">Loading...</div>
</div>

<script>
const supabase = window.supabase.createClient(
  'https://dilalntcxmvdcmwxjcct.supabase.co',
  'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
);

function normalizeText(v){
  return String(v || '').toLowerCase().trim();
}

function normalizeStatus(v){
  return normalizeText(v)
    .replace(/[_-]+/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// 🔥 FIXED FILTER
function isVisibleJob(job){
  const status = normalizeStatus(job.status);

  const hidden = new Set([
    'closed',
    'archived',
    'draft',
    'inactive',
    'filled',
    'on hold',
    'onhold',
    'hold',
    'paused'
  ]);

  if(hidden.has(status)) return false;

  if(job.is_on_hold === true || job.on_hold === true) return false;

  return true;
}

function render(jobs){
  const el = document.getElementById('jobsContainer');

  if(!jobs.length){
    el.innerHTML = 'No open jobs.';
    return;
  }

  el.innerHTML = jobs.map(j=>`
    <div class="job">
      <strong>${j.title || 'Untitled'}</strong><br/>
      ${j.location || ''}<br/>
      ${j.work_setup || ''}
    </div>
  `).join('');
}

async function load(){
  const { data, error } = await supabase
    .from('jobs')
    .select('*')
    .order('created_at', { ascending:false });

  if(error){
    document.getElementById('jobsContainer').innerText = error.message;
    return;
  }

  const filtered = data.filter(isVisibleJob);
  render(filtered);
}

load();
</script>

</body>
</html>
