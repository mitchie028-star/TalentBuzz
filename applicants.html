<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BuzzRoles | BuzzHire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Explore current career opportunities with BuzzHire."
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --ink: #111827;
      --muted: #6b7280;
      --soft: #f8fafc;
      --surface: #ffffff;
      --line: #e5e7eb;
      --line-strong: #d1d5db;
      --bg: #f6f7f9;
      --error: #b42318;
      --shadow: 0 18px 50px rgba(17, 24, 39, 0.07);
      --shadow-hover: 0 24px 70px rgba(17, 24, 39, 0.11);
      --radius: 24px;
      --max: 1280px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 14% 8%, rgba(17,24,39,0.06), transparent 28%),
        radial-gradient(circle at 90% 5%, rgba(148,163,184,0.15), transparent 26%),
        var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: min(var(--max), calc(100% - 34px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.86);
      border-bottom: 1px solid rgba(229,231,235,0.8);
      backdrop-filter: blur(18px);
    }

    .nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 0;
    }

    .brand {
      text-decoration: none;
      color: var(--ink);
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: -0.055em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand::before {
      content: "";
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #111827;
      box-shadow: 0 0 0 5px rgba(17,24,39,0.08);
    }

    .nav-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.86rem;
      padding: 9px 11px;
      border-radius: 999px;
      transition: 0.16s ease;
    }

    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      color: var(--ink);
      background: #f3f4f6;
    }

    .hero {
      padding: 14px 0 10px;
    }

    .minimal-hero {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .minimal-hero p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      font-weight: 600;
    }

    .toolbar {
      padding: 20px 0 12px;
    }

    .toolbar-card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.94);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
    }

    .toolbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-title {
      margin: 0;
      color: var(--ink);
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: -0.035em;
    }

    .results-count {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.6fr 0.9fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 0.76rem;
      font-weight: 900;
      color: #374151;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      font: inherit;
      font-size: 0.92rem;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: 0.16s ease;
    }

    .field input:focus,
    .field select:focus {
      border-color: #9ca3af;
      box-shadow: 0 0 0 4px rgba(156, 163, 175, 0.18);
    }

    .jobs-section {
      padding: 12px 0 58px;
    }

    .jobs-layout {
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .jobs-list-panel,
    .job-detail-panel {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(255,255,255,0.94);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .jobs-list-panel {
      position: sticky;
      top: 92px;
      max-height: calc(100vh - 114px);
      display: flex;
      flex-direction: column;
    }

    .list-head,
    .detail-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .list-head h2,
    .detail-head h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .list-head p,
    .detail-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
      font-weight: 700;
    }

    .jobs-list {
      overflow: auto;
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .job-list-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 18px;
      background: #fff;
      padding: 13px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .job-list-item:hover {
      background: #fafafa;
      border-color: var(--line);
    }

    .job-list-item.active {
      background: #111827;
      border-color: #111827;
      color: #fff;
      box-shadow: 0 14px 30px rgba(17,24,39,0.14);
    }

    .job-list-title {
      margin: 0;
      font-size: 0.96rem;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: -0.025em;
    }

    .job-list-meta {
      display: grid;
      gap: 5px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.4;
    }

    .job-list-item.active .job-list-meta {
      color: rgba(255,255,255,0.72);
    }

    .job-list-line {
      display: flex;
      gap: 7px;
      align-items: flex-start;
    }

    .job-detail-panel {
      min-height: 620px;
    }

    .detail-body {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .detail-title-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .detail-title {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      line-height: 0.98;
      letter-spacing: -0.07em;
      font-weight: 900;
      max-width: 720px;
    }

    .detail-company {
      margin-top: 10px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.45;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
      padding: 8px 11px;
      font-size: 0.76rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .detail-metric {
      border: 1px solid #eef0f2;
      background: #fafafa;
      border-radius: 18px;
      padding: 14px;
      min-height: 92px;
    }

    .detail-metric span {
      display: block;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .detail-metric strong {
      display: block;
      font-size: 0.98rem;
      line-height: 1.45;
      font-weight: 850;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 7px 10px;
      background: #fafafa;
      border: 1px solid #ededed;
      color: #4b5563;
      font-size: 0.75rem;
      font-weight: 850;
    }

    .tag.simulation {
      background: #f7f7f8;
      color: #111827;
      border-color: #d1d5db;
    }

    .description-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      padding: 18px;
    }

    .description-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .job-description {
      color: #374151;
      line-height: 1.7;
      font-size: 0.95rem;
      white-space: pre-line;
      max-height: 360px;
      overflow: auto;
      padding-right: 6px;
    }

    .job-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(17,24,39,0.08);
    }

    .btn-primary {
      background: linear-gradient(135deg, #111827, #374151);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .loading,
    .empty-state,
    .error-state {
      text-align: center;
      color: var(--muted);
      padding: 34px 18px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.92);
      border-radius: 24px;
      box-shadow: var(--shadow);
      font-weight: 800;
    }

    .error-state {
      color: var(--error);
      border-color: #fecdca;
      background: #fff;
      white-space: pre-line;
    }

    .footer {
      padding: 10px 0 40px;
      color: var(--muted);
      text-align: center;
      font-size: 0.88rem;
      font-weight: 700;
    }

    @media (max-width: 960px) {
      .jobs-layout {
        grid-template-columns: 1fr;
      }

      .jobs-list-panel {
        position: static;
        max-height: 430px;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 680px) {
      .container {
        width: min(var(--max), calc(100% - 24px));
      }

      .nav {
        align-items: flex-start;
      }

      .hero {
        padding-top: 28px;
      }

      .detail-body {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">BuzzRoles</a>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="dashboard.html">Dashboard</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="minimal-hero">
        <p>Browse roles. Review details. Apply with confidence.</p>
      </div>
    </div>
  </section>

  <section class="toolbar">
    <div class="container">
      <div class="toolbar-card">
        <div class="toolbar-top">
          <h2 class="toolbar-title">Available roles</h2>
          <div class="results-count" id="resultsCount">Loading roles...</div>
        </div>

        <div class="filters">
          <div class="field">
            <label for="searchInput">Search roles</label>
            <input
              id="searchInput"
              type="text"
              placeholder="Search by title, location, or work setup"
            />
          </div>

          <div class="field">
            <label for="workSetupFilter">Work Setup</label>
            <select id="workSetupFilter">
              <option value="">All</option>
              <option value="Onsite">Onsite</option>
              <option value="Hybrid">Hybrid</option>
              <option value="Remote">Remote</option>
              <option value="WFH">WFH</option>
            </select>
          </div>

          <div class="field">
            <label for="locationFilter">Site / Location</label>
            <input
              id="locationFilter"
              type="text"
              placeholder="e.g. Quezon City, Makati, Ortigas"
            />
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="jobs-section">
    <div class="container">
      <div id="jobsContainer" class="loading">Loading careers...</div>
    </div>
  </section>

  <div class="footer">
    BuzzHire Careers
  </div>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';

    const jobsContainer = document.getElementById('jobsContainer');
    const resultsCount = document.getElementById('resultsCount');
    const searchInput = document.getElementById('searchInput');
    const workSetupFilter = document.getElementById('workSetupFilter');
    const locationFilter = document.getElementById('locationFilter');

    let allJobs = [];
    let currentJobs = [];
    let selectedJobId = null;
    let supabaseClient = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeText(value) {
      return String(value ?? '').trim().toLowerCase();
    }

    function normalizeStatus(value) {
      return normalizeText(value)
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function formatMoney(value) {
      if (value === null || value === undefined || value === '') return '';
      const num = Number(value);
      if (Number.isNaN(num)) return String(value);
      return num.toLocaleString('en-PH');
    }

    function getCurrencySymbol(currency) {
      const map = {
        PHP: '₱',
        USD: '$',
        EUR: '€',
        GBP: '£',
        HKD: 'HK$',
        SGD: 'S$',
        AUD: 'A$',
        CAD: 'C$'
      };

      return map[String(currency || '').toUpperCase()] || (currency ? `${currency} ` : '₱');
    }

    function formatSalary(job) {
      const currency = (job.salary_currency || 'PHP').toUpperCase();
      const symbol = getCurrencySymbol(currency);

      const min = job.salary_min;
      const max = job.salary_max;

      if ((min === null || min === undefined || min === '') && (max === null || max === undefined || max === '')) {
        return 'Not disclosed';
      }

      if (min !== null && min !== undefined && min !== '' && max !== null && max !== undefined && max !== '') {
        return `${symbol}${formatMoney(min)} - ${symbol}${formatMoney(max)}`;
      }

      if (min !== null && min !== undefined && min !== '') {
        return `From ${symbol}${formatMoney(min)}`;
      }

      return `Up to ${symbol}${formatMoney(max)}`;
    }

    function getLocation(job) {
      if (job.location && String(job.location).trim()) return String(job.location).trim();

      const parts = [
        job.site,
        job.city,
        job.state_region,
        job.state,
        job.country
      ].filter(Boolean).map(v => String(v).trim()).filter(Boolean);

      return parts.length ? parts.join(', ') : 'Not specified';
    }

    function getWorkSetup(job) {
      return job.work_setup || job.workSetup || 'Not specified';
    }

    function hasSimulation(job) {
      const text = [
        job.title,
        job.role_family,
        job.industry,
        job.keywords,
        job.screening_summary,
        job.voice_screening_mode,
        JSON.stringify(job.ai_screening_config || {}),
        JSON.stringify(job.screening_config || {})
      ].join(' ').toLowerCase();

      return (
        text.includes('customer support') ||
        text.includes('customer service') ||
        text.includes('csr') ||
        text.includes('bpo') ||
        text.includes('voice') ||
        text.includes('call center')
      );
    }

    function requiresTyping(job) {
      const text = [
        job.title,
        job.keywords,
        job.job_description,
        job.screening_summary,
        JSON.stringify(job.required_skills || {}),
        JSON.stringify(job.ai_screening_config || {})
      ].join(' ').toLowerCase();

      return text.includes('typing') || text.includes('wpm');
    }

    function getRoleTags(job) {
      const tags = [];
      if (job.employment_type) tags.push(job.employment_type);
      if (job.role_family) tags.push(job.role_family);
      if (hasSimulation(job)) tags.push('Simulation assessment');
      if (requiresTyping(job)) tags.push('Typing test');
      return tags.slice(0, 4);
    }

    function getDescription(job) {
      return (
        job.job_description ||
        job.screening_summary ||
        job.jd_raw_text ||
        'Full details will be shared during the application process.'
      );
    }

    function isVisibleJob(job) {
      const status = normalizeStatus(job.status);

      const hiddenStatuses = new Set([
        'closed',
        'archived',
        'draft',
        'inactive',
        'filled',
        'on hold',
        'onhold',
        'hold',
        'paused'
      ]);

      if (hiddenStatuses.has(status)) return false;

      if (
        job.is_on_hold === true ||
        job.on_hold === true ||
        normalizeText(job.visibility) === 'hidden'
      ) {
        return false;
      }

      return true;
    }

    function buildJobUrl(job) {
      return `create-profile.html?job_id=${encodeURIComponent(job.id)}`;
    }

    function renderJobs(jobs) {
      currentJobs = jobs || [];

      if (!currentJobs || currentJobs.length === 0) {
        jobsContainer.className = 'empty-state';
        jobsContainer.innerHTML = 'No open jobs found.';
        resultsCount.textContent = '0 roles found';
        return;
      }

      if (!selectedJobId || !currentJobs.some(job => job.id === selectedJobId)) {
        selectedJobId = currentJobs[0].id;
      }

      const selectedJob = currentJobs.find(job => job.id === selectedJobId) || currentJobs[0];

      jobsContainer.className = 'jobs-layout';
      jobsContainer.innerHTML = `
        <aside class="jobs-list-panel">
          <div class="list-head">
            <h2>List of jobs</h2>
            <p>Select a role to preview details.</p>
          </div>
          <div class="jobs-list">
            ${currentJobs.map(job => renderJobListItem(job)).join('')}
          </div>
        </aside>

        <section class="job-detail-panel">
          ${renderJobDetail(selectedJob)}
        </section>
      `;

      resultsCount.textContent = `${currentJobs.length} role${currentJobs.length === 1 ? '' : 's'} found`;

      jobsContainer.querySelectorAll('[data-job-id]').forEach(button => {
        button.addEventListener('click', () => {
          selectedJobId = button.getAttribute('data-job-id');
          renderJobs(currentJobs);
        });
      });
    }

    function renderJobListItem(job) {
      const title = escapeHtml(job.title || 'Untitled Role');
      const salary = escapeHtml(formatSalary(job));
      const location = escapeHtml(getLocation(job));
      const setup = escapeHtml(getWorkSetup(job));
      const activeClass = job.id === selectedJobId ? 'active' : '';

      return `
        <button class="job-list-item ${activeClass}" type="button" data-job-id="${escapeHtml(job.id)}">
          <h3 class="job-list-title">${title}</h3>
          <div class="job-list-meta">
            <div class="job-list-line">Salary: ${salary}</div>
            <div class="job-list-line">Location: ${location}</div>
            <div class="job-list-line">Set-up: ${setup}</div>
          </div>
        </button>
      `;
    }

    function renderJobDetail(job) {
      if (!job) {
        return `
          <div class="detail-head">
            <h2>Role details</h2>
            <p>Select a job from the list.</p>
          </div>
        `;
      }

      const title = escapeHtml(job.title || 'Untitled Role');
      const company = escapeHtml(job.client_name || job.industry || 'BuzzHire partner');
      const site = escapeHtml(getLocation(job));
      const workSetup = escapeHtml(getWorkSetup(job));
      const salary = escapeHtml(formatSalary(job));
      const jobUrl = buildJobUrl(job);
      const description = escapeHtml(getDescription(job));
      const tags = getRoleTags(job);
      const tagHtml = tags.map(tag => {
        const className = normalizeText(tag).includes('simulation') ? 'tag simulation' : 'tag';
        return `<span class="${className}">${escapeHtml(tag)}</span>`;
      }).join('');

      return `
        <div class="detail-head">
          <h2>Role details</h2>
          <p>Review the role before applying.</p>
        </div>

        <div class="detail-body">
          <div class="detail-title-row">
            <div>
              <h1 class="detail-title">${title}</h1>
              <div class="detail-company">${company}</div>
            </div>
            <span class="badge">${workSetup}</span>
          </div>

          ${tagHtml ? `<div class="tag-row">${tagHtml}</div>` : ''}

          <div class="detail-grid">
            <div class="detail-metric">
              <span>Salary</span>
              <strong>${salary}</strong>
            </div>

            <div class="detail-metric">
              <span>Location</span>
              <strong>${site}</strong>
            </div>

            <div class="detail-metric">
              <span>Set-up</span>
              <strong>${workSetup}</strong>
            </div>
          </div>

          <div class="description-card">
            <h3>Description</h3>
            <div class="job-description">${description}</div>
          </div>

          <div class="job-actions">
            <a class="btn btn-primary" href="${jobUrl}">Apply now</a>
            ${hasSimulation(job) ? `<span class="btn btn-secondary">Simulation may be included</span>` : ''}
          </div>
        </div>
      `;
    }

    function applyFilters() {
      const searchValue = normalizeText(searchInput.value);
      const workSetupValue = normalizeText(workSetupFilter.value);
      const locationValue = normalizeText(locationFilter.value);

      const filtered = allJobs.filter(job => {
        const title = normalizeText(job.title);
        const location = normalizeText(getLocation(job));
        const workSetup = normalizeText(getWorkSetup(job));
        const salary = normalizeText(formatSalary(job));

        const matchesSearch =
          !searchValue ||
          title.includes(searchValue) ||
          location.includes(searchValue) ||
          workSetup.includes(searchValue) ||
          salary.includes(searchValue);

        const matchesWorkSetup =
          !workSetupValue || workSetup.includes(workSetupValue);

        const matchesLocation =
          !locationValue || location.includes(locationValue);

        return matchesSearch && matchesWorkSetup && matchesLocation;
      });

      renderJobs(filtered);
    }

    function showError(message) {
      jobsContainer.className = 'error-state';
      jobsContainer.textContent = message || 'Unable to load careers at the moment.';
      resultsCount.textContent = 'Unable to load roles';
    }

    async function loadJobs() {
      jobsContainer.className = 'loading';
      jobsContainer.textContent = 'Loading careers...';
      resultsCount.textContent = 'Loading roles...';

      try {
        if (!window.supabase || typeof window.supabase.createClient !== 'function') {
          throw new Error('Supabase library failed to load.');
        }

        if (!supabaseClient) {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        const { data, error } = await supabaseClient
          .from('jobs')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        allJobs = Array.isArray(data) ? data.filter(isVisibleJob) : [];
        applyFilters();
      } catch (error) {
        console.error('Error loading jobs:', error);
        showError(error?.message || 'Unable to load careers at the moment.');
      }
    }

    searchInput.addEventListener('input', applyFilters);
    workSetupFilter.addEventListener('change', applyFilters);
    locationFilter.addEventListener('input', applyFilters);

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadJobs);
    } else {
      loadJobs();
    }
  </script>
</body>
</html>
