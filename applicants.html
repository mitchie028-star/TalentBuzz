<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BuzzRoles | BuzzHire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Browse roles, review job details, and apply with confidence through BuzzHire."
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #f6f7f9;
      --card: rgba(255,255,255,0.92);
      --shadow: 0 18px 50px rgba(17, 24, 39, 0.07);
      --shadow-hover: 0 24px 70px rgba(17, 24, 39, 0.11);
      --radius: 24px;
      --max: 1280px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 8%, rgba(17,24,39,0.06), transparent 28%),
        radial-gradient(circle at 90% 5%, rgba(148,163,184,0.15), transparent 26%),
        var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: min(var(--max), calc(100% - 34px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.86);
      border-bottom: 1px solid rgba(229,231,235,0.8);
      backdrop-filter: blur(18px);
    }

    .nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 0;
      flex-wrap: wrap;
    }

    .brand {
      text-decoration: none;
      color: var(--ink);
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: -0.055em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand::before {
      content: "";
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #111827;
      box-shadow: 0 0 0 5px rgba(17,24,39,0.08);
    }

    .menu-btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      font-weight: 900;
      padding: 0 13px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .menu-btn:hover {
      background: #f9fafb;
    }

    .nav-links {
      width: 100%;
      display: none;
      gap: 8px;
      padding-bottom: 10px;
      flex-wrap: wrap;
    }

    .nav-links.show {
      display: flex;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
      padding: 8px 11px;
      border-radius: 999px;
      transition: 0.16s ease;
    }

    .nav-links a:hover {
      background: #f3f4f6;
      color: var(--ink);
    }

    .hero {
      padding: 14px 0 10px;
    }

    .minimal-hero {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .minimal-hero p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      font-weight: 600;
    }

    .toolbar {
      padding: 14px 0 12px;
    }

    .toolbar-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
    }

    .toolbar-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .results-count {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 800;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.6fr 0.9fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 0.75rem;
      font-weight: 900;
      color: #374151;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      font: inherit;
      font-size: 0.92rem;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: 0.16s ease;
    }

    .field input:focus,
    .field select:focus {
      border-color: #9ca3af;
      box-shadow: 0 0 0 4px rgba(156,163,175,0.18);
    }

    .jobs-section {
      padding: 10px 0 58px;
    }

    .jobs-layout {
      display: grid;
      grid-template-columns: 390px minmax(0,1fr);
      gap: 18px;
      align-items: start;
    }

    .jobs-list-panel,
    .job-detail-panel {
      background: var(--card);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .jobs-list-panel {
      position: sticky;
      top: 92px;
      max-height: calc(100vh - 114px);
      display: flex;
      flex-direction: column;
    }

    .list-head,
    .detail-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .list-head h2,
    .detail-head h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .list-head p,
    .detail-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .jobs-list {
      overflow: auto;
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .job-list-item {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 18px;
      background: #fff;
      padding: 13px;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .job-list-item:hover {
      background: #fafafa;
      border-color: var(--line);
    }

    .job-list-item.active {
      background: #111827;
      border-color: #111827;
      color: #fff;
      box-shadow: 0 14px 30px rgba(17,24,39,0.14);
    }

    .job-list-title {
      margin: 0;
      font-size: 0.96rem;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: -0.025em;
    }

    .job-list-meta {
      display: grid;
      gap: 5px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.4;
    }

    .job-list-item.active .job-list-meta {
      color: rgba(255,255,255,0.72);
    }

    .job-detail-panel {
      min-height: 620px;
    }

    .detail-body {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .detail-title {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 0.98;
      letter-spacing: -0.07em;
      font-weight: 900;
    }

    .detail-company {
      margin-top: 10px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.45;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3,minmax(0,1fr));
      gap: 10px;
    }

    .detail-metric {
      border: 1px solid #eef0f2;
      background: #fafafa;
      border-radius: 18px;
      padding: 14px;
    }

    .detail-metric span {
      display: block;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .detail-metric strong {
      display: block;
      font-size: 0.98rem;
      line-height: 1.45;
      font-weight: 850;
    }

    .description-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      padding: 18px;
    }

    .description-card h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .job-description {
      color: #374151;
      line-height: 1.7;
      font-size: 0.95rem;
      white-space: pre-line;
      max-height: 360px;
      overflow: auto;
    }

    .job-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(17,24,39,0.08);
    }

    .btn-primary {
      background: linear-gradient(135deg,#111827,#374151);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .loading,
    .empty-state,
    .error-state {
      text-align: center;
      color: var(--muted);
      padding: 34px 18px;
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      box-shadow: var(--shadow);
      font-weight: 800;
    }

    .footer {
      padding: 10px 0 40px;
      color: var(--muted);
      text-align: center;
      font-size: 0.88rem;
      font-weight: 700;
    }

    @media (max-width: 960px) {
      .jobs-layout {
        grid-template-columns: 1fr;
      }

      .jobs-list-panel {
        position: static;
        max-height: 430px;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">BuzzRoles</a>

      <button class="menu-btn" id="menuBtn">☰ Menu</button>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="about.html">About</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="minimal-hero">
        <p>Browse roles. Review details. Apply with confidence.</p>
      </div>
    </div>
  </section>

  <section class="toolbar">
    <div class="container">
      <div class="toolbar-card">
        <div class="toolbar-top">
          <h2 class="toolbar-title">Available roles</h2>
          <div class="results-count" id="resultsCount">
            Loading roles...
          </div>
        </div>

        <div class="filters">
          <div class="field">
            <label>Search roles</label>
            <input id="searchInput" type="text" placeholder="Search jobs" />
          </div>

          <div class="field">
            <label>Work Setup</label>
            <select id="workSetupFilter">
              <option value="">All</option>
              <option value="Onsite">Onsite</option>
              <option value="Hybrid">Hybrid</option>
              <option value="Remote">Remote</option>
            </select>
          </div>

          <div class="field">
            <label>Location</label>
            <input id="locationFilter" type="text" placeholder="City or site" />
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="jobs-section">
    <div class="container">
      <div id="jobsContainer" class="loading">
        Loading careers...
      </div>
    </div>
  </section>

  <div class="footer">
    BuzzHire Careers
  </div>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const navLinks = document.getElementById("navLinks");

    menuBtn.addEventListener("click", () => {
      navLinks.classList.toggle("show");
    });
  </script>
</body>
</html>
