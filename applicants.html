<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Careers | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:'Manrope',sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .container {
      max-width:1200px;
      margin:auto;
      padding:40px 20px;
    }
    h1 {
      color:var(--blue);
      margin-bottom:6px;
      font-size:2.2rem;
    }
    .subtitle {
      color:var(--muted);
      margin-bottom:24px;
    }
    .filters {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }
    input, select {
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
      font-family:inherit;
      background:#fff;
    }
    .jobs-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:20px;
    }
    .job-card {
      background:white;
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      box-shadow:var(--shadow-soft);
      display:flex;
      flex-direction:column;
      gap:10px;
      transition:.2s;
    }
    .job-card:hover { transform:translateY(-4px); }
    .job-title {
      font-weight:800;
      color:var(--blue);
      font-size:1.1rem;
    }
    .meta {
      font-size:.85rem;
      color:var(--muted);
      line-height:1.5;
    }
    .desc {
      font-size:.9rem;
      color:var(--text);
      line-height:1.5;
      min-height:64px;
    }
    .view-btn {
      margin-top:auto;
      display:inline-block;
      text-align:center;
      padding:11px 14px;
      border-radius:10px;
      border:none;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:white;
      text-decoration:none;
    }
    .empty {
      text-align:center;
      color:var(--muted);
      padding:40px;
      grid-column:1 / -1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Careers</h1>
    <p class="subtitle">Explore opportunities with our partner companies.</p>

    <div class="filters">
      <input id="searchInput" placeholder="Search roles..." />
      <select id="locationFilter">
        <option value="">All locations</option>
      </select>
      <select id="setupFilter">
        <option value="">All setups</option>
      </select>
    </div>

    <div id="jobsContainer" class="jobs-grid">
      <div class="empty">Loading careers...</div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://dilalntcxmvdcmwxjcct.supabase.co',
      'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
    );

    let jobs = [];

    const container = document.getElementById('jobsContainer');
    const searchInput = document.getElementById('searchInput');
    const locationFilter = document.getElementById('locationFilter');
    const setupFilter = document.getElementById('setupFilter');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function shorten(text, max = 140) {
      const value = String(text || '').trim();
      if (!value) return 'No description available.';
      return value.length <= max ? value : value.slice(0, max).trim() + '...';
    }

    async function loadJobs() {
      container.innerHTML = `<div class="empty">Loading careers...</div>`;

      const { data, error } = await supabaseClient
        .from('jobs')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        container.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        return;
      }

      jobs = Array.isArray(data) ? data : [];
      populateFilters();
      renderJobs();
    }

    function populateFilters() {
      const locations = [...new Set(jobs.map(j => j.location).filter(Boolean))];
      const setups = [...new Set(jobs.map(j => j.work_setup).filter(Boolean))];

      locationFilter.innerHTML =
        `<option value="">All locations</option>` +
        locations.map(l => `<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');

      setupFilter.innerHTML =
        `<option value="">All setups</option>` +
        setups.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
    }

    function renderJobs() {
      const search = searchInput.value.trim().toLowerCase();
      const location = locationFilter.value.trim().toLowerCase();
      const setup = setupFilter.value.trim().toLowerCase();

      const filtered = jobs.filter(job => {
        const title = String(job.title || '').toLowerCase();
        const client = String(job.client_name || '').toLowerCase();
        const description = String(job.job_description || '').toLowerCase();
        const jobLocation = String(job.location || '').toLowerCase();
        const jobSetup = String(job.work_setup || '').toLowerCase();

        return (
          (!search || title.includes(search) || client.includes(search) || description.includes(search)) &&
          (!location || jobLocation === location) &&
          (!setup || jobSetup === setup)
        );
      });

      if (!filtered.length) {
        container.innerHTML = `<div class="empty">No jobs found.</div>`;
        return;
      }

      container.innerHTML = filtered.map(job => `
        <div class="job-card">
          <div class="job-title">${escapeHtml(job.title || 'Untitled Role')}</div>
          <div class="meta">
            ${escapeHtml(job.client_name || 'Confidential Client')} •
            ${escapeHtml(job.location || 'Location not specified')} •
            ${escapeHtml(job.work_setup || 'Setup not specified')}
          </div>
          <div class="desc">${escapeHtml(shorten(job.job_description, 140))}</div>
          <a class="view-btn" href="job.html?id=${encodeURIComponent(job.id)}">
            View Full Job Details
          </a>
        </div>
      `).join('');
    }

    searchInput.addEventListener('input', renderJobs);
    locationFilter.addEventListener('change', renderJobs);
    setupFilter.addEventListener('change', renderJobs);

    loadJobs();
  </script>
</body>
</html>
