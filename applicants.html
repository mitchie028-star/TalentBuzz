<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Careers | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Browse open roles and apply through TalentBuzz."
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary: #1e3a8a;
      --primary-light: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fbff;
      --surface: #ffffff;
      --shadow: 0 12px 32px rgba(30, 58, 138, 0.06), 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      color: var(--text);
    }

    .hero {
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
      border-bottom: 1px solid var(--border);
    }

    .hero-inner,
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    .hero-inner {
      padding-top: 44px;
      padding-bottom: 34px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.4rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--primary);
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .container {
      padding-top: 24px;
      padding-bottom: 40px;
    }

    .filters {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 22px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
    }

    .field input,
    .field select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      font: inherit;
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.25);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid transparent;
      text-decoration: none;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: 0.18s ease;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
    }

    .btn-outline {
      background: white;
      color: var(--primary);
      border-color: var(--border);
    }

    .results-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .results-count {
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 700;
    }

    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .job-card-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .job-title {
      margin: 0;
      color: var(--primary);
      font-size: 1.08rem;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }

    .featured-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 0.76rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .job-meta {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .job-description {
      color: var(--text);
      font-size: 0.93rem;
      line-height: 1.75;
      margin-bottom: 16px;
      flex: 1;
    }

    .job-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .job-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .empty {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 26px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 980px) {
      .filters-grid {
        grid-template-columns: 1fr 1fr;
      }

      .jobs-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .hero-inner,
      .container {
        padding-left: 14px;
        padding-right: 14px;
      }

      .hero-inner {
        padding-top: 30px;
        padding-bottom: 24px;
      }

      h1 {
        font-size: 1.9rem;
      }

      .filters-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <h1>Find your next role</h1>
      <p>
        Explore open opportunities across different industries, work setups,
        and locations. Apply directly through TalentBuzz.
      </p>
    </div>
  </section>

  <main class="container">
    <section class="filters">
      <div class="filters-grid">
        <div class="field">
          <label for="searchInput">Search jobs</label>
          <input id="searchInput" type="text" placeholder="Search by title, keyword, industry, or location" />
        </div>

        <div class="field">
          <label for="countryFilter">Country</label>
          <select id="countryFilter">
            <option value="">All countries</option>
          </select>
        </div>

        <div class="field">
          <label for="workSetupFilter">Work Setup</label>
          <select id="workSetupFilter">
            <option value="">All work setups</option>
            <option value="onsite">Onsite</option>
            <option value="hybrid">Hybrid</option>
            <option value="remote">Remote</option>
          </select>
        </div>

        <div class="field">
          <label for="employmentTypeFilter">Employment Type</label>
          <select id="employmentTypeFilter">
            <option value="">All types</option>
            <option value="full-time">Full-time</option>
            <option value="part-time">Part-time</option>
            <option value="contract">Contract</option>
            <option value="project-based">Project-based</option>
            <option value="temporary">Temporary</option>
            <option value="internship">Internship</option>
          </select>
        </div>

        <div class="field">
          <label for="featuredFilter">Featured</label>
          <select id="featuredFilter">
            <option value="">All roles</option>
            <option value="true">Featured only</option>
          </select>
        </div>

        <button id="resetFiltersBtn" class="btn btn-outline" type="button">Reset</button>
      </div>
    </section>

    <div class="results-bar">
      <div class="results-count" id="resultsCount">Loading jobs...</div>
    </div>

    <section id="jobsList" class="jobs-grid">
      <div class="empty">Loading jobs...</div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs";
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const state = {
        jobs: []
      };

      const els = {
        searchInput: document.getElementById("searchInput"),
        countryFilter: document.getElementById("countryFilter"),
        workSetupFilter: document.getElementById("workSetupFilter"),
        employmentTypeFilter: document.getElementById("employmentTypeFilter"),
        featuredFilter: document.getElementById("featuredFilter"),
        resetFiltersBtn: document.getElementById("resetFiltersBtn"),
        resultsCount: document.getElementById("resultsCount"),
        jobsList: document.getElementById("jobsList")
      };

      function normalizeText(value) {
        return String(value || "").trim().toLowerCase();
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function truncateText(value, maxLength = 220) {
        const text = String(value || "").trim();
        if (!text) return "No description provided yet.";
        if (text.length <= maxLength) return text;
        return `${text.slice(0, maxLength).trim()}...`;
      }

      function formatSalaryRange(min, max) {
        const hasMin = min !== null && min !== undefined && min !== "";
        const hasMax = max !== null && max !== undefined && max !== "";

        if (!hasMin && !hasMax) return "";

        const formatValue = (value) => Number(value).toLocaleString();

        if (hasMin && hasMax) {
          return `${formatValue(min)} - ${formatValue(max)}`;
        }
        if (hasMin) return `From ${formatValue(min)}`;
        return `Up to ${formatValue(max)}`;
      }

      function buildLocationLabel(job) {
        return [
          job.city || "",
          job.state || "",
          job.country || ""
        ].filter(Boolean).join(", ") || job.location || "Location not specified";
      }

      function buildApplyUrl(job) {
        const url = new URL("apply.html", window.location.href);
        url.searchParams.set("job", job.title || "this role");
        if (job.id) url.searchParams.set("job_id", job.id);
        return url.toString();
      }

      function populateCountryFilter(jobs) {
        const countries = [...new Set(
          jobs
            .map(job => String(job.country || "").trim())
            .filter(Boolean)
        )].sort((a, b) => a.localeCompare(b));

        els.countryFilter.innerHTML =
          `<option value="">All countries</option>` +
          countries.map(country => `<option value="${escapeHtml(country)}">${escapeHtml(country)}</option>`).join("");
      }

      function getFilteredJobs() {
        const search = normalizeText(els.searchInput.value);
        const country = normalizeText(els.countryFilter.value);
        const workSetup = normalizeText(els.workSetupFilter.value);
        const employmentType = normalizeText(els.employmentTypeFilter.value);
        const featured = normalizeText(els.featuredFilter.value);

        return state.jobs.filter(job => {
          const searchable = [
            job.title,
            job.client_name,
            job.location,
            job.country,
            job.state,
            job.city,
            job.work_setup,
            job.employment_type,
            job.industry,
            job.keywords,
            job.job_description
          ].map(normalizeText).join(" ");

          const jobCountry = normalizeText(job.country);
          const jobWorkSetup = normalizeText(job.work_setup);
          const jobEmploymentType = normalizeText(job.employment_type);
          const isFeatured = Boolean(job.featured);

          return (
            (!search || searchable.includes(search)) &&
            (!country || jobCountry === country) &&
            (!workSetup || jobWorkSetup === workSetup) &&
            (!employmentType || jobEmploymentType === employmentType) &&
            (!featured || (featured === "true" && isFeatured))
          );
        });
      }

      function renderJobs() {
        const filtered = getFilteredJobs();

        els.resultsCount.textContent = `${filtered.length} role${filtered.length === 1 ? "" : "s"} found`;

        if (!filtered.length) {
          els.jobsList.innerHTML = `<div class="empty">No matching roles found. Try adjusting your filters.</div>`;
          return;
        }

        els.jobsList.innerHTML = filtered.map(job => {
          const locationLabel = buildLocationLabel(job);
          const salaryRange = formatSalaryRange(job.salary_min, job.salary_max);

          return `
            <article class="job-card">
              <div class="job-card-header">
                <h3 class="job-title">${escapeHtml(job.title || "Untitled Role")}</h3>
                ${job.featured ? `<span class="featured-pill">Featured</span>` : ``}
              </div>

              <div class="job-meta">
                ${escapeHtml(locationLabel)}
                ${job.work_setup ? ` • ${escapeHtml(job.work_setup)}` : ``}
                ${job.employment_type ? ` • ${escapeHtml(job.employment_type)}` : ``}
                ${job.industry ? ` • ${escapeHtml(job.industry)}` : ``}
                ${salaryRange ? ` • ${escapeHtml(salaryRange)}` : ``}
              </div>

              <div class="job-description">
                ${escapeHtml(truncateText(job.job_description))}
              </div>

              <div class="job-tags">
                ${job.client_name ? `<span class="tag">${escapeHtml(job.client_name)}</span>` : ``}
                ${job.country ? `<span class="tag">${escapeHtml(job.country)}</span>` : ``}
                ${job.keywords ? String(job.keywords).split(",").slice(0, 3).map(tag => `<span class="tag">${escapeHtml(tag.trim())}</span>`).join("") : ``}
              </div>

              <div class="job-actions">
                <a href="${buildApplyUrl(job)}" class="btn btn-primary">Apply Now</a>
              </div>
            </article>
          `;
        }).join("");
      }

      async function loadJobs() {
        els.resultsCount.textContent = "Loading jobs...";
        els.jobsList.innerHTML = `<div class="empty">Loading jobs...</div>`;

        const { data, error } = await supabaseClient
          .from("jobs")
          .select("*")
          .eq("status", "open")
          .order("featured", { ascending: false })
          .order("title", { ascending: true });

        if (error) {
          els.resultsCount.textContent = "Unable to load jobs";
          els.jobsList.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
          return;
        }

        state.jobs = data || [];
        populateCountryFilter(state.jobs);
        renderJobs();
      }

      function resetFilters() {
        els.searchInput.value = "";
        els.countryFilter.value = "";
        els.workSetupFilter.value = "";
        els.employmentTypeFilter.value = "";
        els.featuredFilter.value = "";
        renderJobs();
      }

      [els.searchInput, els.countryFilter, els.workSetupFilter, els.employmentTypeFilter, els.featuredFilter]
        .forEach(el => {
          el.addEventListener(el.tagName === "INPUT" ? "input" : "change", renderJobs);
        });

      els.resetFiltersBtn.addEventListener("click", resetFilters);

      loadJobs();
    });
  </script>
</body>
</html>
