<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Careers | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Browse open roles and apply through TalentBuzz."
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary: #1e3a8a;
      --primary-light: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fbff;
      --surface: #ffffff;
      --success: #166534;
      --warning-bg: #fff7ed;
      --warning-text: #9a3412;
      --success-bg: #f0fdf4;
      --shadow: 0 12px 32px rgba(30, 58, 138, 0.06), 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      color: var(--text);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .hero {
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
      border-bottom: 1px solid var(--border);
    }

    .hero-inner,
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    .hero-inner {
      padding-top: 44px;
      padding-bottom: 34px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.4rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--primary);
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .container {
      padding-top: 24px;
      padding-bottom: 40px;
    }

    .filters {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 22px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .field label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 0 14px;
      font: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .results-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .results-count {
      color: var(--muted);
      font-weight: 700;
    }

    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .job-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 280px;
    }

    .job-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .job-title {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.35;
      color: var(--primary);
      letter-spacing: -0.02em;
    }

    .job-meta {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .job-description {
      color: var(--text);
      line-height: 1.7;
      font-size: 0.96rem;
    }

    .job-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag,
    .featured-pill,
    .applied-pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .tag {
      background: #eff6ff;
      color: var(--primary);
      border: 1px solid #dbeafe;
    }

    .featured-pill {
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .applied-pill {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    .job-actions {
      margin-top: auto;
      display: flex;
      justify-content: flex-start;
    }

    .btn {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 18px rgba(30, 58, 138, 0.18);
    }

    .btn-primary:hover {
      background: var(--primary-light);
    }

    .btn-outline {
      background: #fff;
      color: var(--primary);
      border-color: var(--border);
    }

    .btn-outline:hover {
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      background: #fff;
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 1100px) {
      .filters-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .jobs-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: 1.9rem;
      }

      .filters-grid {
        grid-template-columns: 1fr;
      }

      .jobs-grid {
        grid-template-columns: 1fr;
      }

      .job-card-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="btn btn-outline">🏠 Home</a>
    </div>
    <div class="topbar-right" id="topbarRight"></div>
  </div>

  <section class="hero">
    <div class="hero-inner">
      <h1>Find your next role</h1>
      <p>
        Explore open opportunities across different industries, work setups,
        and locations. Apply directly through TalentBuzz.
      </p>
    </div>
  </section>

  <main class="container">
    <section class="filters">
      <div class="filters-grid">
        <div class="field">
          <label for="searchInput">Search jobs</label>
          <input id="searchInput" type="text" placeholder="Search by title, keyword, industry, or location" />
        </div>

        <div class="field">
          <label for="countryFilter">Country</label>
          <select id="countryFilter">
            <option value="">All countries</option>
          </select>
        </div>

        <div class="field">
          <label for="workSetupFilter">Work Setup</label>
          <select id="workSetupFilter">
            <option value="">All work setups</option>
            <option value="onsite">Onsite</option>
            <option value="hybrid">Hybrid</option>
            <option value="remote">Remote</option>
          </select>
        </div>

        <div class="field">
          <label for="employmentTypeFilter">Employment Type</label>
          <select id="employmentTypeFilter">
            <option value="">All types</option>
            <option value="full-time">Full-time</option>
            <option value="part-time">Part-time</option>
            <option value="contract">Contract</option>
            <option value="project-based">Project-based</option>
            <option value="temporary">Temporary</option>
            <option value="internship">Internship</option>
          </select>
        </div>

        <div class="field">
          <label for="featuredFilter">Featured</label>
          <select id="featuredFilter">
            <option value="">All roles</option>
            <option value="true">Featured only</option>
          </select>
        </div>

        <button id="resetFiltersBtn" class="btn btn-outline" type="button">Reset</button>
      </div>
    </section>

    <div class="results-bar">
      <div class="results-count" id="resultsCount">Loading careers...</div>
    </div>

    <section id="jobsList" class="jobs-grid">
      <div class="empty">Loading careers...</div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs";
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const RECRUITER_EMAILS = new Set([
        "michelle.giray@talentbuzz.pro",
        "angel.n@talentbuzz.pro",
        "jercey.cayetano@talentbuzz.pro",
        "jayson.c@talentbuzz.pro",
        "xyrene.e@talentbuzz.pro",
        "mitchie028@gmail.com"
      ]);

      const state = {
        jobs: [],
        appliedJobIds: new Set(),
        appliedJobTitles: new Set(),
        sessionUser: null,
        jobsLoaded: false
      };

      const els = {
        searchInput: document.getElementById("searchInput"),
        countryFilter: document.getElementById("countryFilter"),
        workSetupFilter: document.getElementById("workSetupFilter"),
        employmentTypeFilter: document.getElementById("employmentTypeFilter"),
        featuredFilter: document.getElementById("featuredFilter"),
        resetFiltersBtn: document.getElementById("resetFiltersBtn"),
        resultsCount: document.getElementById("resultsCount"),
        jobsList: document.getElementById("jobsList"),
        topbarRight: document.getElementById("topbarRight")
      };

      function normalizeText(value) {
        return String(value || "").trim().toLowerCase();
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function truncateText(value, maxLength = 220) {
        const text = String(value || "").trim();
        if (!text) return "No description provided yet.";
        if (text.length <= maxLength) return text;
        return `${text.slice(0, maxLength).trim()}...`;
      }

      function formatSalaryRange(min, max) {
        const hasMin = min !== null && min !== undefined && min !== "";
        const hasMax = max !== null && max !== undefined && max !== "";

        if (!hasMin && !hasMax) return "";

        const formatValue = (value) => {
          const num = Number(value);
          if (Number.isNaN(num)) return String(value);
          return num.toLocaleString();
        };

        if (hasMin && hasMax) return `${formatValue(min)} - ${formatValue(max)}`;
        if (hasMin) return `From ${formatValue(min)}`;
        return `Up to ${formatValue(max)}`;
      }

      function buildLocationLabel(job) {
        return [
          job.city || "",
          job.state || "",
          job.country || ""
        ].filter(Boolean).join(", ") || job.location || "Location not specified";
      }

      function buildApplyUrl(job) {
        const url = new URL("apply.html", window.location.href);
        url.searchParams.set("job", job.title || "this role");
        if (job.id) url.searchParams.set("job_id", job.id);
        return url.toString();
      }

      function isRecruiterEmail(email) {
        return RECRUITER_EMAILS.has(normalizeText(email));
      }

      async function getSafeSession() {
        try {
          const { data, error } = await supabaseClient.auth.getSession();
          if (error) {
            console.error("getSession error:", error);
            return null;
          }
          return data?.session || null;
        } catch (err) {
          console.error("getSession exception:", err);
          return null;
        }
      }

      function populateCountryFilter(jobs) {
        if (!els.countryFilter) return;

        const currentValue = els.countryFilter.value || "";

        const countries = [...new Set(
          jobs
            .map(job => String(job.country || "").trim())
            .filter(Boolean)
        )].sort((a, b) => a.localeCompare(b));

        els.countryFilter.innerHTML =
          `<option value="">All countries</option>` +
          countries
            .map(country => `<option value="${escapeHtml(country)}">${escapeHtml(country)}</option>`)
            .join("");

        if (countries.includes(currentValue)) {
          els.countryFilter.value = currentValue;
        }
      }

      function getFilteredJobs() {
        const search = normalizeText(els.searchInput?.value);
        const country = normalizeText(els.countryFilter?.value);
        const workSetup = normalizeText(els.workSetupFilter?.value);
        const employmentType = normalizeText(els.employmentTypeFilter?.value);
        const featured = normalizeText(els.featuredFilter?.value);

        return state.jobs.filter(job => {
          const searchable = [
            job.title,
            job.client_name,
            job.location,
            job.country,
            job.state,
            job.city,
            job.work_setup,
            job.employment_type,
            job.industry,
            job.keywords,
            job.job_description
          ].map(normalizeText).join(" ");

          const jobCountry = normalizeText(job.country);
          const jobWorkSetup = normalizeText(job.work_setup);
          const jobEmploymentType = normalizeText(job.employment_type);
          const isFeatured = Boolean(job.featured);

          return (
            (!search || searchable.includes(search)) &&
            (!country || jobCountry === country) &&
            (!workSetup || jobWorkSetup === workSetup) &&
            (!employmentType || jobEmploymentType === employmentType) &&
            (!featured || (featured === "true" && isFeatured))
          );
        });
      }

      function isAlreadyApplied(job) {
        const byId = job.id && state.appliedJobIds.has(job.id);
        const byTitle = state.appliedJobTitles.has(normalizeText(job.title));
        return Boolean(byId || byTitle);
      }

      function renderJobs() {
        if (!els.resultsCount || !els.jobsList) return;

        if (!state.jobsLoaded) {
          els.resultsCount.textContent = "Loading careers...";
          els.jobsList.innerHTML = `<div class="empty">Loading careers...</div>`;
          return;
        }

        const filtered = getFilteredJobs();
        els.resultsCount.textContent = `${filtered.length} role${filtered.length === 1 ? "" : "s"} found`;

        if (!filtered.length) {
          els.jobsList.innerHTML = `<div class="empty">No matching roles found. Try adjusting your filters.</div>`;
          return;
        }

        els.jobsList.innerHTML = filtered.map(job => {
          const locationLabel = buildLocationLabel(job);
          const salaryRange = formatSalaryRange(job.salary_min, job.salary_max);
          const alreadyApplied = isAlreadyApplied(job);

          return `
            <article class="job-card">
              <div class="job-card-header">
                <h3 class="job-title">${escapeHtml(job.title || "Untitled Role")}</h3>
                <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
                  ${job.featured ? `<span class="featured-pill">Featured</span>` : ``}
                  ${alreadyApplied ? `<span class="applied-pill">Already Applied</span>` : ``}
                </div>
              </div>

              <div class="job-meta">
                ${escapeHtml(locationLabel)}
                ${job.work_setup ? ` • ${escapeHtml(job.work_setup)}` : ``}
                ${job.employment_type ? ` • ${escapeHtml(job.employment_type)}` : ``}
                ${job.industry ? ` • ${escapeHtml(job.industry)}` : ``}
                ${salaryRange ? ` • ${escapeHtml(salaryRange)}` : ``}
              </div>

              <div class="job-description">
                ${escapeHtml(truncateText(job.job_description))}
              </div>

              <div class="job-tags">
                ${job.client_name ? `<span class="tag">${escapeHtml(job.client_name)}</span>` : ``}
                ${job.country ? `<span class="tag">${escapeHtml(job.country)}</span>` : ``}
                ${job.keywords
                  ? String(job.keywords)
                      .split(",")
                      .slice(0, 3)
                      .map(tag => `<span class="tag">${escapeHtml(tag.trim())}</span>`)
                      .join("")
                  : ``}
              </div>

              <div class="job-actions">
                <a href="${buildApplyUrl(job)}" class="btn btn-primary">
                  ${alreadyApplied ? "View / Reapply" : "Apply Now"}
                </a>
              </div>
            </article>
          `;
        }).join("");
      }

      async function setupTopbar() {
        try {
          const session = await getSafeSession();
          state.sessionUser = session?.user || null;

          if (!els.topbarRight) return;

          if (state.sessionUser) {
            const email = state.sessionUser.email || "";
            const dashboardHref = isRecruiterEmail(email)
              ? "recruiter-dashboard.html"
              : "dashboard.html";

            els.topbarRight.innerHTML = `
              <a href="${dashboardHref}" class="btn btn-outline">← Dashboard</a>
              <button id="logoutBtnTop" class="btn btn-outline" type="button">Logout</button>
            `;

            document.getElementById("logoutBtnTop")?.addEventListener("click", async () => {
              try {
                await supabaseClient.auth.signOut();
              } catch (err) {
                console.error("signOut error:", err);
              }
              window.location.href = "applicants.html";
            });
          } else {
            els.topbarRight.innerHTML = `
              <a href="login.html" class="btn btn-outline">Login</a>
              <a href="index.html" class="btn btn-primary">Main Page</a>
            `;
          }
        } catch (err) {
          console.error("setupTopbar error:", err);
          if (els.topbarRight) {
            els.topbarRight.innerHTML = `
              <a href="login.html" class="btn btn-outline">Login</a>
              <a href="index.html" class="btn btn-primary">Main Page</a>
            `;
          }
        }
      }

      async function loadAppliedJobs() {
        state.appliedJobIds = new Set();
        state.appliedJobTitles = new Set();

        try {
          const session = await getSafeSession();
          const email = session?.user?.email || "";
          if (!email) return;

          if (isRecruiterEmail(email)) {
            return;
          }

          const { data, error } = await supabaseClient
            .from("applications")
            .select("job_id_uuid, job_title")
            .eq("email", email);

          if (error) {
            console.warn("applications lookup error:", error);
            return;
          }

          if (!Array.isArray(data)) return;

          data.forEach(app => {
            if (app.job_id_uuid) {
              state.appliedJobIds.add(app.job_id_uuid);
            }
            if (app.job_title) {
              state.appliedJobTitles.add(normalizeText(app.job_title));
            }
          });
        } catch (err) {
          console.error("loadAppliedJobs error:", err);
        }
      }

      async function loadJobs() {
        if (!els.resultsCount || !els.jobsList) return;

        els.resultsCount.textContent = "Loading careers...";
        els.jobsList.innerHTML = `<div class="empty">Loading careers...</div>`;

        try {
          const { data, error } = await supabaseClient
            .from("jobs")
            .select("*");

          if (error) throw error;

          const jobs = Array.isArray(data) ? data : [];

          jobs.sort((a, b) => {
            const featuredA = a?.featured ? 1 : 0;
            const featuredB = b?.featured ? 1 : 0;

            if (featuredA !== featuredB) {
              return featuredB - featuredA;
            }

            return String(a?.title || "").localeCompare(String(b?.title || ""));
          });

          state.jobs = jobs;
          state.jobsLoaded = true;

          populateCountryFilter(state.jobs);
          renderJobs();
        } catch (err) {
          console.error("Jobs query error:", err);
          state.jobs = [];
          state.jobsLoaded = true;
          els.resultsCount.textContent = "Unable to load careers";
          els.jobsList.innerHTML = `<div class="empty">Unable to load careers right now.</div>`;
        }
      }

      function resetFilters() {
        if (els.searchInput) els.searchInput.value = "";
        if (els.countryFilter) els.countryFilter.value = "";
        if (els.workSetupFilter) els.workSetupFilter.value = "";
        if (els.employmentTypeFilter) els.employmentTypeFilter.value = "";
        if (els.featuredFilter) els.featuredFilter.value = "";
        renderJobs();
      }

      [
        els.searchInput,
        els.countryFilter,
        els.workSetupFilter,
        els.employmentTypeFilter,
        els.featuredFilter
      ]
        .filter(Boolean)
        .forEach(el => {
          el.addEventListener(el.tagName === "INPUT" ? "input" : "change", renderJobs);
        });

      els.resetFiltersBtn?.addEventListener("click", resetFilters);

      supabaseClient.auth.onAuthStateChange(async () => {
        try {
          await setupTopbar();
          await loadAppliedJobs();
          renderJobs();
        } catch (err) {
          console.error("auth state change error:", err);
        }
      });

      (async () => {
        renderJobs();
        await loadJobs();
        await setupTopbar();
        await loadAppliedJobs();
        renderJobs();
      })();
    });
  </script>
</body>
</html>
