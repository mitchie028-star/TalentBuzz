<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Complete</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #222;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 520px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      color: #1f7a4d;
    }
    p {
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 8px;
      background: #1f7a4d;
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Application Complete</h1>
    <p>Thank you. Your application has been successfully submitted.</p>
    <p>We’ll review your information and contact you with any next steps.</p>
    <a href="/">Return Home</a>
  </main>
</body>
</html>
