<script>
  const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const job = params.get("job") || "this role";

  const els = {
    jobTitle: document.getElementById("jobTitle"),
    summaryJob: document.getElementById("summaryJob"),
    statusText: document.getElementById("statusText"),
    message: document.getElementById("message"),
    emailBtn: document.getElementById("emailBtn"),
    email: document.getElementById("email"),
    password: document.getElementById("password"),
    source: document.getElementById("application_source"),
    loginForm: document.getElementById("loginForm"),
    googleLogin: document.getElementById("googleLogin"),
    linkedinLogin: document.getElementById("linkedinLogin")
  };

  if (els.jobTitle) els.jobTitle.textContent = job;
  if (els.summaryJob) els.summaryJob.textContent = job;

  function showMessage(text, type = "error") {
    if (!els.message) return;
    els.message.textContent = text;
    els.message.className = `message show ${type}`;
  }

  function clearMessage() {
    if (!els.message) return;
    els.message.textContent = "";
    els.message.className = "message";
  }

  function setStatus(text) {
    if (!els.statusText) return;
    els.statusText.textContent = text;
  }

  function setButtonState(isBusy, label = "Login / Sign Up") {
    if (els.emailBtn) {
      els.emailBtn.disabled = isBusy;
      els.emailBtn.textContent = isBusy ? "Please wait..." : label;
    }
    if (els.googleLogin) els.googleLogin.disabled = isBusy;
    if (els.linkedinLogin) els.linkedinLogin.disabled = isBusy;
  }

  function getSafeJobId(title) {
    return String(title || "")
      .toLowerCase()
      .trim()
      .replace(/\s+/g, "-");
  }

  function getOAuthRedirectURL() {
    return `https://talentbuzz.pro/apply.html?job=${encodeURIComponent(job)}`;
  }

  async function getApplicantProfile(user) {
    if (!user?.email) return null;

    const { data, error } = await supabaseClient
      .from("applicant_profiles")
      .select("*")
      .eq("email", user.email)
      .maybeSingle();

    if (error || !data) return null;
    return data;
  }

  async function hasCompletedProfile(user) {
    const profile = await getApplicantProfile(user);
    if (!profile) return false;

    return Boolean(
      profile.full_name &&
      (
        profile.phone ||
        profile.location ||
        profile.experience_summary ||
        profile.resume_path ||
        profile.resume_url
      )
    );
  }

  async function sendConfirmationEmail(applicationId, fullName, email, jobTitle) {
    try {
      await supabaseClient
        .from("applications")
        .update({ confirmation_email_status: "sending" })
        .eq("id", applicationId);

      const { data, error } = await supabaseClient.functions.invoke(
        "send-application-confirmation",
        {
          body: {
            candidate_name: fullName || "Applicant",
            candidate_email: email,
            job_title: jobTitle
          }
        }
      );

      if (error || !data?.success) {
        await supabaseClient
          .from("applications")
          .update({ confirmation_email_status: "failed" })
          .eq("id", applicationId);
        return false;
      }

      await supabaseClient
        .from("applications")
        .update({ confirmation_email_status: "sent" })
        .eq("id", applicationId);

      return true;
    } catch (err) {
      await supabaseClient
        .from("applications")
        .update({ confirmation_email_status: "failed" })
        .eq("id", applicationId);
      return false;
    }
  }

  async function applyNow(email) {
    clearMessage();

    const applicationSource = els.source?.value;
    if (!applicationSource) {
      setStatus("Please select an application source.");
      showMessage("Please select an application source.");
      return;
    }

    setStatus("Submitting your application...");

    const safeJobId = getSafeJobId(job);

    const { data: profile, error: profileError } = await supabaseClient
      .from("applicant_profiles")
      .select("id, email, full_name")
      .eq("email", email)
      .single();

    if (profileError || !profile) {
      setStatus("Could not find your applicant profile.");
      showMessage(profileError?.message || "Applicant profile not found.");
      return;
    }

    const { data: existingApplication, error: existingError } = await supabaseClient
      .from("applications")
      .select("*")
      .eq("applicant_profile_id", profile.id)
      .eq("job_id", safeJobId)
      .maybeSingle();

    if (existingError) {
      setStatus("Could not check existing application.");
      showMessage(existingError.message);
      return;
    }

    const currentStatus = String(existingApplication?.status || "").toLowerCase();
    let savedApplicationId = null;

    if (existingApplication && currentStatus !== "withdrawn") {
      showMessage("You already applied to this role.", "success");
      setStatus("Application already found.");
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 800);
      return;
    }

    if (existingApplication && currentStatus === "withdrawn") {
      const { data: updatedApp, error: reviveError } = await supabaseClient
        .from("applications")
        .update({
          status: "submitted",
          created_at: new Date().toISOString(),
          application_source: applicationSource,
          confirmation_email_status: "pending"
        })
        .eq("id", existingApplication.id)
        .select()
        .single();

      if (reviveError) {
        setStatus("Could not restore your application.");
        showMessage(reviveError.message);
        return;
      }

      savedApplicationId = updatedApp.id;
    } else {
      const { data: insertedApp, error: insertError } = await supabaseClient
        .from("applications")
        .insert([{
          email,
          job_title: job,
          job_id: safeJobId,
          applicant_profile_id: profile.id,
          status: "submitted",
          application_source: applicationSource,
          confirmation_email_status: "pending"
        }])
        .select()
        .single();

      if (insertError) {
        setStatus("There was a problem with your application.");
        showMessage(insertError.message);
        return;
      }

      savedApplicationId = insertedApp.id;
    }

    await sendConfirmationEmail(savedApplicationId, profile.full_name, email, job);

    showMessage("✅ Your application has been submitted successfully.", "success");
    setStatus("Application submitted successfully.");

    setTimeout(() => {
      window.location.href = "apply-success.html";
    }, 900);
  }

  async function checkSessionAndApply() {
    const {
      data: { session },
      error
    } = await supabaseClient.auth.getSession();

    if (error) {
      showMessage(error.message);
      return;
    }

    if (session?.user) {
      setStatus("Signed in. Checking your profile...");

      const profileReady = await hasCompletedProfile(session.user);
      if (!profileReady) {
        window.location.href = `create-profile.html?job=${encodeURIComponent(job)}&fromApply=1`;
        return;
      }

      setStatus("You’re signed in. Complete the source field to submit your application.");
    }
  }

  if (els.loginForm) {
    els.loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearMessage();
      setButtonState(true);

      const email = els.email.value.trim();
      const password = els.password.value;

      try {
        const { data: signInData, error: signInError } =
          await supabaseClient.auth.signInWithPassword({
            email,
            password
          });

        if (signInError) {
          const { data: signUpData, error: signUpError } =
            await supabaseClient.auth.signUp({
              email,
              password
            });

          if (signUpError) throw signUpError;

          if (!signUpData.session) {
            showMessage(
              "Account created. Please check your email to confirm your account before signing in.",
              "success"
            );
            setStatus("Account created.");
            return;
          }

          window.location.href = `create-profile.html?job=${encodeURIComponent(job)}&fromApply=1`;
          return;
        }

        const signedInUser = signInData.user;
        if (!signedInUser) throw new Error("Unable to retrieve account.");

        const profileReady = await hasCompletedProfile(signedInUser);
        if (!profileReady) {
          window.location.href = `create-profile.html?job=${encodeURIComponent(job)}&fromApply=1`;
          return;
        }

        await applyNow(signedInUser.email);
      } catch (error) {
        showMessage(error.message || "Something went wrong.");
        setStatus("Login failed.");
      } finally {
        setButtonState(false);
      }
    });
  }

  if (els.googleLogin) {
    els.googleLogin.addEventListener("click", async () => {
      clearMessage();
      setStatus("Redirecting to Google...");

      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: getOAuthRedirectURL() }
      });

      if (error) {
        showMessage(error.message);
        setStatus("Unable to continue with Google.");
      }
    });
  }

  if (els.linkedinLogin) {
    els.linkedinLogin.addEventListener("click", async () => {
      clearMessage();
      setStatus("Redirecting to LinkedIn...");

      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "linkedin_oidc",
        options: { redirectTo: getOAuthRedirectURL() }
      });

      if (error) {
        showMessage(error.message);
        setStatus("Unable to continue with LinkedIn.");
      }
    });
  }

  checkSessionAndApply();
</script>
