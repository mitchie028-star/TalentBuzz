<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Apply | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Apply for a role through TalentBuzz." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --success:#166534;
      --error:#b91c1c;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
      --radius:18px;
      --max:960px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:'Manrope',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container {
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    header {
      background:#fff;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:10;
    }

    .nav {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 0;
      flex-wrap:wrap;
    }

    .brand {
      text-decoration:none;
      color:var(--blue);
      font-weight:800;
      font-size:1.35rem;
    }

    .nav-links {
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .nav-links a {
      text-decoration:none;
      color:var(--blue);
      font-weight:700;
      font-size:.95rem;
    }

    .section {
      padding:32px 0 56px;
    }

    .back-link {
      display:inline-block;
      margin-bottom:18px;
      color:var(--blue);
      text-decoration:none;
      font-weight:700;
    }

    .job-summary,
    .form-card {
      background:var(--white);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
    }

    .job-summary {
      padding:24px;
      margin-bottom:20px;
    }

    .eyebrow {
      color:var(--blue-light);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:.75rem;
      font-weight:800;
      margin-bottom:8px;
    }

    .job-title {
      margin:0 0 8px;
      color:var(--blue);
      font-size:1.8rem;
      line-height:1.15;
    }

    .job-meta {
      color:var(--muted);
      font-size:.95rem;
      line-height:1.6;
    }

    .form-card {
      padding:24px;
    }

    .form-title {
      margin:0 0 8px;
      color:var(--blue);
      font-size:1.35rem;
    }

    .form-subtitle {
      margin:0 0 22px;
      color:var(--muted);
      font-size:.95rem;
    }

    form {
      display:grid;
      gap:16px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }

    .field {
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field.full {
      grid-column:1 / -1;
    }

    label {
      font-weight:700;
      font-size:.94rem;
      color:var(--text);
    }

    input,
    select,
    textarea {
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font:inherit;
      color:var(--text);
      background:#fff;
    }

    textarea {
      min-height:120px;
      resize:vertical;
    }

    input[readonly] {
      background:#f8fafc;
      color:#475569;
    }

    .hint {
      color:var(--muted);
      font-size:.84rem;
      margin-top:2px;
    }

    .actions {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .btn {
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font:inherit;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-primary {
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .btn-secondary {
      background:#fff;
      color:var(--blue);
      border:1px solid var(--line);
    }

    .status {
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
      display:none;
    }

    .status.success {
      display:block;
      background:#f0fdf4;
      color:var(--success);
      border:1px solid #bbf7d0;
    }

    .status.error {
      display:block;
      background:#fef2f2;
      color:var(--error);
      border:1px solid #fecaca;
    }

    .loading,
    .empty-state {
      text-align:center;
      color:var(--muted);
      padding:28px 18px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns:1fr;
      }

      .job-title {
        font-size:1.45rem;
      }

      .form-card,
      .job-summary {
        padding:18px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">TalentBuzz</a>
      <div class="nav-links">
        <a href="about.html">About</a>
        <a href="applicants.html">Careers</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <a id="backToJob" href="applicants.html" class="back-link">← Back to Job Details</a>

      <div id="jobSummary" class="loading">Loading selected role...</div>

      <div class="form-card" style="margin-top:20px;">
        <h2 class="form-title">Application Form</h2>
        <p class="form-subtitle">Complete the form below to apply for this role.</p>

        <form id="applicationForm">
          <div class="grid">
            <div class="field">
              <label for="fullName">Full Name</label>
              <input id="fullName" name="fullName" type="text" required />
            </div>

            <div class="field">
              <label for="email">Email Address</label>
              <input id="email" name="email" type="email" required />
            </div>

            <div class="field">
              <label for="phone">Phone Number</label>
              <input id="phone" name="phone" type="text" required />
            </div>

            <div class="field">
              <label for="location">Current Location</label>
              <input id="location" name="location" type="text" />
            </div>

            <div class="field full">
              <label for="jobTitle">Selected Role</label>
              <input id="jobTitle" name="jobTitle" type="text" readonly />
            </div>

            <div class="field full">
              <label for="resumeLink">Resume Link</label>
              <input id="resumeLink" name="resumeLink" type="url" placeholder="https://drive.google.com/... or resume link" />
              <div class="hint">Use a public Google Drive, Dropbox, or resume file link.</div>
            </div>

            <div class="field full">
              <label for="coverNote">Short Introduction</label>
              <textarea id="coverNote" name="coverNote" placeholder="Tell us briefly about your background and interest in this role."></textarea>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary" id="submitBtn">Submit Application</button>
            <a id="cancelBtn" href="applicants.html" class="btn btn-secondary">Cancel</a>
          </div>

          <div id="formStatus" class="status"></div>
        </form>
      </div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const jobId = params.get('id');
    const jobTitleParam = params.get('job');

    const jobSummary = document.getElementById('jobSummary');
    const backToJob = document.getElementById('backToJob');
    const cancelBtn = document.getElementById('cancelBtn');
    const applicationForm = document.getElementById('applicationForm');
    const formStatus = document.getElementById('formStatus');
    const submitBtn = document.getElementById('submitBtn');
    const jobTitleInput = document.getElementById('jobTitle');

    let selectedJob = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setStatus(message, type) {
      formStatus.className = `status ${type}`;
      formStatus.textContent = message;
    }

    function clearStatus() {
      formStatus.className = 'status';
      formStatus.textContent = '';
    }

    function renderJobSummary(job) {
      document.title = `Apply - ${job.title || 'Role'} | TalentBuzz`;
      jobTitleInput.value = job.title || '';

      backToJob.href = `job.html?id=${encodeURIComponent(job.id)}`;
      cancelBtn.href = `job.html?id=${encodeURIComponent(job.id)}`;

      jobSummary.className = 'job-summary';
      jobSummary.innerHTML = `
        <div class="eyebrow">Selected Role</div>
        <h1 class="job-title">${escapeHtml(job.title || 'Untitled Role')}</h1>
        <div class="job-meta">
          ${job.client_name ? `${escapeHtml(job.client_name)} • ` : ''}
          ${job.location ? `${escapeHtml(job.location)} • ` : ''}
          ${job.work_setup ? `${escapeHtml(job.work_setup)} • ` : ''}
          ${job.employment_type ? escapeHtml(job.employment_type) : ''}
        </div>
      `;
    }

    async function loadSelectedJob() {
      if (jobId) {
        const { data, error } = await supabaseClient
          .from('jobs')
          .select('*')
          .eq('id', jobId)
          .single();

        if (!error && data) {
          selectedJob = data;
          renderJobSummary(data);
          return;
        }
      }

      if (jobTitleParam) {
        jobTitleInput.value = jobTitleParam;
        document.title = `Apply - ${jobTitleParam} | TalentBuzz`;
        jobSummary.className = 'job-summary';
        jobSummary.innerHTML = `
          <div class="eyebrow">Selected Role</div>
          <h1 class="job-title">${escapeHtml(jobTitleParam)}</h1>
          <div class="job-meta">We could not load the full job record, but you may still submit your application.</div>
        `;
        return;
      }

      jobSummary.className = 'empty-state';
      jobSummary.textContent = 'No job selected.';
      submitBtn.disabled = true;
    }

    applicationForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearStatus();

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const location = document.getElementById('location').value.trim();
      const resumeLink = document.getElementById('resumeLink').value.trim();
      const coverNote = document.getElementById('coverNote').value.trim();
      const jobTitle = jobTitleInput.value.trim();

      if (!fullName || !email || !phone || !jobTitle) {
        setStatus('Please complete all required fields.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      try {
        const payload = {
          full_name: fullName,
          email,
          phone,
          location,
          resume_url: resumeLink || null,
          cover_note: coverNote || null,
          job_id: selectedJob?.id || jobId || null,
          job_title: jobTitle,
          status: 'submitted',
          application_source: 'career_page',
          created_at: new Date().toISOString()
        };

        const { error } = await supabaseClient
          .from('applications')
          .insert([payload]);

        if (error) throw error;

        applicationForm.reset();
        jobTitleInput.value = selectedJob?.title || jobTitle;
        setStatus('Application submitted successfully.', 'success');
      } catch (error) {
        setStatus(error.message || 'Something went wrong while submitting your application.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
      }
    });

    loadSelectedJob();
  </script>
</body>
</html>
