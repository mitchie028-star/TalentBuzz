<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Apply | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Apply for a role through TalentBuzz." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --success:#166534;
      --error:#b91c1c;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
      --radius:18px;
      --max:860px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:'Manrope',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container {
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    header {
      background:#fff;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:10;
    }

    .nav {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 0;
      flex-wrap:wrap;
    }

    .brand {
      text-decoration:none;
      color:var(--blue);
      font-weight:800;
      font-size:1.35rem;
    }

    .nav-links {
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .nav-links a {
      text-decoration:none;
      color:var(--blue);
      font-weight:700;
      font-size:.95rem;
    }

    .section {
      padding:36px 0 56px;
    }

    .card {
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
      padding:26px;
    }

    .title {
      margin:0 0 8px;
      color:var(--blue);
      font-size:1.6rem;
    }

    .subtitle {
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.6;
    }

    .status {
      display:none;
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
      white-space:pre-wrap;
    }

    .status.success {
      display:block;
      background:#f0fdf4;
      color:var(--success);
      border:1px solid #bbf7d0;
    }

    .status.error {
      display:block;
      background:#fef2f2;
      color:var(--error);
      border:1px solid #fecaca;
    }

    .muted {
      color:var(--muted);
      font-size:.95rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">TalentBuzz</a>
      <div class="nav-links">
        <a href="about.html">About</a>
        <a href="applicants.html">Careers</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="card">
        <h1 class="title">Processing Your Application</h1>
        <p class="subtitle">
          Please wait while we validate your profile and submit your application.
        </p>

        <div id="statusBox" class="status"></div>
        <div id="helperText" class="muted">Checking your session...</div>
      </div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const jobId = params.get('job') || params.get('id');
    const statusBox = document.getElementById('statusBox');
    const helperText = document.getElementById('helperText');

    function setStatus(message, type = 'success') {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
    }

    function setHelper(message) {
      helperText.textContent = message;
    }

    async function updateConfirmationStatus(applicationId, value) {
      if (!applicationId) return;

      await supabaseClient
        .from('applications')
        .update({ confirmation_email_status: value })
        .eq('id', applicationId);
    }

    async function sendConfirmationEmail({ applicationId, candidateName, candidateEmail, jobTitle }) {
      try {
        await updateConfirmationStatus(applicationId, 'sending');

        const { data, error } = await supabaseClient.functions.invoke(
          'send-application-confirmation',
          {
            body: {
              candidate_name: candidateName,
              candidate_email: candidateEmail,
              job_title: jobTitle
            }
          }
        );

        if (error || !data?.success) {
          await updateConfirmationStatus(applicationId, 'failed');
          return false;
        }

        await updateConfirmationStatus(applicationId, 'sent');
        return true;
      } catch (err) {
        await updateConfirmationStatus(applicationId, 'failed');
        return false;
      }
    }

    async function requireSession() {
      const {
        data: { session }
      } = await supabaseClient.auth.getSession();

      if (!session?.user) {
        window.location.href = `login.html?next=apply&job=${encodeURIComponent(jobId || '')}`;
        return null;
      }

      return session.user;
    }

    async function loadProfileByEmail(email) {
      const { data, error } = await supabaseClient
        .from('applicant_profiles')
        .select('*')
        .eq('email', email)
        .maybeSingle();

      if (error) throw error;
      return data || null;
    }

    async function loadJob(jobIdValue) {
      const { data, error } = await supabaseClient
        .from('jobs')
        .select('id, title')
        .eq('id', jobIdValue)
        .single();

      if (error) throw error;
      return data;
    }

    async function findDuplicateApplication(email, jobIdValue) {
      const { data, error } = await supabaseClient
        .from('applications')
        .select('id')
        .eq('email', email)
        .eq('job_id', String(jobIdValue))
        .limit(1);

      if (error) throw error;
      return Array.isArray(data) && data.length > 0 ? data[0] : null;
    }

    async function insertApplication({ email, applicantProfileId, jobIdValue, jobTitle }) {
      const { data, error } = await supabaseClient
        .from('applications')
        .insert([{
          email,
          applicant_profile_id: applicantProfileId,
          job_id: String(jobIdValue),
          job_title: jobTitle || '',
          status: 'submitted',
          application_source: 'career_page',
          confirmation_email_status: 'pending',
          created_at: new Date().toISOString()
        }])
        .select()
        .single();

      if (error) throw error;
      return data;
    }

    async function processApplication() {
      try {
        if (!jobId) {
          setStatus('Missing job ID.', 'error');
          setHelper('Please return to the job details page and try again.');
          return;
        }

        const user = await requireSession();
        if (!user) return;

        setHelper('Checking your profile...');

        const profile = await loadProfileByEmail(user.email);

        if (!profile) {
          window.location.href = `create-profile.html?fromApply=1&job=${encodeURIComponent(jobId)}`;
          return;
        }

        setHelper('Loading role details...');

        const job = await loadJob(jobId);

        setHelper('Checking for duplicate application...');

        const duplicate = await findDuplicateApplication(user.email, jobId);

        if (duplicate) {
          setStatus('You already submitted an application for this role. Redirecting to your dashboard...', 'error');
          setTimeout(() => {
            window.location.href = 'dashboard.html?duplicate=1';
          }, 1200);
          return;
        }

        setHelper('Submitting your application...');

        const insertedApplication = await insertApplication({
          email: user.email,
          applicantProfileId: profile.id,
          jobIdValue: job.id,
          jobTitle: job.title
        });

        setHelper('Sending confirmation email...');

        const emailSent = await sendConfirmationEmail({
          applicationId: insertedApplication.id,
          candidateName: profile.full_name || user.email,
          candidateEmail: user.email,
          jobTitle: job.title || ''
        });

        if (emailSent) {
          setStatus('Application submitted successfully. A confirmation email has been sent. Redirecting to your dashboard...', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html?applied=1&email=sent';
          }, 1400);
        } else {
          setStatus('Application submitted successfully. We could not send the confirmation email right now. Redirecting to your dashboard...', 'success');
          setTimeout(() => {
            window.location.href = 'dashboard.html?applied=1&email=failed';
          }, 1400);
        }
      } catch (error) {
        console.error('[APPLY_PROCESS_ERROR]', error);
        setStatus(error?.message || 'Something went wrong while submitting your application.', 'error');
        setHelper('Please try again or contact TalentBuzz support.');
      }
    }

    document.addEventListener('DOMContentLoaded', processApplication);
  </script>
</body>
</html>
