<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Apply | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      padding: 40px;
      max-width: 500px;
      margin: auto;
    }

    h2 {
      color: #1e3a8a;
      margin-bottom: 10px;
    }

    p {
      color: #64748b;
      font-size: 14px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    .google-btn {
      background: white;
      color: #1e3a8a;
      border: 1px solid #e2e8f0;
      margin-top: 10px;
    }

    #message {
      margin-top: 20px;
      font-size: 14px;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h2>Apply for <span id="jobTitle"></span></h2>
<p>Please log in or create an account to continue your application.</p>

<!-- EMAIL LOGIN -->
<form id="loginForm">
  <input type="email" id="email" placeholder="Enter your email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login / Sign Up</button>
</form>

<div class="divider">or</div>

<button class="google-btn" id="googleLogin">Continue with Google</button>

<p id="message"></p>

<script>
const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Get job from URL
const params = new URLSearchParams(window.location.search);
const job = params.get('job') || "this role";
document.getElementById('jobTitle').innerText = job;

// ✅ CHECK IF USER ALREADY LOGGED IN
async function checkSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    applyNow(session.user.email);
  }
}

checkSession();

// ✅ LOGIN OR SIGNUP
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  // Try login
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    // If login fails → auto signup
    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (signUpError) {
      document.getElementById('message').innerText = signUpError.message;
      return;
    }

    document.getElementById('message').innerText = "Account created. Please check your email to confirm.";
    return;
  }

  applyNow(email);
});

// ✅ GOOGLE LOGIN
document.getElementById('googleLogin').addEventListener('click', async () => {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.href
    }
  });
});

// ✅ APPLY FUNCTION
async function applyNow(email) {

  // Save application
  const { error } = await supabaseClient
    .from('applications')
    .insert([{
      email,
      job_title: job,
      job_id: job.toLowerCase().replace(/\s/g, '-')
    }]);

  if (error) {
    document.getElementById('message').innerText = error.message;
  } else {
    window.location.href = "apply-success.html";
  }
}
</script>

</body>
</html>
