<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Apply | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login or create an account to continue your TalentBuzz job application.">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue: #1e3a8a;
      --blue-light: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --white: #ffffff;
      --success: #166534;
      --error: #b91c1c;
      --shadow-soft: 0 10px 30px rgba(30, 58, 138, 0.06), 0 2px 10px rgba(15, 23, 42, 0.03);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: var(--white);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .back {
      display: inline-block;
      margin-bottom: 22px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .card {
      background: linear-gradient(180deg, #fbfdff 0%, #f8fbff 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow-soft);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 0.96rem;
    }

    .job-title {
      color: var(--blue);
      font-weight: 800;
    }

    .status {
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.25);
    }

    .btn {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      margin-top: 18px;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      color: white;
    }

    .btn-secondary {
      background: white;
      color: var(--blue);
      border: 1px solid var(--line);
      margin-top: 10px;
    }

    .btn-linkedin {
      background: white;
      color: #0a66c2;
      border: 1px solid #0a66c2;
      margin-top: 10px;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      text-align: center;
      margin: 18px 0;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      line-height: 1.6;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .message.success {
      display: block;
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    .helper {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .page { padding: 24px 14px 40px; }
      .card { padding: 22px; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <div class="page">
    <a href="applicants.html" class="back">← Back to Opportunities</a>

    <div class="card">
      <h1>Apply Now</h1>
      <p class="subtitle">
        Continue your application for
        <span class="job-title" id="jobTitle">this role</span>.
      </p>

      <div class="status" id="statusText">Login or create an account to continue.</div>

      <form id="loginForm">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@email.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit" class="btn btn-primary" id="emailBtn">Login / Sign Up</button>
      </form>

      <div class="divider">or continue with</div>

      <button class="btn btn-secondary" id="googleLogin">Continue with Google</button>
      <button class="btn btn-linkedin" id="linkedinLogin">Continue with LinkedIn</button>

      <div id="message" class="message"></div>

      <div class="helper">
        If you don’t have an account yet, entering your email and password will create one for you.
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const job = params.get('job') || 'this role';

    const jobTitleEl = document.getElementById('jobTitle');
    const statusTextEl = document.getElementById('statusText');
    const messageEl = document.getElementById('message');
    const emailBtn = document.getElementById('emailBtn');

    jobTitleEl.textContent = job;

    function showMessage(text, type = 'error') {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }

    function clearMessage() {
      messageEl.textContent = '';
      messageEl.className = 'message';
    }

    function getSafeJobId(title) {
      return title.toLowerCase().trim().replace(/\s+/g, '-');
    }

    function getOAuthRedirectURL() {
      return `https://talentbuzz.pro/apply.html?job=${encodeURIComponent(job)}`;
    }

    async function hasCompletedProfile(user) {
      if (!user || !user.email) return false;

      const { data, error } = await supabaseClient
        .from('applicant_profiles')
        .select('*')
        .eq('email', user.email)
        .maybeSingle();

      if (error || !data) return false;

      return Boolean(
        data.full_name &&
        (
          data.phone ||
          data.location ||
          data.experience_summary ||
          data.resume_path ||
          data.resume_url
        )
      );
    }

    async function applyNow(email) {
      clearMessage();
      statusTextEl.textContent = 'Submitting your application...';

      const safeJobId = getSafeJobId(job);

      const { data: existingApplication, error: existingError } = await supabaseClient
        .from('applications')
        .select('*')
        .eq('email', email)
        .eq('job_id', safeJobId)
        .maybeSingle();

      if (existingError) {
        statusTextEl.textContent = 'Could not check existing application.';
        showMessage(existingError.message);
        return;
      }

      if (existingApplication && String(existingApplication.status || '').toLowerCase() !== 'withdrawn') {
        showMessage('You already applied to this role.', 'success');
        statusTextEl.textContent = 'Application already found.';
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
        return;
      }

      if (existingApplication && String(existingApplication.status || '').toLowerCase() === 'withdrawn') {
        const { error: reviveError } = await supabaseClient
          .from('applications')
          .update({
            status: 'submitted',
            created_at: new Date().toISOString()
          })
          .eq('id', existingApplication.id);

        if (reviveError) {
          statusTextEl.textContent = 'Could not restore your application.';
          showMessage(reviveError.message);
          return;
        }
      } else {
        const { error: insertError } = await supabaseClient
          .from('applications')
          .insert([{
            email: email,
            job_title: job,
            job_id: safeJobId,
            status: 'submitted'
          }]);

        if (insertError) {
          statusTextEl.textContent = 'There was a problem with your application.';
          showMessage(insertError.message);
          return;
        }
      }

      showMessage('✅ Your application has been submitted successfully.', 'success');
      statusTextEl.textContent = 'Application submitted successfully.';

      setTimeout(() => {
        window.location.href = 'apply-success.html';
      }, 900);
    }

    async function checkSessionAndApply() {
      const { data: { session }, error } = await supabaseClient.auth.getSession();

      if (error) {
        showMessage(error.message);
        return;
      }

      if (session && session.user) {
        statusTextEl.textContent = 'Signed in. Preparing your application...';

        const profileReady = await hasCompletedProfile(session.user);
        if (!profileReady) {
          window.location.href = `create-profile.html?job=${encodeURIComponent(job)}&fromApply=1`;
          return;
        }

        await applyNow(session.user.email);
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();
      emailBtn.disabled = true;
      emailBtn.textContent = 'Please wait...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const { data: signInData, error: signInError } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (signInError) {
          const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({
            email,
            password
          });

          if (signUpError) throw signUpError;

          if (!signUpData.session) {
            showMessage('Account created. Please check your email to confirm your account before signing in.', 'success');
            statusTextEl.textContent = 'Account created.';
            return;
          }

          window.location.href = `create-profile.html?job=${encodeURIComponent(job)}&fromApply=1`;
          return;
        }

        const signedInUser = signInData.user;
        if (!signedInUser) throw new Error('Unable to retrieve account.');

        const profileReady = await hasCompletedProfile(signedInUser);
        if (!profileReady) {
          window.location.href = `create-profile.html?job=${encodeURIComponent(job)}&fromApply=1`;
          return;
        }

        await applyNow(signedInUser.email);
      } catch (error) {
        showMessage(error.message || 'Something went wrong.');
        statusTextEl.textContent = 'Login failed.';
      } finally {
        emailBtn.disabled = false;
        emailBtn.textContent = 'Login / Sign Up';
      }
    });

    document.getElementById('googleLogin').addEventListener('click', async () => {
      clearMessage();
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: getOAuthRedirectURL() }
      });
      if (error) showMessage(error.message);
    });

    document.getElementById('linkedinLogin').addEventListener('click', async () => {
      clearMessage();
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'linkedin_oidc',
        options: { redirectTo: getOAuthRedirectURL() }
      });
      if (error) showMessage(error.message);
    });

    checkSessionAndApply();
  </script>

</body>
</html>
