<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TalentBuzz | Candidate Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f7faff;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe4f0;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --green: #16a34a;
      --green-soft: #ecfdf3;
      --amber: #b45309;
      --amber-soft: #fffbeb;
      --radius: 24px;
      --shadow: 0 12px 40px rgba(15, 23, 42, .08);
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 800;
      font-size: 1rem;
    }

    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: white;
      padding: 8px;
      border: 1px solid var(--line);
    }

    .btn {
      min-height: 44px;
      border-radius: 14px;
      padding: 0 16px;
      display: inline-flex;
</html>
