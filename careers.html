<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Careers | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
    }

    body {
      margin:0;
      font-family:'Manrope',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container {
      max-width:1200px;
      margin:auto;
      padding:40px 20px;
    }

    h1 {
      color:var(--blue);
      margin-bottom:6px;
      font-size:2.2rem;
    }

    .subtitle {
      color:var(--muted);
      margin-bottom:24px;
    }

    .filters {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    input, select {
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
      font-family:inherit;
    }

    .jobs-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:20px;
    }

    .job-card {
      background:white;
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      box-shadow:var(--shadow-soft);
      display:flex;
      flex-direction:column;
      gap:10px;
      transition:.2s;
    }

    .job-card:hover {
      transform:translateY(-4px);
    }

    .job-title {
      font-weight:800;
      color:var(--blue);
      font-size:1.1rem;
    }

    .meta {
      font-size:.85rem;
      color:var(--muted);
    }

    .desc {
      font-size:.9rem;
      color:var(--text);
      line-height:1.5;
    }

    .apply-btn {
      margin-top:auto;
      padding:10px;
      border-radius:10px;
      border:none;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:white;
    }

    .empty {
      text-align:center;
      color:var(--muted);
      padding:40px;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>Careers</h1>
  <p class="subtitle">Explore opportunities with our partner companies.</p>

  <div class="filters">
    <input id="searchInput" placeholder="Search roles..." />
    <select id="locationFilter">
      <option value="">All locations</option>
    </select>
    <select id="setupFilter">
      <option value="">All setups</option>
    </select>
  </div>

  <div id="jobsContainer" class="jobs-grid"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  'https://dilalntcxmvdcmwxjcct.supabase.co',
  'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
);

let jobs = [];

const container = document.getElementById('jobsContainer');
const searchInput = document.getElementById('searchInput');
const locationFilter = document.getElementById('locationFilter');
const setupFilter = document.getElementById('setupFilter');

async function loadJobs() {
  const { data, error } = await supabaseClient
    .from('jobs')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    container.innerHTML = `<div class="empty">${error.message}</div>`;
    return;
  }

  jobs = data || [];

  populateFilters();
  renderJobs();
}

function populateFilters() {
  const locations = [...new Set(jobs.map(j => j.location).filter(Boolean))];
  const setups = [...new Set(jobs.map(j => j.work_setup).filter(Boolean))];

  locationFilter.innerHTML =
    `<option value="">All locations</option>` +
    locations.map(l => `<option>${l}</option>`).join('');

  setupFilter.innerHTML =
    `<option value="">All setups</option>` +
    setups.map(s => `<option>${s}</option>`).join('');
}

function renderJobs() {
  const search = searchInput.value.toLowerCase();
  const location = locationFilter.value.toLowerCase();
  const setup = setupFilter.value.toLowerCase();

  const filtered = jobs.filter(job => {
    return (
      (!search || job.title.toLowerCase().includes(search)) &&
      (!location || (job.location || '').toLowerCase() === location) &&
      (!setup || (job.work_setup || '').toLowerCase() === setup)
    );
  });

  if (!filtered.length) {
    container.innerHTML = `<div class="empty">No jobs found.</div>`;
    return;
  }

  container.innerHTML = filtered.map(job => `
    <div class="job-card">
      <div class="job-title">${job.title}</div>

      <div class="meta">
        ${job.client_name || ''} • ${job.location || ''} • ${job.work_setup || ''}
      </div>

      <div class="desc">
        ${(job.job_description || '').slice(0, 120)}...
      </div>

      <button class="apply-btn"
        onclick="apply('${job.title}')">
        Apply Now
      </button>
    </div>
  `).join('');
}

function apply(title) {
  window.location.href = `apply.html?job=${encodeURIComponent(title)}`;
}

searchInput.oninput = renderJobs;
locationFilter.onchange = renderJobs;
setupFilter.onchange = renderJobs;

loadJobs();
</script>

</body>
</html>
