<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Client Dashboard Preview (ATS) | TalentBuzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
body{font-family:Manrope,sans-serif;margin:0;background:#f6f9ff}
.container{max-width:1500px;margin:auto;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
h1{color:#1e3a8a}
.controls{display:flex;gap:10px}
select,input{padding:10px;border-radius:10px;border:1px solid #e2e8f0}

.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.stat{background:#fff;padding:14px;border-radius:14px;border:1px solid #e2e8f0}
.stat-label{font-size:.7rem;color:#64748b;text-transform:uppercase}
.stat-value{font-size:1.4rem;font-weight:800;color:#1e3a8a}

.table-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #e2e8f0}
th{background:#f8fafc;font-size:.75rem;text-transform:uppercase}
tr:hover{background:#f1f5ff}

.btn{padding:8px 12px;border:none;border-radius:10px;cursor:pointer;font-weight:700}
.btn-primary{background:#2563eb;color:#fff}

.drawer{position:fixed;right:0;top:0;height:100%;width:420px;background:#fff;border-left:1px solid #e2e8f0;display:none;flex-direction:column;z-index:1000}
.drawer.show{display:flex}
.drawer-header{padding:16px;border-bottom:1px solid #e2e8f0;font-weight:800}
.drawer-body{padding:16px;overflow:auto}

.chat-btn{position:fixed;bottom:20px;right:20px;width:64px;height:64px;border-radius:50%;background:#2563eb;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.2);cursor:pointer}
.badge{position:absolute;top:-4px;right:-4px;background:red;color:#fff;border-radius:50%;font-size:12px;padding:4px 6px;display:none}
</style>
</head>

<body>
<div class="container">

<div class="topbar">
<h1>Client Dashboard Preview (ATS)</h1>
<div class="controls">
<select id="clientSelector"></select>
<button class="btn btn-primary" onclick="loadData()">Load</button>
</div>
</div>

<div class="stats">
<div class="stat"><div class="stat-label">Endorsed</div><div id="statEndorsed" class="stat-value">0</div></div>
<div class="stat"><div class="stat-label">Pending</div><div id="statPending" class="stat-value">0</div></div>
<div class="stat"><div class="stat-label">Shortlisted</div><div id="statShortlisted" class="stat-value">0</div></div>
<div class="stat"><div class="stat-label">Rejected</div><div id="statRejected" class="stat-value">0</div></div>
<div class="stat"><div class="stat-label">Offered</div><div id="statOffered" class="stat-value">0</div></div>
<div class="stat"><div class="stat-label">Hired</div><div id="statHired" class="stat-value">0</div></div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Candidate</th>
<th>Role</th>
<th>Status</th>
<th>Rating</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<div class="drawer" id="drawer">
<div class="drawer-header" id="drawerName">Candidate</div>
<div class="drawer-body" id="drawerContent">Select candidate</div>
</div>

<div class="chat-btn" id="chatBtn">💬<div class="badge" id="chatBadge">0</div></div>

<script>
const supabase = window.supabase.createClient(
"https://dilalntcxmvdcmwxjcct.supabase.co",
"sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs"
);

let currentData=[];

async function loadClients(){
const { data } = await supabase.from('clients').select('id, client_name');
const sel=document.getElementById('clientSelector');
sel.innerHTML='<option>Select client</option>';
data.forEach(c=>{
const o=document.createElement('option');
o.value=c.id;o.textContent=c.client_name;sel.appendChild(o);
});
}

async function loadData(){
const id=document.getElementById('clientSelector').value;
const { data } = await supabase.from('client_endorsement_view').select('*').eq('client_id',id);
currentData=data||[];
renderStats();renderTable();
}

function renderStats(){
const d=currentData;
document.getElementById('statEndorsed').textContent=d.length;
document.getElementById('statPending').textContent=d.filter(x=>!x.client_response_status).length;
document.getElementById('statShortlisted').textContent=d.filter(x=>x.client_response_status==='shortlisted').length;
document.getElementById('statRejected').textContent=d.filter(x=>x.client_response_status==='rejected_by_client').length;
document.getElementById('statOffered').textContent=d.filter(x=>x.client_response_status==='offered_jo').length;
document.getElementById('statHired').textContent=d.filter(x=>x.client_response_status==='onboarded').length;
}

function renderTable(){
const tbody=document.getElementById('table');tbody.innerHTML='';
currentData.forEach(row=>{
const tr=document.createElement('tr');
tr.innerHTML=`
<td>${row.full_name}</td>
<td>${row.job_title}</td>
<td>${row.client_response_status||'-'}</td>
<td>${row.client_rating||'-'}</td>
<td>${row.sent_at?new Date(row.sent_at).toLocaleDateString():'-'}</td>
<td><button class='btn' onclick='openDrawer(${JSON.stringify(row)})'>View</button></td>`;
tbody.appendChild(tr);
});
}

function openDrawer(row){
document.getElementById('drawer').classList.add('show');
document.getElementById('drawerName').innerText=row.full_name;
document.getElementById('drawerContent').innerHTML=`
<p><b>Email:</b> ${row.email||'-'}</p>
<p><b>Phone:</b> ${row.phone||'-'}</p>
<p><b>Location:</b> ${row.location||'-'}</p>
<p><b>Experience:</b> ${row.years_of_experience||'-'}</p>
<p><b>Notes:</b> ${row.client_response_notes||'-'}</p>
${row.resume_url?`<a href='${row.resume_url}' target='_blank'>View Resume</a>`:''}
`;
}

// unread simulation
let unread=0;
setInterval(()=>{unread=Math.floor(Math.random()*5);updateBadge();},4000);
function updateBadge(){
const b=document.getElementById('chatBadge');
b.style.display=unread>0?'block':'none';b.textContent=unread;
}

loadClients();
</script>

</body>
</html>
