<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Client Dashboard Preview | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    body { font-family: Manrope, sans-serif; margin:0; background:#f4f8ff; }
    .container { max-width:1400px; margin:auto; padding:20px; }
    h1 { color:#1e3a8a; }

    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }

    .controls { display:flex; gap:10px; }

    select, input {
      padding:10px; border-radius:10px; border:1px solid #e2e8f0;
    }

    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }

    .stat { background:white; padding:15px; border-radius:14px; border:1px solid #e2e8f0; }
    .stat-label { font-size:.75rem; color:#64748b; }
    .stat-value { font-size:1.5rem; font-weight:800; color:#1e3a8a; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { padding:12px; border-bottom:1px solid #e2e8f0; }
    th { background:#f8fafc; font-size:.75rem; text-transform:uppercase; }

    .btn { padding:8px 12px; border:none; border-radius:10px; cursor:pointer; font-weight:700; }
    .btn-primary { background:#2563eb; color:white; }

    .chat-btn {
      position:fixed; bottom:20px; right:20px;
      width:60px; height:60px; border-radius:50%;
      background:#2563eb; color:white; font-size:22px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      cursor:pointer;
    }

    .badge {
      position:absolute; top:-5px; right:-5px;
      background:red; color:white; border-radius:50%;
      font-size:12px; padding:4px 6px;
      display:none;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <h1>Client Dashboard Preview</h1>
    <div class="controls">
      <select id="clientSelector"></select>
      <button class="btn btn-primary" onclick="loadData()">Load</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Endorsed</div><div id="statEndorsed" class="stat-value">0</div></div>
    <div class="stat"><div class="stat-label">Pending</div><div id="statPending" class="stat-value">0</div></div>
    <div class="stat"><div class="stat-label">Shortlisted</div><div id="statShortlisted" class="stat-value">0</div></div>
    <div class="stat"><div class="stat-label">Rejected</div><div id="statRejected" class="stat-value">0</div></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Candidate</th>
        <th>Job</th>
        <th>Status</th>
        <th>Rating</th>
        <th>Date</th>
        <th>Resume</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

</div>

<div class="chat-btn" id="chatBtn">
  💬
  <div class="badge" id="chatBadge">0</div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://dilalntcxmvdcmwxjcct.supabase.co",
  "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs"
);

async function loadClients(){
  const { data } = await supabase.from('clients').select('id, client_name');
  const sel = document.getElementById('clientSelector');
  sel.innerHTML = '<option>Select client</option>';

  data.forEach(c=>{
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.client_name;
    sel.appendChild(o);
  });
}

async function loadData(){
  const clientId = document.getElementById('clientSelector').value;

  const { data } = await supabase
    .from('client_endorsement_view')
    .select('*')
    .eq('client_id', clientId);

  renderStats(data);
  renderTable(data);
}

function renderStats(data){
  document.getElementById('statEndorsed').textContent = data.length;
  document.getElementById('statPending').textContent = data.filter(d=>!d.client_response_status).length;
  document.getElementById('statShortlisted').textContent = data.filter(d=>d.client_response_status==='shortlisted').length;
  document.getElementById('statRejected').textContent = data.filter(d=>d.client_response_status==='rejected_by_client').length;
}

function renderTable(data){
  const tbody = document.getElementById('table');
  tbody.innerHTML = '';

  data.forEach(row=>{
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${row.full_name}</td>
      <td>${row.job_title}</td>
      <td>${row.client_response_status || '-'}</td>
      <td>${row.client_rating || '-'}</td>
      <td>${row.sent_at ? new Date(row.sent_at).toLocaleDateString() : '-'}</td>
      <td>
        ${row.resume_url ? `<a href="${row.resume_url}" target="_blank">View</a>` : '-'}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// Chat (basic unread simulation)
let unread = 0;

function updateBadge(){
  const badge = document.getElementById('chatBadge');
  if(unread > 0){
    badge.style.display = 'block';
    badge.textContent = unread;
  } else {
    badge.style.display = 'none';
  }
}

// Simulated polling (replace with real later)
setInterval(()=>{
  unread = Math.floor(Math.random()*3);
  updateBadge();
},5000);

loadClients();

</script>

</body>
</html>
