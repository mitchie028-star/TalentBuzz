<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Client Login | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: Manrope, sans-serif; background:#f8fbff; margin:0; color:#0f172a; }
    .wrap { max-width:420px; margin:60px auto; background:#fff; border:1px solid #e2e8f0; border-radius:18px; padding:24px; }
    h1 { color:#1e3a8a; margin:0 0 8px; }
    p { color:#64748b; }
    label { display:block; margin:14px 0 6px; font-weight:700; }
    input { width:100%; padding:12px; border:1px solid #e2e8f0; border-radius:12px; font:inherit; }
    button { margin-top:16px; width:100%; padding:12px; border:0; border-radius:12px; background:linear-gradient(135deg,#1e3a8a,#2563eb); color:#fff; font:inherit; font-weight:800; cursor:pointer; }
    .msg { margin-top:12px; font-weight:700; color:#64748b; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Client Login</h1>
    <p>View only the candidates endorsed to your company.</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required />
      <label for="password">Password</label>
      <input id="password" type="password" required />
      <button type="submit">Login</button>
      <div id="msg" class="msg"></div>
    </form>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://dilalntcxmvdcmwxjcct.supabase.co',
      'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
    );

    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = 'Signing in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      window.location.href = 'client-dashboard.html';
    });
  </script>
</body>
</html>
