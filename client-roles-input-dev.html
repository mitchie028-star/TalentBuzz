<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentBuzz Role Workspace (Clean Stable)</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1324;
  color:#e5eefc;
}
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px 24px;
  background:#081225;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.primary{background:#2563eb;color:#fff;}
.ghost{background:#1e293b;color:#fff;}

.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}
.modal.show{display:flex;}
.modal-box{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:400px;
}
input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:6px;
  border:1px solid #374151;
  background:#020617;
  color:#fff;
}
</style>
</head>

<body>

<div class="topbar">
  <div><strong>TalentBuzz Role Workspace</strong></div>
  <div>
    <button class="ghost" id="openAiSettingsBtn">AI Settings</button>
  </div>
</div>

<div style="padding:24px;">
  <h2>Sift Role Intelligence (Stable)</h2>
  <p>Clean rebuild. No duplicate scripts. Stable modal + Gemini integration.</p>
</div>

<!-- AI SETTINGS MODAL -->
<div class="modal" id="aiSettingsModal">
  <div class="modal-box">
    <h3>AI Settings (Gemini)</h3>

    <label>API Key</label>
    <input id="geminiKey" type="password" placeholder="Paste Gemini API Key">

    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="primary" id="saveKey">Save</button>
      <button class="ghost" id="testKey">Test</button>
      <button class="ghost" id="closeModal">Close</button>
    </div>

    <p id="status" style="margin-top:12px;font-size:13px;color:#94a3b8;"></p>
  </div>
</div>

<script>

// CLEAN EVENT BINDING (NO DOMContentLoaded DUPLICATES)

const modal = document.getElementById('aiSettingsModal');
const openBtn = document.getElementById('openAiSettingsBtn');
const closeBtn = document.getElementById('closeModal');

openBtn.onclick = () => modal.classList.add('show');
closeBtn.onclick = () => modal.classList.remove('show');

// SAVE KEY
document.getElementById('saveKey').onclick = () => {
  const key = document.getElementById('geminiKey').value.trim();
  if(!key){
    alert("Enter key first");
    return;
  }
  localStorage.setItem('TB_GEMINI_KEY', key);
  document.getElementById('status').innerText = "Saved successfully";
};

// TEST KEY
document.getElementById('testKey').onclick = async () => {
  const key = localStorage.getItem('TB_GEMINI_KEY');
  if(!key){
    alert("No key saved");
    return;
  }

  try{
    const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+key,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:"say ok"}]}]
      })
    });

    if(res.ok){
      document.getElementById('status').innerText = "Connected ✅";
    }else{
      document.getElementById('status').innerText = "Failed ❌";
    }

  }catch(e){
    document.getElementById('status').innerText = "Error ❌";
  }
};

</script>

</body>
</html>
