<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Roles Input | TalentBuzz</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #081225;
      --panel: rgba(15, 23, 42, 0.78);
      --line: rgba(148, 163, 184, 0.18);
      --soft-line: rgba(148, 163, 184, 0.1);
      --text: #e5eefc;
      --muted: #94a3b8;
      --blue: #2563eb;
      --blue-2: #1d4ed8;
      --green: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --chip: rgba(255, 255, 255, 0.06);
      --shadow: 0 20px 60px rgba(2, 8, 23, 0.38);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 12px;
      --max: 1480px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.14), transparent 26%),
        linear-gradient(180deg, #07111f 0%, #0b1324 100%);
      color: var(--text);
      min-height: 100%;
    }

    body {
      padding: 28px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .app-shell {
      max-width: var(--max);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      padding: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .brand-copy h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-copy p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ghost-btn,
    .primary-btn,
    .danger-btn,
    .small-btn,
    .signal-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 16px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 700;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.28);
    }

    .signal-btn {
      background: linear-gradient(135deg, rgba(16,185,129,0.18), rgba(37,99,235,0.2));
      border-color: rgba(96, 165, 250, 0.26);
      color: #dbeafe;
    }

    .danger-btn {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.25);
      color: #fecaca;
    }

    .ghost-btn:hover,
    .primary-btn:hover,
    .danger-btn:hover,
    .small-btn:hover,
    .signal-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .small-btn {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.18fr 0.92fr;
      gap: 22px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .panel-inner {
      padding: 22px;
    }

    .hero-card {
      margin-bottom: 22px;
      overflow: hidden;
      position: relative;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(37,99,235,0.16), transparent 40%),
        radial-gradient(circle at 85% 15%, rgba(14,165,233,0.15), transparent 22%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.3fr 0.8fr;
      gap: 18px;
      align-items: start;
    }

    .hero-copy h2 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .hero-copy p {
      margin: 0;
      color: #cbd5e1;
      max-width: 760px;
      line-height: 1.7;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--soft-line);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .workspace-card,
    .preview-panel,
    .roles-panel {
      margin-top: 22px;
    }

    .workspace-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .workspace-title h3 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .workspace-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .workspace-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .workspace-body.is-collapsed {
      display: none;
    }

    .sticky-actions {
      position: sticky;
      top: 12px;
      z-index: 20;
      margin-bottom: 16px;
      background: rgba(8, 18, 37, 0.88);
      border: 1px solid var(--soft-line);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      backdrop-filter: blur(12px);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .section-title h3 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .section-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field,
    .field-full {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.88rem;
      color: #d8e4f5;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      outline: none;
      transition: 0.18s ease;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.55;
    }

    input::placeholder,
    textarea::placeholder {
      color: #7f91ab;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(59, 130, 246, 0.55);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.14);
    }

        function showNotice(message, type = "success") {
      els.notice.textContent = message;
      els.notice.className = `notice show ${type}`;
      window.clearTimeout(showNotice._timer);
      showNotice._timer = window.setTimeout(() => {

    function safeText(value) {
      return String(value ?? "").trim();
    }

    function normalizeLines(value) {
      return safeText(value)
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function buildRequirementBullets(text) {
      const lines = normalizeLines(text);
      if (!lines.length) return "Not specified";
      return lines.map(line => `- ${line.replace(/^-\s*/, "")}`).join("\n");
    }

    function getSignalCalibrationPayload() {
      return {
        non_negotiables: normalizeLines(els.signalNonNegotiables.value),
        red_flags: normalizeLines(els.signalRedFlags.value),
        must_have_skills: normalizeLines(els.signalMustHaveSkills.value),
        success_signals: normalizeLines(els.signalSuccessSignals.value),
        setup_criticality: safeText(els.signalSetupCriticality.value),
        environment_notes: safeText(els.signalEnvironmentNotes.value),
        communication_weight: safeText(els.signalCommunicationWeight.value),
        stakeholder_weight: safeText(els.signalStakeholderWeight.value),
        autonomy_level: safeText(els.signalAutonomyLevel.value),
        decision_making: safeText(els.signalDecisionMaking.value),
        business_priorities: normalizeLines(els.signalBusinessPriorities.value)
      };
    }

    function buildSignalSummaryText(signal) {
      return [
        `TalentBuzz Signal Intelligence`,
        ``,
        `Non-Negotiables:`,
        ...(signal.non_negotiables.length ? signal.non_negotiables.map(x => `- ${x}`) : [`- None defined yet`]),
        ``,
        `Must-Have Skills + Importance:`,
        ...(signal.must_have_skills.length ? signal.must_have_skills.map(x => `- ${x}`) : [`- None defined yet`]),
        ``,
        `Success Signals:`,
        ...(signal.success_signals.length ? signal.success_signals.map(x => `- ${x}`) : [`- None defined yet`]),
        ``,
        `Red Flags / Deal Breakers:`,
        ...(signal.red_flags.length ? signal.red_flags.map(x => `- ${x}`) : [`- None defined yet`]),
        ``,
        `Setup Criticality: ${signal.setup_criticality || "Not set"}`,
        `Communication Weight: ${signal.communication_weight || "Not set"}`,
        `Stakeholder Weight: ${signal.stakeholder_weight || "Not set"}`,
        `Autonomy Level: ${signal.autonomy_level || "Not set"}`,
        ``,
        `Environment Notes:`,
        signal.environment_notes || "Not set",
        ``,
        `Decision-Making Expectation:`,
        signal.decision_making || "Not set",
        ``,
        `Business Priorities:`,
        ...(signal.business_priorities.length ? signal.business_priorities.map(x => `- ${x}`) : [`- None defined yet`])
      ].join("\n");
    }

    function buildSignalSummary() {
      const signal = getSignalCalibrationPayload();
      els.signalSummaryOutput.textContent = buildSignalSummaryText(signal);
      showNotice("Signal Intelligence summary generated.");
    }

    function getEnhancedRolePayload() {
      return {
        client_name: safeText(els.clientName.value),
        title: safeText(els.jobTitle.value),
        role_family: safeText(els.roleFamily.value),
        location: safeText(els.location.value),
        work_setup: safeText(els.workSetup.value),
        employment_type: safeText(els.employmentType.value),
        seniority_level: safeText(els.seniority.value),
        status: safeText(els.roleStatus.value) || "Open",
        job_description: safeText(els.jobDescription.value),
        required_skills: safeText(els.requirements.value),
        priority_skills: safeText(els.prioritySkills.value),
        nice_to_have_skills: safeText(els.niceToHaveSkills.value),
        screening_summary: safeText(els.screeningSummaryOutput.textContent),
        screening_config: questionItems,
        ai_screening_config: getSignalCalibrationPayload()
      };
    }

    function hydrateRole(role) {
      return {
        ...role,
        job_title: role?.title || "",
        seniority: role?.seniority_level || "",
        requirements: role?.required_skills || "",
        is_on_hold: role?.is_on_hold ?? false,
        priority_skills: role?.priority_skills || "",
        nice_to_have_skills: role?.nice_to_have_skills || "",
        screening_config: Array.isArray(role?.screening_config) ? role.screening_config : [],
        screening_summary: role?.screening_summary || "",
        ai_screening_config: typeof role?.ai_screening_config === "object" && role?.ai_screening_config !== null
          ? role.ai_screening_config
          : {}
      };
    }

    function applySignalCalibrationToForm(signalConfig = {}) {
      els.signalNonNegotiables.value = Array.isArray(signalConfig.non_negotiables) ? signalConfig.non_negotiables.join("\n") : "";
      els.signalRedFlags.value = Array.isArray(signalConfig.red_flags) ? signalConfig.red_flags.join("\n") : "";
      els.signalMustHaveSkills.value = Array.isArray(signalConfig.must_have_skills) ? signalConfig.must_have_skills.join("\n") : "";
      els.signalSuccessSignals.value = Array.isArray(signalConfig.success_signals) ? signalConfig.success_signals.join("\n") : "";
      els.signalSetupCriticality.value = signalConfig.setup_criticality || "";
      els.signalEnvironmentNotes.value = signalConfig.environment_notes || "";
      els.signalCommunicationWeight.value = signalConfig.communication_weight || "";
      els.signalStakeholderWeight.value = signalConfig.stakeholder_weight || "";
      els.signalAutonomyLevel.value = signalConfig.autonomy_level || "";
      els.signalDecisionMaking.value = signalConfig.decision_making || "";
      els.signalBusinessPriorities.value = Array.isArray(signalConfig.business_priorities) ? signalConfig.business_priorities.join("\n") : "";
      els.signalSummaryOutput.textContent = buildSignalSummaryText(getSignalCalibrationPayload());
    }

    function buildJobPreview() {
      const payload = getEnhancedRolePayload();

      const top = [
        payload.title || "Untitled Role",
        payload.client_name ? `Client: ${payload.client_name}` : "",
        payload.location ? `Location: ${payload.location}` : "",
        payload.work_setup ? `Work Setup: ${payload.work_setup}` : "",
        payload.employment_type ? `Employment Type: ${payload.employment_type}` : "",
        payload.seniority_level ? `Seniority: ${payload.seniority_level}` : ""
      ].filter(Boolean).join("\n");

      const description = payload.job_description || "No role overview added yet.";
      const requirements = buildRequirementBullets(payload.required_skills);
      const prioritySkills = buildRequirementBullets(payload.priority_skills);
      const niceToHave = buildRequirementBullets(payload.nice_to_have_skills);

      return `${top}

Role Overview
${description}

What We're Looking For
${requirements}

Priority Skills
${prioritySkills}

Nice to Have
${niceToHave}`;
    }

    function refreshPreview() {
      els.jdPreview.textContent = buildJobPreview();
    }

    function createEmptyQuestion(overrides = {}) {
      return {
        question: "",
        focus_area: "",
        response_type: "Open Text",
        weight: "Medium",
        ...overrides
      };
    }

    function renderQuestions() {
      if (!questionItems.length) {
        els.questionsWrap.innerHTML = `
          <div class="muted-card">
            No screening questions yet. Click <strong>Add Question</strong> or use
            <strong>Generate from Signal + JD</strong> to build a stronger first draft.
          </div>
        `;
        return;
      }

      els.questionsWrap.innerHTML = questionItems.map((item, index) => `
        <div class="question-card">
          <div class="question-top">
            <div class="question-top-left">
              <span class="question-index">${index + 1}</span>
              <span class="chip">${escapeHtml(item.focus_area || "General")}</span>
              <span class="chip">${escapeHtml(item.weight || "Medium")}</span>
            </div>

            <div class="question-actions">
              <button class="small-btn" type="button" onclick="duplicateQuestion(${index})">Duplicate</button>
              <button class="small-btn" type="button" onclick="addQuestionAfter(${index})">Add After</button>
              <button class="small-btn danger-btn" type="button" onclick="removeQuestion(${index})">Remove</button>
            </div>
          </div>

          <div class="question-grid">
            <div class="field">
              <label>Question</label>
              <textarea onchange="updateQuestionField(${index}, 'question', this.value)" placeholder="Write a role-specific screening question.">${escapeHtml(item.question)}</textarea>
            </div>

            <div class="field">
              <label>Focus Area</label>
              <input type="text" value="${escapeHtml(item.focus_area)}" onchange="updateQuestionField(${index}, 'focus_area', this.value)" placeholder="e.g. Qlik Sense" />
            </div>

            <div class="field">
              <label>Response Type</label>
              <select onchange="updateQuestionField(${index}, 'response_type', this.value)">
                <option ${item.response_type === "Open Text" ? "selected" : ""}>Open Text</option>
                <option ${item.response_type === "Yes/No" ? "selected" : ""}>Yes/No</option>
                <option ${item.response_type === "Short Answer" ? "selected" : ""}>Short Answer</option>
                <option ${item.response_type === "Multiple Choice" ? "selected" : ""}>Multiple Choice</option>
              </select>
            </div>

            <div class="field">
              <label>Weight</label>
              <select onchange="updateQuestionField(${index}, 'weight', this.value)">
                <option ${item.weight === "Low" ? "selected" : ""}>Low</option>
                <option ${item.weight === "Medium" ? "selected" : ""}>Medium</option>
                <option ${item.weight === "High" ? "selected" : ""}>High</option>
                <option ${item.weight === "Critical" ? "selected" : ""}>Critical</option>
              </select>
            </div>
          </div>
        </div>
      `).join("");
    }

    function updateQuestionField(index, field, value) {
      if (!questionItems[index]) return;
      questionItems[index][field] = value;
      renderQuestions();
    }

    function duplicateQuestion(index) {
      const original = questionItems[index];
      if (!original) return;
      questionItems.splice(index + 1, 0, { ...original });
      renderQuestions();
      showNotice("Question duplicated.");
    }

    function addQuestionAfter(index) {
      questionItems.splice(index + 1, 0, createEmptyQuestion());
      renderQuestions();
      showNotice("New question added.");
    }

    function removeQuestion(index) {
      questionItems.splice(index, 1);
      renderQuestions();
      showNotice("Question removed.");
    }

    window.updateQuestionField = updateQuestionField;
    window.duplicateQuestion = duplicateQuestion;
    window.addQuestionAfter = addQuestionAfter;
    window.removeQuestion = removeQuestion;
      function deriveWeightFromLine(line) {
      const text = safeText(line).toLowerCase();
      if (text.includes("critical")) return "Critical";
      if (text.includes("high")) return "High";
      if (text.includes("medium")) return "Medium";
      if (text.includes("low")) return "Low";
      return "High";
    }

    function cleanSkillLine(line) {
      return safeText(line).replace(/\s*-\s*(critical|high|medium|low)\s*$/i, "").trim();
    }

    function generateAiQuestions() {
      const title = safeText(els.jobTitle.value);
      const signal = getSignalCalibrationPayload();
      const requirements = normalizeLines(els.requirements.value);
      const prioritySkills = normalizeLines(els.prioritySkills.value);

      const generated = [];

      signal.non_negotiables.forEach(item => {
        generated.push(createEmptyQuestion({
          question: `This role has a non-negotiable requirement around "${item}". Walk us through a real example that proves you meet this requirement in practice.`,
          focus_area: "Non-Negotiable",
          response_type: "Open Text",
          weight: "Critical"
        }));
      });

      signal.must_have_skills.forEach(item => {
        const skill = cleanSkillLine(item);
        const weight = deriveWeightFromLine(item);
        generated.push(createEmptyQuestion({
          question: `Tell us about a real business situation where you applied ${skill} in a role similar to ${title || "this position"}. What was expected of you, what did you do, and what was the outcome?`,
          focus_area: skill || "Must-Have Skill",
          response_type: "Open Text",
          weight
        }));
      });

      signal.success_signals.slice(0, 3).forEach(item => {
        generated.push(createEmptyQuestion({
          question: `One success signal for this role is "${item}". Can you share an example that demonstrates this clearly?`,
          focus_area: "Success Signal",
          response_type: "Open Text",
          weight: "High"
        }));
      });

      if (signal.communication_weight === "Critical" || signal.communication_weight === "High") {
        generated.push(createEmptyQuestion({
          question: `This role places strong importance on communication. Tell us about a time you had to explain complex work clearly to a non-technical or business stakeholder.`,
          focus_area: "Communication",
          response_type: "Open Text",
          weight: signal.communication_weight || "High"
        }));
      }

      if (signal.stakeholder_weight === "Critical" || signal.stakeholder_weight === "High") {
        generated.push(createEmptyQuestion({
          question: `Describe a situation where you had to manage different stakeholder expectations while still delivering the right outcome.`,
          focus_area: "Stakeholder Management",
          response_type: "Open Text",
          weight: signal.stakeholder_weight || "High"
        }));
      }

      if (signal.autonomy_level) {
        generated.push(createEmptyQuestion({
          question: `This role expects a "${signal.autonomy_level}" style of working. How do you typically operate in that kind of environment?`,
          focus_area: "Autonomy / Ownership",
          response_type: "Open Text",
          weight: "High"
        }));
      }

      if (signal.decision_making) {
        generated.push(createEmptyQuestion({
          question: `Decision-making is important in this role. Based on this expectation: "${signal.decision_making}", how have you handled similar responsibility before?`,
          focus_area: "Decision-Making",
          response_type: "Open Text",
          weight: "High"
        }));
      }

      if (signal.setup_criticality) {
        generated.push(createEmptyQuestion({
          question: `The work setup fit for this role is considered ${signal.setup_criticality.toLowerCase()}. What about your experience and preferences makes you likely to succeed in this setup?`,
          focus_area: "Work Setup Fit",
          response_type: "Open Text",
          weight: signal.setup_criticality === "Critical" ? "Critical" : "Medium"
        }));
      }

      signal.business_priorities.slice(0, 3).forEach(item => {
        generated.push(createEmptyQuestion({
          question: `A business priority for this role is "${item}". How have you contributed to a similar outcome before?`,
          focus_area: "Business Priority",
          response_type: "Open Text",
          weight: "High"
        }));
      });

      if (!generated.length) {
        const fallbackSignals = [...prioritySkills, ...requirements].slice(0, 6);

        fallbackSignals.forEach((signalLine, i) => {
          generated.push(createEmptyQuestion({
            question: `Tell us about a real situation where you applied ${signalLine} in a role similar to ${title || "this position"}. What was the business need, what did you do, and what was the outcome?`,
            focus_area: signalLine,
            response_type: "Open Text",
            weight: i < 2 ? "Critical" : "High"
          }));
        });
      }

      if (!generated.length) {
        generated.push(
          createEmptyQuestion({
            question: "Walk us through your most relevant experience for this role.",
            focus_area: "Relevant Experience",
            response_type: "Open Text",
            weight: "High"
          }),
          createEmptyQuestion({
            question: "Why do you believe you would perform well in this position?",
            focus_area: "Motivation / Fit",
            response_type: "Open Text",
            weight: "Medium"
          })
        );
      }

      questionItems = generated;
      renderQuestions();
      showNotice("Screening questions generated from TalentBuzz Signal Intelligence.");
    }

    function generateScreeningSummary() {
      const payload = getEnhancedRolePayload();
      const signal = getSignalCalibrationPayload();
      const priority = normalizeLines(payload.priority_skills);
      const requirements = normalizeLines(payload.required_skills);
      const focusAreas = [...new Set(questionItems.map(q => safeText(q.focus_area)).filter(Boolean))];
      const strongScreen = questionItems.some(q => ["Critical", "High"].includes(q.weight));

      const summary = [
        `Focus Areas:`,
        ...(focusAreas.length ? focusAreas.map(area => `- ${area}`) : ["- General role fit", "- Relevant experience", "- Core competencies"]),
        ``,
        `Non-Negotiables to Confirm:`,
        ...(signal.non_negotiables.length ? signal.non_negotiables.map(x => `- ${x}`) : [`- None explicitly defined`]),
        ``,
        `Priority Signals:`,
        ...(priority.length ? priority.map(item => `- ${item}`) : ["- No priority skills specified yet"]),
        ``,
        `Role Requirements to Validate:`,
        ...(requirements.length ? requirements.slice(0, 6).map(item => `- ${item}`) : ["- No structured requirements added yet"]),
        ``,
        `Business / Calibration Context:`,
        ...(signal.business_priorities.length ? signal.business_priorities.map(x => `- ${x}`) : [`- No business priorities specified`]),
        signal.communication_weight ? `- Communication Weight: ${signal.communication_weight}` : null,
        signal.stakeholder_weight ? `- Stakeholder Weight: ${signal.stakeholder_weight}` : null,
        signal.autonomy_level ? `- Autonomy Level: ${signal.autonomy_level}` : null,
        signal.setup_criticality ? `- Work Setup Criticality: ${signal.setup_criticality}` : null,
        ``,
        `Recommendation:`,
        strongScreen
          ? `Use a stricter and deeper screen. Prioritize proof of execution, role-specific evidence, and alignment to the defined TalentBuzz Signal Intelligence calibration.`
          : `Use a balanced screening approach. Confirm baseline qualifications first, then validate practical role fit and calibration-based signals.`,
        ``,
        `TalentBuzz Screening Direction:`,
        `Evaluate based on business relevance, proof of execution, and recruiter judgment — not just keyword matching or JD phrasing.`
      ].filter(Boolean).join("\n");

      els.screeningSummaryOutput.textContent = summary;
      showNotice("Screening summary generated.");
    }

    function populateClientSources() {
      const names = [...new Set(
        rolesCache
          .map(role => safeText(role.client_name))
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      els.clientSuggestions.innerHTML = names
        .map(name => `<option value="${escapeHtml(name)}"></option>`)
        .join("");

      els.existingClientSelect.innerHTML = `
        <option value="">Choose existing client</option>
        ${names.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("")}
      `;
    }

    function getFilteredRoles() {
      const query = safeText(els.searchInput.value).toLowerCase();
      const filter = safeText(els.holdFilter.value);

      return rolesCache.filter(role => {
        const haystack = `${safeText(role.client_name)} ${safeText(role.job_title)}`.toLowerCase();
        const matchesQuery = !query || haystack.includes(query);

        let matchesHold = true;
        if (filter === "active") matchesHold = !role.is_on_hold;
        if (filter === "on_hold") matchesHold = !!role.is_on_hold;

        return matchesQuery && matchesHold;
      });
    }

    function renderRolesTable() {
      const roles = getFilteredRoles();

      if (!roles.length) {
        els.rolesTableBody.innerHTML = `
          <tr>
            <td colspan="6" class="empty-state">No roles found.</td>
          </tr>
        `;
        return;
      }

      els.rolesTableBody.innerHTML = roles.map(role => {
        const screeningCount = Array.isArray(role.screening_config) ? role.screening_config.length : 0;
        const statusPill = role.is_on_hold
          ? `<span class="pill pill-hold">On-Hold</span>`
          : role.status === "Closed"
            ? `<span class="pill pill-closed">${escapeHtml(role.status || "Closed")}</span>`
            : `<span class="pill pill-open">${escapeHtml(role.status || "Open")}</span>`;

        return `
          <tr>
            <td>
              <div class="role-title">${escapeHtml(role.job_title || "Untitled Role")}</div>
              <div class="subtext">
                ${escapeHtml(role.role_family || "Uncategorized")}
                ${role.seniority ? ` • ${escapeHtml(role.seniority)}` : ""}
              </div>
            </td>
            <td>
              <div>${escapeHtml(role.client_name || "No client")}</div>
            </td>
            <td>
              <div>${escapeHtml(role.work_setup || "Not set")}</div>
              <div class="subtext">${escapeHtml(role.location || "No location")}</div>
            </td>
            <td>${statusPill}</td>
            <td>
              <div>${screeningCount} question(s)</div>
              <div class="subtext">${role.screening_summary ? "Summary ready" : "No summary yet"}</div>
            </td>
            <td>
              <div class="table-actions">
                <button class="small-btn" type="button" onclick="editRole('${role.id}')">Edit</button>
                <button class="small-btn" type="button" onclick="toggleHoldRole('${role.id}', ${role.is_on_hold ? "false" : "true"})">
                  ${role.is_on_hold ? "Reopen" : "Put On-Hold"}
                </button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    async function loadRoles() {
      els.rolesTableBody.innerHTML = `
        <tr>
          <td colspan="6" class="empty-state">Loading roles...</td>
        </tr>
      `;

      try {
        const { data, error } = await supabaseClient
          .from("jobs")
          .select(`
            id,
            title,
            client_name,
            location,
            employment_type,
            work_setup,
            status,
            role_family,
            seniority_level,
            job_description,
            required_skills,
            nice_to_have_skills,
            priority_skills,
            screening_summary,
            screening_config,
            ai_screening_config,
            is_on_hold,
            created_at
          `)
          .order("created_at", { ascending: false });

        if (error) {
          console.error("loadRoles error:", error);
          els.rolesTableBody.innerHTML = `
            <tr>
              <td colspan="6" class="empty-state">Failed to load roles.</td>
            </tr>
          `;
          showNotice(`Failed to load roles: ${error.message || "Unknown error"}`, "error");
          return;
        }

        rolesCache = Array.isArray(data) ? data.map(hydrateRole) : [];
        populateClientSources();
        renderRolesTable();
      } catch (err) {
        console.error("Unexpected loadRoles error:", err);
        els.rolesTableBody.innerHTML = `
          <tr>
            <td colspan="6" class="empty-state">Failed to load roles.</td>
          </tr>
        `;
        showNotice("Failed to load roles.", "error");
      }
    }

    async function saveRole() {
      if (!safeText(els.clientName.value)) {
        showNotice("Client name is required.", "error");
        return;
      }

      if (!safeText(els.jobTitle.value)) {
        showNotice("Job title is required.", "error");
        return;
      }

      const roleId = safeText(els.roleId.value);
      const payload = getEnhancedRolePayload();

      const dbPayload = {
        client_name: payload.client_name,
        title: payload.title,
        role_family: payload.role_family,
        location: payload.location,
        work_setup: payload.work_setup,
        employment_type: payload.employment_type,
        seniority_level: payload.seniority_level,
        status: payload.status,
        job_description: payload.job_description,
        required_skills: payload.required_skills,
        priority_skills: payload.priority_skills,
        nice_to_have_skills: payload.nice_to_have_skills,
        screening_summary: payload.screening_summary,
        screening_config: payload.screening_config,
        ai_screening_config: payload.ai_screening_config
      };

      if (roleId) {
        const { error } = await supabaseClient
          .from("jobs")
          .update(dbPayload)
          .eq("id", roleId);

        if (error) {
          console.error("Update failed:", error);
          showNotice(`Failed to update role: ${error.message || "Unknown error"}`, "error");
          return;
        }

        showNotice("Role updated successfully.");
      } else {
        const { error } = await supabaseClient
          .from("jobs")
          .insert({
            ...dbPayload,
            is_on_hold: false
          });

        if (error) {
          console.error("Insert failed:", error);
          showNotice(`Failed to save role: ${error.message || "Unknown error"}`, "error");
          return;
        }

        showNotice("Role saved successfully.");
      }

      clearForm(false);
      await loadRoles();
      refreshPreview();
    }

    function fillForm(role) {
      const hydrated = hydrateRole(role);

      els.roleId.value = hydrated.id || "";
      els.clientName.value = hydrated.client_name || "";
      els.jobTitle.value = hydrated.job_title || "";
      els.roleFamily.value = hydrated.role_family || "";
      els.location.value = hydrated.location || "";
      els.workSetup.value = hydrated.work_setup || "";
      els.employmentType.value = hydrated.employment_type || "";
      els.seniority.value = hydrated.seniority || "";
      els.roleStatus.value = hydrated.status || "Open";
      els.jobDescription.value = hydrated.job_description || "";
      els.requirements.value = hydrated.requirements || "";
      els.prioritySkills.value = hydrated.priority_skills || "";
      els.niceToHaveSkills.value = hydrated.nice_to_have_skills || "";
      questionItems = hydrated.screening_config || [];
      els.screeningSummaryOutput.textContent = hydrated.screening_summary || "No summary generated yet.";
      applySignalCalibrationToForm(hydrated.ai_screening_config || {});
      renderQuestions();
      refreshPreview();
      if (workspaceCollapsed) toggleWorkspace(false);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function clearForm(showMessage = true) {
      els.roleId.value = "";
      document.getElementById("roleForm").reset();
      questionItems = [];
      els.screeningSummaryOutput.textContent = "No summary generated yet.";
      els.signalSummaryOutput.textContent = buildSignalSummaryText(getSignalCalibrationPayload());
      renderQuestions();
      refreshPreview();
      if (showMessage) showNotice("Form cleared.");
    }

    async function toggleHoldRole(id, nextState) {
      const { error } = await supabaseClient
        .from("jobs")
        .update({ is_on_hold: nextState })
        .eq("id", id);

      if (error) {
        console.error(error);
        showNotice("Failed to update hold status.", "error");
        return;
      }

      showNotice(nextState ? "Role moved to on-hold." : "Role reopened.");
      await loadRoles();
    }

    function editRole(id) {
      const role = rolesCache.find(item => String(item.id) === String(id));
      if (!role) return;
      fillForm(role);
    }

    function toggleWorkspace(forceState = null) {
      workspaceCollapsed = forceState === null ? !workspaceCollapsed : !forceState ? false : true;

      if (workspaceCollapsed) {
        els.workspaceBody.classList.add("is-collapsed");
        els.toggleWorkspaceBtn.textContent = "Show Workspace";
        els.toggleWorkspaceBtnInline.textContent = "Show Workspace";
      } else {
        els.workspaceBody.classList.remove("is-collapsed");
        els.toggleWorkspaceBtn.textContent = "Hide Workspace";
        els.toggleWorkspaceBtnInline.textContent = "Hide Workspace";
      }
    }

    window.editRole = editRole;
    window.toggleHoldRole = toggleHoldRole;

    els.toggleWorkspaceBtn.addEventListener("click", () => toggleWorkspace());
    els.toggleWorkspaceBtnInline.addEventListener("click", () => toggleWorkspace());

    els.existingClientSelect.addEventListener("change", (event) => {
      const value = safeText(event.target.value);
      if (value) els.clientName.value = value;
    });

    els.buildSignalBtn.addEventListener("click", buildSignalSummary);

    els.addQuestionBtn.addEventListener("click", () => {
      questionItems.push(createEmptyQuestion());
      renderQuestions();
    });

    els.generateAiQuestionsBtn.addEventListener("click", generateAiQuestions);
    els.generateSummaryBtn.addEventListener("click", generateScreeningSummary);
    els.refreshPreviewBtn.addEventListener("click", refreshPreview);
    els.refreshPreviewBtnAside.addEventListener("click", refreshPreview);
    els.saveRoleBtn.addEventListener("click", saveRole);
    els.refreshRolesBtn.addEventListener("click", loadRoles);
    els.searchInput.addEventListener("input", renderRolesTable);
    els.holdFilter.addEventListener("change", renderRolesTable);

    [
      els.clientName,
      els.jobTitle,
      els.roleFamily,
      els.location,
      els.workSetup,
      els.employmentType,
      els.seniority,
      els.roleStatus,
      els.jobDescription,
      els.requirements,
      els.prioritySkills,
      els.niceToHaveSkills,
      els.signalNonNegotiables,
      els.signalRedFlags,
      els.signalMustHaveSkills,
      els.signalSuccessSignals,
      els.signalSetupCriticality,
      els.signalEnvironmentNotes,
      els.signalCommunicationWeight,
      els.signalStakeholderWeight,
      els.signalAutonomyLevel,
      els.signalDecisionMaking,
      els.signalBusinessPriorities
    ].forEach(el => {
      el.addEventListener("input", refreshPreview);
      el.addEventListener("change", () => {
        if (el.id && el.id.startsWith("signal")) {
          els.signalSummaryOutput.textContent = buildSignalSummaryText(getSignalCalibrationPayload());
        }
        refreshPreview();
      });
    });

    async function init() {
      renderQuestions();
      refreshPreview();
      els.signalSummaryOutput.textContent = buildSignalSummaryText(getSignalCalibrationPayload());
      await loadRoles();
    }

    init();
  </script>
</body>
</html>
