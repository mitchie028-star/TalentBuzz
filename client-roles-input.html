<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Client Roles Input | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --success:#166534;
      --error:#b91c1c;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      color: var(--blue);
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid transparent;
      text-decoration: none;
      font-weight: 800;
      font-size: .92rem;
      cursor: pointer;
      font-family: inherit;
      transition: .2s ease;
      background: white;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg,var(--blue),var(--blue-light));
      color: white;
    }

    .btn-outline {
      background: white;
      color: var(--blue);
      border-color: var(--line);
    }

    .btn-danger {
      background: white;
      color: var(--error);
      border-color: #fecaca;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 22px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: .9rem;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font: inherit;
      background: white;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(147,197,253,.25);
    }

    .notice {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: .92rem;
    }

    .notice.show { display: block; }
    .notice.success {
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }
    .notice.error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: .92rem;
    }

    th {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .container { padding: 18px 14px 30px; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div>
      <h1>Client Status / Open Roles</h1>
      <p class="subtitle">Add, edit, and manage client openings that feed directly into your jobs table.</p>
    </div>
    <div>
      <a href="recruiter-dashboard.html" class="btn btn-outline">Back to Recruiter Dashboard</a>
    </div>
  </div>

  <div id="notice" class="notice"></div>

  <div class="panel">
    <form id="roleForm">
      <div class="grid">
        <div>
          <label for="existing_client">Existing Client</label>
          <select id="existing_client">
            <option value="">Select existing client</option>
          </select>
        </div>

        <div>
          <label for="new_client_name">Or Add New Client</label>
          <input id="new_client_name" placeholder="Enter new client name">
        </div>

        <div>
          <label for="title">Role Title</label>
          <input id="title" required>
        </div>

        <div>
          <label for="industry">Industry</label>
          <select id="industry" required>
            <option value="">Select industry</option>
            <option value="BPO & Customer Support">BPO & Customer Support</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Manufacturing & Operations">Manufacturing & Operations</option>
            <option value="Retail & Lifestyle">Retail & Lifestyle</option>
            <option value="Information Technology">Information Technology</option>
          </select>
        </div>

        <div>
          <label for="location">Location</label>
          <input id="location">
        </div>

        <div>
          <label for="employment_type">Employment Type</label>
          <input id="employment_type" placeholder="Full-time">
        </div>

        <div>
          <label for="work_setup">Work Setup</label>
          <input id="work_setup" placeholder="Onsite / Hybrid / Remote">
        </div>

        <div>
          <label for="featured">Featured</label>
          <select id="featured">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>

        <div class="full">
          <label for="job_description">Job Description</label>
          <textarea id="job_description" placeholder="Enter the full job description, responsibilities, qualifications, salary, benefits, and important details."></textarea>
        </div>

        <div class="full">
          <label for="keywords">Keywords</label>
          <textarea id="keywords" placeholder="customer service, voice, csr, support"></textarea>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary" id="saveBtn">Save Role</button>
        <button type="button" class="btn btn-outline" id="resetBtn">Clear Form</button>
      </div>
    </form>
  </div>

  <div class="panel">
    <h2 style="margin-top:0; color:#1e3a8a;">Existing Roles</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Role</th>
            <th>Industry</th>
            <th>Location</th>
            <th>Work Setup</th>
            <th>Featured</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="jobsTable">
          <tr>
            <td colspan="8">Loading roles...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const ALLOWED_RECRUITER_EMAILS = [
    'mitchie028@gmail.com',
    'michelle.giray@talentbuzz.pro',
    'angel.n@talentbuzz.pro',
    'jercey.cayetano@talentbuzz.pro',
    'jayson.c@talentbuzz.pro',
    'xyrene.e@talentbuzz.pro'
  ];

  const form = document.getElementById('roleForm');
  const noticeEl = document.getElementById('notice');
  const saveBtn = document.getElementById('saveBtn');
  const resetBtn = document.getElementById('resetBtn');
  const jobsTable = document.getElementById('jobsTable');
  const existingClientSelect = document.getElementById('existing_client');

  let editingJobId = null;
  let allJobs = [];

  function showNotice(text, type = 'success') {
    noticeEl.textContent = text;
    noticeEl.className = `notice show ${type}`;
  }

  function clearNotice() {
    noticeEl.textContent = '';
    noticeEl.className = 'notice';
  }

  function shorten(text, max = 120) {
    const value = String(text || '');
    if (value.length <= max) return value;
    return value.slice(0, max) + '...';
  }

  async function protectPage() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session || !session.user) {
      window.location.href = 'login.html?redirect=client-roles-input.html';
      return false;
    }

    const email = String(session.user.email || '').toLowerCase();
    if (!ALLOWED_RECRUITER_EMAILS.includes(email)) {
      alert('Access denied.');
      window.location.href = 'dashboard.html';
      return false;
    }

    return true;
  }

  function resetForm() {
    editingJobId = null;
    form.reset();
    saveBtn.textContent = 'Save Role';
  }

  function populateClientDropdown() {
    const clients = [...new Set(allJobs.map(job => job.client_name).filter(Boolean))].sort();

    existingClientSelect.innerHTML =
      `<option value="">Select existing client</option>` +
      clients.map(client => `<option value="${client}">${client}</option>`).join('');
  }

  function renderJobsTable() {
    if (!allJobs.length) {
      jobsTable.innerHTML = `<tr><td colspan="8">No open roles yet.</td></tr>`;
      return;
    }

    jobsTable.innerHTML = allJobs.map(job => `
      <tr>
        <td>${job.client_name || '-'}</td>
        <td>${job.title || '-'}</td>
        <td>${job.industry || '-'}</td>
        <td>${job.location || '-'}</td>
        <td>${job.work_setup || '-'}</td>
        <td>${job.featured ? 'Yes' : 'No'}</td>
        <td>${shorten(job.job_description, 140) || '-'}</td>
        <td>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn btn-outline" onclick="editJob('${job.id}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteJob('${job.id}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function loadJobs() {
    const { data, error } = await supabaseClient
      .from('jobs')
      .select('id, client_name, title, location, industry, work_setup, featured, job_description, employment_type, keywords')
      .order('title', { ascending: true });

    if (error) {
      jobsTable.innerHTML = `<tr><td colspan="8">${error.message}</td></tr>`;
      return;
    }

    allJobs = data || [];
    populateClientDropdown();
    renderJobsTable();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearNotice();
    saveBtn.disabled = true;
    saveBtn.textContent = editingJobId ? 'Updating...' : 'Saving...';

    try {
      const existingClient = document.getElementById('existing_client').value.trim();
      const newClient = document.getElementById('new_client_name').value.trim();
      const client_name = newClient || existingClient;

      if (!client_name) {
        throw new Error('Please select an existing client or enter a new client name.');
      }

      const payload = {
        client_name,
        title: document.getElementById('title').value.trim(),
        location: document.getElementById('location').value.trim(),
        industry: document.getElementById('industry').value,
        employment_type: document.getElementById('employment_type').value.trim(),
        work_setup: document.getElementById('work_setup').value.trim(),
        job_description: document.getElementById('job_description').value.trim(),
        keywords: document.getElementById('keywords').value.trim().toLowerCase(),
        featured: document.getElementById('featured').value === 'true'
      };

      let error;

      if (editingJobId) {
        ({ error } = await supabaseClient
          .from('jobs')
          .update(payload)
          .eq('id', editingJobId));
      } else {
        ({ error } = await supabaseClient
          .from('jobs')
          .insert([payload]));
      }

      if (error) throw error;

      showNotice(editingJobId ? 'Role updated successfully.' : 'Open role saved successfully.', 'success');
      resetForm();
      await loadJobs();

    } catch (error) {
      showNotice(error.message || 'Error saving role.', 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = editingJobId ? 'Update Role' : 'Save Role';
      if (!editingJobId) saveBtn.textContent = 'Save Role';
    }
  });

  resetBtn.addEventListener('click', resetForm);

  window.editJob = function (id) {
    const job = allJobs.find(j => j.id === id);
    if (!job) return;

    editingJobId = id;

    document.getElementById('existing_client').value = '';
    document.getElementById('new_client_name').value = job.client_name || '';
    document.getElementById('title').value = job.title || '';
    document.getElementById('industry').value = job.industry || '';
    document.getElementById('location').value = job.location || '';
    document.getElementById('employment_type').value = job.employment_type || '';
    document.getElementById('work_setup').value = job.work_setup || '';
    document.getElementById('job_description').value = job.job_description || '';
    document.getElementById('keywords').value = job.keywords || '';
    document.getElementById('featured').value = job.featured ? 'true' : 'false';

    saveBtn.textContent = 'Update Role';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.deleteJob = async function (id) {
    const confirmed = window.confirm('Are you sure you want to delete this role?');
    if (!confirmed) return;

    const { error } = await supabaseClient
      .from('jobs')
      .delete()
      .eq('id', id);

    if (error) {
      showNotice(error.message, 'error');
      return;
    }

    allJobs = allJobs.filter(job => job.id !== id);

    if (editingJobId === id) {
      resetForm();
    }

    showNotice('Role deleted successfully.', 'success');
    renderJobsTable();
    populateClientDropdown();
  };

  (async () => {
    const allowed = await protectPage();
    if (!allowed) return;
    await loadJobs();
  })();
});
</script>
</body>
</html>
