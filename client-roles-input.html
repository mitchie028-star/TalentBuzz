<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Client Roles Input | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --success:#166534;
      --error:#b91c1c;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1020px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      color: var(--blue);
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid transparent;
      text-decoration: none;
      font-weight: 800;
      font-size: .92rem;
      cursor: pointer;
      font-family: inherit;
      transition: .2s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg,var(--blue),var(--blue-light));
      color: white;
    }

    .btn-outline {
      background: white;
      color: var(--blue);
      border-color: var(--line);
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 22px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: .9rem;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font: inherit;
      background: white;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(147,197,253,.25);
    }

    .notice {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: .92rem;
    }

    .notice.show { display: block; }
    .notice.success {
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }
    .notice.error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: .92rem;
    }

    th {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .container { padding: 18px 14px 30px; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div>
      <h1>Client Status / Open Roles</h1>
      <p class="subtitle">Add and manage client openings that feed directly into your jobs table.</p>
    </div>
    <div>
      <a href="recruiter-dashboard.html" class="btn btn-outline">Back to Recruiter Dashboard</a>
    </div>
  </div>

  <div id="notice" class="notice"></div>

  <div class="panel">
    <form id="roleForm">
      <div class="grid">
        <div>
          <label for="client_name">Client Name</label>
          <input id="client_name" required>
        </div>

        <div>
          <label for="title">Role Title</label>
          <input id="title" required>
        </div>

        <div>
          <label for="location">Location</label>
          <input id="location">
        </div>

        <div>
          <label for="industry">Industry</label>
          <input id="industry" placeholder="BPO & Customer Support">
        </div>

        <div>
          <label for="employment_type">Employment Type</label>
          <input id="employment_type" placeholder="Full-time">
        </div>

        <div>
          <label for="work_setup">Work Setup</label>
          <input id="work_setup" placeholder="Onsite / Hybrid / Remote">
        </div>

        <div class="full">
          <label for="job_description">Job Description</label>
          <textarea id="job_description" placeholder="Enter the full job description, responsibilities, qualifications, salary, benefits, and any other important details."></textarea>
        </div>

        <div class="full">
          <label for="keywords">Keywords</label>
          <textarea id="keywords" placeholder="customer service, voice, csr, support"></textarea>
        </div>

        <div>
          <label for="featured">Featured</label>
          <select id="featured">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>
      </div>

      <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="submit" class="btn btn-primary" id="saveBtn">Save Open Role</button>
      </div>
    </form>
  </div>

  <div class="panel">
    <h2 style="margin-top:0; color:#1e3a8a;">Recent Open Roles</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Role</th>
            <th>Location</th>
            <th>Industry</th>
            <th>Work Setup</th>
            <th>Featured</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody id="jobsTable">
          <tr>
            <td colspan="7">Loading roles...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const ALLOWED_RECRUITER_EMAILS = [
    'mitchie028@gmail.com',
    'michelle.giray@talentbuzz.pro',
    'angel.n@talentbuzz.pro',
    'jercey.cayetano@talentbuzz.pro',
    'jayson.c@talentbuzz.pro',
    'xyrene.e@talentbuzz.pro'
  ];

  const form = document.getElementById('roleForm');
  const noticeEl = document.getElementById('notice');
  const saveBtn = document.getElementById('saveBtn');
  const jobsTable = document.getElementById('jobsTable');

  function showNotice(text, type = 'success') {
    noticeEl.textContent = text;
    noticeEl.className = `notice show ${type}`;
  }

  function clearNotice() {
    noticeEl.textContent = '';
    noticeEl.className = 'notice';
  }

  function shorten(text, max = 120) {
    const value = String(text || '');
    if (value.length <= max) return value;
    return value.slice(0, max) + '...';
  }

  async function protectPage() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session || !session.user) {
      window.location.href = 'login.html?redirect=client-roles-input.html';
      return false;
    }

    const email = String(session.user.email || '').toLowerCase();
    if (!ALLOWED_RECRUITER_EMAILS.includes(email)) {
      alert('Access denied.');
      window.location.href = 'dashboard.html';
      return false;
    }

    return true;
  }

  async function loadJobs() {
    const { data, error } = await supabaseClient
      .from('jobs')
      .select('client_name, title, location, industry, work_setup, featured, job_description')
      .order('title', { ascending: true });

    if (error) {
      jobsTable.innerHTML = `<tr><td colspan="7">${error.message}</td></tr>`;
      return;
    }

    if (!data || !data.length) {
      jobsTable.innerHTML = `<tr><td colspan="7">No open roles yet.</td></tr>`;
      return;
    }

    jobsTable.innerHTML = data.map(job => `
      <tr>
        <td>${job.client_name || '-'}</td>
        <td>${job.title || '-'}</td>
        <td>${job.location || '-'}</td>
        <td>${job.industry || '-'}</td>
        <td>${job.work_setup || '-'}</td>
        <td>${job.featured ? 'Yes' : 'No'}</td>
        <td>${shorten(job.job_description, 140) || '-'}</td>
      </tr>
    `).join('');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearNotice();
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
      const client_name = document.getElementById('client_name').value.trim();
      const title = document.getElementById('title').value.trim();
      const location = document.getElementById('location').value.trim();
      const industry = document.getElementById('industry').value.trim();
      const employment_type = document.getElementById('employment_type').value.trim();
      const work_setup = document.getElementById('work_setup').value.trim();
      const job_description = document.getElementById('job_description').value.trim();
      const keywords = document.getElementById('keywords').value.trim().toLowerCase();
      const featured = document.getElementById('featured').value === 'true';

      const { error } = await supabaseClient
        .from('jobs')
        .insert([{
          client_name,
          title,
          location,
          industry,
          employment_type,
          work_setup,
          job_description,
          keywords,
          featured
        }]);

      if (error) throw error;

      showNotice('Open role saved successfully.', 'success');
      form.reset();
      await loadJobs();

    } catch (error) {
      showNotice(error.message || 'Error saving role.', 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save Open Role';
    }
  });

  (async () => {
    const allowed = await protectPage();
    if (!allowed) return;
    await loadJobs();
  })();
});
</script>
</body>
</html>
