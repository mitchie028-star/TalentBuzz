<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TalentBuzz ATS - Role Workspace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#0b1324; color:#fff; padding:20px;}
input,select,textarea,button { margin:6px 0; padding:10px; width:100%; }
button { cursor:pointer; background:#2563eb; color:white; border:none; }
.container { max-width:700px; margin:auto; }
</style>
</head>
<body>
<div class="container">
<h2>Role Intake (ATS Fixed)</h2>

<input type="hidden" id="clientId"/>

<label>Client Name</label>
<input id="clientName" placeholder="Type or select"/>

<label>Existing Clients</label>
<select id="clientSelect"><option value="">Select client</option></select>

<label>Job Title</label>
<input id="jobTitle"/>

<label>Location</label>
<input id="location"/>

<button onclick="saveRole()">Save Role</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://dilalntcxmvdcmwxjcct.supabase.co",
  "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs"
);

async function loadClients(){
  const {data} = await supabase.from("clients").select("*");
  const select = document.getElementById("clientSelect");
  data.forEach(c=>{
    const opt=document.createElement("option");
    opt.value=c.id;
    opt.textContent=c.client_name;
    select.appendChild(opt);
  });
}

document.getElementById("clientSelect").addEventListener("change", e=>{
  const opt=e.target.options[e.target.selectedIndex];
  document.getElementById("clientId").value=opt.value;
  document.getElementById("clientName").value=opt.textContent;
});

async function resolveClient(){
  let id=document.getElementById("clientId").value;
  let name=document.getElementById("clientName").value.trim();

  if(id) return id;

  let {data:existing}=await supabase
    .from("clients")
    .select("id")
    .ilike("client_name", name)
    .maybeSingle();

  if(existing) return existing.id;

  let {data,error}=await supabase
    .from("clients")
    .insert([{client_name:name}])
    .select()
    .single();

  if(error) throw error;
  return data.id;
}

async function saveRole(){
  try{
    const client_id=await resolveClient();
    const payload={
      title:document.getElementById("jobTitle").value,
      location:document.getElementById("location").value,
      client_id,
      client_uuid:client_id,
      client_name:document.getElementById("clientName").value
    };

    const {error}=await supabase.from("jobs").insert([payload]);
    if(error) throw error;

    alert("Saved successfully");
  }catch(e){
    alert(e.message);
  }
}

loadClients();
</script>
</body>
</html>
