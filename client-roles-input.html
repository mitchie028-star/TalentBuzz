<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Client Roles Input | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create and manage client roles, locations, salary range, and screening questions in TalentBuzz." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* --- Styles omitted for brevity, same as your existing code --- */
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Client Roles Input</h1>
        <p class="subtitle">Create and manage open roles, salary ranges, locations, and screening questions.</p>
      </div>
      <div class="top-actions">
        <a href="recruiter-dashboard.html" class="btn btn-outline">Back to Recruiter Dashboard</a>
      </div>
    </div>

    <div id="notice" class="notice"></div>

    <div class="layout">
      <div class="panel">
        <h2 id="formTitle">Add Role</h2>
        <form id="jobForm">
          <div class="grid">
            <!-- --- All your input fields here --- -->
            <div class="field">
              <label for="country">Country</label>
              <select id="country" required>
                <option value="">Loading countries...</option>
              </select>
            </div>

            <div class="field">
              <label for="state">State / Province / Region</label>
              <select id="state" required>
                <option value="">Select country first</option>
              </select>
            </div>

            <div class="field">
              <label for="city">City</label>
              <select id="city" required>
                <option value="">Select state first</option>
              </select>
            </div>
            <!-- --- Rest of your input fields --- -->
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary" id="saveBtn">Save Role</button>
            <button type="button" class="btn btn-outline" id="resetBtn">Reset</button>
            <button type="button" class="btn btn-danger hidden" id="deleteBtn">Delete Role</button>
          </div>
        </form>
      </div>

      <div class="panel">
        <h2>Existing Roles</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Role</th>
                <th>Client</th>
                <th>Location</th>
                <th>Work Setup</th>
                <th>Employment</th>
                <th>Salary Range</th>
                <th>Screening</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsTable">
              <tr>
                <td colspan="8" class="empty">Loading roles...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs";
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const ALLOWED_RECRUITER_EMAILS = [
        "mitchie028@gmail.com",
        "michelle.giray@talentbuzz.pro",
        "angel.n@talentbuzz.pro",
        "jercey.cayetano@talentbuzz.pro",
        "jayson.c@talentbuzz.pro",
        "xyrene.e@talentbuzz.pro"
      ];

      const state = {
        editingJobId: null,
        jobs: [],
        geography: [],
        selectedCountry: null,
        selectedState: null
      };

      const els = {
        notice: document.getElementById("notice"),
        formTitle: document.getElementById("formTitle"),
        jobForm: document.getElementById("jobForm"),
        saveBtn: document.getElementById("saveBtn"),
        resetBtn: document.getElementById("resetBtn"),
        deleteBtn: document.getElementById("deleteBtn"),
        jobsTable: document.getElementById("jobsTable"),
        title: document.getElementById("title"),
        clientName: document.getElementById("client_name"),
        country: document.getElementById("country"),
        state: document.getElementById("state"),
        city: document.getElementById("city"),
        workSetup: document.getElementById("work_setup"),
        industry: document.getElementById("industry"),
        employmentType: document.getElementById("employment_type"),
        salaryMin: document.getElementById("salary_min"),
        salaryMax: document.getElementById("salary_max"),
        keywords: document.getElementById("keywords"),
        jobDescription: document.getElementById("job_description"),
        screeningQuestions: document.getElementById("screening_questions_text"),
        featured: document.getElementById("featured"),
        status: document.getElementById("status")
      };

      function showNotice(message, type = "success") {
        els.notice.textContent = message;
        els.notice.className = `notice show ${type}`;
        window.clearTimeout(showNotice._timer);
        showNotice._timer = window.setTimeout(() => clearNotice(), 3500);
      }

      function clearNotice() {
        els.notice.textContent = "";
        els.notice.className = "notice";
      }

      function setBusy(isBusy) {
        els.saveBtn.disabled = isBusy;
        els.resetBtn.disabled = isBusy;
        if (!els.deleteBtn.classList.contains("hidden")) {
          els.deleteBtn.disabled = isBusy;
        }
        els.saveBtn.textContent = isBusy ? "Saving..." : "Save Role";
      }

      function makeSlug(value) {
        return String(value || "")
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function parseScreeningQuestions(raw) {
        return String(raw || "")
          .split("\n")
          .map((line, index) => {
            const trimmed = line.trim();
            if (!trimmed) return null;

            const parts = trimmed.split("|");
            let type = "text";
            let question = trimmed;

            if (parts.length > 1 && ["text", "yes_no", "number"].includes(parts[0].trim().toLowerCase())) {
              type = parts[0].trim().toLowerCase();
              question = parts.slice(1).join("|").trim();
            }

            if (!question) return null;

            return { question, type, required: true, sort_order: index };
          })
          .filter(Boolean);
      }

      function resetForm() {
        state.editingJobId = null;
        state.selectedCountry = null;
        state.selectedState = null;
        els.jobForm.reset();
        els.formTitle.textContent = "Add Role";
        els.deleteBtn.classList.add("hidden");
        els.featured.value = "false";
        els.status.value = "open";
        clearNotice();
        populateCountries();
        populateStates([]);
        populateCities([]);
      }

      function getLocationString() {
        return [els.city.value.trim(), els.state.value.trim(), els.country.value.trim()]
          .filter(Boolean)
          .join(", ");
      }

      // --- Cascading dropdowns ---
      function populateCountries() {
        const countries = [...state.geography].sort((a, b) => a.name.localeCompare(b.name));
        els.country.innerHTML =
          `<option value="">Select country</option>` +
          countries.map(country => `<option value="${country.name}">${country.name}</option>`).join("");
      }

      function populateStates(states, selectedValue = "") {
        els.state.innerHTML =
          `<option value="">${states.length ? "Select state" : "No states available"}</option>` +
          states.map(item => `<option value="${item.name}" ${item.name === selectedValue ? "selected" : ""}>${item.name}</option>`).join("");
      }

      function populateCities(cities, selectedValue = "") {
        els.city.innerHTML =
          `<option value="">${cities.length ? "Select city" : "No cities available"}</option>` +
          cities.map(city => `<option value="${city.name}" ${city.name === selectedValue ? "selected" : ""}>${city.name}</option>`).join("");
      }

      function findCountryByName(name) {
        return state.geography.find(country => country.name === name) || null;
      }

      function findStateByName(country, stateName) {
        if (!country || !Array.isArray(country.states)) return null;
        return country.states.find(item => item.name === stateName) || null;
      }

      function fillForm(job, questions) {
        state.editingJobId = job.id;
        els.formTitle.textContent = "Edit Role";
        els.deleteBtn.classList.remove("hidden");

        els.title.value = job.title || "";
        els.clientName.value = job.client_name || "";
        els.workSetup.value = job.work_setup || "";
        els.industry.value = job.industry || "";
        els.employmentType.value = job.employment_type || "";
        els.salaryMin.value = job.salary_min ?? "";
        els.salaryMax.value = job.salary_max ?? "";
        els.keywords.value = job.keywords || "";
        els.jobDescription.value = job.job_description || "";
        els.featured.value = String(Boolean(job.featured));
        els.status.value = job.status || "open";

        const countryName = job.country || "";
        const stateName = job.state || "";
        const cityName = job.city || "";

        // Populate countries and select
        populateCountries();
        els.country.value = countryName;
        const selectedCountry = findCountryByName(countryName);
        state.selectedCountry = selectedCountry;

        // Populate states and select
        const states = selectedCountry?.states || [];
        populateStates(states, stateName);
        const selectedState = findStateByName(selectedCountry, stateName);
        state.selectedState = selectedState;

        // Populate cities and select
        const cities = selectedState?.cities || [];
        populateCities(cities, cityName);

        // Screening questions
        els.screeningQuestions.value = (questions || [])
          .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0))
          .map(q => `${q.type || "text"}|${q.question}`)
          .join("\n");
      }

      async function protectPage() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session?.user) {
          window.location.href = "login.html?redirect=client-roles-input.html";
          return false;
        }
        const email = String(session.user.email || "").toLowerCase();
        if (!ALLOWED_RECRUITER_EMAILS.includes(email)) {
          alert("Access denied.");
          window.location.href = "dashboard.html";
          return false;
        }
        return true;
      }

      async function loadGeography() {
        try {
          const response = await fetch("https://raw.githubusercontent.com/dr5hn/countries-states-cities-database/master/json/countries+states+cities.json");
          if (!response.ok) throw new Error("Failed to load online location dataset.");
          const data = await response.json();
          state.geography = Array.isArray(data) ? data : [];
          populateCountries();
          populateStates([]);
          populateCities([]);
        } catch (error) {
          showNotice("Unable to load country/state/city dataset.", "error");
          els.country.innerHTML = `<option value="">Unable to load countries</option>`;
          els.state.innerHTML = `<option value="">Unable to load states</option>`;
          els.city.innerHTML = `<option value="">Unable to load cities</option>`;
        }
      }

      // --- Dropdown change events ---
      els.country.addEventListener("change", () => {
        const selectedCountry = findCountryByName(els.country.value);
        state.selectedCountry = selectedCountry;
        state.selectedState = null;

        const states = selectedCountry?.states || [];
        populateStates(states);
        populateCities([]);
      });

      els.state.addEventListener("change", () => {
        const selectedState = findStateByName(state.selectedCountry, els.state.value);
        state.selectedState = selectedState;

        const cities = selectedState?.cities || [];
        populateCities(cities);
      });

      // --- Form events and Supabase save/load ---
      els.jobForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await saveRole();
      });

      els.resetBtn.addEventListener("click", resetForm);
      els.deleteBtn.addEventListener("click", async () => {
        if (!state.editingJobId) return;
        await deleteRole(state.editingJobId);
      });

      els.jobsTable.addEventListener("click", async (event) => {
        const target = event.target;
        if (target.classList.contains("edit-role-btn")) await loadRoleForEdit(target.dataset.id);
        if (target.classList.contains("delete-role-btn")) await deleteRole(target.dataset.id);
      });

      (async () => {
        const allowed = await protectPage();
        if (!allowed) return;
        await loadGeography();
        await loadRoles();
      })();

      /* --- saveRole, loadRoles, loadRoleForEdit, deleteRole functions stay unchanged --- */
    });
  </script>
</body>
</html>
