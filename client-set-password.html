<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Password | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Set your TalentBuzz client portal password." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --white:#ffffff;
      --success:#166534;
      --error:#b91c1c;
      --info:#4338ca;
      --shadow:0 18px 40px rgba(30,58,138,.08), 0 4px 14px rgba(15,23,42,.06);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#f3f7ff 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:470px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      padding:28px;
      box-shadow:var(--shadow);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .brand-logo{
      height:52px;
      width:auto;
      object-fit:contain;
      display:block;
      flex-shrink:0;
    }

    h1{
      margin:0;
      color:var(--blue);
      font-size:1.8rem;
      line-height:1.1;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .subtitle{
      margin:0 0 20px;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.65;
    }

    .notice{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:.92rem;
      font-weight:700;
      line-height:1.6;
      border:1px solid transparent;
    }

    .notice.show{ display:block; }
    .notice.error{
      background:#fef2f2;
      color:var(--error);
      border-color:#fecaca;
    }
    .notice.success{
      background:#ecfdf5;
      color:var(--success);
      border-color:#bbf7d0;
    }
    .notice.info{
      background:#eef2ff;
      color:var(--info);
      border-color:#c7d2fe;
    }

    form{
      display:grid;
      gap:14px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-size:.9rem;
      font-weight:800;
    }

    .field input{
      width:100%;
      padding:13px 14px;
      border:1px solid var(--line);
      border-radius:14px;
      font:inherit;
      outline:none;
      background:#fff;
      color:var(--text);
    }

    .field input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:92px;
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      border:none;
      border-radius:12px;
      background:#eff6ff;
      color:var(--blue);
      font:inherit;
      font-size:.82rem;
      font-weight:800;
      padding:8px 12px;
      cursor:pointer;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:13px 16px;
      font:inherit;
      font-weight:800;
      cursor:pointer;
      min-height:48px;
      transition:.18s ease;
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:disabled{ opacity:.7; cursor:not-allowed; transform:none; }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .hint{
      margin-top:14px;
      color:var(--muted);
      font-size:.84rem;
      line-height:1.65;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="logo.png" alt="TalentBuzz Logo" class="brand-logo" />
      <div>
        <h1>Create Password</h1>
      </div>
    </div>

    <p class="subtitle">
      Set your password to activate your TalentBuzz client portal access.
    </p>

    <div id="notice" class="notice"></div>

    <form id="setPasswordForm">
      <div class="field">
        <label for="password">New Password</label>
        <div class="password-wrap">
          <input id="password" name="password" type="password" required />
          <button type="button" id="togglePassword" class="toggle-password">Show</button>
        </div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrap">
          <input id="confirmPassword" name="confirmPassword" type="password" required />
          <button type="button" id="toggleConfirmPassword" class="toggle-password">Show</button>
        </div>
      </div>

      <button id="submitBtn" type="submit" class="btn btn-primary">
        Activate Client Access
      </button>
    </form>

    <div class="hint">
      Use at least 8 characters. After activation, you’ll be redirected to the client login page.
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      form: document.getElementById("setPasswordForm"),
      password: document.getElementById("password"),
      confirmPassword: document.getElementById("confirmPassword"),
      submitBtn: document.getElementById("submitBtn"),
      notice: document.getElementById("notice"),
      togglePassword: document.getElementById("togglePassword"),
      toggleConfirmPassword: document.getElementById("toggleConfirmPassword")
    };

    function showNotice(message, type = "info") {
      els.notice.textContent = message;
      els.notice.className = `notice show ${type}`;
    }

    function clearNotice() {
      els.notice.textContent = "";
      els.notice.className = "notice";
    }

    function setBusy(isBusy) {
      els.submitBtn.disabled = isBusy;
      els.submitBtn.textContent = isBusy ? "Activating..." : "Activate Client Access";
    }

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token") || "";
    }

    function toggleInputVisibility(inputEl, buttonEl) {
      const isHidden = inputEl.type === "password";
      inputEl.type = isHidden ? "text" : "password";
      buttonEl.textContent = isHidden ? "Hide" : "Show";
    }

    async function completeInvite(token, password) {
      const { data, error } = await supabaseClient.functions.invoke("complete-client-invite", {
        body: { token, password }
      });

      if (error) throw error;
      if (data?.error) throw new Error(data.error);

      return data;
    }

    els.togglePassword.addEventListener("click", () => {
      toggleInputVisibility(els.password, els.togglePassword);
    });

    els.toggleConfirmPassword.addEventListener("click", () => {
      toggleInputVisibility(els.confirmPassword, els.toggleConfirmPassword);
    });

    els.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearNotice();

      const token = getToken();
      const password = els.password.value;
      const confirmPassword = els.confirmPassword.value;

      if (!token) {
        showNotice("This invite link is missing a token.", "error");
        return;
      }

      if (password.length < 8) {
        showNotice("Password must be at least 8 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showNotice("Passwords do not match.", "error");
        return;
      }

      try {
        setBusy(true);

        await completeInvite(token, password);

        showNotice("Your client portal access is now active. Redirecting to login...", "success");

        setTimeout(() => {
          window.location.href = "client-login.html";
        }, 1400);
      } catch (error) {
        console.error("Complete invite error:", error);
        showNotice(error.message || "Unable to activate your account.", "error");
      } finally {
        setBusy(false);
      }
    });
  </script>
</body>
</html>
