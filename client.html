<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Client Dashboard | TalentBuzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f8fbff}
.container{max-width:1200px;margin:auto;padding:20px}
.notice{display:none;padding:12px;border-radius:8px;margin-bottom:10px}
.notice.show{display:block}
.notice.info{background:#eef2ff}
</style>
</head>
<body>
<div class="container">
<h2>Client Dashboard</h2>
<div id="previewBanner" class="notice info"></div>
<div id="notice" class="notice"></div>
<table border="1" width="100%">
<thead>
<tr><th>Candidate</th><th>Role</th><th>Date</th></tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
const SUPABASE_ANON_KEY = "REPLACE_KEY";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const els = {
  tableBody: document.getElementById('tableBody'),
  notice: document.getElementById('notice'),
  previewBanner: document.getElementById('previewBanner')
};

function showNotice(msg,type='info'){
  els.notice.textContent = msg;
  els.notice.className = `notice show ${type}`;
}

function showPreviewBanner(msg){
  els.previewBanner.textContent = msg;
  els.previewBanner.classList.add('show');
}

function hidePreviewBanner(){
  els.previewBanner.textContent = '';
  els.previewBanner.classList.remove('show');
}

async function getSession(){
  const { data } = await supabase.auth.getSession();
  return data.session;
}

async function loadClientUser(email){
  const { data, error } = await supabase
    .from('client_users')
    .select('*')
    .eq('email', email)
    .eq('active', true)
    .single();

  if(error) throw error;
  return data;
}

async function loadData(clientId){
  const { data, error } = await supabase
    .from('client_endorsement_view')
    .select('*')
    .eq('client_id', clientId)
    .order('sent_at', { ascending:false });

  if(error) throw error;

  els.tableBody.innerHTML = '';

  if(!data.length){
    els.tableBody.innerHTML = '<tr><td colspan="3">No data</td></tr>';
    return;
  }

  data.forEach(row=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.full_name || '-'}</td>
      <td>${row.job_title || '-'}</td>
      <td>${row.sent_at ? new Date(row.sent_at).toLocaleString() : '-'}</td>
    `;
    els.tableBody.appendChild(tr);
  });
}

async function init(){
  try{
    const session = await getSession();

    if(!session){
      showNotice('Not logged in','error');
      return;
    }

    const email = session.user.email;

    const clientUser = await loadClientUser(email);

    hidePreviewBanner(); // CLEAN: always hidden

    await loadData(clientUser.client_id);

  }catch(err){
    console.error(err);
    showNotice(err.message,'error');
  }
}

init();
</script>
</body>
</html>
