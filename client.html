<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Management | TalentBuzz</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Manrope, sans-serif;
  background:#f8fafc;
  padding:24px;
}

.container {
  max-width:1100px;
  margin:auto;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1 {
  color:#1e3a8a;
}

.btn {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.btn-primary {
  background:#1e3a8a;
  color:white;
}

.btn-outline {
  background:white;
  border:1px solid #e2e8f0;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}

th, td {
  padding:14px;
  border-bottom:1px solid #e2e8f0;
  text-align:left;
}

.status {
  font-weight:700;
}

.status.active { color:green; }
.status.pending { color:orange; }
.status.expired { color:red; }
.status.none { color:#64748b; }
</style>
</head>

<body>
<div class="container">

<div class="header">
  <h1>Client Management</h1>
  <button class="btn btn-primary" onclick="openAddClient()">+ Add Client</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>
</table>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://dilalntcxmvdcmwxjcct.supabase.co",
  "YOUR_ANON_KEY"
);

async function loadClients() {

  const { data, error } = await supabase
    .from("client_invites")
    .select("*")
    .order("created_at", { ascending:false });

  if (error) {
    alert(error.message);
    return;
  }

  const grouped = {};

  data.forEach(row => {
    const key = row.email.toLowerCase();
    if (!grouped[key]) grouped[key] = row;
  });

  const table = document.getElementById("clientTable");
  table.innerHTML = "";

  for (const email in grouped) {
    const row = grouped[email];

    let status = "none";

    if (row.used) status = "active";
    else if (new Date(row.expires_at) < new Date()) status = "expired";
    else status = "pending";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.full_name || "-"}</td>
      <td>${row.email}</td>
      <td><span class="status ${status}">${status}</span></td>
      <td>
        ${status !== "active" ? `
          <button class="btn btn-outline resend-btn" data-email="${row.email}">
            Resend
          </button>
        ` : ""}
      </td>
    `;

    table.appendChild(tr);
  }
}

async function resendInvite(email) {
  const res = await supabase.functions.invoke("resend-client-invite", {
    body:{ email }
  });

  if (res.error) {
    alert("Error sending invite");
    return;
  }

  alert("Invite sent!");
  loadClients();
}

document.addEventListener("click", async (e) => {
  if (e.target.classList.contains("resend-btn")) {
    const email = e.target.dataset.email;

    if (!confirm(`Resend invite to ${email}?`)) return;

    await resendInvite(email);
  }
});

function openAddClient() {
  const name = prompt("Client Name:");
  const email = prompt("Client Email:");

  if (!email) return;

  sendInvite(name, email);
}

async function sendInvite(name, email) {

  const res = await supabase.functions.invoke("resend-client-invite", {
    body:{ email }
  });

  if (res.error) {
    alert(res.error.message);
    return;
  }

  alert("Invite sent!");
  loadClients();
}

loadClients();
</script>

</body>
</html>
