<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TalentBuzz Client Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Client portal login for TalentBuzz." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --white:#ffffff;
      --success:#166534;
      --error:#b91c1c;
      --info:#4338ca;
      --warning:#9a3412;
      --warning-bg:#fff7ed;
      --warning-line:#fed7aa;
      --shadow:0 18px 40px rgba(30,58,138,.08), 0 4px 14px rgba(15,23,42,.06);
    }

    * { box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#f3f7ff 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:460px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      padding:28px;
      box-shadow:var(--shadow);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .brand-logo{
      height:52px;
      width:auto;
      object-fit:contain;
      display:block;
      flex-shrink:0;
    }

    h1{
      margin:0;
      color:var(--blue);
      font-size:1.8rem;
      line-height:1.1;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .subtitle{
      margin:0 0 20px;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.65;
    }

    .notice{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:.92rem;
      font-weight:700;
      line-height:1.6;
      border:1px solid transparent;
    }

    .notice.show{ display:block; }

    .notice.error{
      background:#fef2f2;
      color:var(--error);
      border-color:#fecaca;
    }

    .notice.success{
      background:#ecfdf5;
      color:var(--success);
      border-color:#bbf7d0;
    }

    .notice.info{
      background:#eef2ff;
      color:var(--info);
      border-color:#c7d2fe;
    }

    .notice.warning{
      background:var(--warning-bg);
      color:var(--warning);
      border-color:var(--warning-line);
    }

    form{
      display:grid;
      gap:14px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-size:.9rem;
      font-weight:800;
    }

    .field input{
      width:100%;
      padding:13px 14px;
      border:1px solid var(--line);
      border-radius:14px;
      font:inherit;
      outline:none;
      background:#fff;
      color:var(--text);
    }

    .field input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:92px;
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      border:none;
      border-radius:12px;
      background:#eff6ff;
      color:var(--blue);
      font:inherit;
      font-size:.82rem;
      font-weight:800;
      padding:8px 12px;
      cursor:pointer;
      transition:.18s ease;
    }

    .toggle-password:hover{
      background:#dbeafe;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:13px 16px;
      font:inherit;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
      min-height:48px;
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:disabled{ opacity:.7; cursor:not-allowed; transform:none; }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .actions{
      display:grid;
      gap:10px;
      margin-top:4px;
    }

    .links{
      margin-top:14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .links a{
      color:var(--blue);
      text-decoration:none;
      font-size:.9rem;
      font-weight:700;
    }

    .links a:hover{
      text-decoration:underline;
    }

    .links a.is-disabled{
      pointer-events:none;
      opacity:.6;
    }

    .footnote{
      margin-top:16px;
      color:var(--muted);
      font-size:.84rem;
      line-height:1.6;
    }

    @media (max-width: 520px){
      .wrap{
        padding:22px;
        border-radius:20px;
      }

      h1{
        font-size:1.55rem;
      }

      .brand-logo{
        height:46px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="logo.png" alt="TalentBuzz Logo" class="brand-logo" />
      <div>
        <h1>Client Login</h1>
      </div>
    </div>

    <p class="subtitle">
      Sign in to view candidates endorsed to your company and provide feedback to the TalentBuzz team.
    </p>

    <div id="notice" class="notice"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button type="button" id="togglePassword" class="toggle-password">Show</button>
        </div>
      </div>

      <div class="actions">
        <button id="loginBtn" type="submit" class="btn btn-primary">Login</button>
      </div>
    </form>

    <div class="links">
      <a href="#" id="forgotPasswordLink">Forgot password?</a>
      <a href="index.html">Back to website</a>
    </div>

    <div class="footnote">
      Only approved client portal users can access this page.
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      form: document.getElementById("loginForm"),
      email: document.getElementById("email"),
      password: document.getElementById("password"),
      loginBtn: document.getElementById("loginBtn"),
      notice: document.getElementById("notice"),
      forgotPasswordLink: document.getElementById("forgotPasswordLink"),
      togglePassword: document.getElementById("togglePassword")
    };

    function normalizeEmail(value) {
      return String(value || "").trim().toLowerCase();
    }

    function showNotice(message, type = "info") {
      els.notice.textContent = message;
      els.notice.className = `notice show ${type}`;
    }

    function clearNotice() {
      els.notice.textContent = "";
      els.notice.className = "notice";
    }

    function setBusy(isBusy, label = "Login") {
      els.loginBtn.disabled = isBusy;
      els.loginBtn.textContent = isBusy ? "Signing in..." : label;

      if (isBusy) {
        els.forgotPasswordLink.classList.add("is-disabled");
      } else {
        els.forgotPasswordLink.classList.remove("is-disabled");
      }
    }

    async function checkClientPortalAccess(email) {
      const normalized = normalizeEmail(email);

      const { data, error } = await supabaseClient
        .from("client_users")
        .select("id, email, full_name, client_id")
        .eq("email", normalized)
        .limit(1);

      if (error) throw error;

      return Array.isArray(data) && data.length > 0 ? data[0] : null;
    }

    async function redirectIfAlreadySignedIn() {
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session?.user?.email) return;

      try {
        const clientUser = await checkClientPortalAccess(session.user.email);

        if (!clientUser) {
          await supabaseClient.auth.signOut();
          return;
        }

        window.location.href = "client-dashboard.html";
      } catch (error) {
        console.error("Session check failed:", error);
      }
    }

    async function signInClient(email, password) {
      clearNotice();
      setBusy(true);

      try {
        const clientUser = await checkClientPortalAccess(email);

        if (!clientUser) {
          showNotice("This email is not authorized for client portal access.", "error");
          return;
        }

        const { error } = await supabaseClient.auth.signInWithPassword({
          email: normalizeEmail(email),
          password
        });

        if (error) {
          showNotice(error.message || "Unable to sign in.", "error");
          return;
        }

        showNotice("Login successful. Redirecting...", "success");
        window.location.href = "client-dashboard.html";
      } catch (error) {
        console.error("Client login error:", error);
        showNotice(error.message || "Something went wrong during login.", "error");
      } finally {
        setBusy(false, "Login");
      }
    }

    async function createPasswordResetRequest(email) {
      const normalized = normalizeEmail(email);

      if (!normalized) {
        showNotice("Enter your email first so the administrator knows which account needs help.", "error");
        els.email.focus();
        return;
      }

      try {
        const clientUser = await checkClientPortalAccess(normalized);

        if (!clientUser) {
          showNotice("This email is not authorized for client portal access.", "error");
          return;
        }

        const { data: existing, error: existingError } = await supabaseClient
          .from("password_reset_requests")
          .select("id, status")
          .eq("email", normalized)
          .eq("portal", "client")
          .eq("status", "pending")
          .limit(1);

        if (existingError) throw existingError;

        if (existing && existing.length > 0) {
          showNotice("A password reset request is already pending for this account.", "warning");
          return;
        }

        const { error: insertError } = await supabaseClient
          .from("password_reset_requests")
          .insert([{
            email: normalized,
            requested_by: normalized,
            portal: "client",
            status: "pending"
          }]);

        if (insertError) throw insertError;

        showNotice("Your password reset request has been sent to the administrator.", "success");
      } catch (error) {
        console.error("Password reset request error:", error);
        showNotice(error.message || "Unable to send your request to the administrator.", "error");
      }
    }

    function togglePasswordVisibility() {
      const isHidden = els.password.type === "password";
      els.password.type = isHidden ? "text" : "password";
      els.togglePassword.textContent = isHidden ? "Hide" : "Show";
    }

    els.form.addEventListener("submit", async (event) => {
      event.preventDefault();
      await signInClient(els.email.value, els.password.value);
    });

    els.forgotPasswordLink.addEventListener("click", async (event) => {
      event.preventDefault();
      await createPasswordResetRequest(els.email.value);
    });

    els.togglePassword.addEventListener("click", togglePasswordVisibility);

    redirectIfAlreadySignedIn();
  </script>
</body>
</html>
