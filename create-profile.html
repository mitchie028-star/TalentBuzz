<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Profile | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Complete your TalentBuzz profile to apply faster and get matched with top opportunities.">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --success:#166534;
      --error:#b91c1c;
      --shadow-soft: 0 10px 30px rgba(30, 58, 138, 0.06), 0 2px 10px rgba(15, 23, 42, 0.03);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #fff;
      color: #0f172a;
    }

    .container {
      max-width: 820px;
      margin: auto;
      padding: 24px 20px 60px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      color: var(--blue);
      font-size: 2.2rem;
      margin: 0 0 8px;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      margin: 0 0 28px;
      line-height: 1.8;
    }

    .card {
      background: linear-gradient(180deg, #fbfdff 0%, #f8fbff 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--shadow-soft);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      background: white;
    }

    input:focus, textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(147,197,253,0.25);
    }

    textarea {
      resize: vertical;
      min-height: 140px;
    }

    .readonly {
      background: #f8fafc;
      color: #475569;
    }

    .btn {
      margin-top: 24px;
      width: 100%;
      background: linear-gradient(135deg,#1e3a8a,#2563eb);
      color: white;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.success {
      display: block;
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .file-note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.85rem;
      }

      .container {
        padding: 20px 14px 40px;
      }

      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="applicants.html" class="back">← Back to Opportunities</a>

    <h1>Complete Your Profile</h1>
    <p class="subtitle">
      Finish your TalentBuzz profile so you can apply faster and get matched with the right opportunities.
    </p>

    <div class="card">
      <form id="profileForm">
        <div class="grid">
          <div>
            <label for="full_name">Full Name</label>
            <input id="full_name" type="text" required>
          </div>

          <div>
            <label for="email">Email Address</label>
            <input id="email" type="email" class="readonly" readonly>
          </div>

          <div>
            <label for="phone">Phone Number</label>
            <input id="phone" type="text" placeholder="09XXXXXXXXX">
          </div>

          <div>
            <label for="location">Location</label>
            <input id="location" type="text" placeholder="City, Province">
          </div>

          <div class="full">
            <label for="experience">Work Experience Summary</label>
            <textarea id="experience" placeholder="Briefly describe your work experience, background, or the type of roles you are looking for."></textarea>
          </div>

          <div class="full">
            <label for="resume">Upload Resume</label>
            <input id="resume" type="file" accept=".pdf,.doc,.docx">
            <div class="file-note">Accepted formats: PDF, DOC, DOCX</div>
          </div>
        </div>

        <button id="saveBtn" class="btn" type="submit">Save Profile</button>
      </form>

      <div id="message" class="message"></div>

      <div class="note">
        Your information is used only for job application and recruitment purposes.
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const job = params.get('job');

    const form = document.getElementById('profileForm');
    const saveBtn = document.getElementById('saveBtn');
    const message = document.getElementById('message');

    let currentUser = null;
    let existingProfile = null;

    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message ' + type;
    }

    function clearMessage() {
      message.textContent = '';
      message.className = 'message';
    }

    function getFullNameFromMetadata(user) {
      const metadata = user.user_metadata || {};
      return (
        metadata.full_name ||
        metadata.name ||
        `${metadata.given_name || ''} ${metadata.family_name || ''}`.trim() ||
        user.email.split('@')[0]
      );
    }

    async function loadUserAndProfile() {
      const { data: { user } } = await supabaseClient.auth.getUser();

      if (!user) {
        window.location.href = job
          ? `login.html?job=${encodeURIComponent(job)}`
          : 'login.html';
        return;
      }

      currentUser = user;

      document.getElementById('email').value = user.email || '';
      document.getElementById('full_name').value = getFullNameFromMetadata(user);

      const { data, error } = await supabaseClient
        .from('applicant_profiles')
        .select('*')
        .eq('email', user.email)
        .maybeSingle();

      if (!error && data) {
        existingProfile = data;

        document.getElementById('full_name').value = data.full_name || getFullNameFromMetadata(user);
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('location').value = data.location || '';
        document.getElementById('experience').value = data.experience_summary || '';
      }
    }

    async function uploadResume(file) {
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const filePath = `${Date.now()}-${safeName}`;

  const { error } = await supabaseClient
    .storage
    .from('resumes') // ✅ FIXED BUCKET NAME
    .upload(filePath, file);

  if (error) throw error;

  return filePath;
}

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();

      if (!currentUser) {
        showMessage('Please log in first.', 'error');
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        const full_name = document.getElementById('full_name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const location = document.getElementById('location').value.trim();
        const experience_summary = document.getElementById('experience').value.trim();
        const resumeFile = document.getElementById('resume').files[0];

        let resume_path = existingProfile?.resume_path || null;

        if (resumeFile) {
          resume_path = await uploadResume(resumeFile);
        }

        if (existingProfile) {
          const { error: updateError } = await supabaseClient
            .from('applicant_profiles')
            .update({
              full_name,
              phone,
              location,
              experience_summary,
              resume_path
            })
            .eq('email', email);

          if (updateError) throw updateError;
        } else {
          const { error: insertError } = await supabaseClient
            .from('applicant_profiles')
            .insert([{
              full_name,
              email,
              phone,
              location,
              experience_summary,
              resume_path
            }]);

          if (insertError) throw insertError;
        }

        showMessage('✅ Profile saved successfully.', 'success');

        setTimeout(() => {
          if (job) {
            window.location.href = `apply.html?job=${encodeURIComponent(job)}`;
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 900);

      } catch (error) {
        showMessage(error.message || 'Something went wrong while saving your profile.', 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Profile';
      }
    });

    loadUserAndProfile();
  </script>

</body>
</html>
