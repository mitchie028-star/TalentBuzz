<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Profile | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your TalentBuzz profile and apply to top jobs faster. Upload your resume and get matched with opportunities.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
    }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #fff;
      color: #0f172a;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      color: var(--blue);
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 30px;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    .btn {
      margin-top: 24px;
      width: 100%;
      background: linear-gradient(135deg,#1e3a8a,#2563eb);
      color: white;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <a href="applicants.html" class="back">← Back to Opportunities</a>

    <h1>Create Your Profile</h1>
    <p class="subtitle">
      Build your TalentBuzz profile to apply faster and get matched with top opportunities.
    </p>

    <div class="card">

      <form>

        <label>Full Name</label>
        <input type="text" placeholder="e.g. Juan Dela Cruz" required>

        <label>Email Address</label>
        <input type="email" placeholder="you@email.com" required>

        <label>Phone Number</label>
        <input type="text" placeholder="09XXXXXXXXX">

        <label>Location</label>
        <input type="text" placeholder="City, Province">

        <label>Work Experience Summary</label>
        <textarea rows="4" placeholder="Brief summary of your experience..."></textarea>

        <label>Upload Resume</label>
        <input type="file" accept=".pdf,.doc,.docx">

        <button class="btn">Save Profile</button>

      </form>

      <div class="note">
        Your information is kept secure and will only be used for job applications.
      </div>

    </div>

  </div>

</body>
</html>
