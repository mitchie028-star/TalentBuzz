<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Profile | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      margin: 0;
      background: #fff;
      color: #0f172a;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 30px 20px;
    }

    h1 {
      color: #1e3a8a;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 25px;
    }

    .card {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      background: #f8fbff;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      font: inherit;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg,#1e3a8a,#2563eb);
      color: white;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

    .success {
      display: block;
      background: #ecfdf5;
      color: #166534;
    }

    .error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Complete Your Profile</h1>
  <p class="subtitle">Finish your profile to apply faster and get matched with jobs.</p>

  <div class="card">
    <form id="profileForm">

      <label>Full Name</label>
      <input id="full_name" required>

      <label>Email</label>
      <input id="email" readonly>

      <label>Phone</label>
      <input id="phone">

      <label>Location</label>
      <input id="location">

      <label>Experience Summary</label>
      <textarea id="experience"></textarea>

      <label>Resume</label>
      <input id="resume" type="file" accept=".pdf,.doc,.docx">

      <button type="submit" class="btn" id="saveBtn">Save Profile</button>
    </form>

    <div id="message" class="message"></div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const job = params.get('job');
  const fromApply = params.get('fromApply');
  const redirect = params.get('redirect');

  const form = document.getElementById('profileForm');
  const message = document.getElementById('message');
  const saveBtn = document.getElementById('saveBtn');

  let currentUser = null;
  let existingProfile = null;

  function showMessage(text, type) {
    message.textContent = text;
    message.className = 'message ' + type;
  }

  function clearMessage() {
    message.textContent = '';
    message.className = 'message';
  }

  function setSavingState(isSaving) {
    saveBtn.disabled = isSaving;
    saveBtn.textContent = isSaving ? 'Saving...' : 'Save Profile';
  }

  function getFullName(user) {
    const m = user.user_metadata || {};
    return (
      m.full_name ||
      m.name ||
      `${m.given_name || ''} ${m.family_name || ''}`.trim() ||
      (user.email ? user.email.split('@')[0] : '')
    );
  }

  function validateResumeFile(file) {
    if (!file) return;

    const allowedExtensions = ['.pdf', '.doc', '.docx'];
    const lowerName = file.name.toLowerCase();
    const isValid = allowedExtensions.some(ext => lowerName.endsWith(ext));

    if (!isValid) {
      throw new Error('Please upload a PDF, DOC, or DOCX file only.');
    }
  }

  async function loadUser() {
    const { data: { user }, error } = await supabaseClient.auth.getUser();

    if (error || !user) {
      window.location.href = 'login.html';
      return;
    }

    currentUser = user;

    document.getElementById('email').value = user.email || '';
    document.getElementById('full_name').value = getFullName(user);

    const { data, error: profileError } = await supabaseClient
      .from('applicant_profiles')
      .select('*')
      .eq('email', user.email)
      .maybeSingle();

    if (profileError) {
      showMessage(profileError.message || 'Unable to load profile.', 'error');
      return;
    }

    if (data) {
      existingProfile = data;

      document.getElementById('full_name').value = data.full_name || getFullName(user);
      document.getElementById('phone').value = data.phone || '';
      document.getElementById('location').value = data.location || '';
      document.getElementById('experience').value = data.experience_summary || '';
    }
  }

  async function uploadResume(file) {
    validateResumeFile(file);

    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const safeFolder = (currentUser.email || currentUser.id || 'unknown')
      .replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `manual/${safeFolder}/${Date.now()}-${safeName}`;

    const { error } = await supabaseClient
      .storage
      .from('resumes')
      .upload(path, file, { upsert: false });

    if (error) throw error;

    return { path };
  }

  function redirectAfterSave() {
    if (fromApply === '1' && job) {
      window.location.href = `apply.html?job=${encodeURIComponent(job)}`;
      return;
    }

    if (redirect) {
      window.location.href = redirect;
      return;
    }

    window.location.href = 'dashboard.html';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMessage();
    setSavingState(true);

    try {
      const full_name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const phone = document.getElementById('phone').value.trim();
      const location = document.getElementById('location').value.trim();
      const experience = document.getElementById('experience').value.trim();
      const file = document.getElementById('resume').files[0];

      if (!full_name) {
        throw new Error('Full name is required.');
      }

      if (!email) {
        throw new Error('Email is required.');
      }

      let resume_path = existingProfile?.resume_path || null;
      let resume_url = null;

      if (file) {
        const uploaded = await uploadResume(file);
        resume_path = uploaded.path;
        resume_url = null;
      }

      if (existingProfile) {
        const { data, error } = await supabaseClient
          .from('applicant_profiles')
          .update({
            full_name,
            phone,
            location,
            experience_summary: experience,
            resume_path,
            resume_url
          })
          .eq('email', email)
          .select()
          .single();

        if (error) throw error;
        existingProfile = data;
      } else {
        const { data, error } = await supabaseClient
          .from('applicant_profiles')
          .insert([{
            full_name,
            email,
            phone,
            location,
            experience_summary: experience,
            resume_path,
            resume_url
          }])
          .select()
          .single();

        if (error) throw error;
        existingProfile = data;
      }

      showMessage('Profile saved successfully.', 'success');

      setTimeout(() => {
        redirectAfterSave();
      }, 700);

    } catch (err) {
      showMessage(err.message || 'Error saving profile.', 'error');
    } finally {
      setSavingState(false);
    }
  });

  loadUser();
</script>

</body>
</html>
