<script>
  const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;

  function formatDate(dateString) {
    if (!dateString) return '-';
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return '-';
    return date.toLocaleDateString(undefined, {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });
  }

  function getStatusClass(status) {
    if (!status) return 'status-submitted';
    const value = String(status).toLowerCase();
    if (value === 'submitted') return 'status-submitted';
    if (value === 'withdrawn') return 'status-withdrawn';
    return 'status-other';
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function buildApplyUrl(job) {
    const params = new URLSearchParams();
    params.set('job', job.title || 'this role');
    if (job.id) params.set('job_id', job.id);
    return `apply.html?${params.toString()}`;
  }

  function buildApplicantsBrowseUrl() {
    return 'applicants.html';
  }

  async function getResumeUrl(profile) {
    if (!profile) return '';

    if (profile.resume_url) {
      return profile.resume_url;
    }

    if (profile.resume_path) {
      const { data, error } = await supabaseClient
        .storage
        .from('resumes')
        .createSignedUrl(profile.resume_path, 3600);

      if (error) return '';
      return data?.signedUrl || '';
    }

    return '';
  }

  async function requireAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session || !session.user) {
      window.location.href = `login.html?redirect=${encodeURIComponent('dashboard.html')}`;
      return null;
    }

    return session.user;
  }

  async function init() {
    const user = await requireAuth();
    if (!user) return;

    currentUser = user;
    document.getElementById('email').textContent = user.email || '-';

    const browseCareersLink = document.querySelector('a[href="applicants.html"]');
    if (browseCareersLink) {
      browseCareersLink.href = buildApplicantsBrowseUrl();
    }

    await loadProfile(user.email);
    await loadApplications(user.email);
    await loadJobs(user.email);
  }

  async function loadProfile(email) {
    const { data, error } = await supabaseClient
      .from('applicant_profiles')
      .select('*')
      .eq('email', email)
      .maybeSingle();

    const resumeStatusEl = document.getElementById('resumeStatus');

    if (error || !data) {
      document.getElementById('name').textContent = '-';
      document.getElementById('phone').textContent = '-';
      document.getElementById('location').textContent = '-';
      resumeStatusEl.textContent = 'Not uploaded';
      return;
    }

    document.getElementById('name').textContent = data.full_name || '-';
    document.getElementById('phone').textContent = data.phone || '-';
    document.getElementById('location').textContent = data.location || '-';

    const resumeUrl = await getResumeUrl(data);

    if (resumeUrl) {
      resumeStatusEl.innerHTML = `
        <a href="${resumeUrl}" target="_blank" rel="noopener noreferrer" class="resume-link">
          View Resume
        </a>
      `;
    } else {
      resumeStatusEl.textContent = 'Not uploaded';
    }
  }

  async function loadApplications(email) {
    const { data, error } = await supabaseClient
      .from('applications')
      .select('*')
      .eq('email', email)
      .order('created_at', { ascending: false });

    const table = document.getElementById('applicationsTable');

    if (error) {
      table.innerHTML = `<tr><td colspan="4" class="empty">${escapeHtml(error.message)}</td></tr>`;
      return;
    }

    if (!data || data.length === 0) {
      table.innerHTML = `<tr><td colspan="4" class="empty">No applications yet</td></tr>`;
      return;
    }

    table.innerHTML = data.map(app => `
      <tr>
        <td>${escapeHtml(app.job_title || '-')}</td>
        <td>
          <span class="status-pill ${getStatusClass(app.status)}">
            ${escapeHtml(app.status || 'submitted')}
          </span>
        </td>
        <td>${escapeHtml(formatDate(app.created_at))}</td>
        <td>
          ${String(app.status || 'submitted').toLowerCase() !== 'withdrawn'
            ? `<button class="btn btn-danger" onclick="withdrawApplication('${app.id}')">Withdraw</button>`
            : `<span class="muted">—</span>`
          }
        </td>
      </tr>
    `).join('');
  }

  async function withdrawApplication(id) {
    const confirmed = window.confirm('Are you sure you want to withdraw this application?');
    if (!confirmed) return;

    const { error } = await supabaseClient
      .from('applications')
      .update({ status: 'withdrawn' })
      .eq('id', id);

    if (!error && currentUser) {
      await loadApplications(currentUser.email);
      await loadJobs(currentUser.email);
    }
  }

  async function loadJobs(userEmail) {
    const jobsContainer = document.getElementById('jobsList');

    const { data: profile } = await supabaseClient
      .from('applicant_profiles')
      .select('*')
      .eq('email', userEmail)
      .maybeSingle();

    const { data: applications } = await supabaseClient
      .from('applications')
      .select('job_title, job_id_uuid')
      .eq('email', userEmail);

    const appliedTitles = new Set(
      (applications || []).map(app => String(app.job_title || '').toLowerCase())
    );

    const appliedJobIds = new Set(
      (applications || [])
        .map(app => app.job_id_uuid)
        .filter(Boolean)
    );

    const { data: jobs, error } = await supabaseClient
      .from('jobs')
      .select('*')
      .eq('status', 'open')
      .order('featured', { ascending: false })
      .order('title', { ascending: true });

    if (error) {
      jobsContainer.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
      return;
    }

    if (!jobs || jobs.length === 0) {
      jobsContainer.innerHTML = `<div class="empty">No recommended jobs available yet.</div>`;
      return;
    }

    const candidateLocation = String(profile?.location || '').toLowerCase();
    const candidateExperience = String(profile?.experience_summary || '').toLowerCase();
    const candidateSkills = String(profile?.skills || '').toLowerCase();
    const candidateTitle = String(profile?.current_title || '').toLowerCase();

    const combinedCandidateText = [
      candidateExperience,
      candidateSkills,
      candidateTitle
    ].join(' ');

    const candidateWords = combinedCandidateText
      .split(/[\s,./()\-]+/)
      .map(word => word.trim())
      .filter(word => word.length > 2);

    const scoredJobs = jobs
      .filter(job => {
        const titleMatch = appliedTitles.has(String(job.title || '').toLowerCase());
        const idMatch = job.id && appliedJobIds.has(job.id);
        return !titleMatch && !idMatch;
      })
      .map(job => {
        let score = 0;

        const jobTitle = String(job.title || '').toLowerCase();
        const jobLocation = String(job.location || '').toLowerCase();
        const jobCountry = String(job.country || '').toLowerCase();
        const jobState = String(job.state || '').toLowerCase();
        const jobCity = String(job.city || '').toLowerCase();
        const jobIndustry = String(job.industry || '').toLowerCase();
        const jobKeywords = String(job.keywords || '').toLowerCase();
        const jobDescription = String(job.job_description || '').toLowerCase();
        const jobWorkSetup = String(job.work_setup || '').toLowerCase();

        const fullJobLocation = [jobCity, jobState, jobCountry, jobLocation].join(' ');

        if (candidateLocation && fullJobLocation.includes(candidateLocation)) score += 5;

        if (
          candidateLocation &&
          candidateLocation.split(/[,\s]+/).some(part => part && fullJobLocation.includes(part))
        ) {
          score += 2;
        }

        candidateWords.forEach(word => {
          if (jobKeywords.includes(word)) score += 2;
          if (jobTitle.includes(word)) score += 2;
          if (jobIndustry.includes(word)) score += 1;
          if (jobDescription.includes(word)) score += 1;
        });

        if (job.featured) score += 2;
        if (jobWorkSetup === 'remote') score += 1;

        return { ...job, score };
      })
      .sort((a, b) => b.score - a.score)
      .slice(0, 6);

    if (!scoredJobs.length) {
      jobsContainer.innerHTML = `<div class="empty">No recommended jobs available yet.</div>`;
      return;
    }

    jobsContainer.innerHTML = scoredJobs.map(job => {
      const locationLabel = [
        job.city || '',
        job.state || '',
        job.country || ''
      ].filter(Boolean).join(', ') || job.location || 'Location not specified';

      const metaParts = [
        locationLabel,
        job.industry || '',
        job.work_setup || '',
        job.employment_type || ''
      ].filter(Boolean);

      return `
        <div class="job-card">
          <div class="job-score">Match Score: ${job.score}</div>
          <h4>${escapeHtml(job.title || 'Untitled Role')}</h4>
          <div class="job-meta">
            ${escapeHtml(metaParts.join(' | '))}
          </div>
          <div class="job-actions">
            <a href="${buildApplyUrl(job)}" class="btn btn-primary">Apply</a>
          </div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'index.html';
  });

  init();
</script>
