<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Applicant Dashboard | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Applicant dashboard for TalentBuzz." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --success:#166534;
      --danger:#b91c1c;
      --shadow:0 14px 40px rgba(30,58,138,.08),0 3px 10px rgba(15,23,42,.04);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--text);
    }
    .container{
      max-width:1200px;
      margin:auto;
      padding:24px 20px 40px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .topbar h1{
      margin:0 0 6px;
      color:var(--blue);
      font-size:2rem;
    }
    .subtitle{
      margin:0;
      color:var(--muted);
    }
    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:11px 14px;
      border-radius:12px;
      border:1px solid transparent;
      text-decoration:none;
      font-weight:800;
      font-size:.92rem;
      cursor:pointer;
      font-family:inherit;
      background:#fff;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }
    .btn-outline{
      color:var(--blue);
      border-color:var(--line);
    }
    .btn-danger{
      color:var(--danger);
      border-color:#fecaca;
    }
    .grid{
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
      gap:20px;
    }
    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:20px;
    }
    .card h2{
      margin:0 0 14px;
      color:var(--blue);
      font-size:1.2rem;
    }
    .profile-line{
      margin-bottom:12px;
    }
    .label{
      display:block;
      font-size:.78rem;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.06em;
      font-weight:800;
      margin-bottom:4px;
    }
    .value{
      font-size:.96rem;
      color:var(--text);
    }
    .notice{
      display:none;
      margin-bottom:16px;
      padding:12px 14px;
      border-radius:12px;
      font-size:.92rem;
      font-weight:700;
      white-space:pre-wrap;
    }
    .notice.show{display:block}
    .notice.success{background:#ecfdf5;color:var(--success);border:1px solid #bbf7d0}
    .notice.error{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
    .apps-table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
      background:#fff;
    }
    th,td{
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
    }
    th{
      color:var(--muted);
      font-size:.78rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.06em;
      background:#f8fbff;
    }
    .status-pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:.76rem;
      font-weight:800;
      text-transform:capitalize;
      background:#dbeafe;
      color:#1d4ed8;
    }
    .status-failed-paper-screening,
    .status-withdrawn,
    .status-rejected,
    .status-no-show-onboarding{background:#fee2e2;color:#b91c1c}
    .status-endorsed,
    .status-assessment,
    .status-initial,
    .status-final{background:#fef3c7;color:#b45309}
    .status-hired,
    .status-onboarded{background:#dcfce7;color:#166534}
    .empty{
      color:var(--muted);
      padding:10px 0;
    }
    @media (max-width: 920px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>My Dashboard</h1>
        <p class="subtitle">View your profile and track your job applications.</p>
      </div>

      <div class="top-actions">
        <a href="applicants.html" class="btn btn-outline">Browse Careers</a>
        <a href="create-profile.html" class="btn btn-outline">Edit Profile</a>
        <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
      </div>
    </div>

    <div id="notice" class="notice"></div>

    <div class="grid">
      <div class="card">
        <h2>Profile</h2>
        <div id="profileBox">
          <div class="empty">Loading profile...</div>
        </div>
      </div>

      <div class="card">
        <h2>My Applications</h2>
        <div class="apps-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Role</th>
                <th>Status</th>
                <th>Applied</th>
                <th>Recruiter</th>
                <th>Source</th>
                <th>Latest Note</th>
              </tr>
            </thead>
            <tbody id="applicationsTable">
              <tr><td colspan="6" class="empty">Loading applications...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const els = {
        profileBox: document.getElementById('profileBox'),
        applicationsTable: document.getElementById('applicationsTable'),
        logoutBtn: document.getElementById('logoutBtn'),
        notice: document.getElementById('notice')
      };

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function formatDate(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        if (Number.isNaN(date.getTime())) return '-';
        return date.toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });
      }

      function getStatusClass(status) {
        return (
          'status-' +
          String(status || 'submitted')
            .toLowerCase()
            .replace(/\s+/g, '-')
            .replace(/[()]/g, '')
        );
      }

      function showNotice(message, type = 'success') {
        els.notice.textContent = message;
        els.notice.className = `notice show ${type}`;
      }

      async function protectApplicantPage() {
        const {
          data: { session }
        } = await supabaseClient.auth.getSession();

        if (!session?.user) {
          window.location.href = 'login.html';
          return null;
        }

        return session.user;
      }

      async function loadProfile(user) {
        const { data, error } = await supabaseClient
          .from('applicant_profiles')
          .select('*')
          .eq('id', user.id)
          .maybeSingle();

        if (error) {
          els.profileBox.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
          return;
        }

        if (!data) {
          els.profileBox.innerHTML = `
            <div class="empty">No profile found yet.</div>
            <div style="margin-top:12px;">
              <a href="create-profile.html" class="btn btn-primary">Create Profile</a>
            </div>
          `;
          return;
        }

        els.profileBox.innerHTML = `
          <div class="profile-line">
            <span class="label">Full Name</span>
            <div class="value">${escapeHtml(data.full_name || '-')}</div>
          </div>
          <div class="profile-line">
            <span class="label">Email</span>
            <div class="value">${escapeHtml(data.email || user.email || '-')}</div>
          </div>
          <div class="profile-line">
            <span class="label">Phone</span>
            <div class="value">${escapeHtml(data.phone || '-')}</div>
          </div>
          <div class="profile-line">
            <span class="label">Location</span>
            <div class="value">${escapeHtml(data.location || '-')}</div>
          </div>
          <div class="profile-line">
            <span class="label">Resume</span>
            <div class="value">
              ${data.resume_url ? `<a href="${escapeHtml(data.resume_url)}" target="_blank" rel="noopener noreferrer">View Resume</a>` : '-'}
            </div>
          </div>
        `;
      }

      async function loadApplications(user) {
        const { data, error } = await supabaseClient
          .from('applications')
          .select(`
            id,
            email,
            job_title,
            status,
            recruiter_email,
            application_source,
            stage_note_label,
            created_at
          `)
          .eq('email', user.email)
          .order('created_at', { ascending: false });

        if (error) {
          els.applicationsTable.innerHTML = `<tr><td colspan="6" class="empty">${escapeHtml(error.message)}</td></tr>`;
          return;
        }

        if (!data || !data.length) {
          els.applicationsTable.innerHTML = `<tr><td colspan="6" class="empty">No applications yet.</td></tr>`;
          return;
        }

        els.applicationsTable.innerHTML = data.map(app => {
          const status = app.status || 'submitted';
          const recruiter = app.recruiter_email || '-';
          const role = app.job_title || '-';
          const note = app.stage_note_label || '-';

          return `
            <tr>
              <td>${escapeHtml(role)}</td>
              <td><span class="status-pill ${getStatusClass(status)}">${escapeHtml(status)}</span></td>
              <td>${escapeHtml(formatDate(app.created_at))}</td>
              <td>${escapeHtml(recruiter)}</td>
              <td>${escapeHtml(app.application_source || '-')}</td>
              <td>${escapeHtml(note)}</td>
            </tr>
          `;
        }).join('');
      }

      els.logoutBtn.addEventListener('click', async () => {
        try {
          await supabaseClient.auth.signOut();
        } finally {
          window.location.href = 'login.html';
        }
      });

      supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_OUT' || !session?.user) {
          window.location.href = 'login.html';
        }
      });

      protectApplicantPage().then(async user => {
        if (!user) return;
        await loadProfile(user);
        await loadApplications(user);
      });
    });
  </script>
</body>
</html>
