<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --light:#2563eb;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
    }

    body {
      margin:0;
      font-family:'Manrope',sans-serif;
      background:var(--bg);
    }

    .container {
      max-width:1100px;
      margin:auto;
      padding:30px 20px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    h1 { color:var(--blue); }

    .grid {
      display:grid;
      grid-template-columns: 1fr 2fr;
      gap:20px;
    }

    .card {
      background:white;
      border:1px solid var(--line);
      border-radius:16px;
      padding:20px;
    }

    .card h3 {
      margin-top:0;
      color:var(--blue);
    }

    .info {
      font-size:14px;
      margin-bottom:8px;
    }

    .btn {
      padding:8px 12px;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
      border:none;
    }

    .btn-primary {
      background:var(--blue);
      color:white;
    }

    .btn-outline {
      border:1px solid var(--line);
      background:white;
    }

    .btn-danger {
      background:#ef4444;
      color:white;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid var(--line);
    }

    th {
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
    }

    .job-card {
      border:1px solid var(--line);
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .job-title {
      font-weight:700;
      margin-bottom:4px;
    }

    .messenger {
      display:block;
      text-align:center;
      background:#0084ff;
      color:white;
      padding:12px;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }

    @media(max-width:800px){
      .grid {
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <h1>Applicant Dashboard</h1>
    <button id="logoutBtn" class="btn btn-outline">Logout</button>
  </div>

  <div class="grid">

    <!-- PROFILE -->
    <div class="card">
      <h3>Your Profile</h3>
      <div class="info"><strong>Name:</strong> <span id="name"></span></div>
      <div class="info"><strong>Email:</strong> <span id="email"></span></div>
      <div class="info"><strong>Phone:</strong> <span id="phone"></span></div>
      <div class="info"><strong>Location:</strong> <span id="location"></span></div>

      <a href="create-profile.html" class="btn btn-primary">Edit Profile</a>

      <hr style="margin:20px 0">

      <h3>Talk to a Recruiter</h3>
      <a href="https://m.me/YOUR_FB_PAGE" target="_blank" class="messenger">
        Message us on Messenger
      </a>
    </div>

    <!-- RIGHT SIDE -->
    <div>

      <!-- APPLICATIONS -->
      <div class="card">
        <h3>My Applications</h3>
        <table>
          <thead>
            <tr>
              <th>Job</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="applicationsTable"></tbody>
        </table>
      </div>

      <!-- SUGGESTED JOBS -->
      <div class="card" style="margin-top:20px;">
        <h3>Recommended Roles</h3>
        <div id="jobsList"></div>
      </div>

    </div>

  </div>

</div>

<script>
const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 🔐 REQUIRE LOGIN
async function requireAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    window.location.href = "login.html?redirect=dashboard.html";
    return null;
  }

  return session.user;
}

// INIT
async function init() {
  const user = await requireAuth();
  if (!user) return;

  document.getElementById('email').innerText = user.email;

  await loadProfile(user.email);
  await loadApplications(user.email);
  await loadJobs();
}

// PROFILE
async function loadProfile(email) {
  const { data } = await supabaseClient
    .from('applicant_profiles')
    .select('*')
    .eq('email', email)
    .single();

  if (!data) return;

  document.getElementById('name').innerText = data.full_name || "-";
  document.getElementById('phone').innerText = data.phone || "-";
  document.getElementById('location').innerText = data.location || "-";
}

// APPLICATIONS
async function loadApplications(email) {
  const { data } = await supabaseClient
    .from('applications')
    .select('*')
    .eq('email', email);

  const table = document.getElementById('applicationsTable');

  if (!data || data.length === 0) {
    table.innerHTML = `<tr><td colspan="3">No applications yet</td></tr>`;
    return;
  }

  table.innerHTML = data.map(app => `
    <tr>
      <td>${app.job_title}</td>
      <td>${app.status || 'submitted'}</td>
      <td>
        ${app.status !== 'withdrawn' ? 
          `<button onclick="withdraw('${app.id}')" class="btn btn-danger">Withdraw</button>` 
          : ''}
      </td>
    </tr>
  `).join('');
}

// WITHDRAW
async function withdraw(id) {
  if (!confirm("Are you sure you want to withdraw?")) return;

  await supabaseClient
    .from('applications')
    .update({ status: 'withdrawn' })
    .eq('id', id);

  location.reload();
}

// JOBS (simple version)
async function loadJobs() {
  const { data } = await supabaseClient
    .from('jobs')
    .select('*')
    .limit(5);

  const container = document.getElementById('jobsList');

  if (!data || data.length === 0) {
    container.innerHTML = "No jobs available.";
    return;
  }

  container.innerHTML = data.map(job => `
    <div class="job-card">
      <div class="job-title">${job.title}</div>
      <div>${job.location || ''}</div>
      <a href="apply.html?job=${encodeURIComponent(job.title)}">Apply</a>
    </div>
  `).join('');
}

// LOGOUT
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabaseClient.auth.signOut();
  window.location.href = "index.html";
});

init();
</script>

</body>
</html>
