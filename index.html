<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #1e293b;
    }

    .container {
      text-align: center;
      padding: 80px 20px;
    }

    /* HEADER */
    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .logo img {
      height: 50px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: bold;
      color: #1E3A8A;
    }

    /* HERO */
    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      color: #1E3A8A;
    }

    p {
      font-size: 18px;
      color: #475569;
      max-width: 600px;
      margin: 0 auto 30px;
    }

    /* BUTTON */
    .btn {
      background: #1E3A8A;
      color: #fff;
      padding: 12px 26px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      display: inline-block;
    }

    .btn:hover {
      background: #3B82F6;
    }

    /* FOOTER */
    footer {
      margin-top: 60px;
      font-size: 14px;
      color: #94a3b8;
    }

    /* SECTION DIVIDER */
    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 40px auto;
      width: 60%;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo">
      <img src="logo.png" alt="TalentBuzz Logo">
      <div class="logo-text">TalentBuzz</div>
    </div>

    <!-- HEADLINE -->
    <h1>Global Recruitment, Simplified</h1>

    <!-- DESCRIPTION -->
    <p>
      TalentBuzz is a global recruitment partner helping companies across industries hire top-tier talent for on-site and remote roles.
    </p>

    <!-- CTA -->
    <a href="mailto:hello@talentbuzz.pro" class="btn">Contact Us</a>

    <div class="divider"></div>

    <!-- FOOTER -->
    <footer>
      © 2026 TalentBuzz. All rights reserved.
    </footer>

  </div>

</body>
</html>
