<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalentBuzz</title>
  <meta name="description" content="Structured hiring workflows for modern teams." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue:#123aa8;
      --blue-soft:#8fb4ff;
      --ink:#123aa8;
      --body:#4c4c4c;
      --page:#eef0f4;
      --white:#ffffff;
      --hero-left:#c6d5ff;
      --hero-right:#d5fbff;
      --max:1400px;
    }

    *{box-sizing:border-box}

    html,body{min-height:100%}

    body{
      margin:0;
      font-family:"Inter",Arial,sans-serif;
      background:var(--page);
      color:var(--body);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{text-decoration:none;color:inherit}

    .page{
      width:min(var(--max), calc(100% - 18px));
      margin:8px auto;
      background:#fff;
      min-height:calc(100vh - 16px);
      overflow:hidden;
    }

    .header{
      height:160px;
      background:#fff;
      display:flex;
      align-items:center;
      padding:0 30px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .brand-mark{
      position:relative;
      width:74px;
      height:86px;
      flex-shrink:0;
    }

    .hex{
      position:absolute;
      width:40px;
      height:46px;
    }

    .hex svg{
      width:100%;
      height:100%;
      display:block;
    }

    .hex svg polygon{
      fill:none;
      stroke:var(--blue);
      stroke-width:5;
      stroke-linejoin:round;
    }

    .hex.one{left:24px;top:0}
    .hex.two{left:0;top:36px}
    .hex.three{left:48px;top:36px}

    .brand-word{
      font-weight:800;
      font-size:22px;
      letter-spacing:-.05em;
      color:#071226;
      line-height:1;
      text-transform:uppercase;
    }

    .brand-word span{
      color:var(--blue);
    }

    .hero{
      position:relative;
      min-height:486px;
      background:linear-gradient(110deg,var(--hero-left) 0%,#d3e5ff 48%,var(--hero-right) 100%);
      overflow:hidden;
      display:flex;
      align-items:center;
    }

    .hero-art{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .giant-hex{
      position:absolute;
      width:430px;
      height:500px;
      opacity:.34;
      transform:rotate(-14deg);
    }

    .giant-hex svg{
      width:100%;
      height:100%;
      display:block;
    }

    .giant-hex polygon{
      fill:none;
      stroke:#5b8fff;
      stroke-width:38;
      stroke-linejoin:round;
    }

    .giant-hex.h1{right:300px;top:46px}
    .giant-hex.h2{right:-92px;top:166px}
    .giant-hex.h3{right:190px;top:450px}

    .scratch{
      position:absolute;
      width:34px;
      height:2px;
      background:rgba(91,143,255,.25);
      right:118px;
      top:36px;
      transform:rotate(48deg);
    }

    .hero-copy{
      position:relative;
      z-index:2;
      width:620px;
      margin-left:78px;
      text-align:center;
      transform:translateY(-8px);
    }

    h1{
      margin:0 0 16px;
      color:var(--ink);
      font-size:53px;
      line-height:1.42;
      letter-spacing:-.095em;
      font-weight:500;
    }

    .lead{
      margin:0 auto;
      max-width:565px;
      color:var(--body);
      font-size:27px;
      line-height:1.42;
      letter-spacing:-.08em;
      font-weight:500;
    }

    .below{
      height:140px;
      background:#fff;
      position:relative;
      overflow:hidden;
    }

    .below .giant-hex{
      opacity:.26;
    }

    .below .h4{
      right:172px;
      top:-82px;
    }

    @media(max-width:900px){
      .page{width:100%;margin:0;min-height:100vh}
      .header{height:128px;padding:0 24px}
      .hero{min-height:500px;align-items:flex-start;padding-top:74px}
      .hero-copy{margin:0 auto;width:min(620px, calc(100% - 40px));transform:none}
      h1{font-size:clamp(38px,9vw,54px);line-height:1.18}
      .lead{font-size:clamp(20px,5vw,28px);letter-spacing:-.06em}
      .giant-hex.h1{right:-20px;top:160px;width:320px;height:370px}
      .giant-hex.h2{display:none}
      .giant-hex.h3{right:120px;top:430px;width:300px;height:350px}
    }

    @media(max-width:560px){
      .header{height:112px}
      .brand-mark{width:58px;height:68px}
      .hex{width:32px;height:37px}
      .hex.one{left:19px;top:0}
      .hex.two{left:0;top:29px}
      .hex.three{left:38px;top:29px}
      .brand-word{font-size:18px}
      .hero{min-height:430px;padding-top:64px}
      .hero-copy{text-align:left;width:calc(100% - 44px)}
      h1{letter-spacing:-.08em}
      .lead{margin:0;letter-spacing:-.05em}
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a href="index.html" class="brand" aria-label="TalentBuzz home">
        <div class="brand-mark" aria-hidden="true">
          <div class="hex one">
            <svg viewBox="0 0 100 115"><polygon points="50 4 94 29 94 86 50 111 6 86 6 29" /></svg>
          </div>
          <div class="hex two">
            <svg viewBox="0 0 100 115"><polygon points="50 4 94 29 94 86 50 111 6 86 6 29" /></svg>
          </div>
          <div class="hex three">
            <svg viewBox="0 0 100 115"><polygon points="50 4 94 29 94 86 50 111 6 86 6 29" /></svg>
          </div>
        </div>
        <div class="brand-word"><span>Talent</span>Buzz</div>
      </a>
    </header>

    <main>
      <section class="hero">
        <div class="hero-art" aria-hidden="true">
          <div class="scratch"></div>
          <div class="giant-hex h1">
            <svg viewBox="0 0 100 115"><polygon points="50 4 94 29 94 86 50 111 6 86 6 29" /></svg>
          </div>
          <div class="giant-hex h2">
            <svg viewBox="0 0 100 115"><polygon points="50 4 94 29 94 86 50 111 6 86 6 29" /></svg>
          </div>
          <div class="giant-hex h3">
            <svg viewBox="0 0 100 115"><polygon points="50 4 94 29 94 86 50 111 6 86 6 29" /></svg>
          </div>
        </div>

        <div class="hero-copy">
          <h1>Structured hiring workflows for modern teams.</h1>
          <p class="lead">
            TalentBuzz helps companies organize candidate evaluation, recruiter workflows, and hiring movement through a cleaner, more focused experience.
          </p>
        </div>
      </section>

      <section class="below" aria-hidden="true">
        <div class="giant-hex h4">
          <svg viewBox="0 0 100 115"><polygon points="50 4 94 29 94 86 50 111 6 86 6 29" /></svg>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
