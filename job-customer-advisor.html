<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Customer Advisor | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Apply for top BPO and retail jobs with TalentBuzz. Explore opportunities in customer service, wellness retail, and premium client advisory roles.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
    }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #fff;
      color: #0f172a;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      color: var(--blue);
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .meta {
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .badge {
      display: inline-block;
      background: #eef4ff;
      color: var(--blue);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 18px;
    }
