<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Job Sourcing | TalentBuzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Search and review sourced prospects for a selected role." />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
:root {
  --primary:#1e3a8a; --primary-2:#2563eb; --text:#0f172a; --muted:#64748b;
  --border:#e2e8f0; --bg:#f8fbff; --white:#ffffff; --success:#166534; --danger:#b91c1c;
  --warning:#b45309; --info:#4338ca; --shadow:0 12px 30px rgba(30,58,138,0.06),0 2px 10px rgba(15,23,42,0.04);
  --radius-lg:18px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Manrope",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
.container{max-width:1600px;margin:0 auto;padding:24px 20px 44px;}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.topbar h1{margin:0 0 6px;color:var(--primary);font-size:2rem;line-height:1.1;}
.subtitle{margin:0;color:var(--muted);font-size:0.95rem;}
.top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hello{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-weight:700;box-shadow:var(--shadow);}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border-radius:12px;border:1px solid transparent;text-decoration:none;font-weight:800;font-size:0.92rem;cursor:pointer;font-family:inherit;transition:0.18s ease;background:white;white-space:nowrap;color:var(--primary);}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:0.65;cursor:not-allowed;transform:none;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:white;}
.btn-outline{border-color:var(--border);color:var(--primary);background:white;}
.btn-danger{border-color:#fecaca;color:var(--danger);background:white;}
.notice{display:none;margin-bottom:18px;padding:12px 14px;border-radius:14px;font-weight:700;font-size:0.92rem;}
.notice.show{display:block;}
.notice.success{background:#ecfdf5;color:var(--success);border:1px solid #bbf7d0;}
.notice.error{background:#fef2f2;color:var(--danger);border:1px solid #fecaca;}
.notice.warning{background:#fff7ed;color:var(--warning);border:1px solid #fed7aa;}
.notice.info{background:#eef2ff;color:var(--info);border:1px solid #c7d2fe;}
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:22px;margin-bottom:20px;}
.filters-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr auto;gap:12px;align-items:end;margin-bottom:16px;}
.field label{display:block;margin-bottom:6px;font-size:0.88rem;font-weight:700;color:var(--text);}
.field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;outline:none;font:inherit;background:white;color:var(--text);}
.field input:focus,.field select:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(147,197,253,0.25);}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:16px;max-height:700px;}
table{width:100%;border-collapse:collapse;background:white;min-width:1500px;}
th,td{padding:12px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;font-size:0.9rem;}
th{background:#f8fbff;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-size:0.76rem;font-weight:800;}
tr:last-child td{border-bottom:none;}
.candidate-name{font-weight:800;color:var(--primary);margin-bottom:2px;}
.small{color:var(--muted);font-size:0.82rem;line-height:1.5;}
.chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:0.75rem;font-weight:800;line-height:1;border:1px solid transparent;}
.chip-gray{background:#f1f5f9;color:#475569;border-color:#e2e8f0;}
.chip-green{background:#ecfdf5;color:#166534;border-color:#bbf7d0;}
.chip-amber{background:#fff7ed;color:#b45309;border-color:#fed7aa;}
.inline-link{color:var(--primary-2);font-weight:700;text-decoration:none;}
.inline-link:hover{text-decoration:underline;}
.empty{color:var(--muted);font-size:0.95rem;padding:12px;text-align:center;}
@media (max-width:1200px){.filters-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media (max-width:760px){.container{padding:18px 14px 34px;}.topbar h1{font-size:1.7rem;}.filters-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>Job Sourcing</h1>
      <p class="subtitle">Search and review sourced prospects for a selected role.</p>
    </div>
    <div class="top-right">
      <div class="hello" id="helloRecruiter">Hello</div>
      <a href="recruiter-dashboard.html" class="btn btn-outline">Dashboard</a>
      <a href="client-roles-input.html" class="btn btn-outline">Roles</a>
      <button id="refreshBtn" class="btn btn-primary">Refresh</button>
      <button id="logoutBtn" class="btn btn-danger">Logout</button>
    </div>
  </div>

  <div id="notice" class="notice"></div>

  <!-- Filters -->
  <div class="panel">
    <h2>Search Filters</h2>
    <div class="filters-grid">
      <div class="field"><label for="titleFilter">Title</label><input id="titleFilter" placeholder="Target title"/></div>
      <div class="field"><label for="countryFilter">Country</label><select id="countryFilter"><option value="">Loading...</option></select></div>
      <div class="field"><label for="stateFilter">State</label><select id="stateFilter"><option value="">Select country first</option></select></div>
      <div class="field"><label for="cityFilter">City</label><input id="cityFilter" placeholder="City (optional)"/></div>
      <button id="searchBtn" class="btn btn-primary">Search & Source</button>
    </div>
  </div>

  <!-- Prospects Table -->
  <div class="panel">
    <h2>Prospects</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Prospect</th>
            <th>Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Match Score</th>
            <th>Location Match</th>
            <th>Email</th>
            <th>LinkedIn</th>
          </tr>
        </thead>
        <tbody id="prospectsTable">
          <tr><td colspan="8" class="empty">Click Search & Source to load prospects.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
  const SUPABASE_KEY = "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs";
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const els = {
    hello: document.getElementById("helloRecruiter"),
    title: document.getElementById("titleFilter"),
    country: document.getElementById("countryFilter"),
    state: document.getElementById("stateFilter"),
    city: document.getElementById("cityFilter"),
    searchBtn: document.getElementById("searchBtn"),
    prospectsTable: document.getElementById("prospectsTable"),
    notice: document.getElementById("notice"),
    refreshBtn: document.getElementById("refreshBtn"),
    logoutBtn: document.getElementById("logoutBtn")
  };

  function escapeHtml(value){return String(value||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
  function showNotice(msg,type="success"){ els.notice.textContent=msg; els.notice.className=`notice show ${type}`; window.clearTimeout(showNotice._timer); showNotice._timer=setTimeout(()=>{ els.notice.className="notice"; els.notice.textContent=""; },4000); }

  async function protectPage(){
    const { data:{ session } } = await supabase.auth.getSession();
    if(!session?.user){ window.location.href="recruiter-login.html"; return false; }
    els.hello.textContent = `Hello, ${session.user.email || "Recruiter"}`;
    return true;
  }

  function getLocationLabel(rank){ if(rank===1) return "Exact City"; if(rank===2) return "State"; if(rank===3) return "Country"; if(rank===99) return "Outside Target"; return "-"; }
  function getScoreChip(score){ if(score>=75) return "chip chip-green"; if(score>=50) return "chip chip-amber"; return "chip chip-gray"; }

  function renderProspects(rows){
    if(!rows.length){ els.prospectsTable.innerHTML=`<tr><td colspan="8" class="empty">No prospects found.</td></tr>`; return; }
    els.prospectsTable.innerHTML = rows.map(r=>{
      const linkedin = r.linkedin_url?`<a class="inline-link" href="${escapeHtml(r.linkedin_url)}" target="_blank" rel="noopener noreferrer">Open</a>`:"-";
      return `<tr>
        <td><div class="candidate-name">${escapeHtml(r.full_name)}</div><div class="small">${escapeHtml(r.location)}</div></td>
        <td>${escapeHtml(r.current_title)}</td>
        <td>${escapeHtml(r.current_company)}</td>
        <td>${escapeHtml(r.location)}</td>
        <td><span class="${getScoreChip(r.match_score)}">${r.match_score}</span></td>
        <td><span class="chip chip-gray">${getLocationLabel(r.location_rank)}</span></td>
        <td>${escapeHtml(r.email||"-")}</td>
        <td>${linkedin}</td>
      </tr>`;
    }).join("");
  }

  // ✅ Dynamic Country & State
  async function populateCountryState() {
    // Fetch distinct countries
    const { data: countriesData, error: countryErr } = await supabase
      .from('locations')
      .select('country')
      .distinct()
      .order('country', { ascending: true });

    if(countryErr) { console.error(countryErr); return; }

    const countries = countriesData.map(c=>c.country);
    els.country.innerHTML = `<option value="">Select Country</option>` + countries.map(c=>`<option value="${c}">${c}</option>`).join("");
    els.state.innerHTML = `<option value="">Select country first</option>`;

    // On country change, fetch states
    els.country.addEventListener("change", async ()=>{
      const selectedCountry = els.country.value;
      if(!selectedCountry){
        els.state.innerHTML = `<option value="">Select country first</option>`;
        return;
      }
      const { data: statesData, error: stateErr } = await supabase
        .from('locations')
        .select('state')
        .eq('country', selectedCountry)
        .order('state', { ascending:true });

      if(stateErr){ console.error(stateErr); els.state.innerHTML=`<option value="">Select country first</option>`; return; }
      const states = statesData.map(s=>s.state);
      els.state.innerHTML = `<option value="">Select State</option>` + states.map(s=>`<option value="${s}">${s}</option>`).join("");
    });
  }

  async function searchProspects(){
    try{
      els.searchBtn.disabled=true; els.searchBtn.textContent="Sourcing...";
      const payload = {
        title: els.title.value.trim(),
        country: els.country.value.trim(),
        state: els.state.value.trim(),
        city: els.city.value.trim()
      };
      const { data, error } = await supabase.functions.invoke("source-prospects-v2",{ body: payload });
      if(error) throw error;
      renderProspects(data.data||[]);
    } catch(err){ showNotice(err.message||"Failed to source prospects","error"); }
    finally{ els.searchBtn.disabled=false; els.searchBtn.textContent="Search & Source"; }
  }

  els.searchBtn.addEventListener("click", searchProspects);
  els.refreshBtn.addEventListener("click", searchProspects);
  els.logoutBtn.addEventListener("click", async()=>{ await supabase.auth.signOut(); window.location.href="recruiter-login.html"; });

  const allowed = await protectPage();
  if(allowed) await populateCountryState().then(searchProspects);
});
</script>
</body>
</html>
