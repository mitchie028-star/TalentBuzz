<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Job Sourcing | TalentBuzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; padding:20px; background:#f5f7fb; }
input, select, button { padding:10px; margin:5px; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:white; }
th, td { padding:10px; border:1px solid #ddd; text-align:left; }
button { cursor:pointer; }
</style>
</head>

<body>

<h2>Job Sourcing</h2>

<input id="title" placeholder="Job Title">
<input id="country" placeholder="Country">
<input id="state" placeholder="State">
<input id="city" placeholder="City">

<button onclick="search()">Search & Source</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Title</th>
<th>Company</th>
<th>Location</th>
<th>Score</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const supabase = window.supabase.createClient(
  "https://dilalntcxmvdcmwxjcct.supabase.co",
  "YOUR_ANON_KEY"
);

async function search(){
  const payload = {
    title: document.getElementById("title").value,
    country: document.getElementById("country").value,
    state: document.getElementById("state").value,
    city: document.getElementById("city").value
  };

  console.log("Payload:", payload);

  const { data, error } = await supabase.functions.invoke(
    "source-prospects-v2",
    {
      body: JSON.stringify(payload),
      headers: { "Content-Type": "application/json" }
    }
  );

  console.log("Response:", data, error);

  if(error){
    alert(error.message);
    return;
  }

  render(data.data);
}

function render(rows){
  const table = document.getElementById("table");

  table.innerHTML = rows.map(r => `
    <tr>
      <td>${r.full_name}</td>
      <td>${r.current_title}</td>
      <td>${r.current_company}</td>
      <td>${r.location}</td>
      <td>${r.match_score}</td>
      <td><button onclick='save(${JSON.stringify(r)})'>Save</button></td>
    </tr>
  `).join("");
}

async function save(candidate){
  const { error } = await supabase
    .from("pipeline")
    .insert([{
      full_name: candidate.full_name,
      title: candidate.current_title,
      company: candidate.current_company,
      location: candidate.location,
      email: candidate.email,
      linkedin_url: candidate.linkedin_url,
      stage: "Leads"
    }]);

  if(error){
    alert("Save failed: " + error.message);
  } else {
    alert("Saved to pipeline ✅");
  }
}
</script>

</body>
</html>
