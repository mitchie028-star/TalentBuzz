<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Details | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View full job details and apply through TalentBuzz.">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue: #1e3a8a;
      --blue-light: #3b82f6;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --bg-soft: #f8fbff;
      --white: #ffffff;
      --shadow-soft: 0 10px 30px rgba(30, 58, 138, 0.06), 0 2px 10px rgba(15, 23, 42, 0.03);
      --max: 1080px;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      z-index: 10;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      flex-wrap: wrap;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      color: var(--blue);
      text-decoration: none;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }

    .brand img {
      height: 40px;
      width: auto;
    }

    .nav-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--blue);
      font-weight: 700;
      font-size: 0.95rem;
    }

    .nav-links a:hover {
      color: var(--blue-light);
    }

    .section {
      padding: 44px 0 60px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
    }

    .hero-card,
    .detail-card {
      background: linear-gradient(180deg, #fbfdff 0%, #f8fbff 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
    }

    .hero-card {
      padding: 26px;
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--blue);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--blue);
      font-size: 2.2rem;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 18px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      font-size: 0.95rem;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
    }

    .btn-secondary {
      background: white;
      color: var(--blue);
      border: 1px solid var(--line);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 20px;
      align-items: start;
    }

    .detail-card {
      padding: 24px;
    }

    .detail-card h2 {
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 1.3rem;
      letter-spacing: -0.02em;
    }

    .job-description p {
      margin: 0 0 14px;
      color: var(--text);
      line-height: 1.85;
    }

    .job-description ul {
      margin: 0;
      padding-left: 20px;
    }

    .job-description li {
      margin-bottom: 10px;
      line-height: 1.8;
      color: var(--text);
    }

    .sidebar-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 20px;
    }

    .sidebar-card h3 {
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 1.08rem;
    }

    .sidebar-item {
      margin-bottom: 12px;
    }

    .sidebar-label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .sidebar-value {
      color: var(--text);
      font-size: 0.95rem;
    }

    .loading,
    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 34px 0;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--line);
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }

      .nav {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="container nav">
    <a href="index.html" class="brand">
      <img src="logo.png" alt="TalentBuzz Logo">
      TalentBuzz
    </a>

    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="services.html">Hiring Solutions</a>
      <a href="applicants.html">Careers</a>
      <a href="dashboard.html">Applicant Dashboard</a>
      <a href="contact.html">Contact Us</a>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <a href="applicants.html" class="back-link">← Back to Careers</a>

    <div id="jobContent">
      <div class="loading">Loading job details...</div>
    </div>
  </div>
</section>

<footer>
  © 2026 TalentBuzz. All rights reserved.
</footer>

<script>
  const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const jobId = params.get('id');
  const jobContent = document.getElementById('jobContent');

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function formatJobDescription(text) {
    const raw = String(text || '').trim();
    if (!raw) return '<p>No description available.</p>';

    const paragraphs = raw
      .split(/\n\s*\n/)
      .map(p => p.trim())
      .filter(Boolean);

    if (paragraphs.length > 1) {
      return paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join('');
    }

    const lines = raw
      .split('\n')
      .map(line => line.trim())
      .filter(Boolean);

    const bulletLike = lines.length >= 4;
    if (bulletLike) {
      return `<ul>${lines.map(line => `<li>${escapeHtml(line.replace(/^[-•*]\s*/, ''))}</li>`).join('')}</ul>`;
    }

    const sentences = raw
      .split(/(?<=[.!?])\s+/)
      .map(s => s.trim())
      .filter(Boolean);

    if (sentences.length >= 3) {
      return sentences.map(s => `<p>${escapeHtml(s)}</p>`).join('');
    }

    return `<p>${escapeHtml(raw)}</p>`;
  }

  async function loadJob() {
    if (!jobId) {
      jobContent.innerHTML = `<div class="empty-state">Job not found.</div>`;
      return;
    }

    const { data, error } = await supabaseClient
      .from('jobs')
      .select('*')
      .eq('id', jobId)
      .single();

    if (error) {
      jobContent.innerHTML = `<div class="empty-state">${escapeHtml(error.message)}</div>`;
      return;
    }

    if (!data) {
      jobContent.innerHTML = `<div class="empty-state">This job could not be found.</div>`;
      return;
    }

    const descriptionHtml = formatJobDescription(
      data.job_description || 'Full job description will be provided during the application process.'
    );

    document.title = `${data.title} | TalentBuzz`;

    jobContent.innerHTML = `
      <div class="hero-card">
        <div class="eyebrow">Open Role</div>
        <h1>${escapeHtml(data.title || 'Untitled Role')}</h1>
        <div class="meta">
          ${data.client_name ? escapeHtml(data.client_name) + ' • ' : ''}
          ${data.location ? escapeHtml(data.location) + ' • ' : ''}
          ${data.work_setup ? escapeHtml(data.work_setup) + ' • ' : ''}
          ${data.employment_type ? escapeHtml(data.employment_type) : ''}
        </div>

        <div class="hero-actions">
          <a href="apply.html?job=${encodeURIComponent(data.title || '')}" class="btn btn-primary">Apply Now</a>
          <a href="applicants.html" class="btn btn-secondary">Browse More Roles</a>
        </div>
      </div>

      <div class="layout">
        <div class="detail-card">
          <h2>Job Description</h2>
          <div class="job-description">${descriptionHtml}</div>
        </div>

        <div class="sidebar-card">
          <h3>Role Snapshot</h3>

          <div class="sidebar-item">
            <span class="sidebar-label">Client</span>
            <span class="sidebar-value">${escapeHtml(data.client_name || 'Not specified')}</span>
          </div>

          <div class="sidebar-item">
            <span class="sidebar-label">Industry</span>
            <span class="sidebar-value">${escapeHtml(data.industry || 'Not specified')}</span>
          </div>

          <div class="sidebar-item">
            <span class="sidebar-label">Location</span>
            <span class="sidebar-value">${escapeHtml(data.location || 'Not specified')}</span>
          </div>

          <div class="sidebar-item">
            <span class="sidebar-label">Work Setup</span>
            <span class="sidebar-value">${escapeHtml(data.work_setup || 'Not specified')}</span>
          </div>

          <div class="sidebar-item">
            <span class="sidebar-label">Employment Type</span>
            <span class="sidebar-value">${escapeHtml(data.employment_type || 'Not specified')}</span>
          </div>
        </div>
      </div>
    `;
  }

  loadJob();
</script>

</body>
</html>
