<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Details | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View full job details and apply through TalentBuzz.">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --blue-soft:#eff6ff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --success:#166534;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
      --shadow-strong:0 18px 40px rgba(30,58,138,.10),0 6px 16px rgba(15,23,42,.06);
      --radius:22px;
      --max:1160px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:'Manrope',sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.7;
    }

    .container {
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    header {
      background:rgba(255,255,255,.96);
      backdrop-filter:saturate(180%) blur(12px);
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:20;
    }

    .nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 0;
      flex-wrap:wrap;
      gap:14px;
    }

    .brand {
      text-decoration:none;
      color:var(--blue);
      font-weight:800;
      font-size:1.35rem;
      letter-spacing:-.02em;
    }

    .nav-links {
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .nav-links a {
      text-decoration:none;
      color:var(--blue);
      font-weight:700;
      font-size:.95rem;
    }

    .section {
      padding:34px 0 64px;
    }

    .back-link {
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:18px;
      color:var(--blue);
      text-decoration:none;
      font-weight:800;
      font-size:.96rem;
    }

    .hero-card,
    .detail-card,
    .sidebar-card,
    .cta-strip {
      background:var(--white);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
    }

    .hero-card {
      overflow:hidden;
      margin-bottom:20px;
    }

    .hero-top {
      padding:26px 26px 20px;
      background:
        radial-gradient(circle at top right, rgba(37,99,235,.14), transparent 28%),
        linear-gradient(135deg, rgba(30,58,138,.98), rgba(37,99,235,.95));
      color:#fff;
    }

    .eyebrow {
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:rgba(255,255,255,.88);
      text-transform:uppercase;
      letter-spacing:.09em;
      font-size:.74rem;
      font-weight:800;
      margin-bottom:10px;
    }

    h1 {
      margin:0 0 12px;
      font-size:clamp(2rem, 4vw, 2.7rem);
      line-height:1.08;
      letter-spacing:-.03em;
      color:#fff;
    }

    .meta {
      color:rgba(255,255,255,.9);
      font-size:.98rem;
      line-height:1.7;
      margin-bottom:18px;
    }

    .hero-actions {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      font-size:.95rem;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    }

    .btn:hover {
      transform:translateY(-1px);
    }

    .btn-primary {
      background:#fff;
      color:var(--blue);
      border:none;
      box-shadow:0 10px 24px rgba(255,255,255,.16);
    }

    .btn-secondary {
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.24);
    }

    .hero-bottom {
      padding:18px 24px 22px;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
      background:#fff;
    }

    .hero-stat {
      border:1px solid #eef2ff;
      background:#f8fbff;
      border-radius:16px;
      padding:14px;
    }

    .hero-stat-label {
      display:block;
      color:var(--muted);
      font-size:.78rem;
      font-weight:800;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin-bottom:4px;
    }

    .hero-stat-value {
      color:var(--text);
      font-size:.96rem;
      font-weight:800;
      line-height:1.45;
    }

    .layout {
      display:grid;
      grid-template-columns:minmax(0,1fr) 340px;
      gap:20px;
    }

    .detail-stack {
      display:grid;
      gap:18px;
    }

    .detail-card {
      padding:24px;
    }

    .detail-header {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      margin-bottom:14px;
    }

    .detail-title {
      margin:0;
      color:var(--blue);
      font-size:1.15rem;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .detail-subtitle {
      margin:6px 0 0;
      color:var(--muted);
      font-size:.92rem;
    }

    .job-description {
      color:var(--text);
      line-height:1.8;
    }

    .job-section {
      margin:0 0 24px;
    }

    .job-section:last-child {
      margin-bottom:0;
    }

    .job-section h3 {
      margin:0 0 10px;
      color:var(--blue);
      font-size:1.02rem;
      line-height:1.35;
      letter-spacing:-.01em;
    }

    .job-description p {
      margin:0 0 14px;
      white-space:pre-wrap;
    }

    .job-description ul {
      margin:0;
      padding-left:20px;
    }

    .job-description li {
      margin:0 0 8px;
    }

    .job-description .chip-row {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .info-chip {
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:8px 12px;
      font-size:.82rem;
      font-weight:800;
      background:var(--blue-soft);
      border:1px solid #dbeafe;
      color:var(--blue-light);
    }

    .sidebar-wrap {
      display:grid;
      gap:18px;
      align-content:start;
    }

    .sidebar-card {
      padding:20px;
      position:sticky;
      top:88px;
      height:fit-content;
    }

    .sidebar-title {
      margin:0 0 14px;
      color:var(--blue);
      font-size:1.04rem;
      font-weight:800;
    }

    .sidebar-item {
      margin-bottom:14px;
    }

    .sidebar-item:last-child {
      margin-bottom:0;
    }

    .sidebar-label {
      display:block;
      color:var(--muted);
      font-size:.78rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.06em;
      margin-bottom:4px;
    }

    .sidebar-value {
      color:var(--text);
      font-size:.95rem;
      white-space:pre-wrap;
      line-height:1.5;
    }

    .cta-strip {
      padding:18px;
      border:1px solid #dbeafe;
      background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
    }

    .cta-strip h3 {
      margin:0 0 8px;
      color:var(--blue);
      font-size:1.04rem;
      font-weight:800;
    }

    .cta-strip p {
      margin:0 0 14px;
      color:var(--muted);
      font-size:.93rem;
      line-height:1.65;
    }

    .cta-actions {
      display:grid;
      gap:10px;
    }

    .cta-actions .btn {
      width:100%;
    }

    .btn-solid {
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
      border:none;
      box-shadow:0 16px 32px rgba(37,99,235,.2);
    }

    .btn-outline {
      background:#fff;
      color:var(--blue);
      border:1px solid var(--line);
    }

    .loading, .empty-state {
      text-align:center;
      color:var(--muted);
      padding:34px 18px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
    }

    .divider {
      height:1px;
      background:#eef2ff;
      margin:18px 0;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns:1fr;
      }

      .sidebar-card {
        position:static;
      }

      .hero-bottom {
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width: 680px) {
      .hero-top {
        padding:22px 20px 18px;
      }

      .hero-bottom {
        padding:16px 18px 18px;
        grid-template-columns:1fr;
      }

      .detail-card,
      .sidebar-card,
      .cta-strip {
        padding:18px;
      }

      h1 {
        font-size:1.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">TalentBuzz</a>
      <div class="nav-links">
        <a href="about.html">About</a>
        <a href="applicants.html">Careers</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <a href="applicants.html" class="back-link">← Back to Careers</a>
      <div id="jobPage" class="loading">Loading job details...</div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const jobId = params.get('job_id');
    const slug = params.get('slug');
    const legacyId = params.get('id');
    const jobPage = document.getElementById('jobPage');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function firstFilled(obj, keys) {
      for (const key of keys) {
        const value = obj?.[key];
        if (value === null || value === undefined) continue;
        if (typeof value === 'string' && value.trim()) return value.trim();
        if (Array.isArray(value) && value.length) return value;
        if (typeof value === 'number') return String(value);
        if (typeof value === 'boolean') return value ? 'Yes' : 'No';
      }
      return '';
    }

    function formatSalary(job) {
      const currency = String(job.salary_currency || '').trim();
      const min = job.salary_min != null ? String(job.salary_min) : '';
      const max = job.salary_max != null ? String(job.salary_max) : '';

      if (!currency && !min && !max) return 'Not specified';
      if (min && max) return escapeHtml(`${currency} ${min} - ${max}`.trim());
      if (min) return escapeHtml(`${currency} ${min}`.trim());
      if (max) return escapeHtml(`${currency} ${max}`.trim());
      return escapeHtml(currency);
    }

    function buildApplyLink(job) {
      return `apply.html?id=${encodeURIComponent(job.id)}`;
    }

    function extractShiftFromDescription(desc) {
      const text = String(desc || '');

      const patterns = [
        /work\s*setup\s*&\s*shift\s*:\s*([^\n\r]+)/i,
        /shift\s*:\s*([^\n\r]+)/i
      ];

      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          let value = match[1].trim();

          if (value.includes('|')) {
            const parts = value.split('|').map(x => x.trim()).filter(Boolean);
            if (parts.length >= 2) return parts.slice(1).join(' | ');
          }

          return value;
        }
      }

      return '';
    }

    function extractWorkSetupFromDescription(desc) {
      const text = String(desc || '');
      const match = text.match(/work\s*setup\s*&\s*shift\s*:\s*([^\n\r]+)/i);
      if (!match || !match[1]) return '';

      const value = match[1].trim();
      if (value.includes('|')) {
        const parts = value.split('|').map(x => x.trim()).filter(Boolean);
        return parts.length ? parts[0] : '';
      }
      return value;
    }

    function formatParagraphs(text) {
      const value = String(text || '').trim();
      if (!value) return '';
      return value
        .split(/\n{2,}/)
        .map(part => part.trim())
        .filter(Boolean)
        .map(part => `<p>${escapeHtml(part)}</p>`)
        .join('');
    }

    function formatBulletList(lines) {
      const clean = (lines || []).map(line => String(line || '').trim()).filter(Boolean);
      if (!clean.length) return '';
      return `<ul>${clean.map(line => `<li>${escapeHtml(line.replace(/^[●•\-]\s*/, ''))}</li>`).join('')}</ul>`;
    }

    function parseDescriptionSections(text) {
      const value = String(text || '').replace(/\r/g, '').trim();
      if (!value) return [];

      const lines = value.split('\n');
      const sections = [];
      let current = null;

      const headingMatchers = [
        /^job description$/i,
        /^role overview$/i,
        /^overview$/i,
        /^requirements$/i,
        /^priority skills$/i,
        /^nice-to-have skills$/i,
        /^nice to have skills$/i,
        /^signal summary$/i,
        /^screening summary$/i,
        /^benefits$/i,
        /^what you will do$/i,
        /^what we are looking for$/i,
        /^tools \/ systems$/i,
        /^work setup & shift$/i
      ];

      function isHeading(line) {
        const trimmed = line.trim();
        return headingMatchers.some(re => re.test(trimmed));
      }

      function pushCurrent() {
        if (!current) return;
        current.lines = current.lines.filter(Boolean);
        if (current.lines.length) {
          sections.push(current);
        }
      }

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          if (current) current.lines.push('');
          continue;
        }

        if (isHeading(line)) {
          pushCurrent();
          current = { title: line, lines: [] };
        } else if (!current) {
          current = { title: '', lines: [line] };
        } else {
          current.lines.push(line);
        }
      }

      pushCurrent();

      if (!sections.length) {
        return [{ title: '', lines }];
      }

      return sections;
    }

    function renderSection(title, contentHtml) {
      if (!contentHtml) return '';
      return `
        <section class="job-section">
          ${title ? `<h3>${escapeHtml(title)}</h3>` : ''}
          ${contentHtml}
        </section>
      `;
    }

    function renderParsedDescription(mainDescription) {
      const sections = parseDescriptionSections(mainDescription);

      return sections.map(section => {
        const title = String(section.title || '').trim();
        const nonEmptyLines = (section.lines || []).map(x => String(x || '').trim()).filter(Boolean);
        const bulletLines = nonEmptyLines.filter(line => /^[●•\-]\s+/.test(line));
        const mostlyBullets = nonEmptyLines.length > 1 && bulletLines.length >= Math.max(2, Math.ceil(nonEmptyLines.length * 0.45));

        if (mostlyBullets) {
          return renderSection(title, formatBulletList(nonEmptyLines));
        }

        const content = formatParagraphs(nonEmptyLines.join('\n\n'));
        return renderSection(title, content);
      }).join('');
    }

    function buildDescriptionHtml(job) {
      const mainDescription = firstFilled(job, [
        'job_description',
        'job_description_full',
        'full_job_description',
        'description',
        'jd_preview',
        'job_description_preview'
      ]);

      const overview = firstFilled(job, [
        'overview',
        'job_summary',
        'summary',
        'position_summary',
        'about_the_role'
      ]);

      const whyJoinText = firstFilled(job, [
        'why_join',
        'why_join_us',
        'benefits_overview',
        'company_benefits'
      ]);

      const benefitsList = firstFilled(job, [
        'benefits',
        'perks',
        'compensation_and_benefits'
      ]);

      const responsibilities = firstFilled(job, [
        'responsibilities',
        'key_responsibilities',
        'duties',
        'job_responsibilities'
      ]);

      const requirements = firstFilled(job, [
        'requirements',
        'qualifications',
        'what_were_looking_for',
        'what_we_are_looking_for',
        'skills_required',
        'must_have'
      ]);

      const preferred = firstFilled(job, [
        'nice_to_have',
        'preferred_qualifications',
        'preferred_skills'
      ]);

      const tools = firstFilled(job, [
        'tools',
        'systems',
        'platforms',
        'tech_stack'
      ]);

      let shiftValue = firstFilled(job, ['shift', 'work_shift', 'shift_schedule']);
      if (!shiftValue) {
        shiftValue = extractShiftFromDescription(mainDescription);
      }

      let workSetupValue = firstFilled(job, ['work_setup']);
      if (!workSetupValue) {
        workSetupValue = extractWorkSetupFromDescription(mainDescription);
      }

      const scheduleValue = firstFilled(job, ['schedule']);

      const structured = [
        overview ? renderSection('Overview', formatParagraphs(overview)) : '',
        whyJoinText ? renderSection('Why join', formatParagraphs(whyJoinText)) : '',
        benefitsList ? renderSection('Benefits', formatBulletList(Array.isArray(benefitsList) ? benefitsList : String(benefitsList).split('\n'))) : '',
        responsibilities ? renderSection('What you will do', formatBulletList(Array.isArray(responsibilities) ? responsibilities : String(responsibilities).split('\n'))) : '',
        requirements ? renderSection('What we are looking for', formatBulletList(Array.isArray(requirements) ? requirements : String(requirements).split('\n'))) : '',
        preferred ? renderSection('Nice to have', formatBulletList(Array.isArray(preferred) ? preferred : String(preferred).split('\n'))) : '',
        tools ? renderSection('Tools / Systems', formatBulletList(Array.isArray(tools) ? tools : String(tools).split('\n'))) : '',
        (workSetupValue || shiftValue || scheduleValue)
          ? renderSection(
              'Work setup & shift',
              `<div class="chip-row">
                ${workSetupValue ? `<span class="info-chip">Work Setup: ${escapeHtml(workSetupValue)}</span>` : ''}
                ${shiftValue ? `<span class="info-chip">Shift: ${escapeHtml(shiftValue)}</span>` : ''}
                ${scheduleValue ? `<span class="info-chip">Schedule: ${escapeHtml(scheduleValue)}</span>` : ''}
              </div>`
            )
          : ''
      ].filter(Boolean).join('');

      const parsedMain = mainDescription ? renderParsedDescription(mainDescription) : '';

      if (structured || parsedMain) {
        return `${structured}${structured && parsedMain ? '<div class="divider"></div>' : ''}${parsedMain}`;
      }

      return '<p>No job description available.</p>';
    }

    function slugify(value) {
      return String(value || '')
        .toLowerCase()
        .trim()
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .replace(/-{2,}/g, '-');
    }

    async function generateUniqueSlug(title, excludeId = null) {
      const baseSlug = slugify(title) || 'job';
      let nextSlug = baseSlug;
      let counter = 1;

      while (true) {
        let query = supabaseClient
          .from('jobs')
          .select('id', { count: 'exact', head: false })
          .eq('slug', nextSlug);

        if (excludeId) {
          query = query.neq('id', excludeId);
        }

        const { data, error } = await query;
        if (error) throw error;

        if (!data || data.length === 0) {
          return nextSlug;
        }

        counter += 1;
        nextSlug = `${baseSlug}-${counter}`;
      }
    }

    async function createJobWithUniqueSlug(payload) {
      const safePayload = { ...(payload || {}) };
      safePayload.slug = await generateUniqueSlug(safePayload.slug || safePayload.title || 'job');

      const { data, error } = await supabaseClient
        .from('jobs')
        .insert(safePayload)
        .select()
        .single();

      if (error) throw error;
      return data;
    }

    async function updateJobWithUniqueSlug(jobIdValue, payload, regenerateSlug = false) {
      const safePayload = { ...(payload || {}) };

      if (regenerateSlug) {
        safePayload.slug = await generateUniqueSlug(safePayload.slug || safePayload.title || 'job', jobIdValue);
      }

      const { data, error } = await supabaseClient
        .from('jobs')
        .update(safePayload)
        .eq('id', jobIdValue)
        .select()
        .single();

      if (error) throw error;
      return data;
    }

    window.slugify = slugify;
    window.generateUniqueSlug = generateUniqueSlug;
    window.createJobWithUniqueSlug = createJobWithUniqueSlug;
    window.updateJobWithUniqueSlug = updateJobWithUniqueSlug;

    async function loadJobById(idValue) {
      const { data, error } = await supabaseClient
        .from('jobs')
        .select('*')
        .eq('id', idValue)
        .single();

      if (error) throw error;
      return data;
    }

    async function loadJobBySlug(slugValue) {
      const { data, error } = await supabaseClient
        .from('jobs')
        .select('*')
        .eq('slug', slugValue)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();

      if (error) throw error;
      return data;
    }

    function renderJob(data) {
      document.title = `${data.title || 'Job Details'} | TalentBuzz`;

      const mainDescription = firstFilled(data, [
        'job_description',
        'job_description_full',
        'full_job_description',
        'description',
        'jd_preview',
        'job_description_preview'
      ]);

      let shiftValue = firstFilled(data, ['shift', 'work_shift', 'shift_schedule']);
      if (!shiftValue) {
        shiftValue = extractShiftFromDescription(mainDescription);
      }

      let workSetupValue = firstFilled(data, ['work_setup']);
      if (!workSetupValue) {
        workSetupValue = extractWorkSetupFromDescription(mainDescription);
      }

      const locationValue = firstFilled(data, ['location']) || [
        firstFilled(data, ['city']),
        firstFilled(data, ['state_region', 'state']),
        firstFilled(data, ['country'])
      ].filter(Boolean).join(', ') || 'Location not specified';

      const salaryValue = formatSalary(data);
      const heroMeta = [
        firstFilled(data, ['client_name']) || 'Confidential Client',
        locationValue,
        workSetupValue || 'Setup not specified',
        firstFilled(data, ['employment_type']),
        shiftValue
      ].filter(Boolean).map(escapeHtml).join(' • ');

      jobPage.className = '';
      jobPage.innerHTML = `
        <div class="hero-card">
          <div class="hero-top">
            <div class="eyebrow">Selected Role</div>
            <h1>${escapeHtml(data.title || 'Untitled Role')}</h1>
            <div class="meta">${heroMeta}</div>

            <div class="hero-actions">
              <a href="${buildApplyLink(data)}" class="btn btn-primary">Create Profile & Apply</a>
              <a href="applicants.html" class="btn btn-secondary">Browse More Roles</a>
            </div>
          </div>

          <div class="hero-bottom">
            <div class="hero-stat">
              <span class="hero-stat-label">Client</span>
              <div class="hero-stat-value">${escapeHtml(firstFilled(data, ['client_name']) || 'Confidential')}</div>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">Location</span>
              <div class="hero-stat-value">${escapeHtml(locationValue)}</div>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">Work Setup</span>
              <div class="hero-stat-value">${escapeHtml(workSetupValue || 'Not specified')}</div>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">Salary</span>
              <div class="hero-stat-value">${salaryValue}</div>
            </div>
          </div>
        </div>

        <div class="layout">
          <div class="detail-stack">
            <div class="detail-card">
              <div class="detail-header">
                <div>
                  <h2 class="detail-title">Role overview</h2>
                  <p class="detail-subtitle">Review the role summary, requirements, and supporting details below.</p>
                </div>
              </div>
              <div class="job-description">${buildDescriptionHtml(data)}</div>
            </div>
          </div>

          <div class="sidebar-wrap">
            <aside class="sidebar-card">
              <h3 class="sidebar-title">Role Snapshot</h3>

              <div class="sidebar-item">
                <span class="sidebar-label">Client</span>
                <div class="sidebar-value">${escapeHtml(firstFilled(data, ['client_name']) || 'Confidential')}</div>
              </div>

              <div class="sidebar-item">
                <span class="sidebar-label">Location</span>
                <div class="sidebar-value">${escapeHtml(locationValue)}</div>
              </div>

              <div class="sidebar-item">
                <span class="sidebar-label">Work Setup</span>
                <div class="sidebar-value">${escapeHtml(workSetupValue || 'Not specified')}</div>
              </div>

              <div class="sidebar-item">
                <span class="sidebar-label">Employment Type</span>
                <div class="sidebar-value">${escapeHtml(firstFilled(data, ['employment_type']) || 'Not specified')}</div>
              </div>

              <div class="sidebar-item">
                <span class="sidebar-label">Shift</span>
                <div class="sidebar-value">${escapeHtml(shiftValue || 'Not specified')}</div>
              </div>

              <div class="sidebar-item">
                <span class="sidebar-label">Salary</span>
                <div class="sidebar-value">${salaryValue}</div>
              </div>

              <div class="sidebar-item">
                <span class="sidebar-label">Slug</span>
                <div class="sidebar-value">${escapeHtml(data.slug || 'Not available')}</div>
              </div>
            </aside>

            <div class="cta-strip">
              <h3>Interested in this role?</h3>
              <p>Create your profile to apply and get considered for this opportunity through TalentBuzz.</p>
              <div class="cta-actions">
                <a href="${buildApplyLink(data)}" class="btn btn-solid">Create Profile & Apply</a>
                <a href="applicants.html" class="btn btn-outline">See other openings</a>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function loadJob() {
      try {
        let data = null;

        if (jobId) {
          data = await loadJobById(jobId);
        } else if (slug) {
          data = await loadJobBySlug(slug);
        } else if (legacyId) {
          data = await loadJobById(legacyId);
        }

        if (!data) {
          jobPage.className = 'empty-state';
          jobPage.textContent = 'No job selected.';
          return;
        }

        renderJob(data);
      } catch (error) {
        console.error('Failed to load job:', error);
        jobPage.className = 'empty-state';
        jobPage.textContent = error?.message || 'Job not found.';
      }
    }

    loadJob();
  </script>
</body>
</html>
