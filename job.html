<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Details | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View full job details and apply through TalentBuzz.">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
      --radius:20px;
      --max:1100px;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:'Manrope',sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.7;
    }
    .container {
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }
    header {
      background:#fff;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:10;
    }
    .nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 0;
      flex-wrap:wrap;
      gap:14px;
    }
    .brand {
      text-decoration:none;
      color:var(--blue);
      font-weight:800;
      font-size:1.35rem;
    }
    .nav-links {
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }
    .nav-links a {
      text-decoration:none;
      color:var(--blue);
      font-weight:700;
      font-size:.95rem;
    }
    .section { padding:36px 0 60px; }
    .back-link {
      display:inline-block;
      margin-bottom:18px;
      color:var(--blue);
      text-decoration:none;
      font-weight:700;
    }
    .hero-card, .detail-card, .sidebar-card {
      background:var(--white);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
    }
    .hero-card {
      padding:26px;
      margin-bottom:20px;
    }
    .eyebrow {
      color:var(--blue-light);
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:.75rem;
      font-weight:800;
      margin-bottom:8px;
    }
    h1 {
      margin:0 0 10px;
      color:var(--blue);
      font-size:2.1rem;
      line-height:1.15;
    }
    .meta {
      color:var(--muted);
      font-size:.95rem;
      line-height:1.7;
      margin-bottom:18px;
    }
    .hero-actions {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }
    .btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border-radius:12px;
      padding:12px 16px;
      font-weight:800;
      font-size:.95rem;
      cursor:pointer;
    }
    .btn-primary {
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:white;
      border:none;
    }
    .btn-secondary {
      background:white;
      color:var(--blue);
      border:1px solid var(--line);
    }
    .layout {
      display:grid;
      grid-template-columns:minmax(0,1fr) 320px;
      gap:20px;
    }
    .detail-card {
      padding:24px;
    }
    .detail-card h2, .sidebar-card h3 {
      margin:0 0 14px;
      color:var(--blue);
    }
    .job-description {
      color:var(--text);
      line-height:1.85;
    }
    .job-description > *:first-child {
      margin-top: 0;
    }
    .job-description > *:last-child {
      margin-bottom: 0;
    }
    .job-description p {
      margin: 0 0 14px;
      white-space: pre-wrap;
    }
    .job-section {
      margin: 0 0 22px;
    }
    .job-section h3 {
      margin: 0 0 10px;
      color: var(--blue);
      font-size: 1.02rem;
      line-height: 1.35;
    }
    .job-section ul {
      margin: 0;
      padding-left: 18px;
    }
    .job-section li {
      margin: 0 0 8px;
    }
    .sidebar-card {
      padding:20px;
      position:sticky;
      top:88px;
      height: fit-content;
    }
    .sidebar-item { margin-bottom:14px; }
    .sidebar-label {
      display:block;
      color:var(--muted);
      font-size:.78rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.06em;
      margin-bottom:4px;
    }
    .sidebar-value {
      color:var(--text);
      font-size:.95rem;
      white-space: pre-wrap;
    }
    .loading, .empty-state {
      text-align:center;
      color:var(--muted);
      padding:34px 18px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns:1fr; }
      .sidebar-card { position:static; }
      h1 { font-size:1.7rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="index.html" class="brand">TalentBuzz</a>
      <div class="nav-links">
        <a href="about.html">About</a>
        <a href="applicants.html">Careers</a>
        <a href="contact.html">Contact Us</a>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <a href="applicants.html" class="back-link">← Back to Careers</a>
      <div id="jobPage" class="loading">Loading job details...</div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const jobId = params.get('job_id');
    const slug = params.get('slug');
    const legacyId = params.get('id');
    const jobPage = document.getElementById('jobPage');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function firstFilled(obj, keys) {
      for (const key of keys) {
        const value = obj?.[key];
        if (value === null || value === undefined) continue;
        if (typeof value === 'string' && value.trim()) return value.trim();
        if (Array.isArray(value) && value.length) return value;
        if (typeof value === 'number') return String(value);
        if (typeof value === 'boolean') return value ? 'Yes' : 'No';
      }
      return '';
    }

    function normalizeList(value) {
      if (Array.isArray(value)) {
        return value.map(item => String(item ?? '').trim()).filter(Boolean);
      }

      const text = String(value ?? '').trim();
      if (!text) return [];

      return text
        .split(/\n|•|\u2022|(?=\s*-\s)|(?=\d+\.)/g)
        .map(line => line.replace(/^\s*(?:•|-|\d+\.)\s*/, '').trim())
        .filter(Boolean);
    }

    function formatSalary(job) {
      const currency = String(job.salary_currency || '').trim();
      const min = job.salary_min != null ? String(job.salary_min) : '';
      const max = job.salary_max != null ? String(job.salary_max) : '';

      if (!currency && !min && !max) return 'Not specified';
      if (min && max) return escapeHtml(`${currency} ${min} - ${max}`.trim());
      if (min) return escapeHtml(`${currency} ${min}`.trim());
      if (max) return escapeHtml(`${currency} ${max}`.trim());
      return escapeHtml(currency);
    }

    function buildApplyLink(job) {
      return `apply.html?id=${encodeURIComponent(job.id)}`;
    }

    function formatParagraphBlock(text) {
      const value = String(text || '').trim();
      if (!value) return '';
      return value
        .split(/\n{2,}/)
        .map(part => part.trim())
        .filter(Boolean)
        .map(part => `<p>${escapeHtml(part)}</p>`)
        .join('');
    }

    function formatListBlock(items) {
      const list = normalizeList(items);
      if (!list.length) return '';
      return `<ul>${list.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function renderSection(title, contentHtml) {
      if (!contentHtml) return '';
      return `
        <section class="job-section">
          <h3>${escapeHtml(title)}</h3>
          ${contentHtml}
        </section>
      `;
    }

    function buildDescriptionHtml(job) {
      const mainDescription = firstFilled(job, [
        'job_description',
        'job_description_full',
        'full_job_description',
        'description',
        'jd_preview',
        'job_description_preview'
      ]);

      const overview = firstFilled(job, [
        'overview',
        'job_summary',
        'summary',
        'position_summary',
        'about_the_role'
      ]);

      const whyJoinText = firstFilled(job, [
        'why_join',
        'why_join_us',
        'benefits_overview',
        'company_benefits'
      ]);

      const benefitsList = firstFilled(job, [
        'benefits',
        'perks',
        'compensation_and_benefits'
      ]);

      const responsibilities = firstFilled(job, [
        'responsibilities',
        'key_responsibilities',
        'duties',
        'job_responsibilities'
      ]);

      const requirements = firstFilled(job, [
        'requirements',
        'qualifications',
        'what_were_looking_for',
        'what_we_are_looking_for',
        'skills_required',
        'must_have'
      ]);

      const preferred = firstFilled(job, [
        'nice_to_have',
        'preferred_qualifications',
        'preferred_skills'
      ]);

      const tools = firstFilled(job, [
        'tools',
        'systems',
        'platforms',
        'tech_stack'
      ]);

      const shiftValue = firstFilled(job, ['shift', 'work_shift', 'shift_schedule']);
      const scheduleValue = firstFilled(job, ['schedule']);
      const workSetupValue = firstFilled(job, ['work_setup']);

      const assembled = [
        overview ? renderSection('Overview', formatParagraphBlock(overview)) : '',
        mainDescription ? renderSection('Job Description', formatParagraphBlock(mainDescription)) : '',
        whyJoinText ? renderSection('Why join', formatParagraphBlock(whyJoinText)) : '',
        benefitsList ? renderSection('Benefits', formatListBlock(benefitsList)) : '',
        responsibilities ? renderSection('What you will do', formatListBlock(responsibilities)) : '',
        requirements ? renderSection('What we are looking for', formatListBlock(requirements)) : '',
        preferred ? renderSection('Nice to have', formatListBlock(preferred)) : '',
        tools ? renderSection('Tools / Systems', formatListBlock(tools)) : '',
        (workSetupValue || shiftValue || scheduleValue)
          ? renderSection(
              'Work setup & shift',
              formatParagraphBlock(
                [
                  workSetupValue ? `Work setup: ${workSetupValue}` : '',
                  shiftValue ? `Shift: ${shiftValue}` : '',
                  scheduleValue ? `Schedule: ${scheduleValue}` : ''
                ].filter(Boolean).join('\n')
              )
            )
          : ''
      ].join('');

      if (assembled.trim()) return assembled;
      if (mainDescription) return formatParagraphBlock(mainDescription);

      return '<p>No job description available.</p>';
    }

    function slugify(value) {
      return String(value || '')
        .toLowerCase()
        .trim()
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .replace(/-{2,}/g, '-');
    }

    async function generateUniqueSlug(title, excludeId = null) {
      const baseSlug = slugify(title) || 'job';
      let nextSlug = baseSlug;
      let counter = 1;

      while (true) {
        let query = supabaseClient
          .from('jobs')
          .select('id', { count: 'exact', head: false })
          .eq('slug', nextSlug);

        if (excludeId) {
          query = query.neq('id', excludeId);
        }

        const { data, error } = await query;
        if (error) throw error;

        if (!data || data.length === 0) {
          return nextSlug;
        }

        counter += 1;
        nextSlug = `${baseSlug}-${counter}`;
      }
    }

    async function createJobWithUniqueSlug(payload) {
      const safePayload = { ...(payload || {}) };
      safePayload.slug = await generateUniqueSlug(safePayload.slug || safePayload.title || 'job');

      const { data, error } = await supabaseClient
        .from('jobs')
        .insert(safePayload)
        .select()
        .single();

      if (error) throw error;
      return data;
    }

    async function updateJobWithUniqueSlug(jobIdValue, payload, regenerateSlug = false) {
      const safePayload = { ...(payload || {}) };

      if (regenerateSlug) {
        safePayload.slug = await generateUniqueSlug(safePayload.slug || safePayload.title || 'job', jobIdValue);
      }

      const { data, error } = await supabaseClient
        .from('jobs')
        .update(safePayload)
        .eq('id', jobIdValue)
        .select()
        .single();

      if (error) throw error;
      return data;
    }

    window.slugify = slugify;
    window.generateUniqueSlug = generateUniqueSlug;
    window.createJobWithUniqueSlug = createJobWithUniqueSlug;
    window.updateJobWithUniqueSlug = updateJobWithUniqueSlug;

    async function loadJobById(idValue) {
      const { data, error } = await supabaseClient
        .from('jobs')
        .select('*')
        .eq('id', idValue)
        .single();

      if (error) throw error;
      return data;
    }

    async function loadJobBySlug(slugValue) {
      const { data, error } = await supabaseClient
        .from('jobs')
        .select('*')
        .eq('slug', slugValue)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();

      if (error) throw error;
      return data;
    }

    function renderJob(data) {
      document.title = `${data.title || 'Job Details'} | TalentBuzz`;

      const locationValue = firstFilled(data, ['location']) || [
        firstFilled(data, ['city']),
        firstFilled(data, ['state_region', 'state']),
        firstFilled(data, ['country'])
      ].filter(Boolean).join(', ') || 'Location not specified';

      const shiftValue = firstFilled(data, ['shift', 'work_shift', 'shift_schedule']);
      const heroMeta = [
        firstFilled(data, ['client_name']) || 'Confidential Client',
        locationValue,
        firstFilled(data, ['work_setup']) || 'Setup not specified',
        firstFilled(data, ['employment_type']),
        shiftValue
      ].filter(Boolean).map(escapeHtml).join(' • ');

      jobPage.className = '';
      jobPage.innerHTML = `
        <div class="hero-card">
          <div class="eyebrow">Selected Role</div>
          <h1>${escapeHtml(data.title || 'Untitled Role')}</h1>
          <div class="meta">${heroMeta}</div>

          <div class="hero-actions">
            <a href="${buildApplyLink(data)}" class="btn btn-primary">
              Create Profile & Apply
            </a>
            <a href="applicants.html" class="btn btn-secondary">
              Browse More Roles
            </a>
          </div>
        </div>

        <div class="layout">
          <div class="detail-card">
            <h2>Job Description</h2>
            <div class="job-description">${buildDescriptionHtml(data)}</div>
          </div>

          <aside class="sidebar-card">
            <h3>Role Snapshot</h3>

            <div class="sidebar-item">
              <span class="sidebar-label">Client</span>
              <div class="sidebar-value">${escapeHtml(firstFilled(data, ['client_name']) || 'Confidential')}</div>
            </div>

            <div class="sidebar-item">
              <span class="sidebar-label">Location</span>
              <div class="sidebar-value">${escapeHtml(locationValue)}</div>
            </div>

            <div class="sidebar-item">
              <span class="sidebar-label">Work Setup</span>
              <div class="sidebar-value">${escapeHtml(firstFilled(data, ['work_setup']) || 'Not specified')}</div>
            </div>

            <div class="sidebar-item">
              <span class="sidebar-label">Employment Type</span>
              <div class="sidebar-value">${escapeHtml(firstFilled(data, ['employment_type']) || 'Not specified')}</div>
            </div>

            <div class="sidebar-item">
              <span class="sidebar-label">Shift</span>
              <div class="sidebar-value">${escapeHtml(shiftValue || 'Not specified')}</div>
            </div>

            <div class="sidebar-item">
              <span class="sidebar-label">Salary</span>
              <div class="sidebar-value">${formatSalary(data)}</div>
            </div>

            <div class="sidebar-item">
              <span class="sidebar-label">Slug</span>
              <div class="sidebar-value">${escapeHtml(data.slug || 'Not available')}</div>
            </div>
          </aside>
        </div>
      `;
    }

    async function loadJob() {
      try {
        let data = null;

        if (jobId) {
          data = await loadJobById(jobId);
        } else if (slug) {
          data = await loadJobBySlug(slug);
        } else if (legacyId) {
          data = await loadJobById(legacyId);
        }

        if (!data) {
          jobPage.className = 'empty-state';
          jobPage.textContent = 'No job selected.';
          return;
        }

        renderJob(data);
      } catch (error) {
        console.error('Failed to load job:', error);
        jobPage.className = 'empty-state';
        jobPage.textContent = error?.message || 'Job not found.';
      }
    }

    loadJob();
  </script>
</body>
</html>
