<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Details | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View full job details and apply through TalentBuzz." />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#1e3a8a;--blue-light:#2563eb;--blue-soft:#eff6ff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f8fbff;--white:#fff;--shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);--radius:22px;--max:1160px}
    *{box-sizing:border-box} body{margin:0;font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
    .container{width:min(var(--max),calc(100% - 32px));margin:0 auto}
    header{background:rgba(255,255,255,.96);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
    .nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;flex-wrap:wrap;gap:14px}
    .brand{text-decoration:none;color:var(--blue);font-weight:800;font-size:1.35rem;letter-spacing:-.02em}
    .nav-links{display:flex;gap:16px;flex-wrap:wrap}.nav-links a{text-decoration:none;color:var(--blue);font-weight:700;font-size:.95rem}
    .section{padding:34px 0 64px}.back-link{display:inline-flex;align-items:center;gap:8px;margin-bottom:18px;color:var(--blue);text-decoration:none;font-weight:800;font-size:.96rem}
    .hero-card,.detail-card,.sidebar-card,.cta-strip{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-soft)}
    .hero-card{overflow:hidden;margin-bottom:20px}
    .hero-top{padding:28px 26px 22px;background:radial-gradient(circle at top right, rgba(37,99,235,.14), transparent 28%),linear-gradient(135deg, rgba(30,58,138,.98), rgba(37,99,235,.95));color:#fff}
    .eyebrow{display:inline-flex;align-items:center;color:rgba(255,255,255,.88);text-transform:uppercase;letter-spacing:.09em;font-size:.74rem;font-weight:800;margin-bottom:10px}
    h1{margin:0 0 12px;font-size:clamp(2rem,4vw,2.7rem);line-height:1.08;letter-spacing:-.03em;color:#fff}
    .meta{color:rgba(255,255,255,.92);font-size:.98rem;line-height:1.7;margin-bottom:18px}
    .hero-actions{display:flex;flex-wrap:wrap;gap:12px}
    .btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:14px;padding:12px 16px;font-weight:800;font-size:.95rem;cursor:pointer;transition:transform .18s ease}
    .btn:hover{transform:translateY(-1px)} .btn-primary{background:#fff;color:var(--blue);border:none}.btn-secondary{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.24)}
    .hero-bottom{padding:18px 24px 22px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;background:#fff}
    .hero-stat{border:1px solid #eef2ff;background:#f8fbff;border-radius:16px;padding:14px}
    .hero-stat-label{display:block;color:var(--muted);font-size:.78rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
    .hero-stat-value{color:var(--text);font-size:.96rem;font-weight:800;line-height:1.45}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:20px}.detail-stack{display:grid;gap:18px}.detail-card{padding:24px}
    .detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px}
    .detail-title{margin:0;color:var(--blue);font-size:1.15rem;font-weight:800;letter-spacing:-.02em}.detail-subtitle{margin:6px 0 0;color:var(--muted);font-size:.92rem}
    .job-description{color:var(--text);line-height:1.8}.job-section{margin:0 0 26px}.job-section:last-child{margin-bottom:0}
    .job-section h3{margin:0 0 10px;color:var(--blue);font-size:1.02rem;line-height:1.35;letter-spacing:-.01em}
    .job-description p{margin:0 0 14px;white-space:pre-wrap}.job-description ul{margin:0;padding-left:20px}.job-description li{margin:0 0 8px}
    .sidebar-wrap{display:grid;gap:18px;align-content:start}.sidebar-card{padding:20px;position:sticky;top:88px;height:fit-content}
    .sidebar-title{margin:0 0 14px;color:var(--blue);font-size:1.04rem;font-weight:800}.sidebar-item{margin-bottom:14px}.sidebar-item:last-child{margin-bottom:0}
    .sidebar-label{display:block;color:var(--muted);font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .sidebar-value{color:var(--text);font-size:.95rem;white-space:pre-wrap;line-height:1.5}
    .cta-strip{padding:18px;border:1px solid #dbeafe;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%)}
    .cta-strip h3{margin:0 0 8px;color:var(--blue);font-size:1.04rem;font-weight:800}.cta-strip p{margin:0 0 14px;color:var(--muted);font-size:.93rem;line-height:1.65}
    .cta-actions{display:grid;gap:10px}.cta-actions .btn{width:100%}.btn-solid{background:linear-gradient(135deg,var(--blue),var(--blue-light));color:#fff;border:none}.btn-outline{background:#fff;color:var(--blue);border:1px solid var(--line)}
    .loading,.empty-state{text-align:center;color:var(--muted);padding:34px 18px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-soft)}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.sidebar-card{position:static}.hero-bottom{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:680px){.hero-top{padding:22px 20px 18px}.hero-bottom{padding:16px 18px 18px;grid-template-columns:1fr}.detail-card,.sidebar-card,.cta-strip{padding:18px}h1{font-size:1.8rem}}
  </style>
</head>
<body>
<header>
  <div class="container nav">
    <a href="index.html" class="brand">TalentBuzz</a>
    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="applicants.html">Careers</a>
      <a href="contact.html">Contact Us</a>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <a href="applicants.html" class="back-link">← Back to Careers</a>
    <div id="jobPage" class="loading">Loading job details...</div>
  </div>
</section>

<script>
const SUPABASE_URL='https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const params=new URLSearchParams(window.location.search);
const jobId=params.get('job_id');
const slug=params.get('slug');
const legacyId=params.get('id');
const jobPage=document.getElementById('jobPage');

function escapeHtml(value){return String(value??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function firstFilled(obj,keys){for(const key of keys){const value=obj?.[key];if(value===null||value===undefined)continue;if(typeof value==='string'&&value.trim())return value.trim();if(Array.isArray(value)&&value.length)return value;if(typeof value==='number')return String(value)}return ''}
function uniquePreserve(values){const seen=new Set();const result=[];for(const raw of values||[]){const value=String(raw||'').trim();if(!value)continue;const key=value.toLowerCase();if(seen.has(key))continue;seen.add(key);result.push(value)}return result}
function stripTrailingSetup(location,workSetup){const loc=String(location||'').trim();const setup=String(workSetup||'').trim();if(!loc||!setup)return loc;const pattern=new RegExp(`\s*\(?${setup.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}\)?\s*$`,'i');return loc.replace(pattern,'').trim()||loc}
function formatSalary(job){const currency=String(job.salary_currency||'').trim();const min=job.salary_min!=null?Number(job.salary_min):null;const max=job.salary_max!=null?Number(job.salary_max):null;const symbols={PHP:'₱',USD:'$',SGD:'S$',HKD:'HK$',EUR:'€',GBP:'£',AUD:'A$',CAD:'C$',JPY:'¥'};const symbol=symbols[currency]||currency||'';const fmt=n=>Number.isFinite(n)?n.toLocaleString():'';if(min!==null&&max!==null)return escapeHtml(`${symbol}${fmt(min)} - ${symbol}${fmt(max)}`);if(min!==null)return escapeHtml(`${symbol}${fmt(min)}`);if(max!==null)return escapeHtml(`Up to ${symbol}${fmt(max)}`);return 'Not specified'}
function buildApplyLink(job){return `apply.html?id=${encodeURIComponent(job.id)}`}
function extractShiftFromDescription(desc){const text=String(desc||'');for(const pattern of [/work\s*setup\s*&\s*shift\s*:\s*([^\n\r]+)/i,/shift\s*:\s*([^\n\r]+)/i]){const match=text.match(pattern);if(match&&match[1]){let value=match[1].trim();if(value.includes('|')){const parts=value.split('|').map(x=>x.trim()).filter(Boolean);if(parts.length>=2)return parts.slice(1).join(' | ')}return value}}return ''}
function extractWorkSetupFromDescription(desc){const text=String(desc||'');const match=text.match(/work\s*setup\s*&\s*shift\s*:\s*([^\n\r]+)/i);if(!match||!match[1])return '';const value=match[1].trim();if(value.includes('|')){const parts=value.split('|').map(x=>x.trim()).filter(Boolean);return parts.length?parts[0]:''}return value}
function titleCase(text){return String(text||'').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}
function cleanLine(line){return String(line||'').replace(/\u2022/g,'•').replace(/\s+/g,' ').trim()}
function isInternalHeading(line){const t=cleanLine(line).toLowerCase();return ['client','job title','role family','seniority','location','work setup','employment type','status','salary','salary notes','signal summary','screening summary','talentbuzz signal intelligence','role snapshot','slug','screening structure','focus areas','recommendation'].includes(t)}
function isPublicHeading(line){const t=cleanLine(line).toLowerCase();return ['role overview','overview','about the role','requirements','qualifications','required qualifications','preferred qualifications','key responsibilities','responsibilities','what you will do','what we are looking for','nice-to-have skills','nice to have skills','benefits','why join','work setup & shift'].includes(t)}
function splitBulletishLines(text){return String(text||'').split('\n').map(cleanLine).filter(Boolean)}
function looksLikeBullet(line){return /^[•\-]/.test(line)||/^(must|at least|minimum|required|strong|experience|knowledge|ability|familiarity|certification|proven)\b/i.test(line)}
function dropInternalLines(lines){return (lines||[]).filter(line=>{const t=cleanLine(line).toLowerCase();if(!t)return false;if(isInternalHeading(t))return false;if(/^(screening structure|focus areas|recommendation):?$/i.test(t))return false;if(/^total questions:/i.test(t))return false;if(/^knockout questions:/i.test(t))return false;if(/^proof questions:/i.test(t))return false;if(/^technical/i.test(t))return false;if(/^simulation questions:/i.test(t))return false;if(/^leadership questions:/i.test(t))return false;if(/^red-flag validation questions:/i.test(t))return false;return true})}
function buildCandidateSections(job){
  const mainDescription=firstFilled(job,['job_description','job_description_full','full_job_description','description','jd_preview','job_description_preview']);
  const sections=[];
  const overview=firstFilled(job,['overview','job_summary','summary','position_summary','about_the_role']);
  const responsibilities=firstFilled(job,['responsibilities','key_responsibilities','duties','job_responsibilities']);
  const requirements=firstFilled(job,['requirements','qualifications','what_were_looking_for','what_we_are_looking_for','skills_required','must_have']);
  const preferred=firstFilled(job,['nice_to_have','preferred_qualifications','preferred_skills']);
  const benefits=firstFilled(job,['benefits','perks','compensation_and_benefits']);
  const whyJoin=firstFilled(job,['why_join','why_join_us','benefits_overview','company_benefits']);
  const add=(title,type,content)=>{if(content)sections.push({title,type,content})};
  if(overview)add('About the Role','paragraph',String(overview));
  if(whyJoin)add('Why Join','paragraph',String(whyJoin));
  if(responsibilities)add('Key Responsibilities','bullets',Array.isArray(responsibilities)?responsibilities:splitBulletishLines(responsibilities));
  if(requirements)add('Requirements','bullets',Array.isArray(requirements)?requirements:splitBulletishLines(requirements));
  if(preferred)add('Nice to Have','bullets',Array.isArray(preferred)?preferred:splitBulletishLines(preferred));
  if(benefits)add('Benefits','bullets',Array.isArray(benefits)?benefits:splitBulletishLines(benefits));

  const rawLines=dropInternalLines(splitBulletishLines(mainDescription));
  if(rawLines.length){
    let currentTitle=''; let currentLines=[]; const parsed=[];
    const flush=()=>{if(currentLines.length){parsed.push({title:currentTitle,lines:[...currentLines]});currentLines=[]}};
    for(const line of rawLines){if(isPublicHeading(line)){flush();currentTitle=titleCase(line);continue;}currentLines.push(line)}
    flush(); if(!parsed.length)parsed.push({title:'',lines:rawLines});
    for(const block of parsed){
      const title=block.title; const lines=block.lines.filter(Boolean); if(!lines.length)continue;
      const bullets=lines.filter(looksLikeBullet); const mostlyBullets=bullets.length>=Math.max(2,Math.ceil(lines.length*.45));
      if(!title && !sections.some(s=>s.title==='About the Role')){add('About the Role','paragraph',lines.slice(0,Math.min(lines.length,3)).join('\n\n'));continue;}
      if(!title && mostlyBullets && !sections.some(s=>s.title==='Requirements')){add('Requirements','bullets',lines);continue;}
      if(title && !sections.some(s=>s.title.toLowerCase()===title.toLowerCase())){add(title,mostlyBullets?'bullets':'paragraph',mostlyBullets?lines:lines.join('\n\n'))}
    }
  }
  return sections.length?sections:[{title:'About the Role',type:'paragraph',content:'Full job details will be shared during the application process.'}]
}
function renderSection(section){
  if(section.type==='bullets'){
    const items=uniquePreserve(section.content||[]).map(line=>cleanLine(line).replace(/^[•\-]\s*/,''));
    if(!items.length)return '';
    return `<section class="job-section"><h3>${escapeHtml(section.title)}</h3><ul>${items.map(line=>`<li>${escapeHtml(line)}</li>`).join('')}</ul></section>`;
  }
  const content=String(section.content||'').trim(); if(!content)return '';
  const paragraphs=content.split(/\n{2,}/).map(p=>cleanLine(p)).filter(Boolean);
  return `<section class="job-section"><h3>${escapeHtml(section.title)}</h3>${paragraphs.map(p=>`<p>${escapeHtml(p)}</p>`).join('')}</section>`;
}
function buildDescriptionHtml(job){return buildCandidateSections(job).map(renderSection).join('')}
function slugify(value){return String(value||'').toLowerCase().trim().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').replace(/-{2,}/g,'-')}
async function generateUniqueSlug(title,excludeId=null){const baseSlug=slugify(title)||'job';let nextSlug=baseSlug;let counter=1;while(true){let query=supabaseClient.from('jobs').select('id',{count:'exact',head:false}).eq('slug',nextSlug);if(excludeId)query=query.neq('id',excludeId);const {data,error}=await query;if(error)throw error;if(!data||data.length===0)return nextSlug;counter+=1;nextSlug=`${baseSlug}-${counter}`}}
async function createJobWithUniqueSlug(payload){const safePayload={...(payload||{})};safePayload.slug=await generateUniqueSlug(safePayload.slug||safePayload.title||'job');const {data,error}=await supabaseClient.from('jobs').insert(safePayload).select().single();if(error)throw error;return data}
async function updateJobWithUniqueSlug(jobIdValue,payload,regenerateSlug=false){const safePayload={...(payload||{})};if(regenerateSlug)safePayload.slug=await generateUniqueSlug(safePayload.slug||safePayload.title||'job',jobIdValue);const {data,error}=await supabaseClient.from('jobs').update(safePayload).eq('id',jobIdValue).select().single();if(error)throw error;return data}
window.slugify=slugify;window.generateUniqueSlug=generateUniqueSlug;window.createJobWithUniqueSlug=createJobWithUniqueSlug;window.updateJobWithUniqueSlug=updateJobWithUniqueSlug;
async function loadJobById(idValue){const {data,error}=await supabaseClient.from('jobs').select('*').eq('id',idValue).single();if(error)throw error;return data}
async function loadJobBySlug(slugValue){const {data,error}=await supabaseClient.from('jobs').select('*').eq('slug',slugValue).order('created_at',{ascending:false}).limit(1).maybeSingle();if(error)throw error;return data}
function renderJob(data){
  document.title=`${data.title||'Job Details'} | TalentBuzz`;
  const mainDescription=firstFilled(data,['job_description','job_description_full','full_job_description','description','jd_preview','job_description_preview']);
  let shiftValue=firstFilled(data,['shift','work_shift','shift_schedule']); if(!shiftValue)shiftValue=extractShiftFromDescription(mainDescription);
  let workSetupValue=firstFilled(data,['work_setup']); if(!workSetupValue)workSetupValue=extractWorkSetupFromDescription(mainDescription);
  const rawLocation=firstFilled(data,['location'])||[firstFilled(data,['city']),firstFilled(data,['state_region','state']),firstFilled(data,['country'])].filter(Boolean).join(', ')||'Location not specified';
  const locationValue=stripTrailingSetup(rawLocation,workSetupValue);
  const salaryValue=formatSalary(data);
  const heroMeta=uniquePreserve([firstFilled(data,['client_name'])||'Confidential Client',locationValue,workSetupValue||'',firstFilled(data,['employment_type']),shiftValue]).map(escapeHtml).join(' • ');
  jobPage.className='';
  jobPage.innerHTML=`<div class="hero-card"><div class="hero-top"><div class="eyebrow">Selected Role</div><h1>${escapeHtml(data.title||'Untitled Role')}</h1><div class="meta">${heroMeta}</div><div class="hero-actions"><a href="${buildApplyLink(data)}" class="btn btn-primary">Create Profile & Apply</a><a href="applicants.html" class="btn btn-secondary">Browse More Roles</a></div></div><div class="hero-bottom"><div class="hero-stat"><span class="hero-stat-label">Client</span><div class="hero-stat-value">${escapeHtml(firstFilled(data,['client_name'])||'Confidential')}</div></div><div class="hero-stat"><span class="hero-stat-label">Location</span><div class="hero-stat-value">${escapeHtml(locationValue)}</div></div><div class="hero-stat"><span class="hero-stat-label">Work Setup</span><div class="hero-stat-value">${escapeHtml(workSetupValue||'Not specified')}</div></div><div class="hero-stat"><span class="hero-stat-label">Salary</span><div class="hero-stat-value">${salaryValue}</div></div></div></div><div class="layout"><div class="detail-stack"><div class="detail-card"><div class="detail-header"><div><h2 class="detail-title">Role overview</h2><p class="detail-subtitle">Review the role summary, requirements, and key details below.</p></div></div><div class="job-description">${buildDescriptionHtml(data)}</div></div></div><div class="sidebar-wrap"><aside class="sidebar-card"><h3 class="sidebar-title">Role Snapshot</h3><div class="sidebar-item"><span class="sidebar-label">Client</span><div class="sidebar-value">${escapeHtml(firstFilled(data,['client_name'])||'Confidential')}</div></div><div class="sidebar-item"><span class="sidebar-label">Location</span><div class="sidebar-value">${escapeHtml(locationValue)}</div></div><div class="sidebar-item"><span class="sidebar-label">Work Setup</span><div class="sidebar-value">${escapeHtml(workSetupValue||'Not specified')}</div></div><div class="sidebar-item"><span class="sidebar-label">Employment Type</span><div class="sidebar-value">${escapeHtml(firstFilled(data,['employment_type'])||'Not specified')}</div></div><div class="sidebar-item"><span class="sidebar-label">Shift</span><div class="sidebar-value">${escapeHtml(shiftValue||'Not specified')}</div></div><div class="sidebar-item"><span class="sidebar-label">Salary</span><div class="sidebar-value">${salaryValue}</div></div></aside><div class="cta-strip"><h3>Interested in this role?</h3><p>Create your profile to apply and get considered for this opportunity through TalentBuzz.</p><div class="cta-actions"><a href="${buildApplyLink(data)}" class="btn btn-solid">Create Profile & Apply</a><a href="applicants.html" class="btn btn-outline">See other openings</a></div></div></div></div>`;
}
async function loadJob(){try{let data=null;if(jobId)data=await loadJobById(jobId);else if(slug)data=await loadJobBySlug(slug);else if(legacyId)data=await loadJobById(legacyId);if(!data){jobPage.className='empty-state';jobPage.textContent='No job selected.';return}renderJob(data)}catch(error){console.error('Failed to load job:',error);jobPage.className='empty-state';jobPage.textContent=error?.message||'Job not found.'}}
loadJob();
</script>
</body>
</html>
