<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TalentBuzz Professionals Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --danger:#b91c1c;
      --success:#166534;
      --info:#1d4ed8;
      --shadow:0 20px 60px rgba(30,58,138,.12),0 6px 20px rgba(15,23,42,.06);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--text);
    }

    .shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:32px;
      text-align:center;
    }

    /* ✅ LOGO */
    .logo{
      width:160px;
      margin:0 auto 18px;
      display:block;
    }

    h1{
      margin:0 0 6px;
      color:var(--blue);
      font-size:1.8rem;
      font-weight:800;
    }

    .subtitle{
      margin:0 0 24px;
      color:var(--muted);
      font-size:.95rem;
    }

    form{
      text-align:left;
    }

    label{
      display:block;
      margin:14px 0 6px;
      font-weight:700;
      font-size:.9rem;
    }

    input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font:inherit;
    }

    input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
      outline:none;
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:60px;
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      border:none;
      background:transparent;
      cursor:pointer;
      font-weight:800;
      color:var(--muted);
    }

    .toggle-password:hover{
      color:var(--blue);
    }

    .actions{
      margin-top:18px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:13px;
      font-weight:800;
      cursor:pointer;
      transition:0.2s;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(37,99,235,0.25);
    }

    .msg{
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-weight:700;
    }

    .msg.show{display:block}

    .msg.error{
      background:#fef2f2;
      color:var(--danger);
    }

    .msg.success{
      background:#ecfdf5;
      color:var(--success);
    }

    .msg.info{
      background:#eff6ff;
      color:var(--info);
    }

    .links{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      font-size:.9rem;
    }

    .links a{
      color:var(--blue);
      font-weight:700;
      text-decoration:none;
    }

    .divider{
      margin:22px 0 14px;
      font-size:.75rem;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.1em;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }

    .oauth-grid{
      display:grid;
      gap:10px;
    }

    .btn-secondary{
      background:#fff;
      border:1px solid var(--line);
      color:var(--blue);
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="card">

    <!-- ✅ LOGO HERE -->
    <img src="logo.png" alt="TalentBuzz Logo" class="logo">

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to access your TalentBuzz profile</p>

    <form id="loginForm">
      <label>Email</label>
      <input id="email" type="email" required>

      <label>Password</label>
      <div class="password-wrap">
        <input id="password" type="password" required>
        <button type="button" id="togglePasswordBtn" class="toggle-password">Show</button>
      </div>

      <div class="actions">
        <button id="submitBtn" type="submit" class="btn btn-primary">Login</button>
      </div>

      <div id="messageBox" class="msg"></div>
    </form>

    <div class="links">
      <a href="create-profile.html">Create account</a>
      <a href="recruiter-login.html">Recruiter</a>
    </div>

    <div class="divider">or continue with</div>

    <div class="oauth-grid">
      <button id="googleBtn" class="btn btn-secondary">Google</button>
      <button id="linkedinBtn" class="btn btn-secondary">LinkedIn</button>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const messageBox = document.getElementById('messageBox');
const submitBtn = document.getElementById('submitBtn');

function showMessage(message, type='error'){
  messageBox.textContent = message;
  messageBox.className = `msg show ${type}`;
}

function getNextRoute(){
  const params = new URLSearchParams(window.location.search);
  return params.get('next') === 'create-profile'
    ? 'create-profile.html'
    : 'dashboard.html';
}

function prefillEmail(){
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email');
  if(email) emailInput.value = email;
}

function showMessageFromUrl(){
  const msg = new URLSearchParams(window.location.search).get('message');
  if(msg === 'account_exists_signin'){
    showMessage('This email already has an account. Please sign in.', 'info');
  }
}

document.getElementById('togglePasswordBtn').onclick = () => {
  passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
};

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in...';

  try{
    const { error } = await supabaseClient.auth.signInWithPassword({
      email: emailInput.value,
      password: passwordInput.value
    });

    if(error) throw error;

    window.location.href = getNextRoute();

  }catch(err){
    showMessage(err.message);
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'Login';
  }
});

prefillEmail();
showMessageFromUrl();
</script>

</body>
</html>
