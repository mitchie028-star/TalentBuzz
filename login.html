<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to TalentBuzz and apply to top job opportunities faster.">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
    }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #fff;
      color: #0f172a;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 50px 20px;
    }

    h1 {
      text-align: center;
      color: var(--blue);
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 14px;
    }

    .btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(135deg,#1e3a8a,#2563eb);
      color: white;
    }

    .google {
      background: #fff;
      border: 1px solid var(--line);
    }

    .linkedin {
      background: #0077b5;
      color: white;
    }

    .divider {
      text-align: center;
      margin: 18px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toggle {
      margin-top: 16px;
      text-align: center;
      color: var(--blue-light);
      cursor: pointer;
      font-weight: 600;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      text-align: center;
      color: #b91c1c;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="title">Login</h1>
  <p class="subtitle">Access your TalentBuzz account</p>

  <div class="card">

    <!-- GOOGLE -->
    <button id="googleBtn" class="btn google">
      Continue with Google
    </button>

    <!-- LINKEDIN -->
    <button id="linkedinBtn" class="btn linkedin">
      Continue with LinkedIn
    </button>

    <div class="divider">or</div>

    <!-- EMAIL -->
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="actionBtn" class="btn primary">
      Login
    </button>

    <div class="toggle" onclick="toggleMode()">
      Don't have an account? Sign up
    </div>

    <div id="message" class="message"></div>

  </div>

</div>

<script>
const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Detect job redirect
const params = new URLSearchParams(window.location.search);
const job = params.get('job');

let isLogin = true;

// Toggle login/signup
function toggleMode() {
  isLogin = !isLogin;

  document.getElementById('title').innerText = isLogin ? "Login" : "Sign Up";
  document.getElementById('actionBtn').innerText = isLogin ? "Login" : "Create Account";
}

// EMAIL LOGIN / SIGNUP
document.getElementById('actionBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  let result;

  if (isLogin) {
    result = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });
  } else {
    result = await supabaseClient.auth.signUp({
      email,
      password
    });
  }

  if (result.error) {
    document.getElementById('message').innerText = result.error.message;
  } else {
    redirectAfterLogin();
  }
});

// GOOGLE LOGIN
document.getElementById('googleBtn').addEventListener('click', async () => {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: getRedirectURL()
    }
  });
});

// LINKEDIN LOGIN
document.getElementById('linkedinBtn').addEventListener('click', async () => {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'linkedin_oidc',
    options: {
      redirectTo: getRedirectURL()
    }
  });
});

// Redirect logic
function getRedirectURL() {
  if (job) {
    return window.location.origin + '/apply.html?job=' + encodeURIComponent(job);
  }
  return window.location.origin + '/applicants.html';
}

function redirectAfterLogin() {
  if (job) {
    window.location.href = `apply.html?job=${encodeURIComponent(job)}`;
  } else {
    window.location.href = "applicants.html";
  }
}
</script>

</body>
</html>
