<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Applicant Login | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Applicant login for TalentBuzz." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --danger:#b91c1c;
      --success:#166534;
      --info:#1d4ed8;
      --shadow:0 14px 40px rgba(30,58,138,.08),0 3px 10px rgba(15,23,42,.04);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--text);
    }

    .shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:28px;
    }

    .brand{
      display:inline-block;
      color:var(--blue);
      font-weight:800;
      font-size:1.4rem;
      text-decoration:none;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 8px;
      color:var(--blue);
      font-size:1.9rem;
      line-height:1.1;
    }

    .subtitle{
      margin:0 0 22px;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.6;
    }

    label{
      display:block;
      margin:14px 0 6px;
      font-weight:700;
      font-size:.93rem;
    }

    input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font:inherit;
      background:#fff;
      outline:none;
    }

    input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:58px;
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      border:none;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      font:inherit;
      font-weight:800;
      padding:6px 8px;
      border-radius:8px;
    }

    .toggle-password:hover{
      background:#f8fafc;
      color:var(--blue);
    }

    .actions{
      display:grid;
      gap:10px;
      margin-top:18px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font:inherit;
      font-weight:800;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .btn-secondary{
      background:#fff;
      color:var(--blue);
      border:1px solid var(--line);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn:disabled{
      opacity:.75;
      cursor:not-allowed;
    }

    .msg{
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
      display:none;
      white-space:pre-wrap;
    }

    .msg.show{display:block}

    .msg.error{
      background:#fef2f2;
      color:var(--danger);
      border:1px solid #fecaca;
    }

    .msg.success{
      background:#f0fdf4;
      color:var(--success);
      border:1px solid #bbf7d0;
    }

    .msg.info{
      background:#eff6ff;
      color:var(--info);
      border:1px solid #bfdbfe;
    }

    .links{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      font-size:.9rem;
    }

    .links a{
      color:var(--blue);
      font-weight:700;
      text-decoration:none;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:20px 0 14px;
      color:var(--muted);
      font-size:.82rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }

    .oauth-grid{
      display:grid;
      gap:10px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <a href="index.html" class="brand">TalentBuzz</a>
      <h1>Applicant Login</h1>
      <p class="subtitle">Access your profile, applications, and opportunities faster.</p>

      <form id="loginForm">
        <label for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" required />

        <label for="password">Password</label>
        <div class="password-wrap">
          <input id="password" type="password" autocomplete="current-password" required />
          <button
            type="button"
            id="togglePasswordBtn"
            class="toggle-password"
            aria-label="Show password"
          >
            Show
          </button>
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit" class="btn btn-primary">Login</button>
        </div>

        <div id="messageBox" class="msg"></div>
      </form>

      <div class="links">
        <a href="create-profile.html">Create an account</a>
        <a href="recruiter-login.html">Recruiter login</a>
      </div>

      <div class="divider">or continue with</div>

      <div class="oauth-grid">
        <button id="googleBtn" type="button" class="btn btn-secondary">Continue with Google</button>
        <button id="linkedinBtn" type="button" class="btn btn-secondary">Continue with LinkedIn</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePasswordBtn');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');
    const googleBtn = document.getElementById('googleBtn');
    const linkedinBtn = document.getElementById('linkedinBtn');

    let isSubmitting = false;

    function showMessage(message, type = 'error') {
      messageBox.textContent = message;
      messageBox.className = `msg show ${type}`;
    }

    function clearMessage() {
      messageBox.textContent = '';
      messageBox.className = 'msg';
    }

    function getNextRoute() {
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next');

      if (next === 'create-profile') return 'create-profile.html';
      if (next === 'dashboard') return 'dashboard.html';

      return 'dashboard.html';
    }

    function showMessageFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const message = params.get('message');

      if (message === 'login_required_profile') {
        showMessage('Please log in first to create or update your profile.', 'info');
      } else if (message === 'login_required_dashboard') {
        showMessage('Please log in to access your dashboard.', 'info');
      }
    }

    async function ensureApplicantProfile(user) {
      if (!user?.email) return;

      const { data: existing, error: existingError } = await supabaseClient
        .from('applicant_profiles')
        .select('id')
        .eq('email', user.email)
        .maybeSingle();

      if (existingError) {
        console.error('Profile check error:', existingError);
        return;
      }

      if (existing) return;

      const payload = {
        id: user.id,
        email: user.email,
        full_name: user.user_metadata?.full_name || user.user_metadata?.name || '',
        created_at: new Date().toISOString()
      };

      const { error: insertError } = await supabaseClient
        .from('applicant_profiles')
        .insert([payload]);

      if (insertError) {
        console.error('Profile create error:', insertError);
      }
    }

    togglePasswordBtn.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      togglePasswordBtn.textContent = isHidden ? 'Hide' : 'Show';
      togglePasswordBtn.setAttribute(
        'aria-label',
        isHidden ? 'Hide password' : 'Show password'
      );
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isSubmitting) return;

      clearMessage();

      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      if (!email || !password) {
        showMessage('Please enter your email and password.');
        return;
      }

      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        await ensureApplicantProfile(data.user);

        showMessage('Login successful.', 'success');
        window.location.href = getNextRoute();
      } catch (error) {
        const msg = String(error?.message || 'Login failed.');
        const lower = msg.toLowerCase();

        if (lower.includes('rate limit')) {
          showMessage('Too many attempts. Please wait a bit before trying again.');
        } else if (lower.includes('invalid login credentials')) {
          showMessage('Invalid email or password.');
        } else {
          showMessage(msg);
        }
      } finally {
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });

    googleBtn.addEventListener('click', async () => {
      clearMessage();

      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: `${window.location.origin}/${getNextRoute()}`
        }
      });

      if (error) {
        showMessage(error.message || 'Google login failed.');
      }
    });

    linkedinBtn.addEventListener('click', async () => {
      clearMessage();

      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'linkedin_oidc',
        options: {
          redirectTo: `${window.location.origin}/${getNextRoute()}`
        }
      });

      if (error) {
        showMessage(error.message || 'LinkedIn login failed.');
      }
    });

    showMessageFromUrl();
  </script>
</body>
</html>
