<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TalentBuzz Professionals Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --danger:#b91c1c;
      --success:#166534;
      --info:#1d4ed8;
      --shadow:0 20px 60px rgba(30,58,138,.12),0 6px 20px rgba(15,23,42,.06);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--text);
    }

    .shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:32px;
      text-align:center;
      position:relative;
      z-index:1;
    }

    .logo{
      width:160px;
      margin:0 auto 18px;
      display:block;
    }

    h1{
      margin:0 0 6px;
      color:var(--blue);
      font-size:1.8rem;
      font-weight:800;
    }

    .subtitle{
      margin:0 0 24px;
      color:var(--muted);
      font-size:.95rem;
    }

    form{
      text-align:left;
    }

    label{
      display:block;
      margin:14px 0 6px;
      font-weight:700;
      font-size:.9rem;
    }

    input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font:inherit;
    }

    input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
      outline:none;
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:60px;
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      border:none;
      background:transparent;
      cursor:pointer;
      font-weight:800;
      color:var(--muted);
    }

    .toggle-password:hover{
      color:var(--blue);
    }

    .form-row-right{
      display:flex;
      justify-content:flex-end;
      margin-top:8px;
    }

    .text-link{
      border:none;
      background:transparent;
      padding:0;
      color:var(--blue);
      font:inherit;
      font-size:.9rem;
      font-weight:700;
      cursor:pointer;
    }

    .actions{
      margin-top:18px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:13px;
      font-weight:800;
      cursor:pointer;
      transition:0.2s;
      font:inherit;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .btn-primary:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .msg{
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-weight:700;
      line-height:1.6;
    }

    .msg.show{display:block}
    .msg.error{background:#fef2f2;color:var(--danger);}
    .msg.success{background:#ecfdf5;color:var(--success);}
    .msg.info{background:#eff6ff;color:var(--info);}

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:20;
    }

    .modal-backdrop.show{display:flex;}

    .modal{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:22px;
      padding:24px;
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your TalentBuzz account</p>

    <form id="loginForm">
      <label>Email</label>
      <input id="email" type="email" required>

      <label>Password</label>
      <div class="password-wrap">
        <input id="password" type="password" required>
        <button type="button" id="togglePasswordBtn" class="toggle-password">Show</button>
      </div>

      <div class="form-row-right">
        <button type="button" id="forgotPasswordBtn" class="text-link">Forgot password?</button>
      </div>

      <div class="actions">
        <button id="submitBtn" class="btn btn-primary">Login</button>
      </div>

      <div id="messageBox" class="msg"></div>
    </form>
  </div>
</div>

<div id="resetModalBackdrop" class="modal-backdrop">
  <div class="modal">
    <h2>Reset password</h2>
    <p>Enter your email and we'll send a reset link.</p>

    <input id="resetEmail" type="email" placeholder="you@example.com">
    <div id="resetMessageBox" class="msg"></div>

    <button id="sendResetBtn" class="btn btn-primary">Send reset link</button>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  'https://dilalntcxmvdcmwxjcct.supabase.co',
  'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
);

const sendResetBtn = document.getElementById('sendResetBtn');
const resetEmailInput = document.getElementById('resetEmail');
const resetMessageBox = document.getElementById('resetMessageBox');

function showResetMessage(msg, type='error'){
  resetMessageBox.textContent = msg;
  resetMessageBox.className = 'msg show ' + type;
}

async function sendPasswordReset(){
  const email = resetEmailInput.value.trim();

  if(!email || !email.includes('@')){
    showResetMessage('Please enter a valid email.', 'error');
    return;
  }

  sendResetBtn.disabled = true;
  sendResetBtn.textContent = 'Sending reset link...';

  try{
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://talentbuzz.pro/update-password.html'
    });

    if(error) throw error;

    showResetMessage(
      'If an account exists, a reset link has been sent. Check your email.',
      'success'
    );

  }catch(err){
    console.error(err);

    let message = 'Failed to send reset email.';

    if(typeof err === 'string'){
      message = err;
    } else if(err?.message){
      message = err.message;
    }

    showResetMessage(message, 'error');
  }

  sendResetBtn.disabled = false;
  sendResetBtn.textContent = 'Send reset link';
}

sendResetBtn.addEventListener('click', sendPasswordReset);
</script>

</body>
</html>
