<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      max-width: 400px;
      margin: auto;
      padding: 40px;
    }

    h2 {
      color: #1e3a8a;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      cursor: pointer;
    }

    .toggle {
      margin-top: 10px;
      cursor: pointer;
      color: #2563eb;
    }
  </style>
</head>

<body>

<h2 id="title">Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button id="actionBtn">Login</button>

<p class="toggle" onclick="toggleMode()">Don't have an account? Sign up</p>

<p id="message"></p>

<script>
const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isLogin = true;

function toggleMode() {
  isLogin = !isLogin;
  document.getElementById('title').innerText = isLogin ? "Login" : "Sign Up";
  document.getElementById('actionBtn').innerText = isLogin ? "Login" : "Sign Up";
}

document.getElementById('actionBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  let result;

  if (isLogin) {
    result = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });
  } else {
    result = await supabaseClient.auth.signUp({
      email,
      password
    });
  }

  if (result.error) {
    document.getElementById('message').innerText = result.error.message;
  } else {
    document.getElementById('message').innerText = "✅ Success!";
    window.location.href = "applicants.html";
  }
});
</script>

</body>
</html>
