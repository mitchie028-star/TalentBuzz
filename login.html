<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TalentBuzz Professionals Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --danger:#b91c1c;
      --success:#166534;
      --info:#1d4ed8;
      --shadow:0 20px 60px rgba(30,58,138,.12),0 6px 20px rgba(15,23,42,.06);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--text);
    }

    .shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:32px;
      text-align:center;
      position:relative;
      z-index:1;
    }

    .logo{
      width:160px;
      margin:0 auto 18px;
      display:block;
    }

    h1{
      margin:0 0 6px;
      color:var(--blue);
      font-size:1.8rem;
      font-weight:800;
    }

    .subtitle{
      margin:0 0 24px;
      color:var(--muted);
      font-size:.95rem;
    }

    form{
      text-align:left;
    }

    label{
      display:block;
      margin:14px 0 6px;
      font-weight:700;
      font-size:.9rem;
    }

    input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font:inherit;
    }

    input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
      outline:none;
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:60px;
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      border:none;
      background:transparent;
      cursor:pointer;
      font-weight:800;
      color:var(--muted);
    }

    .toggle-password:hover{
      color:var(--blue);
    }

    .form-row-right{
      display:flex;
      justify-content:flex-end;
      margin-top:8px;
    }

    .text-link{
      border:none;
      background:transparent;
      padding:0;
      color:var(--blue);
      font:inherit;
      font-size:.9rem;
      font-weight:700;
      cursor:pointer;
    }

    .text-link:hover{
      text-decoration:underline;
    }

    .text-link:disabled{
      opacity:.6;
      cursor:not-allowed;
      text-decoration:none;
    }

    .actions{
      margin-top:18px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:13px;
      font-weight:800;
      cursor:pointer;
      transition:0.2s;
      font:inherit;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(37,99,235,0.25);
    }

    .btn-primary:disabled,
    .btn-secondary:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .msg{
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-weight:700;
      line-height:1.6;
    }

    .msg.show{display:block}

    .msg.error{
      background:#fef2f2;
      color:var(--danger);
    }

    .msg.success{
      background:#ecfdf5;
      color:var(--success);
    }

    .msg.info{
      background:#eff6ff;
      color:var(--info);
    }

    .links{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      font-size:.9rem;
      gap:12px;
    }

    .links a{
      color:var(--blue);
      font-weight:700;
      text-decoration:none;
    }

    .divider{
      margin:22px 0 14px;
      font-size:.75rem;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.1em;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }

    .oauth-grid{
      display:grid;
      gap:10px;
    }

    .btn-secondary{
      background:#fff;
      border:1px solid var(--line);
      color:var(--blue);
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:20;
    }

    .modal-backdrop.show{
      display:flex;
    }

    .modal{
      width:100%;
      max-width:420px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:24px;
    }

    .modal-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .modal-title{
      margin:0;
      color:var(--blue);
      font-size:1.25rem;
      font-weight:800;
    }

    .modal-subtitle{
      margin:6px 0 0;
      color:var(--muted);
      font-size:.92rem;
      line-height:1.6;
    }

    .icon-btn{
      border:none;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      font-size:1.25rem;
      line-height:1;
      padding:4px;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      margin-top:16px;
    }

    .modal-actions .btn{
      width:auto;
      flex:1;
    }

    @media (max-width:520px){
      .card{
        padding:24px;
      }

      .links{
        flex-direction:column;
        align-items:flex-start;
      }

      .modal-actions{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="card">
    <img src="logo.png" alt="TalentBuzz Logo" class="logo" onerror="this.style.display='none'">

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to access your TalentBuzz profile</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required>

      <label for="password">Password</label>
      <div class="password-wrap">
        <input id="password" type="password" required>
        <button type="button" id="togglePasswordBtn" class="toggle-password">Show</button>
      </div>

      <div class="form-row-right">
        <button type="button" id="forgotPasswordBtn" class="text-link">Forgot password?</button>
      </div>

      <div class="actions">
        <button id="submitBtn" type="submit" class="btn btn-primary">Login</button>
      </div>

      <div id="messageBox" class="msg"></div>
    </form>

    <div class="links">
      <a href="create-profile.html">Create account</a>
      <a href="recruiter-login.html">Recruiter</a>
    </div>

    <div class="divider">or continue with</div>

    <div class="oauth-grid">
      <button id="googleBtn" type="button" class="btn btn-secondary">Google</button>
      <button id="linkedinBtn" type="button" class="btn btn-secondary">LinkedIn</button>
    </div>
  </div>
</div>

<div id="resetModalBackdrop" class="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="resetModalTitle">
    <div class="modal-head">
      <div>
        <h2 id="resetModalTitle" class="modal-title">Reset password</h2>
        <p class="modal-subtitle">
          Enter your email and we’ll send you a password reset link.
        </p>
      </div>
      <button type="button" id="closeResetModalBtn" class="icon-btn" aria-label="Close">×</button>
    </div>

    <label for="resetEmail">Email</label>
    <input id="resetEmail" type="email" placeholder="you@example.com">

    <div id="resetMessageBox" class="msg"></div>

    <div class="modal-actions">
      <button type="button" id="cancelResetBtn" class="btn btn-secondary">Cancel</button>
      <button type="button" id="sendResetBtn" class="btn btn-primary">Send reset link</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const messageBox = document.getElementById('messageBox');
const submitBtn = document.getElementById('submitBtn');
const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');

const resetModalBackdrop = document.getElementById('resetModalBackdrop');
const closeResetModalBtn = document.getElementById('closeResetModalBtn');
const cancelResetBtn = document.getElementById('cancelResetBtn');
const sendResetBtn = document.getElementById('sendResetBtn');
const resetEmailInput = document.getElementById('resetEmail');
const resetMessageBox = document.getElementById('resetMessageBox');

let resetCooldown = false;

function showMessage(message, type='error'){
  messageBox.textContent = message;
  messageBox.className = `msg show ${type}`;
}

function showResetMessage(message, type='error'){
  resetMessageBox.textContent = message;
  resetMessageBox.className = `msg show ${type}`;
}

function clearResetMessage(){
  resetMessageBox.textContent = '';
  resetMessageBox.className = 'msg';
}

function getNextRoute(){
  const params = new URLSearchParams(window.location.search);
  return params.get('next') === 'create-profile'
    ? 'create-profile.html'
    : 'dashboard.html';
}

function prefillEmail(){
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email');
  if(email) emailInput.value = email;
}

function showMessageFromUrl(){
  const msg = new URLSearchParams(window.location.search).get('message');

  if(msg === 'account_exists_signin'){
    showMessage('This email already has an account. Please sign in.', 'info');
  }

  if(msg === 'password_updated'){
    showMessage('Password updated successfully. Please sign in.', 'success');
  }
}

function openResetModal(){
  clearResetMessage();
  resetEmailInput.value = emailInput.value.trim();
  resetModalBackdrop.classList.add('show');
  setTimeout(() => resetEmailInput.focus(), 50);
}

function closeResetModal(){
  resetModalBackdrop.classList.remove('show');
  clearResetMessage();
}

document.getElementById('togglePasswordBtn').onclick = () => {
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  document.getElementById('togglePasswordBtn').textContent = isPassword ? 'Hide' : 'Show';
};

forgotPasswordBtn.addEventListener('click', openResetModal);
closeResetModalBtn.addEventListener('click', closeResetModal);
cancelResetBtn.addEventListener('click', closeResetModal);

resetModalBackdrop.addEventListener('click', (e) => {
  if(e.target === resetModalBackdrop){
    closeResetModal();
  }
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && resetModalBackdrop.classList.contains('show')){
    closeResetModal();
  }
});

async function sendPasswordReset(){
  const email = resetEmailInput.value.trim();

  if(!email){
    showResetMessage('Please enter your email first.', 'info');
    resetEmailInput.focus();
    return;
  }

  if(resetCooldown){
    showResetMessage('Please wait before requesting another reset email.', 'info');
    return;
  }

  resetCooldown = true;
  sendResetBtn.disabled = true;
  forgotPasswordBtn.disabled = true;
  sendResetBtn.textContent = 'Sending...';

  try{
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://talentbuzz.pro/update-password.html'
    });

    if(error) throw error;

    showResetMessage('Password reset email sent. Please check your inbox.', 'success');
  }catch(err){
    showResetMessage(err.message || 'Failed to send reset email.', 'error');
  }finally{
    setTimeout(() => {
      resetCooldown = false;
      sendResetBtn.disabled = false;
      forgotPasswordBtn.disabled = false;
      sendResetBtn.textContent = 'Send reset link';
    }, 60000);
  }
}

sendResetBtn.addEventListener('click', sendPasswordReset);

resetEmailInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    sendPasswordReset();
  }
});

document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in...';

  try{
    const { error } = await supabaseClient.auth.signInWithPassword({
      email: emailInput.value.trim(),
      password: passwordInput.value
    });

    if(error) throw error;

    window.location.href = getNextRoute();

  }catch(err){
    showMessage(err.message || 'Failed to sign in.');
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'Login';
  }
});

document.getElementById('googleBtn').addEventListener('click', () => {
  showMessage('Google login is not configured yet.', 'info');
});

document.getElementById('linkedinBtn').addEventListener('click', () => {
  showMessage('LinkedIn login is not configured yet.', 'info');
});

prefillEmail();
showMessageFromUrl();
</script>

</body>
</html>
