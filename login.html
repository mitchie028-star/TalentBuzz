<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      padding: 40px;
      max-width: 480px;
      margin: auto;
    }

    h2 {
      color: #1e3a8a;
      margin-bottom: 8px;
    }

    p {
      color: #64748b;
      font-size: 14px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
    }

    .btn-primary {
      background: #1e3a8a;
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-google {
      background: white;
      border: 1px solid #e2e8f0;
      color: #1e3a8a;
    }

    .btn-linkedin {
      background: white;
      border: 1px solid #0a66c2;
      color: #0a66c2;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #94a3b8;
      font-size: 12px;
    }

    #message {
      margin-top: 15px;
      font-size: 13px;
      color: red;
    }
  </style>
</head>

<body>

<h2>Login to TalentBuzz</h2>
<p>Access your profile and applications.</p>

<form id="loginForm">
  <input type="email" id="email" placeholder="Enter your email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button class="btn-primary" type="submit">Login / Sign Up</button>
</form>

<div class="divider">or continue with</div>

<button class="btn-google" id="googleLogin">Continue with Google</button>
<button class="btn-linkedin" id="linkedinLogin">Continue with LinkedIn</button>

<p id="message"></p>

<script>
const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// redirect after login
function getRedirect() {
  return 'https://talentbuzz.pro/dashboard.html';
}

// CHECK SESSION
async function checkSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    window.location.href = "dashboard.html";
  }
}

checkSession();

// EMAIL LOGIN / SIGNUP
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    const { error: signUpError } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (signUpError) {
      document.getElementById('message').innerText = signUpError.message;
      return;
    }

    document.getElementById('message').innerText = "Account created. Check your email.";
    return;
  }

  window.location.href = "dashboard.html";
});

// GOOGLE LOGIN
document.getElementById('googleLogin').addEventListener('click', async () => {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: getRedirect()
    }
  });
});

// LINKEDIN LOGIN
document.getElementById('linkedinLogin').addEventListener('click', async () => {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'linkedin_oidc',
    options: {
      redirectTo: getRedirect()
    }
  });
});
</script>

</body>
</html>
