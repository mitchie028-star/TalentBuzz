<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Candidate | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --success:#166534;
      --error:#b91c1c;
      --shadow-soft:0 10px 30px rgba(30,58,138,.06),0 2px 10px rgba(15,23,42,.03);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      color: var(--blue);
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid transparent;
      text-decoration: none;
      font-weight: 800;
      font-size: .92rem;
      cursor: pointer;
      font-family: inherit;
      transition: .2s ease;
      background: white;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg,var(--blue),var(--blue-light));
      color: white;
    }

    .btn-outline {
      background: white;
      color: var(--blue);
      border-color: var(--line);
    }

    .btn[disabled] {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: .9rem;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font: inherit;
      background: white;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(147,197,253,.25);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .helper {
      margin-top: 6px;
      color: var(--muted);
      font-size: .84rem;
    }

    .dropzone {
      border: 2px dashed var(--line);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      background: white;
      cursor: pointer;
      color: var(--muted);
      transition: .2s ease;
    }

    .dropzone.dragover {
      border-color: var(--blue-light);
      background: #f0f5ff;
      color: var(--blue);
    }

    .resume-preview {
      margin-top: 10px;
      color: var(--text);
      font-size: .9rem;
    }

    .mini-btn {
      margin-left: 10px;
      padding: 4px 8px;
      font-size: .8rem;
      border: none;
      border-radius: 6px;
      background: var(--error);
      color: white;
      cursor: pointer;
    }

    .notice {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: .92rem;
    }

    .notice.show { display: block; }
    .notice.success {
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }
    .notice.error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .container { padding: 18px 14px 30px; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div>
      <h1>Add Candidate</h1>
      <p class="subtitle">Create a candidate profile and application on behalf of a recruiter.</p>
    </div>
    <div>
      <a href="recruiter-dashboard.html" class="btn btn-outline">Back to Recruiter Dashboard</a>
    </div>
  </div>

  <div id="notice" class="notice"></div>

  <div class="panel">
    <form id="candidateForm">
      <div class="grid">
        <div>
          <label for="full_name">Full Name</label>
          <input id="full_name" required>
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" type="email" required>
        </div>

        <div>
          <label for="phone">Phone</label>
          <input id="phone">
        </div>

        <div>
          <label for="location">Location</label>
          <input id="location">
        </div>

        <div class="full">
          <label for="experience_summary">Experience Summary</label>
          <textarea id="experience_summary" placeholder="Write manually for now. Resume parsing can be connected later."></textarea>
        </div>

        <div>
          <label for="job_id_select">Job</label>
          <select id="job_id_select" required>
            <option value="">Loading roles...</option>
          </select>
          <div class="helper" id="jobHelper">Roles are pulled from your jobs table.</div>
        </div>

        <div>
          <label for="status">Application Status</label>
          <select id="status">
            <option value="submitted">Submitted</option>
            <option value="failed paper screening">Failed paper screening</option>
            <option value="endorsed">Endorsed</option>
            <option value="assessment">Assessment</option>
            <option value="initial">Initial</option>
            <option value="final">Final</option>
            <option value="hired">Hired</option>
            <option value="onboarded">Onboarded</option>
            <option value="no-show (onboarding)">No-show (Onboarding)</option>
            <option value="withdrawn">Withdrawn</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <div>
          <label for="recruiter_email">Assigned Recruiter</label>
          <select id="recruiter_email">
            <option value="michelle.giray@talentbuzz.pro">Michelle Giray</option>
            <option value="angel.n@talentbuzz.pro">Angelia Nerida</option>
            <option value="jercey.cayetano@talentbuzz.pro">Jercey Cayetano</option>
            <option value="jayson.c@talentbuzz.pro">Jayson Cornejo</option>
            <option value="xyrene.e@talentbuzz.pro">Xyrene Ellsworth</option>
          </select>
        </div>

        <div>
          <label for="application_source">Application Source</label>
          <select id="application_source" required>
            <option value="">Select source</option>
            <option value="Facebook">Facebook</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="Website">Website</option>
            <option value="Indeed">Indeed</option>
            <option value="Referral">Referral</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="full">
          <label for="resume">Resume</label>
          <div id="resumeDropZone" class="dropzone">
            Drag & drop your resume here, or click to select
          </div>
          <input id="resume" type="file" accept=".pdf,.doc,.docx" style="display:none;">
          <div class="helper">Uploads to the <strong>resumes</strong> bucket. You can remove or replace the file before saving.</div>
          <div id="resumePreview" class="resume-preview"></div>
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary" id="saveBtn">Save Candidate</button>
        <button type="button" class="btn btn-outline" id="saveAddAnotherBtn">Save & Add Another</button>
        <a href="recruiter-dashboard.html" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const ALLOWED_RECRUITER_EMAILS = [
    'mitchie028@gmail.com',
    'michelle.giray@talentbuzz.pro',
    'angel.n@talentbuzz.pro',
    'jercey.cayetano@talentbuzz.pro',
    'jayson.c@talentbuzz.pro',
    'xyrene.e@talentbuzz.pro'
  ];

  const form = document.getElementById('candidateForm');
  const noticeEl = document.getElementById('notice');
  const saveBtn = document.getElementById('saveBtn');
  const saveAddAnotherBtn = document.getElementById('saveAddAnotherBtn');
  const jobSelect = document.getElementById('job_id_select');
  const jobHelper = document.getElementById('jobHelper');
  const recruiterSelect = document.getElementById('recruiter_email');

  const resumeInput = document.getElementById('resume');
  const resumeDropZone = document.getElementById('resumeDropZone');
  const resumePreview = document.getElementById('resumePreview');

  let currentUserEmail = '';

  function showNotice(text, type = 'success') {
    noticeEl.textContent = text;
    noticeEl.className = `notice show ${type}`;
  }

  function clearNotice() {
    noticeEl.textContent = '';
    noticeEl.className = 'notice';
  }

  function setSavingState(isSaving, mode = 'save') {
    saveBtn.disabled = isSaving;
    saveAddAnotherBtn.disabled = isSaving;

    if (!isSaving) {
      saveBtn.textContent = 'Save Candidate';
      saveAddAnotherBtn.textContent = 'Save & Add Another';
      return;
    }

    saveBtn.textContent = mode === 'addAnother' ? 'Saving...' : 'Saving...';
    saveAddAnotherBtn.textContent = mode === 'addAnother' ? 'Saving...' : 'Save & Add Another';
  }

  function makeSlug(value) {
    return String(value || '')
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function getSelectedJobData() {
    const selectedJobOption = jobSelect.options[jobSelect.selectedIndex];
    return {
      uuid: selectedJobOption?.value || '',
      title: selectedJobOption?.dataset?.title || '',
      slug: selectedJobOption?.dataset?.slug || ''
    };
  }

  function resetFormForNextEntry() {
    form.reset();
    resumeInput.value = '';
    resumePreview.innerHTML = '';
    resumeDropZone.classList.remove('dragover');

    if (currentUserEmail) {
      const recruiterOptionExists = Array.from(recruiterSelect.options).some(
        option => option.value.toLowerCase() === currentUserEmail
      );
      if (recruiterOptionExists) recruiterSelect.value = currentUserEmail;
    }
  }

  async function protectPage() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session || !session.user) {
      window.location.href = 'login.html?redirect=recruiter-add-candidate.html';
      return false;
    }

    const email = String(session.user.email || '').toLowerCase();
    currentUserEmail = email;

    if (!ALLOWED_RECRUITER_EMAILS.includes(email)) {
      alert('Access denied.');
      window.location.href = 'dashboard.html';
      return false;
    }

    const recruiterOptionExists = Array.from(recruiterSelect.options).some(
      option => option.value.toLowerCase() === email
    );
    if (recruiterOptionExists) recruiterSelect.value = email;

    return true;
  }

  async function loadJobs() {
    jobSelect.innerHTML = `<option value="">Loading roles...</option>`;

    const { data, error } = await supabaseClient
      .from('jobs')
      .select('id, title, client_name, location, slug')
      .order('title', { ascending: true });

    if (error) {
      jobSelect.innerHTML = `<option value="">Unable to load roles</option>`;
      jobHelper.textContent = error.message;
      return;
    }

    if (!data || !data.length) {
      jobSelect.innerHTML = `<option value="">No roles found</option>`;
      jobHelper.textContent = 'Your jobs table is empty or not readable yet.';
      return;
    }

    jobSelect.innerHTML =
      `<option value="">Select a role</option>` +
      data.map(job => {
        const safeSlug = job.slug || makeSlug(job.title);
        return `
          <option
            value="${job.id}"
            data-title="${job.title}"
            data-slug="${safeSlug}"
          >
            ${job.title}${job.client_name ? ' — ' + job.client_name : ''}${job.location ? ' (' + job.location + ')' : ''}
          </option>
        `;
      }).join('');

    jobHelper.textContent = `${data.length} role(s) available.`;
  }

  async function uploadResume(file, email) {
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const safeEmail = email.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `manual/${safeEmail}/${Date.now()}-${safeName}`;

    const { error } = await supabaseClient
      .storage
      .from('resumes')
      .upload(path, file, { upsert: false });

    if (error) throw error;

    const { data } = supabaseClient.storage.from('resumes').getPublicUrl(path);

    return {
      path,
      url: data.publicUrl
    };
  }

  function showResumePreview(file) {
    resumePreview.innerHTML = `
      Selected file: <strong>${file.name}</strong> (${(file.size / 1024).toFixed(1)} KB)
      <button type="button" id="removeResumeBtn" class="mini-btn">Remove</button>
    `;

    document.getElementById('removeResumeBtn').addEventListener('click', () => {
      resumeInput.value = '';
      resumePreview.innerHTML = '';
    });
  }

  function validateResumeFile(file) {
    if (!file) return true;

    const allowedExtensions = ['.pdf', '.doc', '.docx'];
    const lowerName = file.name.toLowerCase();
    const isValid = allowedExtensions.some(ext => lowerName.endsWith(ext));

    if (!isValid) {
      throw new Error('Please upload a PDF, DOC, or DOCX file only.');
    }

    return true;
  }

  resumeDropZone.addEventListener('click', () => resumeInput.click());

  resumeInput.addEventListener('change', () => {
    if (resumeInput.files.length > 0) {
      try {
        validateResumeFile(resumeInput.files[0]);
        showResumePreview(resumeInput.files[0]);
      } catch (error) {
        resumeInput.value = '';
        resumePreview.innerHTML = '';
        showNotice(error.message, 'error');
      }
    }
  });

  resumeDropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    resumeDropZone.classList.add('dragover');
  });

  resumeDropZone.addEventListener('dragleave', (e) => {
    e.preventDefault();
    resumeDropZone.classList.remove('dragover');
  });

  resumeDropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    resumeDropZone.classList.remove('dragover');

    const files = e.dataTransfer.files;
    if (!files || !files.length) return;

    try {
      validateResumeFile(files[0]);
      resumeInput.files = files;
      showResumePreview(files[0]);
    } catch (error) {
      resumeInput.value = '';
      resumePreview.innerHTML = '';
      showNotice(error.message, 'error');
    }
  });

  async function saveCandidate({ stayOnPage = false } = {}) {
    clearNotice();
    setSavingState(true, stayOnPage ? 'addAnother' : 'save');

    try {
      const full_name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const phone = document.getElementById('phone').value.trim();
      const location = document.getElementById('location').value.trim();
      const experience_summary = document.getElementById('experience_summary').value.trim();
      const status = document.getElementById('status').value;
      const recruiter_email = document.getElementById('recruiter_email').value;
      const application_source = document.getElementById('application_source').value;
      const resumeFile = resumeInput.files[0];

      const selectedJob = getSelectedJobData();
      const selectedJobUuid = selectedJob.uuid;
      const selectedJobTitle = selectedJob.title;
      const selectedJobSlug = selectedJob.slug || makeSlug(selectedJobTitle);

      if (!full_name) throw new Error('Please enter the full name.');
      if (!email) throw new Error('Please enter the email address.');
      if (!selectedJobTitle || !selectedJobUuid) throw new Error('Please select a job role.');
      if (!application_source) throw new Error('Please select an application source.');
      validateResumeFile(resumeFile);

      const { data: existingProfile, error: existingProfileError } = await supabaseClient
        .from('applicant_profiles')
        .select('*')
        .eq('email', email)
        .maybeSingle();

      if (existingProfileError) throw existingProfileError;

      let resume_path = existingProfile?.resume_path || null;
      let resume_url = existingProfile?.resume_url || null;

      if (resumeFile) {
        const uploaded = await uploadResume(resumeFile, email);
        resume_path = uploaded.path;
        resume_url = uploaded.url;
      }

      let profile = null;

      if (existingProfile) {
        const { data: updatedProfile, error: updateProfileError } = await supabaseClient
          .from('applicant_profiles')
          .update({
            full_name,
            phone,
            location,
            experience_summary,
            resume_path,
            resume_url
          })
          .eq('id', existingProfile.id)
          .select()
          .single();

        if (updateProfileError) throw updateProfileError;
        profile = updatedProfile;
      } else {
        const { data: insertedProfile, error: insertProfileError } = await supabaseClient
          .from('applicant_profiles')
          .insert([{
            full_name,
            email,
            phone,
            location,
            experience_summary,
            resume_path,
            resume_url
          }])
          .select()
          .single();

        if (insertProfileError) throw insertProfileError;
        profile = insertedProfile;
      }

      const { data: existingApplication, error: existingApplicationError } = await supabaseClient
        .from('applications')
        .select('*')
        .eq('applicant_profile_id', profile.id)
        .eq('job_id_uuid', selectedJobUuid)
        .maybeSingle();

      if (existingApplicationError) {
        const { data: fallbackExistingApplication, error: fallbackError } = await supabaseClient
          .from('applications')
          .select('*')
          .eq('applicant_profile_id', profile.id)
          .eq('job_id', selectedJobSlug)
          .maybeSingle();

        if (fallbackError) throw fallbackError;

        if (fallbackExistingApplication) {
          const { error: updateAppError } = await supabaseClient
            .from('applications')
            .update({
              status,
              recruiter_email,
              email,
              application_source,
              confirmation_email_status: 'pending',
              job_title: selectedJobTitle,
              job_id: selectedJobSlug,
              job_id_uuid: selectedJobUuid
            })
            .eq('id', fallbackExistingApplication.id);

          if (updateAppError) throw updateAppError;
        } else {
          const { error: insertAppError } = await supabaseClient
            .from('applications')
            .insert([{
              applicant_profile_id: profile.id,
              email,
              job_title: selectedJobTitle,
              job_id: selectedJobSlug,
              job_id_uuid: selectedJobUuid,
              recruiter_email,
              status,
              application_source,
              confirmation_email_status: 'pending'
            }]);

          if (insertAppError) throw insertAppError;
        }
      } else if (existingApplication) {
        const { error: updateAppError } = await supabaseClient
          .from('applications')
          .update({
            status,
            recruiter_email,
            email,
            application_source,
            confirmation_email_status: 'pending',
            job_title: selectedJobTitle,
            job_id: selectedJobSlug,
            job_id_uuid: selectedJobUuid
          })
          .eq('id', existingApplication.id);

        if (updateAppError) throw updateAppError;
      } else {
        const { error: insertAppError } = await supabaseClient
          .from('applications')
          .insert([{
            applicant_profile_id: profile.id,
            email,
            job_title: selectedJobTitle,
            job_id: selectedJobSlug,
            job_id_uuid: selectedJobUuid,
            recruiter_email,
            status,
            application_source,
            confirmation_email_status: 'pending'
          }]);

        if (insertAppError) throw insertAppError;
      }

      showNotice('Candidate saved successfully.', 'success');

      if (stayOnPage) {
        resetFormForNextEntry();
        await loadJobs();
        document.getElementById('full_name').focus();
      } else {
        setTimeout(() => {
          window.location.href = 'recruiter-dashboard.html';
        }, 800);
      }

    } catch (error) {
      showNotice(error.message || 'Error saving candidate.', 'error');
    } finally {
      setSavingState(false);
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    await saveCandidate({ stayOnPage: false });
  });

  saveAddAnotherBtn.addEventListener('click', async () => {
    await saveCandidate({ stayOnPage: true });
  });

  (async () => {
    const allowed = await protectPage();
    if (!allowed) return;
    await loadJobs();
  })();
});
</script>
</body>
</html>
