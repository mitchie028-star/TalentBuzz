<!DOCTYPE html>
<html>
<head>
  <title>Recruiter Dashboard (Updated)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Recruiter Dashboard (Endorsement Sync Fixed)</h2>

<button onclick="testEndorse()">Test Endorse Candidate</button>

<script>
const supabaseClient = supabase.createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

// 🔥 NEW: Sync endorsement record
async function syncEndorsementRecord(applicationRow) {
  const applicationId = applicationRow.id;
  const jobId = applicationRow.job_id;

  const { data: existing } = await supabaseClient
    .from("application_endorsements")
    .select("id")
    .eq("application_id", applicationId)
    .maybeSingle();

  const payload = {
    application_id: applicationId,
    job_id: jobId,
    sent_at: new Date().toISOString()
  };

  if (existing?.id) {
    await supabaseClient
      .from("application_endorsements")
      .update(payload)
      .eq("id", existing.id);
  } else {
    await supabaseClient
      .from("application_endorsements")
      .insert(payload);
  }
}

// 🔥 UPDATED: Status setter
async function setApplicationStatus(applicationRow, status) {
  await supabaseClient
    .from("applications")
    .update({
      status: status,
      endorsement_status: status === "endorsed" ? "sent" : null,
      endorsement_sent_at: status === "endorsed" ? new Date().toISOString() : null
    })
    .eq("id", applicationRow.id);

  if (status === "endorsed") {
    await syncEndorsementRecord(applicationRow);
  }
}

// 🔥 TEST FUNCTION
async function testEndorse() {
  const applicationRow = {
    id: prompt("Enter application_id"),
    job_id: prompt("Enter job_id")
  };

  await setApplicationStatus(applicationRow, "endorsed");

  alert("Endorsement synced! Now check client dashboard.");
}
</script>

</body>
</html>
