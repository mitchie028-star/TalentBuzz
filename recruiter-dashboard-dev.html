<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BuzzHire | TalentBuzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Manrope, sans-serif;
  background:#f8fbff;
  margin:0;
}

.container {
  padding:20px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #e2e8f0;
}

th {
  background:#f1f5f9;
  font-size:12px;
}

.score-bar {
  height:6px;
  background:#e2e8f0;
  border-radius:999px;
  overflow:hidden;
}

.score-bar span {
  display:block;
  height:100%;
  background:#2563eb;
}
</style>
</head>

<body>

<div class="container">
  <h2>BuzzHire Dashboard</h2>

  <table>
    <thead>
      <tr>
        <th>Candidate</th>
        <th>Job</th>
        <th>Status</th>
        <th>Experience</th>
        <th>Profile</th>
        <th>Screening</th>
        <th>Final</th>
      </tr>
    </thead>

    <tbody id="table">
      <tr><td colspan="7">Loading candidates...</td></tr>
    </tbody>
  </table>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://dilalntcxmvdcmwxjcct.supabase.co",
  "YOUR_PUBLIC_KEY"
);

const table = document.getElementById("table");

init();

async function init(){
  try {
    const data = await loadCandidates();
    render(data);
  } catch (err){
    table.innerHTML = `<tr><td colspan="7">Failed to load candidates</td></tr>`;
    console.error(err);
  }
}

async function loadCandidates(){
  const { data, error } = await supabase
    .from("applications")
    .select(`
      id,
      status,
      job_title,
      application_source,
      recruiter_email,
      created_at,
      applicant_profiles (
        full_name,
        phone,
        location,
        years_of_experience,
        resume_url
      ),
      application_screening_responses (
        recruiter_score
      )
    `);

  if (error) throw error;

  return data || [];
}

function render(data){
  if (!data.length){
    table.innerHTML = `<tr><td colspan="7">No candidates found</td></tr>`;
    return;
  }

  table.innerHTML = data.map(app=>{
    const profile = app.applicant_profiles?.[0] || {};
    const responses = app.application_screening_responses || [];

    const profileScore = computeProfileScore(app, profile);
    const screeningScore = computeScreeningScore(responses);
    const finalScore = computeFinal(profileScore, screeningScore);

    return `
      <tr>
        <td>${profile.full_name || "-"}</td>
        <td>${app.job_title || "-"}</td>
        <td>${app.status || "-"}</td>
        <td>${profile.years_of_experience || "-"}</td>

        <td>${renderScore(profileScore)}</td>
        <td>${renderScore(screeningScore)}</td>
        <td>${renderScore(finalScore)}</td>
      </tr>
    `;
  }).join("");
}

/* =============================
   SCORING LOGIC (CLEAN)
============================= */

function computeProfileScore(app, profile){
  let score = 0;

  const exp = parseFloat(profile.years_of_experience || 0);

  if (exp >= 10) score += 40;
  else if (exp >= 5) score += 30;
  else if (exp >= 3) score += 20;
  else if (exp >= 1) score += 10;

  if (profile.resume_url) score += 15;
  if (profile.phone) score += 5;
  if (profile.location) score += 5;

  if (app.recruiter_email) score += 10;

  return clamp(score);
}

function computeScreeningScore(responses){
  if (!responses.length) return 0;

  const valid = responses.filter(r=>r.recruiter_score != null);

  if (!valid.length) return 0;

  const avg = valid.reduce((a,b)=>a + Number(b.recruiter_score),0)/valid.length;

  return clamp((avg/5)*100);
}

function computeFinal(profile, screening){
  if (!screening) return profile;
  return clamp((profile*0.4)+(screening*0.6));
}

function clamp(n){
  return Math.max(0, Math.min(100, Math.round(n)));
}

function renderScore(score){
  return `
    <div>
      <b>${score}</b>
      <div class="score-bar">
        <span style="width:${score}%"></span>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
