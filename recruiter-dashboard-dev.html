
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BuzzHire - TalentBuzz</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px}
h1{color:#1e3a8a}
.table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden}
.table th,.table td{padding:10px;border-bottom:1px solid #eee;text-align:left}
.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.strong{background:#dcfce7}
.moderate{background:#fef3c7}
.weak{background:#fee2e2}
.drawer{position:fixed;right:0;top:0;width:400px;height:100%;background:#fff;border-left:1px solid #ddd;padding:20px;display:none}
</style>
</head>
<body>

<h1>BuzzHire Dashboard</h1>
<div id="stats"></div>
<table class="table" id="table"></table>

<div class="drawer" id="drawer"></div>

<script>
const supabase = supabase.createClient(
"https://dilalntcxmvdcmwxjcct.supabase.co",
"sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs"
);

function safeNumber(v,f=0){const n=Number(v);return isFinite(n)?n:f;}
function safeText(v,f='-'){return v?String(v):f;}

function computeAiScore(app){
 if(app.screening_score!=null){
  return Math.round((safeNumber(app.screening_score)*0.7)+((safeNumber(app.ai_score)||42)*0.3));
 }
 let s=42;
 if(app.resume_url) s+=18;
 if(app.experience_summary) s+=14;
 if(app.location) s+=10;
 return Math.min(100,s);
}

function scoreClass(score){
 if(score>=75) return 'strong';
 if(score>=50) return 'moderate';
 return 'weak';
}

function openDrawer(app){
 document.getElementById("drawer").style.display="block";
 document.getElementById("drawer").innerHTML=`
   <h3>${safeText(app.full_name)}</h3>
   <p><b>Email:</b> ${safeText(app.email)}</p>
   <p><b>Role:</b> ${safeText(app.job_title_clean)}</p>
   <p><b>Status:</b> ${safeText(app.status)}</p>
   <p><b>Screening:</b> ${safeText(app.screening_result)}</p>
 `;
}

async function load(){
 const {data,error}=await supabase
   .from("recruiter_applications_view")
   .select("*")
   .order("created_at",{ascending:false});

 if(error){
  document.getElementById("table").innerHTML=error.message;
  return;
 }

 document.getElementById("stats").innerHTML=
   "Total Applicants: "+data.length;

 let html="<tr><th>Candidate</th><th>Role</th><th>Status</th><th>Score</th></tr>";

 data.forEach(app=>{
  const score=computeAiScore(app);
  html+=`
   <tr onclick='openDrawer(${JSON.stringify(app)})'>
    <td>${safeText(app.full_name||app.email)}</td>
    <td>${safeText(app.job_title_clean)}</td>
    <td>${safeText(app.status)}</td>
    <td><span class="badge ${scoreClass(score)}">${score}%</span></td>
   </tr>
  `;
 });

 document.getElementById("table").innerHTML=html;
}

load();
</script>
</body>
</html>
