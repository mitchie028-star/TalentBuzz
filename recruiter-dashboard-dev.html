<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BuzzHire Recruiter Dashboard</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f7fb;color:#0f172a}
.top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06);position:sticky;top:0}
.brand{font-weight:800;font-size:24px;color:#1e3a8a}
.right{display:flex;gap:12px;align-items:center}
.status{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid #dbe5f1;border-radius:12px;background:#fff}
.dot{width:12px;height:12px;border-radius:50%}
.online{background:#22c55e}.away{background:#f59e0b}.offline{background:#ef4444}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;padding:20px}
.card{background:#fff;padding:16px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.label{font-size:12px;color:#64748b;text-transform:uppercase}
.value{font-size:28px;font-weight:800;color:#1e3a8a}
.tablewrap{padding:0 20px 20px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left}
th{background:#eff6ff;font-size:12px;text-transform:uppercase}
small{color:#64748b}
</style>
</head>
<body>
<div class="top">
<div class="brand">TalentBuzz • BuzzHire</div>
<div class="right">
<div class="status"><span id="dot" class="dot online"></span>
<select id="presence">
<option value="online">Online</option>
<option value="away">Away</option>
<option value="offline">Offline</option>
</select>
</div>
<div><small>Auto Refresh: <span id="refreshState">Live</span></small></div>
</div>
</div>

<div class="grid">
<div class="card"><div class="label">Applications</div><div class="value" id="a1">175</div></div>
<div class="card"><div class="label">Unassigned</div><div class="value" id="a2">13</div></div>
<div class="card"><div class="label">Endorsed</div><div class="value" id="a3">47</div></div>
<div class="card"><div class="label">Interview</div><div class="value" id="a4">7</div></div>
<div class="card"><div class="label">Offered JO</div><div class="value" id="a5">0</div></div>
<div class="card"><div class="label">Onboarded</div><div class="value" id="a6">31</div></div>
<div class="card"><div class="label">Rejected</div><div class="value" id="a7">43</div></div>
</div>

<div class="tablewrap">
<table>
<thead><tr><th>Candidate</th><th>Job</th><th>Status</th><th>Recruiter</th><th>AI Score</th></tr></thead>
<tbody id="rows">
<tr><td>Michelle Giray</td><td>Web Developer</td><td>Interview</td><td>Michelle</td><td>92</td></tr>
<tr><td>John Cruz</td><td>CSR</td><td>Submitted</td><td>Eric</td><td>84</td></tr>
<tr><td>Ana Lee</td><td>Ops Manager</td><td>Endorsed</td><td>Michelle</td><td>89</td></tr>
</tbody>
</table>
</div>

<script>
const dot=document.getElementById('dot');
const presence=document.getElementById('presence');
function setStatus(v){
dot.className='dot '+v;
localStorage.setItem('tb_presence',v);
}
presence.value=localStorage.getItem('tb_presence')||'online';
setStatus(presence.value);
presence.onchange=()=>setStatus(presence.value);

// auto refresh demo every 20 sec
function refreshDashboard(){
document.getElementById('refreshState').textContent='Refreshing...';
setTimeout(()=>document.getElementById('refreshState').textContent='Live',800);
// demo KPI movement
let el=document.getElementById('a1');
el.textContent=parseInt(el.textContent)+Math.floor(Math.random()*2);
}
setInterval(refreshDashboard,20000);
document.addEventListener('visibilitychange',()=>{
document.getElementById('refreshState').textContent=document.hidden?'Paused':'Live';
});
</script>
</body></html>
