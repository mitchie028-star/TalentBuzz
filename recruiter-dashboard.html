<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BuzzHire | Recruiter Dashboard</title>
<style>
:root{
--bg:#f6f9ff;--panel:#ffffff;--text:#0f172a;--muted:#64748b;
--border:#dbe5f1;--primary:#1e3a8a;--primary2:#2563eb;
--shadow:0 12px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#f8fbff,#eef4ff);color:var(--text)}
.wrap{max-width:1600px;margin:auto;padding:18px}
.topbar{background:rgba(255,255,255,.95);border:1px solid #cfe0ff;border-radius:24px;padding:16px 20px;box-shadow:var(--shadow)}
.row{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:56px;height:56px;border-radius:16px;object-fit:contain;background:#fff;border:1px solid #dbe5f1;padding:6px}
.brand small{display:block;color:#2563eb;font-weight:700;letter-spacing:.08em}
.brand h1{margin:2px 0 0;font-size:34px;color:#1e3a8a}
.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid #dbe5f1;background:#fff;padding:10px 14px;border-radius:14px;font-weight:700;color:#1e3a8a}
.hello{font-weight:800;padding:10px 14px}
.kpis{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:16px}
.card{background:#fff;border:1px solid #dbe5f1;border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.label{font-size:12px;color:#64748b;text-transform:uppercase;font-weight:700}
.val{font-size:30px;font-weight:800;color:#1e3a8a;margin-top:8px}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}.brand h1{font-size:28px}}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
<div class="row">
<div class="brand">
<img src="logo.jpg" class="logo" onerror="this.style.display='none'">
<div>
<small>TALENTBUZZ RECRUITER WORKSPACE</small>
<h1>BuzzHire</h1>
</div>
</div>
<div class="actions">
<div class="hello">Hi Michelle!</div>
<button class="btn">My Sourcing Link</button>
<button class="btn">Clear Filters</button>
<button class="btn">Logout</button>
<button class="btn">☰</button>
</div>
</div>
</div>

<div class="kpis">
<div class="card"><div class="label">Applications</div><div class="val">175</div></div>
<div class="card"><div class="label">Unassigned</div><div class="val">13</div></div>
<div class="card"><div class="label">Endorsed</div><div class="val">47</div></div>
<div class="card"><div class="label">Interview</div><div class="val">7</div></div>
<div class="card"><div class="label">Offered JO</div><div class="val">0</div></div>
<div class="card"><div class="label">Onboarded</div><div class="val">31</div></div>
<div class="card"><div class="label">Rejected</div><div class="val">43</div></div>
</div>
</div>
</body>
</html>
