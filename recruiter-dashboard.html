<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BuzzHire | TalentBuzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f7fb; }
.container { padding:20px; }

.btn { padding:8px 12px; border-radius:8px; cursor:pointer; border:1px solid #ccc; background:white; }
.btn-primary { background:#2563eb; color:white; }
.btn-outline { background:white; }

 table { width:100%; border-collapse:collapse; background:white; }
th, td { padding:10px; border-bottom:1px solid #eee; font-size:14px; }

.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
.modal.show { display:flex; }

.modal-box { background:white; padding:20px; width:900px; max-height:90vh; overflow:auto; border-radius:12px; }
textarea { width:100%; padding:10px; margin-top:6px; }
</style>
</head>

<body>
<div class="container">
<h2>BuzzHire</h2>

<table>
<thead>
<tr>
<th>Candidate</th>
<th>Role</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- SCREENING MODAL -->
<div id="screeningModal" class="modal">
  <div class="modal-box">
    <h3>Screening Review</h3>
    <div id="screeningContainer"></div>

    <h4>Summary</h4>
    <textarea id="strengths" placeholder="Strengths"></textarea>
    <textarea id="risks" placeholder="Risks"></textarea>
    <textarea id="summary" placeholder="Summary"></textarea>

    <div style="margin-top:10px;">
      <button id="generateBtn" class="btn">Generate</button>
      <button id="pushBtn" class="btn">Push → Interview Notes</button>
      <button id="closeScreening" class="btn">Close</button>
    </div>
  </div>
</div>

<!-- ENDORSEMENT MODAL -->
<div id="endorseModal" class="modal">
  <div class="modal-box">
    <h3>Review Email</h3>
    <label>Subject</label>
    <input id="subject" style="width:100%;padding:10px;margin-bottom:10px;" />
    <label>Body</label>
    <textarea id="body" rows="12"></textarea>

    <div style="margin-top:10px;">
      <button id="sendBtn" class="btn btn-primary">Send</button>
      <button id="closeEndorse" class="btn">Close</button>
    </div>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://dilalntcxmvdcmwxjcct.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbGFsbnRjeG12ZGNtd3hqY2N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTk4NTQsImV4cCI6MjA4OTQ3NTg1NH0.nlltxL-K-b0tsge2UR3VPPE0ZBPADuCY8pU_G_Ygmkw"
);

let currentAppId = null;
let screeningData = [];

async function load() {
  const { data } = await supabaseClient.from("applications").select("*");

  document.getElementById("table").innerHTML = data.map(app => `
    <tr>
      <td>${app.email || "Candidate"}</td>
      <td>${app.job_title}</td>
      <td>
        <button onclick="openScreening('${app.id}')" class="btn">Screening</button>
        <button onclick="openEndorse('${app.id}')" class="btn">Endorse</button>
      </td>
    </tr>
  `).join("");
}

async function openScreening(id) {
  currentAppId = id;

  const { data } = await supabaseClient
    .from("application_screening_responses")
    .select("*")
    .eq("application_id", id);

  screeningData = data || [];

  document.getElementById("screeningContainer").innerHTML = screeningData.map(q => `
    <div style="margin-bottom:10px;">
      <b>${q.question_text}</b>
    </div>
  `).join("");

  document.getElementById("screeningModal").classList.add("show");
}

// Generate summary
document.getElementById("generateBtn").onclick = () => {
  strengths.value = "• Strong communication\n• Good technical understanding";
  risks.value = "• Needs validation on depth";
  summary.value = "Candidate is qualified based on screening.";
};

// Push to interview notes
document.getElementById("pushBtn").onclick = async () => {
  await supabaseClient.from("interview_notes").upsert({
    application_id: currentAppId,
    strengths: strengths.value,
    risks: risks.value,
    interview_summary: summary.value
  });

  alert("Pushed to Interview Notes");
};

// Close screening
document.getElementById("closeScreening").onclick = () => {
  screeningModal.classList.remove("show");
};

async function openEndorse(id) {
  currentAppId = id;

  const { data } = await supabaseClient
    .from("interview_notes")
    .select("*")
    .eq("application_id", id)
    .maybeSingle();

  subject.value = "Candidate Endorsement";
  body.value = `Hi,\n\nWe are pleased to endorse this candidate.\n\n${data?.interview_summary || "Candidate looks good."}\n\nRegards,\nTalentBuzz`;

  endorseModal.classList.add("show");
}

// Send email (placeholder)
document.getElementById("sendBtn").onclick = () => {
  alert("Email sent (connect to M365 later)");
};

// Close endorsement
document.getElementById("closeEndorse").onclick = () => {
  endorseModal.classList.remove("show");
};

load();
</script>
</body>
</html>
