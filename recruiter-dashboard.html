<script>
  document.addEventListener("DOMContentLoaded", () => {
    const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const RECRUITERS = {
      "michelle.giray@talentbuzz.pro": "Michelle Giray",
      "angel.n@talentbuzz.pro": "Angelia Nerida",
      "jercey.cayetano@talentbuzz.pro": "Jercey Cayetano",
      "jayson.c@talentbuzz.pro": "Jayson Cornejo",
      "xyrene.e@talentbuzz.pro": "Xyrene Ellsworth"
    };

    const ALLOWED_RECRUITER_EMAILS = Object.keys(RECRUITERS).concat(["mitchie028@gmail.com"]);
    const STATUS_OPTIONS = [
      "submitted",
      "failed paper screening",
      "endorsed",
      "assessment",
      "initial",
      "final",
      "hired",
      "onboarded",
      "no-show (onboarding)",
      "withdrawn",
      "rejected"
    ];

    const REJECTED_STATUSES = ["failed paper screening", "withdrawn", "rejected", "no-show (onboarding)"];
    const INTERVIEWED_STATUSES = ["assessment", "initial", "final"];
    const HIRED_STATUSES = ["hired", "onboarded"];

    const state = {
      allApplications: [],
      currentUser: null
    };

    const els = {
      applicationsTable: document.getElementById("applicationsTable"),
      jobFilter: document.getElementById("jobFilter"),
      statusFilter: document.getElementById("statusFilter"),
      recruiterFilter: document.getElementById("recruiterFilter"),
      sourceFilter: document.getElementById("sourceFilter"),
      searchInput: document.getElementById("searchInput"),
      notice: document.getElementById("notice"),
      helloRecruiter: document.getElementById("helloRecruiter"),
      logoutBtn: document.getElementById("logoutBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      statTotal: document.getElementById("statTotal"),
      statEndorsed: document.getElementById("statEndorsed"),
      statRejected: document.getElementById("statRejected"),
      statInterviewed: document.getElementById("statInterviewed"),
      statHired: document.getElementById("statHired"),
      resumeModal: document.getElementById("resumeModal"),
      resumeFrame: document.getElementById("resumeFrame"),
      closeModal: document.getElementById("closeModal"),
      downloadResumeBtn: document.getElementById("downloadResumeBtn")
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function formatDate(dateString) {
      if (!dateString) return "-";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function showNotice(message, type = "success") {
      els.notice.textContent = message;
      els.notice.className = `notice show ${type}`;
      window.clearTimeout(showNotice._timer);
      showNotice._timer = window.setTimeout(() => {
        clearNotice();
      }, 3500);
    }

    function clearNotice() {
      els.notice.textContent = "";
      els.notice.className = "notice";
    }

    function getRecruiterName(email) {
      return RECRUITERS[email] || email || "Unassigned";
    }

    function getProfileFromApplication(app) {
      if (Array.isArray(app.applicant_profiles)) return app.applicant_profiles[0] || null;
      return app.applicant_profiles || null;
    }

    function getStatusClass(status) {
      return (
        "status-" +
        String(status || "submitted")
          .toLowerCase()
          .replace(/\s+/g, "-")
          .replace(/[()]/g, "")
      );
    }

    function getFileExtension(url) {
      try {
        const cleanUrl = String(url || "").split("?")[0].split("#")[0];
        const parts = cleanUrl.split(".");
        return parts.length > 1 ? parts.pop().toLowerCase() : "";
      } catch {
        return "";
      }
    }

    async function getResumeUrl(app) {
      const profile = getProfileFromApplication(app);
      if (!profile) return "";

      if (profile.resume_url) return profile.resume_url;

      if (profile.resume_path) {
        const { data, error } = await supabaseClient
          .storage
          .from("resumes")
          .createSignedUrl(profile.resume_path, 3600);

        if (error) return "";
        return data?.signedUrl || "";
      }

      return "";
    }

    function openResumeModal(url) {
      if (!url) return;

      const extension = getFileExtension(url);
      const isPdf = extension === "pdf";

      els.downloadResumeBtn.href = url;
      els.downloadResumeBtn.style.display = "inline-flex";

      els.resumeFrame.src = isPdf
        ? url
        : `https://docs.google.com/gview?url=${encodeURIComponent(url)}&embedded=true`;

      els.resumeModal.classList.add("show");
      els.resumeModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeResumeModal() {
      els.resumeModal.classList.remove("show");
      els.resumeModal.setAttribute("aria-hidden", "true");
      els.resumeFrame.src = "";
      els.downloadResumeBtn.href = "#";
      els.downloadResumeBtn.style.display = "none";
      document.body.style.overflow = "";
    }

    async function protectRecruiterPage() {
      const {
        data: { session }
      } = await supabaseClient.auth.getSession();

      if (!session || !session.user) {
        window.location.href = "login.html?redirect=recruiter-dashboard.html";
        return null;
      }

      const email = normalizeText(session.user.email);
      const allowedEmails = ALLOWED_RECRUITER_EMAILS.map(v => normalizeText(v));

      if (!allowedEmails.includes(email)) {
        alert("Access denied.");
        window.location.href = "dashboard.html";
        return null;
      }

      state.currentUser = session.user;
      els.helloRecruiter.textContent = `Hello! ${getRecruiterName(email)}`;
      return session.user;
    }

    function populateFilters() {
      const urlParams = new URLSearchParams(window.location.search);
      const selectedJobFromUrl = normalizeText(urlParams.get("job"));
      const currentRecruiterValue = els.recruiterFilter.value;
      const jobsMap = new Map();

      state.allApplications.forEach(app => {
        const title = app.jobs?.title || app.job_title || "";
        const slug = app.jobs?.slug || title;
        if (title) jobsMap.set(String(slug), String(title));
      });

      const jobsOptions = Array.from(jobsMap.entries())
        .sort((a, b) => a[1].localeCompare(b[1]))
        .map(([slug, title]) => {
          const selected = normalizeText(slug) === selectedJobFromUrl ? "selected" : "";
          return `<option value="${escapeHtml(slug)}" ${selected}>${escapeHtml(title)}</option>`;
        })
        .join("");

      els.jobFilter.innerHTML = `<option value="">All jobs</option>${jobsOptions}`;

      const recruiterOptions = Object.entries(RECRUITERS)
        .map(([email, name]) => `<option value="${escapeHtml(email)}">${escapeHtml(name)}</option>`)
        .join("");

      els.recruiterFilter.innerHTML = `<option value="">All recruiters</option>${recruiterOptions}`;

      if (currentRecruiterValue) {
        els.recruiterFilter.value = currentRecruiterValue;
      }
    }

    function getFilteredApplications() {
      const search = normalizeText(els.searchInput.value);
      const selectedJobSlug = normalizeText(els.jobFilter.value);
      const selectedStatus = normalizeText(els.statusFilter.value);
      const selectedRecruiter = normalizeText(els.recruiterFilter.value);
      const selectedSource = normalizeText(els.sourceFilter.value);

      return state.allApplications.filter(app => {
        const profile = getProfileFromApplication(app);
        const candidateName = normalizeText(profile?.full_name);
        const candidateEmail = normalizeText(app.email);
        const jobSlug = normalizeText(app.jobs?.slug || app.job_title);
        const status = normalizeText(app.status || "submitted");
        const recruiter = normalizeText(app.recruiter_email);
        const source = normalizeText(app.application_source);

        return (
          (!search || candidateName.includes(search) || candidateEmail.includes(search)) &&
          (!selectedJobSlug || jobSlug === selectedJobSlug) &&
          (!selectedStatus || status === selectedStatus) &&
          (!selectedRecruiter || recruiter === selectedRecruiter) &&
          (!selectedSource || source === selectedSource)
        );
      });
    }

    function renderStats() {
      const filtered = getFilteredApplications();
      els.statTotal.textContent = filtered.length;
      els.statEndorsed.textContent = filtered.filter(a => normalizeText(a.status) === "endorsed").length;
      els.statRejected.textContent = filtered.filter(a => REJECTED_STATUSES.includes(normalizeText(a.status))).length;
      els.statInterviewed.textContent = filtered.filter(a => INTERVIEWED_STATUSES.includes(normalizeText(a.status))).length;
      els.statHired.textContent = filtered.filter(a => HIRED_STATUSES.includes(normalizeText(a.status))).length;
    }

    async function renderTable() {
      const filtered = getFilteredApplications();

      if (!filtered.length) {
        els.applicationsTable.innerHTML = '<tr><td colspan="13" class="empty">No candidates found.</td></tr>';
        return;
      }

      const rows = await Promise.all(
        filtered.map(async app => {
          const profile = getProfileFromApplication(app);
          const candidateName = escapeHtml(profile?.full_name || "Unnamed");
          const candidateEmail = escapeHtml(app.email || "-");
          const jobTitle = escapeHtml(app.jobs?.title || app.job_title || "-");
          const currentStatus = String(app.status || "submitted");
          const safeStatus = escapeHtml(currentStatus);
          const recruiterName = escapeHtml(getRecruiterName(app.recruiter_email));
          const source = escapeHtml(app.application_source || "-");
          const appliedDate = escapeHtml(formatDate(app.created_at));
          const phone = escapeHtml(profile?.phone || "-");
          const location = escapeHtml(profile?.location || "-");
          const yearsOfExperience =
            profile?.years_of_experience !== null &&
            profile?.years_of_experience !== undefined &&
            profile?.years_of_experience !== ""
              ? `${escapeHtml(profile.years_of_experience)} yr${Number(profile.years_of_experience) === 1 ? "" : "s"}`
              : "-";

          const resumeUrl = await getResumeUrl(app);
          const safeResumeUrl = resumeUrl ? escapeHtml(resumeUrl) : "";

          const statusOptions = STATUS_OPTIONS.map(option => {
            const selected = normalizeText(option) === normalizeText(currentStatus) ? "selected" : "";
            return `<option value="${escapeHtml(option)}" ${selected}>${escapeHtml(option)}</option>`;
          }).join("");

          const recruiterOptions =
            `<option value="">Unassigned</option>` +
            Object.entries(RECRUITERS)
              .map(([email, name]) => {
                const selected = normalizeText(app.recruiter_email) === normalizeText(email) ? "selected" : "";
                return `<option value="${escapeHtml(email)}" ${selected}>${escapeHtml(name)}</option>`;
              })
              .join("");

          return `
            <tr>
              <td>
                <div class="candidate-name">${candidateName}</div>
                <div class="small">${candidateEmail}</div>
              </td>
              <td>${jobTitle}</td>
              <td><span class="status-pill ${getStatusClass(currentStatus)}">${safeStatus}</span></td>
              <td>${recruiterName}</td>
              <td>${source}</td>
              <td>${appliedDate}</td>
              <td>${phone}</td>
              <td>${location}</td>
              <td>${yearsOfExperience}</td>
              <td>
                ${
                  safeResumeUrl
                    ? `<button class="btn btn-outline table-btn view-resume-btn" type="button" data-url="${safeResumeUrl}">View Resume</button>`
                    : `<span class="small">No resume</span>`
                }
              </td>
              <td>
                <select class="table-select status-select" data-id="${escapeHtml(app.id)}">
                  ${statusOptions}
                </select>
              </td>
              <td>
                <select class="table-select recruiter-select" data-id="${escapeHtml(app.id)}">
                  ${recruiterOptions}
                </select>
              </td>
              <td>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <button class="btn btn-outline table-btn edit-btn" type="button" data-id="${escapeHtml(app.id)}">Edit</button>
                  <button class="btn btn-danger table-btn btn-delete" type="button" data-id="${escapeHtml(app.id)}">Remove</button>
                </div>
              </td>
            </tr>
          `;
        })
      );

      els.applicationsTable.innerHTML = rows.join("");
    }

    async function sendRejectionEmail(application) {
      const profile = getProfileFromApplication(application);

      await supabaseClient
        .from("applications")
        .update({ rejection_email_status: "sending" })
        .eq("id", application.id);

      const { data, error } = await supabaseClient.functions.invoke(
        "send-rejection-email",
        {
          body: {
            candidate_name: profile?.full_name || "Applicant",
            candidate_email: application.email,
            job_title: application.jobs?.title || application.job_title || "Role"
          }
        }
      );

      if (error || !data?.success) {
        await supabaseClient
          .from("applications")
          .update({ rejection_email_status: "failed" })
          .eq("id", application.id);
        return false;
      }

      await supabaseClient
        .from("applications")
        .update({ rejection_email_status: "sent" })
        .eq("id", application.id);

      return true;
    }

    async function updateApplicationStatus(applicationId, newStatus) {
      const application = state.allApplications.find(app => app.id === applicationId);

      const { error } = await supabaseClient
        .from("applications")
        .update({ status: newStatus })
        .eq("id", applicationId);

      if (error) {
        showNotice(error.message || "Failed to update status.", "error");
        return;
      }

      const newStatusNormalized = normalizeText(newStatus);

      if (
        newStatusNormalized === "rejected" &&
        application &&
        application.rejection_email_status !== "sent"
      ) {
        try {
          const sent = await sendRejectionEmail(application);
          if (sent) {
            showNotice("Status updated and rejection email sent.", "success");
          } else {
            showNotice("Status updated, but rejection email failed.", "error");
          }
        } catch {
          showNotice("Status updated, but rejection email failed.", "error");
        }
      } else {
        showNotice("Application status updated.", "success");
      }

      await loadApplications();
    }

    async function updateRecruiter(applicationId, recruiterEmail) {
      const { error } = await supabaseClient
        .from("applications")
        .update({ recruiter_email: recruiterEmail || null })
        .eq("id", applicationId);

      if (error) {
        showNotice(error.message || "Failed to assign recruiter.", "error");
        return;
      }

      showNotice("Recruiter assignment updated.", "success");
      await loadApplications();
    }

    async function deleteApplication(applicationId) {
      const confirmed = window.confirm("Are you sure you want to remove this application?");
      if (!confirmed) return;

      const { error } = await supabaseClient
        .from("applications")
        .delete()
        .eq("id", applicationId);

      if (error) {
        showNotice(error.message || "Failed to remove application.", "error");
        return;
      }

      showNotice("Application removed successfully.", "success");
      await loadApplications();
    }

    async function loadApplications() {
      clearNotice();
      els.refreshBtn.disabled = true;
      els.refreshBtn.textContent = "Refreshing...";
      els.applicationsTable.innerHTML = '<tr><td colspan="13" class="empty loading">Loading candidates...</td></tr>';

      const { data, error } = await supabaseClient
        .from("applications")
        .select(`
          id,
          applicant_profile_id,
          email,
          job_id,
          job_id_uuid,
          job_title,
          status,
          recruiter_email,
          application_source,
          confirmation_email_status,
          rejection_email_status,
          created_at,
          jobs(id, title, slug),
          applicant_profiles(id, full_name, phone, location, years_of_experience, current_title, skills, resume_url, resume_path)
        `)
        .order("created_at", { ascending: false });

      els.refreshBtn.disabled = false;
      els.refreshBtn.textContent = "Refresh";

      if (error) {
        els.applicationsTable.innerHTML = `<tr><td colspan="13" class="empty">${escapeHtml(error.message)}</td></tr>`;
        return;
      }

      state.allApplications = data || [];
      populateFilters();
      renderStats();
      await renderTable();
    }

    function syncJobFilterToUrl() {
      const selectedSlug = els.jobFilter.value;
      const url = new URL(window.location.href);
      if (selectedSlug) url.searchParams.set("job", selectedSlug);
      else url.searchParams.delete("job");
      window.history.replaceState({}, "", url.toString());
    }

    function handleFilterChange() {
      renderStats();
      renderTable();
    }

    els.jobFilter.addEventListener("change", () => {
      syncJobFilterToUrl();
      handleFilterChange();
    });

    [els.statusFilter, els.recruiterFilter, els.sourceFilter].forEach(el => {
      el.addEventListener("change", handleFilterChange);
    });

    els.searchInput.addEventListener("input", handleFilterChange);
    els.refreshBtn.addEventListener("click", loadApplications);

    els.applicationsTable.addEventListener("change", async event => {
      const target = event.target;

      if (target.classList.contains("status-select")) {
        await updateApplicationStatus(target.dataset.id, target.value);
        return;
      }

      if (target.classList.contains("recruiter-select")) {
        await updateRecruiter(target.dataset.id, target.value || null);
      }
    });

    els.applicationsTable.addEventListener("click", async event => {
      const target = event.target;

      if (target.classList.contains("view-resume-btn")) {
        openResumeModal(target.dataset.url);
        return;
      }

      if (target.classList.contains("edit-btn")) {
        window.location.href = `recruiter-add-candidate.html?id=${encodeURIComponent(target.dataset.id)}`;
        return;
      }

      if (target.classList.contains("btn-delete")) {
        await deleteApplication(target.dataset.id);
      }
    });

    if (els.closeModal) {
      els.closeModal.addEventListener("click", closeResumeModal);
    }

    if (els.resumeModal) {
      els.resumeModal.addEventListener("click", event => {
        if (event.target === els.resumeModal) closeResumeModal();
      });
    }

    document.addEventListener("keydown", event => {
      if (els.resumeModal && event.key === "Escape" && els.resumeModal.classList.contains("show")) {
        closeResumeModal();
      }
    });

    if (els.logoutBtn) {
      els.logoutBtn.addEventListener("click", async () => {
        try {
          await supabaseClient.auth.signOut();
        } finally {
          window.location.href = "login.html";
        }
      });
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_OUT" || !session?.user) {
        window.location.href = "login.html?redirect=recruiter-dashboard.html";
      }
    });

    protectRecruiterPage().then(user => {
      if (user) loadApplications();
    });
  });
</script>
