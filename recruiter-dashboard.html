<script>
const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ALLOWED_RECRUITER_EMAILS = [
  'mitchie028@gmail.com',
  'michelle.giray@talentbuzz.pro'
];

let allApplications = [];

const applicationsTable = document.getElementById('applicationsTable');
const jobFilter = document.getElementById('jobFilter');
const statusFilter = document.getElementById('statusFilter');
const searchInput = document.getElementById('searchInput');

// 🔐 PROTECTION
async function protectRecruiterPage() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    window.location.href = 'login.html';
    return null;
  }

  const email = session.user.email.toLowerCase();

  if (!ALLOWED_RECRUITER_EMAILS.map(e => e.toLowerCase()).includes(email)) {
    alert('Access denied.');
    window.location.href = 'dashboard.html';
    return null;
  }

  return session.user;
}

// 🚀 LOAD APPLICATIONS (NOW USING RELATIONSHIP)
async function loadApplications() {

  const { data, error } = await supabaseClient
    .from('applications')
    .select(`
      id,
      email,
      job_id,
      job_title,
      status,
      created_at,
      applicant_profiles (
        id,
        full_name,
        phone,
        location,
        resume_url
      )
    `)
    .order('created_at', { ascending: false });

  if (error) {
    applicationsTable.innerHTML = `<tr><td colspan="8">${error.message}</td></tr>`;
    return;
  }

  allApplications = data || [];

  populateJobFilter();
  renderStats();
  renderTable();
}

// 📊 STATS
function renderStats() {
  document.getElementById('statTotal').textContent = allApplications.length;
  document.getElementById('statSubmitted').textContent =
    allApplications.filter(a => a.status === 'submitted').length;
  document.getElementById('statShortlisted').textContent =
    allApplications.filter(a => a.status === 'shortlisted').length;
  document.getElementById('statHired').textContent =
    allApplications.filter(a => a.status === 'hired').length;
}

// 🔍 FILTER
function getFilteredApplications() {
  const search = searchInput.value.toLowerCase();
  const job = jobFilter.value.toLowerCase();
  const status = statusFilter.value.toLowerCase();

  return allApplications.filter(app => {
    const profile = app.applicant_profiles;

    return (
      (!search ||
        profile?.full_name?.toLowerCase().includes(search) ||
        app.email.toLowerCase().includes(search)) &&
      (!job || app.job_title.toLowerCase() === job) &&
      (!status || app.status === status)
    );
  });
}

// 🧠 TABLE
function renderTable() {
  const data = getFilteredApplications();

  if (!data.length) {
    applicationsTable.innerHTML = `<tr><td colspan="8">No applications found</td></tr>`;
    return;
  }

  applicationsTable.innerHTML = data.map(app => {
    const p = app.applicant_profiles;

    return `
      <tr>
        <td>
          <strong>${p?.full_name || 'Unknown'}</strong><br>
          ${app.email}
        </td>
        <td>${app.job_title}</td>
        <td>${app.status}</td>
        <td>${new Date(app.created_at).toLocaleDateString()}</td>
        <td>${p?.phone || '-'}</td>
        <td>${p?.location || '-'}</td>
        <td>
          ${p?.resume_url
            ? `<a href="${p.resume_url}" target="_blank">View</a>`
            : 'None'}
        </td>
        <td>
          <select onchange="updateStatus('${app.id}', this.value)">
            ${renderStatusOptions(app.status)}
          </select>
        </td>
      </tr>
    `;
  }).join('');
}

// 🎯 STATUS OPTIONS
function renderStatusOptions(current) {
  const statuses = ['submitted','shortlisted','interviewed','hired','rejected'];

  return statuses.map(s =>
    `<option value="${s}" ${s === current ? 'selected' : ''}>
      ${s}
    </option>`
  ).join('');
}

// 🔄 UPDATE STATUS
async function updateStatus(id, status) {
  await supabaseClient
    .from('applications')
    .update({ status })
    .eq('id', id);

  const target = allApplications.find(a => a.id === id);
  if (target) target.status = status;

  renderStats();
  renderTable();
}

// 🧩 JOB FILTER
function populateJobFilter() {
  const jobs = [...new Set(allApplications.map(a => a.job_title))];

  jobFilter.innerHTML =
    `<option value="">All jobs</option>` +
    jobs.map(j => `<option value="${j}">${j}</option>`).join('');
}

// 🎯 EVENTS
document.getElementById('refreshBtn').onclick = loadApplications;
searchInput.oninput = renderTable;
jobFilter.onchange = renderTable;
statusFilter.onchange = renderTable;

document.getElementById('logoutBtn').onclick = async () => {
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
};

// 🚀 INIT
(async () => {
  const user = await protectRecruiterPage();
  if (!user) return;

  await loadApplications();
})();
</script>
