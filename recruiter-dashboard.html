<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recruiter Pipeline | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #f5f7fb;
    }

    .header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      color: #1e3a8a;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .logout {
      background: #ef4444;
      color: white;
    }

    .stats {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .stat {
      background: white;
      padding: 16px;
      border-radius: 12px;
      flex: 1;
    }

    .pipeline {
      display: flex;
      gap: 16px;
      padding: 20px;
      overflow-x: auto;
    }

    .column {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      min-width: 260px;
      flex-shrink: 0;
    }

    .column h3 {
      margin: 0 0 10px;
      color: #1e3a8a;
    }

    .card {
      background: #f8fafc;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: grab;
    }

    .card strong {
      display: block;
    }

    .card small {
      color: #64748b;
    }

    .resume {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
    }

    .dropzone {
      min-height: 100px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Recruiter Pipeline</h1>
  <button class="btn logout" id="logoutBtn">Logout</button>
</div>

<div class="stats">
  <div class="stat">Total: <span id="total">0</span></div>
  <div class="stat">Submitted: <span id="submitted">0</span></div>
  <div class="stat">Hired: <span id="hired">0</span></div>
</div>

<div class="pipeline" id="pipeline"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const supabase = window.supabase.createClient(
  'https://dilalntcxmvdcmwxjcct.supabase.co',
  'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
);

const allowed = ['mitchie028@gmail.com','michelle.giray@talentbuzz.pro','angel.n@talentbuzz.pro','jayson.c@talentbuzz.pro','xyrene.e@talentbuzz.pro','jercey.cayetano@talentbuzz.pro'];

const statuses = ['submitted','shortlisted','interviewed','hired','rejected'];

let applications = [];

async function protect() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) location.href = 'login.html';

  if (!allowed.includes(session.user.email.toLowerCase())) {
    alert("Access denied");
    location.href = 'dashboard.html';
  }
}

async function loadData() {
  const { data, error } = await supabase
    .from('applications')
    .select(`
      *,
      applicant_profiles (
        full_name,
        phone,
        location,
        resume_url
      )
    `);

  if (error) {
    console.error(error);
    return;
  }

  applications = data;
  render();
}

function render() {
  document.getElementById('total').textContent = applications.length;
  document.getElementById('submitted').textContent =
    applications.filter(a=>a.status==='submitted').length;
  document.getElementById('hired').textContent =
    applications.filter(a=>a.status==='hired').length;

  const pipeline = document.getElementById('pipeline');
  pipeline.innerHTML = '';

  statuses.forEach(status => {
    const col = document.createElement('div');
    col.className = 'column';

    col.innerHTML = `<h3>${status.toUpperCase()}</h3>
      <div class="dropzone" data-status="${status}"></div>`;

    pipeline.appendChild(col);

    const zone = col.querySelector('.dropzone');

    zone.ondragover = e => e.preventDefault();
    zone.ondrop = async e => {
      e.preventDefault();
      const id = e.dataTransfer.getData("id");
      await updateStatus(id, status);
    };

    applications
      .filter(a => (a.status || 'submitted') === status)
      .forEach(app => {
        const card = document.createElement('div');
        card.className = 'card';
        card.draggable = true;

        const p = app.applicant_profiles || {};

        card.innerHTML = `
          <strong>${p.full_name || 'Unknown'}</strong>
          <small>${app.email}</small><br>
          <small>${app.job_title}</small>
          ${p.resume_url ? `<a href="${p.resume_url}" target="_blank" class="resume">Resume</a>` : ''}
        `;

        card.ondragstart = e => {
          e.dataTransfer.setData("id", app.id);
        };

        zone.appendChild(card);
      });
  });
}

async function updateStatus(id, status) {
  await supabase
    .from('applications')
    .update({ status })
    .eq('id', id);

  const target = applications.find(a => a.id === id);
  if (target) target.status = status;

  render();
}

document.getElementById('logoutBtn').onclick = async () => {
  await supabase.auth.signOut();
  location.href = 'index.html';
};

(async () => {
  await protect();
  await loadData();
})();

});
</script>

</body>
</html>
