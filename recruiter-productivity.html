<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TalentBuzz | Recruiter Productivity Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {font-family: Arial; background:#f5f7fb; margin:0; padding:20px;}
.panel {background:#fff; padding:20px; border-radius:14px; margin-bottom:20px;}
.grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px;}
.card {border:1px solid #e2e8f0; border-radius:12px; padding:14px;}
.stat {font-size:26px; font-weight:bold;}
.avatar {width:50px;height:50px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;font-weight:bold;}
.progress {height:6px;background:#eee;border-radius:999px;margin:6px 0;}
.progress span {display:block;height:100%;background:#4f46e5;}
</style>
</head>
<body>

<div class="panel">
<h2>📈 Hiring Trends</h2>
<canvas id="trendChart"></canvas>
</div>

<div class="panel">
<h2>🏆 Leaderboard</h2>
<div id="leaderboard" class="grid"></div>
</div>

<div class="panel">
<h2>👤 Recruiter Performance</h2>
<div id="recruiters" class="grid"></div>
</div>

<div class="panel">
<h2>🧠 AI Insights</h2>
<div id="insights"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://dilalntcxmvdcmwxjcct.supabase.co",
  "sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs"
);

function initials(name){return name.split(" ").map(x=>x[0]).join("").slice(0,2)}

async function load(){
  const {data} = await supabase.from("recruiter_productivity_summary").select("*");

  if(!data) return;

  // TREND
  const trend = {};
  data.forEach(r=>{
    const d = new Date().toISOString().slice(0,10);
    trend[d] = (trend[d]||0) + r.hired_count;
  });

  new Chart(document.getElementById("trendChart"),{
    type:"line",
    data:{
      labels:Object.keys(trend),
      datasets:[{label:"Hires",data:Object.values(trend)}]
    }
  });

  // LEADERBOARD
  const sorted = [...data].sort((a,b)=>b.hired_count - a.hired_count);

  document.getElementById("leaderboard").innerHTML = sorted.map((r,i)=>`
    <div class="card">
      <b>#${i+1} ${r.full_name || r.recruiter_email}</b><br>
      Hires: ${r.hired_count}<br>
      Endorsements: ${r.endorsed_count}
    </div>
  `).join("");

  // RECRUITER CARDS
  document.getElementById("recruiters").innerHTML = data.map(r=>{
    return `
    <div class="card">
      <div style="display:flex;gap:10px;">
        <div class="avatar">${r.profile_photo_url ? `<img src="${r.profile_photo_url}" style="width:100%;height:100%;object-fit:cover;">` : initials(r.full_name||r.recruiter_email)}</div>
        <div>
          <b>${r.full_name || r.recruiter_email}</b><br>
          <small>${r.recruiter_email}</small>
        </div>
      </div>

      <div>Sourced: ${r.sourced_count}</div>
      <div>Endorsed: ${r.endorsed_count}</div>
      <div>Hired: ${r.hired_count}</div>

      <div>Endorsement ${r.endorsement_rate}%</div>
      <div class="progress"><span style="width:${r.endorsement_rate}%"></span></div>

      <div>Hiring ${r.hiring_rate}%</div>
      <div class="progress"><span style="width:${r.hiring_rate}%"></span></div>
    </div>`;
  }).join("");

  // AI INSIGHTS
  const top = sorted[0];
  const weak = sorted[sorted.length-1];

  document.getElementById("insights").innerHTML = `
    <div class="card">🏆 Top Performer: ${top.full_name}</div>
    <div class="card">⚠️ Needs Improvement: ${weak.full_name}</div>
  `;
}

load();
</script>

</body>
</html>
