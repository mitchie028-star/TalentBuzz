<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Set Password | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{font-family:Manrope,sans-serif;background:#f8fbff;padding:40px}
    .box{max-width:400px;margin:auto;background:#fff;padding:24px;border-radius:16px}
    input{width:100%;padding:12px;margin-top:10px}
    button{margin-top:16px;padding:12px;width:100%}
  </style>
</head>
<body>

<div class="box">
  <h2>Set Your Password</h2>
  <input id="password" type="password" placeholder="New password" />
  <button onclick="updatePassword()">Save Password</button>
</div>

<script>
const supabaseClient = supabase.createClient(
  'https://dilalntcxmvdcmwxjcct.supabase.co',
  'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
);

async function updatePassword() {
  const password = document.getElementById('password').value;

  const { error } = await supabaseClient.auth.updateUser({
    password: password
  });

  if (error) {
    alert(error.message);
  } else {
    alert('Password updated. You can now login.');
    window.location.href = 'recruiter-login.html';
  }
}
</script>

</body>
</html>
