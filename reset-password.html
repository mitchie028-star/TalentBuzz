<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Update Password | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --danger:#b91c1c;
      --success:#166534;
      --info:#1d4ed8;
      --shadow:0 20px 60px rgba(30,58,138,.12),0 6px 20px rgba(15,23,42,.06);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--text);
    }

    .shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:32px;
      text-align:center;
    }

    .logo{
      width:160px;
      margin:0 auto 18px;
      display:block;
    }

    h1{
      margin:0 0 6px;
      color:var(--blue);
      font-size:1.8rem;
      font-weight:800;
    }

    .subtitle{
      margin:0 0 24px;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.6;
    }

    form{
      text-align:left;
    }

    label{
      display:block;
      margin:14px 0 6px;
      font-weight:700;
      font-size:.9rem;
    }

    input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font:inherit;
    }

    input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
      outline:none;
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:64px;
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      border:none;
      background:transparent;
      cursor:pointer;
      font-weight:800;
      color:var(--muted);
    }

    .toggle-password:hover{
      color:var(--blue);
    }

    .password-hint{
      margin-top:8px;
      color:var(--muted);
      font-size:.84rem;
      line-height:1.5;
    }

    .actions{
      margin-top:20px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:13px;
      font-weight:800;
      cursor:pointer;
      transition:.2s;
      font:inherit;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(37,99,235,.25);
    }

    .btn-primary:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .msg{
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-weight:700;
      line-height:1.6;
      text-align:left;
    }

    .msg.show{display:block}

    .msg.error{
      background:#fef2f2;
      color:var(--danger);
    }

    .msg.success{
      background:#ecfdf5;
      color:var(--success);
    }

    .msg.info{
      background:#eff6ff;
      color:var(--info);
    }

    .footer-links{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      font-size:.9rem;
    }

    .footer-links a{
      color:var(--blue);
      font-weight:700;
      text-decoration:none;
    }

    .footer-links a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="card">
    <img src="logo.png" alt="TalentBuzz Logo" class="logo" onerror="this.style.display='none'">

    <h1>Set a new password</h1>
    <p class="subtitle">
      Enter your new password below. Once updated, you can sign in to your TalentBuzz account.
    </p>

    <form id="updatePasswordForm">
      <label for="newPassword">New Password</label>
      <div class="password-wrap">
        <input id="newPassword" type="password" autocomplete="new-password" required>
        <button type="button" id="toggleNewPasswordBtn" class="toggle-password">Show</button>
      </div>

      <label for="confirmPassword">Confirm New Password</label>
      <div class="password-wrap">
        <input id="confirmPassword" type="password" autocomplete="new-password" required>
        <button type="button" id="toggleConfirmPasswordBtn" class="toggle-password">Show</button>
      </div>

      <div class="password-hint">
        Use at least 8 characters for better account security.
      </div>

      <div class="actions">
        <button id="submitBtn" type="submit" class="btn btn-primary">Update Password</button>
      </div>

      <div id="messageBox" class="msg"></div>
    </form>

    <div class="footer-links">
      <a href="login.html">Back to Login</a>
      <a href="create-profile.html">Create Account</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('updatePasswordForm');
  const newPasswordInput = document.getElementById('newPassword');
  const confirmPasswordInput = document.getElementById('confirmPassword');
  const submitBtn = document.getElementById('submitBtn');
  const messageBox = document.getElementById('messageBox');

  function showMessage(message, type = 'error'){
    messageBox.textContent = message;
    messageBox.className = `msg show ${type}`;
  }

  function clearMessage(){
    messageBox.textContent = '';
    messageBox.className = 'msg';
  }

  function setLoadingState(isLoading){
    submitBtn.disabled = isLoading;
    submitBtn.textContent = isLoading ? 'Updating...' : 'Update Password';
  }

  function togglePassword(inputId, buttonId){
    const input = document.getElementById(inputId);
    const btn = document.getElementById(buttonId);

    btn.addEventListener('click', () => {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.textContent = isPassword ? 'Hide' : 'Show';
    });
  }

  togglePassword('newPassword', 'toggleNewPasswordBtn');
  togglePassword('confirmPassword', 'toggleConfirmPasswordBtn');

  async function ensureRecoverySession(){
    try{
      const hash = window.location.hash || '';
      const hashParams = new URLSearchParams(hash.replace(/^#/, ''));
      const accessToken = hashParams.get('access_token');
      const refreshToken = hashParams.get('refresh_token');
      const type = hashParams.get('type');

      if(accessToken && refreshToken){
        const { error } = await supabaseClient.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        if(error) throw error;
        return true;
      }

      const { data, error } = await supabaseClient.auth.getSession();
      if(error) throw error;

      if(data?.session) return true;

      if(type === 'recovery') return true;

      return false;
    }catch(err){
      console.error('Recovery session setup failed:', err);
      return false;
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMessage();

    const newPassword = newPasswordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    if(!newPassword){
      showMessage('Please enter your new password.', 'error');
      return;
    }

    if(newPassword.length < 8){
      showMessage('Password must be at least 8 characters.', 'error');
      return;
    }

    if(newPassword !== confirmPassword){
      showMessage('Passwords do not match.', 'error');
      return;
    }

    setLoadingState(true);

    try{
      const hasRecoverySession = await ensureRecoverySession();

      if(!hasRecoverySession){
        throw new Error('This password reset link is invalid or has expired. Please request a new reset email.');
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: newPassword
      });

      if(error) throw error;

      showMessage('Password updated successfully. Redirecting to login...', 'success');

      setTimeout(() => {
        window.location.href = 'login.html?message=password_updated';
      }, 1500);

    }catch(err){
      showMessage(err.message || 'Failed to update password.', 'error');
    }finally{
      setLoadingState(false);
    }
  });

  (async function init(){
    clearMessage();

    const ok = await ensureRecoverySession();
    if(!ok){
      showMessage('Open this page using the password reset link sent to your email.', 'info');
    }
  })();
</script>

</body>
</html>
