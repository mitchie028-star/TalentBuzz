<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Set Password | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Set your TalentBuzz password." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --white:#ffffff;
      --danger:#b91c1c;
      --success:#166534;
      --shadow:0 14px 40px rgba(30,58,138,.08),0 3px 10px rgba(15,23,42,.04);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--text);
    }

    .shell{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--white);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:28px;
    }

    .brand{
      display:inline-block;
      color:var(--blue);
      font-weight:800;
      font-size:1.4rem;
      text-decoration:none;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 8px;
      color:var(--blue);
      font-size:1.9rem;
      line-height:1.1;
    }

    .subtitle{
      margin:0 0 22px;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.6;
    }

    label{
      display:block;
      margin:14px 0 6px;
      font-weight:700;
      font-size:.93rem;
    }

    input{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font:inherit;
      background:#fff;
      outline:none;
    }

    input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
    }

    .actions{
      display:grid;
      gap:10px;
      margin-top:18px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font:inherit;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .msg{
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
      display:none;
      line-height:1.5;
    }

    .msg.show{display:block}
    .msg.error{
      background:#fef2f2;
      color:var(--danger);
      border:1px solid #fecaca;
    }
    .msg.success{
      background:#f0fdf4;
      color:var(--success);
      border:1px solid #bbf7d0;
    }

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:.86rem;
      line-height:1.5;
    }

    .links{
      margin-top:18px;
      font-size:.9rem;
    }

    .links a{
      color:var(--blue);
      font-weight:700;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <a href="index.html" class="brand">TalentBuzz</a>
      <h1>Set Your Password</h1>
      <p class="subtitle">Create a secure password to access TalentBuzz.</p>

      <label for="password">New Password</label>
      <input id="password" type="password" autocomplete="new-password" />

      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" />

      <div class="hint">
        Use at least 8 characters. A mix of letters, numbers, and symbols is recommended.
      </div>

      <div class="actions">
        <button id="saveBtn" type="button" class="btn btn-primary">Save Password</button>
      </div>

      <div id="messageBox" class="msg"></div>

      <div class="links">
        <a href="recruiter-login.html">Back to recruiter login</a>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://dilalntcxmvdcmwxjcct.supabase.co',
      'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
    );

    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const saveBtn = document.getElementById('saveBtn');
    const messageBox = document.getElementById('messageBox');

    function showMessage(message, type = 'error') {
      messageBox.textContent = message;
      messageBox.className = `msg show ${type}`;
    }

    function validatePassword(password) {
      if (!password) return 'Please enter a new password.';
      if (password.length < 8) return 'Password must be at least 8 characters.';
      return '';
    }

    saveBtn.addEventListener('click', async () => {
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      const passwordError = validatePassword(password);
      if (passwordError) {
        showMessage(passwordError);
        return;
      }

      if (!confirmPassword) {
        showMessage('Please confirm your password.');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('Passwords do not match.');
        return;
      }

      try {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';

        const { error } = await supabaseClient.auth.updateUser({
          password
        });

        if (error) throw error;

        showMessage('Password updated successfully. Redirecting to recruiter login...', 'success');

        setTimeout(() => {
          window.location.href = 'recruiter-login.html';
        }, 1500);
      } catch (error) {
        const msg = String(error?.message || 'Failed to update password.');

        if (msg.toLowerCase().includes('auth session missing')) {
          showMessage('This password setup link is invalid or expired. Please request a new invite link.');
        } else {
          showMessage(msg);
        }
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Password';
      }
    });
  </script>
</body>
</html>
