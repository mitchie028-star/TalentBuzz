<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body{margin:0;font-family:'Manrope',sans-serif;background:#f8fbff;color:#0f172a}
    .wrap{max-width:460px;margin:48px auto;padding:24px;background:#fff;border:1px solid #e2e8f0;border-radius:22px}
    h1{margin:0 0 8px;color:#1e3a8a}
    p{color:#64748b}
    label{display:block;margin:14px 0 6px;font-weight:700}
    input{width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:12px;font:inherit}
    button{margin-top:18px;width:100%;padding:12px 16px;border:none;border-radius:12px;background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;font:inherit;font-weight:800;cursor:pointer}
    .msg{margin-top:14px;padding:12px 14px;border-radius:12px;display:none;font-weight:700}
    .msg.show{display:block}
    .msg.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .msg.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
    a{color:#1e3a8a;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Create Applicant Account</h1>
    <p>Create your account before applying for roles.</p>

    <form id="signupForm">
      <label for="fullName">Full Name</label>
      <input id="fullName" type="text" required />

      <label for="email">Email</label>
      <input id="email" type="email" required />

      <label for="password">Password</label>
      <input id="password" type="password" required />

      <button id="submitBtn" type="submit">Create Account</button>
      <div id="messageBox" class="msg"></div>
    </form>

    <p style="margin-top:16px;"><a href="login.html">Back to applicant login</a></p>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://dilalntcxmvdcmwxjcct.supabase.co',
      'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs'
    );

    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');

    function showMessage(message, type = 'error') {
      messageBox.textContent = message;
      messageBox.className = `msg show ${type}`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating...';

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            data: {
              full_name: fullName
            }
          }
        });

        if (error) throw error;

        if (data.user?.id) {
          await supabaseClient.from('applicant_profiles').upsert([{
            id: data.user.id,
            email,
            full_name: fullName,
            created_at: new Date().toISOString()
          }]);
        }

        showMessage('Account created. You may now log in.', 'success');
        form.reset();
      } catch (error) {
        showMessage(error.message || 'Sign up failed.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
