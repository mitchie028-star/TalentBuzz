<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BuzzHire | Sourced Candidates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BuzzHire sourced candidates pipeline." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary: #1e3a8a;
      --primary-2: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fbff;
      --white: #ffffff;
      --success: #166534;
      --danger: #b91c1c;
      --warning: #b45309;
      --info: #4338ca;
      --shadow: 0 12px 30px rgba(30, 58, 138, 0.06), 0 2px 10px rgba(15, 23, 42, 0.04);
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Manrope", sans-serif; background: linear-gradient(180deg, #f8fbff 0%, #f4f8ff 100%); color: var(--text); line-height: 1.6; }
    .container { max-width: 1500px; margin: 0 auto; padding: 24px 20px 44px; }

    /* Topbar */
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .topbar h1 { margin: 0 0 6px; color: var(--primary); font-size: 2rem; line-height: 1.1; letter-spacing: -0.03em; }
    .subtitle { margin: 0; color: var(--muted); font-size: 0.95rem; }
    .top-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .hello { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; font-weight: 700; box-shadow: var(--shadow); }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 11px 14px; border-radius: 12px; border: 1px solid transparent; text-decoration: none; font-weight: 800; font-size: 0.92rem; cursor: pointer; font-family: inherit; transition: 0.18s ease; background: white; white-space: nowrap; color: var(--primary); }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; }
    .btn-outline { border-color: var(--border); color: var(--primary); background: white; }
    .btn-danger { border-color: #fecaca; color: var(--danger); background: white; }

    .notice { display: none; margin-bottom: 18px; padding: 12px 14px; border-radius: 14px; font-weight: 700; font-size: 0.92rem; }
    .notice.show { display: block; }
    .notice.success { background: #ecfdf5; color: var(--success); border: 1px solid #bbf7d0; }
    .notice.error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }

    .panel { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 22px; margin-bottom: 20px; }
    .panel h2 { margin: 0 0 14px; color: var(--primary); font-size: 1.2rem; line-height: 1.2; letter-spacing: -0.02em; }

    .filters-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .field input, .field select { width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: 12px; outline: none; font: inherit; background: white; color: var(--text); }
    .field input:focus, .field select:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.25); }

    /* Table */
    .table-wrap { display: flex; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: white; }
    .table-left { flex: 0 0 280px; border-right: 1px solid var(--border); }
    .table-left table { width: 100%; border-collapse: collapse; }
    .table-left th, .table-left td { padding: 12px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .table-right { flex: 1 1 auto; overflow-x: auto; }
    .table-right table { width: 100%; min-width: 1000px; border-collapse: collapse; }
    .table-right th, .table-right td { padding: 12px 10px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
    th { background: #f8fbff; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.76rem; font-weight: 800; }
    .candidate-name { font-weight: 800; color: var(--primary); margin-bottom: 2px; }
    .small { color: var(--muted); font-size: 0.82rem; line-height: 1.5; }
    .chip, .status-pill { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 800; line-height: 1; border: 1px solid transparent; }
    .chip-gray, .status-default { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
    .status-sourced, .status-reviewing { background: #eef2ff; color: #4338ca; border-color: #c7d2fe; }
    .status-shortlisted, .status-contacted, .status-endorsed, .status-interview { background: #ecfdf5; color: #166534; border-color: #bbf7d0; }
    .status-rejected, .status-archived { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .inline-link { color: var(--primary-2); font-weight: 700; text-decoration: none; }
    .inline-link:hover { text-decoration: underline; }
    .table-select { min-width: 150px; padding: 9px 10px; border-radius: 10px; border: 1px solid var(--border); font: inherit; background: white; }
    .empty { color: var(--muted); font-size: 0.95rem; padding: 12px; text-align: center; }

    /* Responsive card view for mobile */
    @media (max-width: 900px) {
      .table-wrap { display: block; }
      .table-left, .table-right { width: 100%; overflow: visible; }
      .table-left table, .table-right table { min-width: 0; width: 100%; }
      .table-right table th, .table-right table td { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Sourced Candidates</h1>
        <p class="subtitle">View and manage sourced candidates in BuzzHire.</p>
      </div>
      <div class="top-right">
        <div class="hello" id="helloRecruiter">Hello</div>
        <a href="recruiter-dashboard.html" class="btn btn-outline">Back to Dashboard</a>
        <a href="client-roles-input.html" class="btn btn-outline">Manage Roles</a>
        <button id="refreshBtn" class="btn btn-primary">Refresh</button>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
      </div>
    </div>

    <div id="notice" class="notice"></div>

    <div class="panel">
      <h2>Pipeline Filters</h2>
      <div class="filters-grid">
        <div class="field"><label for="searchInput">Search</label><input id="searchInput" type="text" placeholder="Name, company, email" /></div>
        <div class="field"><label for="jobFilter">Job</label><select id="jobFilter"><option value="">All jobs</option></select></div>
        <div class="field"><label for="clientFilter">Client</label><select id="clientFilter"><option value="">All clients</option></select></div>
        <div class="field"><label for="statusFilter">Status</label><select id="statusFilter"><option value="">All statuses</option></select></div>
        <button id="clearFiltersBtn" class="btn btn-outline">Clear Filters</button>
      </div>

      <div class="table-wrap">
        <div class="table-left">
          <table>
            <thead>
              <tr><th>Prospect</th><th>Title</th><th>Company</th></tr>
            </thead>
            <tbody id="tableLeftBody"><tr><td colspan="3" class="empty loading">Loading sourced candidates...</td></tr></tbody>
          </table>
        </div>
        <div class="table-right">
          <table>
            <thead>
              <tr>
                <th>Job</th><th>Client</th><th>Status</th><th>Match</th><th>Location Match</th><th>Email</th><th>LinkedIn</th><th>Notes</th><th>Update</th>
              </tr>
            </thead>
            <tbody id="tableRightBody"><tr><td colspan="9" class="empty loading">Loading sourced candidates...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
      const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const STATUS_OPTIONS = ["sourced","reviewing","shortlisted","contacted","endorsed","interview","rejected","archived"];
      const state = { sessionUser: null, rows: [], filteredRows: [] };
      const els = {
        helloRecruiter: document.getElementById("helloRecruiter"),
        notice: document.getElementById("notice"),
        refreshBtn: document.getElementById("refreshBtn"),
        logoutBtn: document.getElementById("logoutBtn"),
        searchInput: document.getElementById("searchInput"),
        jobFilter: document.getElementById("jobFilter"),
        clientFilter: document.getElementById("clientFilter"),
        statusFilter: document.getElementById("statusFilter"),
        clearFiltersBtn: document.getElementById("clearFiltersBtn"),
        tableLeftBody: document.getElementById("tableLeftBody"),
        tableRightBody: document.getElementById("tableRightBody")
      };

      const normalizeText = v => String(v||"").trim().toLowerCase();
      const escapeHtml = v => String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");

      function showNotice(msg,type="success"){els.notice.textContent=msg;els.notice.className=`notice show ${type}`;window.clearTimeout(showNotice._timer);showNotice._timer=window.setTimeout(()=>{els.notice.className="notice";els.notice.textContent=""},4000);}
      const getStatusClass = status=>"status-"+(String(status||"default").toLowerCase().replace(/\s+/g,"-").replace(/[()]/g,""));
      const getLocationLabel = r=>{const n=Number(r||0);if(n===1)return"Exact City";if(n===2)return"State Match";if(n===3)return"Country Match";if(n===99)return"Outside Target";return"-";};

      async function protectPage(){const { data: { session } } = await supabase.auth.getSession();if(!session?.user){window.location.href="recruiter-login.html";return false;}state.sessionUser=session.user;els.helloRecruiter.textContent=`Hello, ${session.user.email||"Recruiter"}`;return true;}

      function populateFilters(rows){
        const jobs=[...new Set(rows.map(r=>r.job_title).filter(Boolean))].sort();
        const clients=[...new Set(rows.map(r=>r.client_name).filter(Boolean))].sort();
        els.jobFilter.innerHTML=`<option value="">All jobs</option>`+jobs.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
        els.clientFilter.innerHTML=`<option value="">All clients</option>`+clients.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
        els.statusFilter.innerHTML=`<option value="">All statuses</option>`+STATUS_OPTIONS.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
      }

      function applyFilters(){
        const search=normalizeText(els.searchInput.value),job=normalizeText(els.jobFilter.value),client=normalizeText(els.clientFilter.value),status=normalizeText(els.statusFilter.value);
        state.filteredRows=state.rows.filter(row=>{
          const haystack=normalizeText([row.full_name,row.current_company,row.email,row.job_title,row.client_name].join(" "));
          return (!search||haystack.includes(search))&&(!job||normalizeText(row.job_title)===job)&&(!client||normalizeText(row.client_name)===client)&&(!status||normalizeText(row.status)===status);
        });renderTable();
      }

      function renderTable(){
        const rows=state.filteredRows;if(!rows.length){els.tableLeftBody.innerHTML=`<tr><td colspan="3" class="empty">No sourced candidates found.</td></tr>`;els.tableRightBody.innerHTML=`<tr><td colspan="9" class="empty">No sourced candidates found.</td></tr>`;return;}

        els.tableLeftBody.innerHTML=rows.map(row=>`<tr><td><div class="candidate-name">${escapeHtml(row.full_name||"-")}</div><div class="small">${escapeHtml(row.location||"-")}</div></td><td>${escapeHtml(row.current_title||"-")}</td><td>${escapeHtml(row.current_company||"-")}</td></tr>`).join("");

        els.tableRightBody.innerHTML=rows.map(row=>{
          const linkedin=row.linkedin_url?`<a href="${escapeHtml(row.linkedin_url)}" target="_blank" class="inline-link" rel="noopener noreferrer">Open</a>`:"-";
          const email=row.email||"-";const notes=row.notes?`<div style="max-width:200px; word-wrap: break-word;">${escapeHtml(row.notes)}</div>`:"-";
          const statusOptions=STATUS_OPTIONS.map(option=>`<option value="${escapeHtml(option)}" ${normalizeText(row.status)===normalizeText(option)?"selected":""}>${escapeHtml(option)}</option>`).join("");
          return `<tr><td>${escapeHtml(row.job_title||"-")}</td><td>${escapeHtml(row.client_name||"-")}</td><td><span class="status-pill ${getStatusClass(row.status)}">${escapeHtml(row.status||"-")}</span></td><td><span class="chip chip-gray">${escapeHtml(String(row.match_score??0))}</span></td><td><span class="chip chip-gray">${escapeHtml(getLocationLabel(row.location_rank))}</span></td><td>${escapeHtml(email)}</td><td>${linkedin}</td><td>${notes}</td><td><select class="table-select status-select" data-id="${escapeHtml(row.id)}">${statusOptions}</select></td></tr>`;
        }).join("");
      }

      async function loadData(){
        els.tableLeftBody.innerHTML=`<tr><td colspan="3" class="empty loading">Loading sourced candidates...</td></tr>`;
        els.tableRightBody.innerHTML=`<tr><td colspan="9" class="empty loading">Loading sourced candidates...</td></tr>`;

        const { data, error } = await supabase
