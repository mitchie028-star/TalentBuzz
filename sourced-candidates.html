<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BuzzPool | TalentBuzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Manage sourced candidates in BuzzPool." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --bg:#f8fbff;
      --white:#ffffff;
      --success:#166534;
      --danger:#b91c1c;
      --warning:#b45309;
      --shadow:0 14px 40px rgba(30,58,138,.08),0 3px 10px rgba(15,23,42,.04);
    }

    * { box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Manrope',sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--text);
    }

    .container{
      max-width:1400px;
      margin:auto;
      padding:24px 20px 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .topbar h1{
      margin:0 0 6px;
      color:var(--blue);
      font-size:2rem;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:11px 14px;
      border-radius:12px;
      border:1px solid transparent;
      text-decoration:none;
      font-weight:800;
      font-size:.92rem;
      cursor:pointer;
      font-family:inherit;
      background:#fff;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue-light));
      color:#fff;
    }

    .btn-outline{
      color:var(--blue);
      border-color:var(--line);
      background:#fff;
    }

    .btn-danger{
      color:var(--danger);
      border-color:#fecaca;
      background:#fff;
    }

    .btn-small{
      padding:8px 10px;
      font-size:.82rem;
      border-radius:10px;
    }

    .notice{
      display:none;
      margin-bottom:16px;
      padding:12px 14px;
      border-radius:12px;
      font-size:.92rem;
      font-weight:700;
      white-space:pre-wrap;
    }

    .notice.show{display:block}
    .notice.success{background:#ecfdf5;color:var(--success);border:1px solid #bbf7d0}
    .notice.error{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:20px;
    }

    .card h2{
      margin:0 0 14px;
      color:var(--blue);
      font-size:1.2rem;
    }

    .toolbar{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }

    .toolbar input,
    .toolbar select{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font:inherit;
      background:#fff;
      outline:none;
    }

    .toolbar input:focus,
    .toolbar select:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(147,197,253,.25);
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1500px;
      background:#fff;
    }

    th,td{
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
    }

    th{
      color:var(--muted);
      font-size:.78rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.06em;
      background:#f8fbff;
    }

    .empty{
      color:var(--muted);
      padding:10px 0;
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:.76rem;
      font-weight:800;
      background:#dbeafe;
      color:#1d4ed8;
      text-transform:capitalize;
    }

    .pill.sourced{background:#dbeafe;color:#1d4ed8}
    .pill.contacted{background:#fef3c7;color:#b45309}
    .pill.responded{background:#e0e7ff;color:#4338ca}
    .pill.interested{background:#dcfce7;color:#166534}
    .pill.not-interested{background:#fee2e2;color:#b91c1c}

    .muted{
      color:var(--muted);
      font-size:.88rem;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .upload-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      margin-top:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    .field label{
      font-weight:700;
      font-size:.92rem;
    }

    .field input,
    .field textarea{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      font:inherit;
      outline:none;
    }

    .field textarea{
      min-height:100px;
      resize:vertical;
    }

    .section-gap{
      margin-top:20px;
    }

    @media (max-width: 1024px){
      .toolbar{
        grid-template-columns:1fr 1fr;
      }
      .upload-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      .toolbar{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>BuzzPool</h1>
        <p class="subtitle">Manage sourced candidates and resume-backed prospects.</p>
      </div>

      <div class="top-actions">
        <a href="recruiter-dashboard.html" class="btn btn-outline">Back to BuzzHire</a>
      </div>
    </div>

    <div id="notice" class="notice"></div>

    <div class="card">
      <h2>BuzzPool Directory</h2>

      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Search by name, title, company, email, role..." />
        <select id="statusFilter">
          <option value="">All Statuses</option>
          <option value="sourced">Sourced</option>
          <option value="contacted">Contacted</option>
          <option value="responded">Responded</option>
          <option value="interested">Interested</option>
          <option value="not-interested">Not Interested</option>
        </select>
        <input id="roleFilter" type="text" placeholder="Filter by matched role..." />
        <input id="sourceFilter" type="text" placeholder="Filter by source..." />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Current Title</th>
              <th>Company</th>
              <th>Location</th>
              <th>Emails</th>
              <th>Phone</th>
              <th>LinkedIn</th>
              <th>Suggested Roles</th>
              <th>Top Match</th>
              <th>Job</th>
              <th>Status</th>
              <th>Source</th>
              <th>Match Score</th>
              <th>Resume</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="buzzPoolTable">
            <tr><td colspan="15" class="empty">Loading BuzzPool...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="section-gap">
        <h2>Add Candidate to BuzzPool</h2>

        <form id="prospectForm">
          <div class="upload-grid">
            <div class="field">
              <label for="fullName">Full Name</label>
              <input id="fullName" type="text" required />
            </div>

            <div class="field">
              <label for="currentTitle">Current Title</label>
              <input id="currentTitle" type="text" />
            </div>

            <div class="field">
              <label for="currentCompany">Current Company</label>
              <input id="currentCompany" type="text" />
            </div>

            <div class="field">
              <label for="location">Location</label>
              <input id="location" type="text" />
            </div>

            <div class="field">
              <label for="personalEmail">Personal Email</label>
              <input id="personalEmail" type="email" />
            </div>

            <div class="field">
              <label for="phone">Phone</label>
              <input id="phone" type="text" />
            </div>

            <div class="field full">
              <label for="linkedinUrl">LinkedIn URL</label>
              <input id="linkedinUrl" type="url" />
            </div>

            <div class="field full">
              <label for="suggestedRoles">Suggested Roles</label>
              <textarea id="suggestedRoles" placeholder="Comma separated roles"></textarea>
            </div>

            <div class="field">
              <label for="topMatchRole">Top Match Role</label>
              <input id="topMatchRole" type="text" />
            </div>

            <div class="field">
              <label for="resumeFile">Resume File</label>
              <input id="resumeFile" type="file" accept=".pdf,.doc,.docx" />
            </div>

            <div class="field full">
              <button id="saveProspectBtn" type="submit" class="btn btn-primary">Save Candidate</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dilalntcxmvdcmwxjcct.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HrLVIUwnaRo54yijtrbWBQ_1aeb4ezs';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      notice: document.getElementById('notice'),
      table: document.getElementById('buzzPoolTable'),
      searchInput: document.getElementById('searchInput'),
      statusFilter: document.getElementById('statusFilter'),
      roleFilter: document.getElementById('roleFilter'),
      sourceFilter: document.getElementById('sourceFilter'),
      form: document.getElementById('prospectForm'),
      saveProspectBtn: document.getElementById('saveProspectBtn'),
      fullName: document.getElementById('fullName'),
      currentTitle: document.getElementById('currentTitle'),
      currentCompany: document.getElementById('currentCompany'),
      location: document.getElementById('location'),
      personalEmail: document.getElementById('personalEmail'),
      phone: document.getElementById('phone'),
      linkedinUrl: document.getElementById('linkedinUrl'),
      suggestedRoles: document.getElementById('suggestedRoles'),
      topMatchRole: document.getElementById('topMatchRole'),
      resumeFile: document.getElementById('resumeFile')
    };

    let allRows = [];

    function showNotice(message, type = 'success') {
      els.notice.textContent = message;
      els.notice.className = `notice show ${type}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatScore(value) {
      if (value === null || value === undefined || value === '') return '-';
      return String(value);
    }

    function pillClass(status) {
      const normalized = String(status || 'sourced').toLowerCase();
      return `pill ${normalized}`;
    }

    async function protectRecruiterPage() {
      const { data: { session } } = await supabase.auth.getSession();

      if (!session?.user?.email) {
        window.location.href = 'recruiter-login.html';
        return null;
      }

      return session.user;
    }

    async function uploadResume(file, emailValue) {
      if (!file) {
        return { resume_url: null, resume_path: null };
      }

      const safeEmail = String(emailValue || 'candidate')
        .toLowerCase()
        .replace(/[^a-z0-9._-]+/g, '-');

      const safeFile = String(file.name || 'resume')
        .toLowerCase()
        .replace(/[^a-z0-9._-]+/g, '-');

      const path = `buzzpool/${safeEmail}/${Date.now()}-${safeFile}`;

      const { error: uploadError } = await supabase.storage
        .from('resumes')
        .upload(path, file, { upsert: false });

      if (uploadError) throw uploadError;

      const { data } = supabase.storage
        .from('resumes')
        .getPublicUrl(path);

      return {
        resume_url: data?.publicUrl || null,
        resume_path: path
      };
    }

    async function loadData() {
      els.table.innerHTML = '<tr><td colspan="15" class="empty">Loading BuzzPool...</td></tr>';

      const { data, error } = await supabase
        .from('prospect_pipeline')
        .select(`
          id,
          prospect_id,
          job_id,
          status,
          recruiter_email,
          notes,
          source,
          match_score,
          location_rank,
          created_at,
          updated_at,
          prospects (
            id,
            full_name,
            current_title,
            current_company,
            location,
            linkedin_url,
            work_email,
            personal_email,
            phone,
            resume_url,
            resume_path,
            suggested_roles,
            top_match_role
          ),
          jobs (
            id,
            title,
            client_name
          )
        `)
        .order('created_at', { ascending: false });

      if (error) {
        els.table.innerHTML = `<tr><td colspan="15" class="empty">${escapeHtml(error.message)}</td></tr>`;
        return;
      }

      allRows = (data || []).map(row => {
        const p = row.prospects || {};
        const j = row.jobs || {};

        return {
          pipeline_id: row.id,
          prospect_id: row.prospect_id,
          job_id: row.job_id,
          status: row.status || 'sourced',
          recruiter_email: row.recruiter_email || '',
          notes: row.notes || '',
          source: row.source || '',
          match_score: row.match_score,
          location_rank: row.location_rank,
          created_at: row.created_at,
          updated_at: row.updated_at,

          full_name: p.full_name || '',
          current_title: p.current_title || '',
          current_company: p.current_company || '',
          location: p.location || '',
          linkedin_url: p.linkedin_url || '',
          work_email: p.work_email || '',
          personal_email: p.personal_email || '',
          phone: p.phone || '',
          resume_url: p.resume_url || '',
          resume_path: p.resume_path || '',
          suggested_roles: p.suggested_roles || '',
          top_match_role: p.top_match_role || '',

          job_title: j.title || '',
          client_name: j.client_name || ''
        };
      });

      renderRows();
    }

    function renderRows() {
      const keyword = els.searchInput.value.trim().toLowerCase();
      const status = els.statusFilter.value.trim().toLowerCase();
      const roleKeyword = els.roleFilter.value.trim().toLowerCase();
      const sourceKeyword = els.sourceFilter.value.trim().toLowerCase();

      const filtered = allRows.filter(row => {
        const haystack = [
          row.full_name,
          row.current_title,
          row.current_company,
          row.location,
          row.linkedin_url,
          row.work_email,
          row.personal_email,
          row.phone,
          row.suggested_roles,
          row.top_match_role,
          row.job_title,
          row.client_name,
          row.source
        ].join(' ').toLowerCase();

        if (keyword && !haystack.includes(keyword)) return false;
        if (status && String(row.status || '').toLowerCase() !== status) return false;

        const roleHaystack = [row.suggested_roles, row.top_match_role, row.job_title].join(' ').toLowerCase();
        if (roleKeyword && !roleHaystack.includes(roleKeyword)) return false;

        if (sourceKeyword && !String(row.source || '').toLowerCase().includes(sourceKeyword)) return false;

        return true;
      });

      if (!filtered.length) {
        els.table.innerHTML = '<tr><td colspan="15" class="empty">No BuzzPool candidates found.</td></tr>';
        return;
      }

      els.table.innerHTML = filtered.map(row => {
        const emailText = [row.work_email, row.personal_email].filter(Boolean).join('<br>');
        const jobText = row.job_title
          ? `${escapeHtml(row.job_title)}${row.client_name ? `<br><span class="muted">${escapeHtml(row.client_name)}</span>` : ''}`
          : '-';

        const resumeHtml = row.resume_url
          ? `<a href="${escapeHtml(row.resume_url)}" target="_blank" rel="noopener noreferrer">View Resume</a>`
          : '-';

        return `
          <tr>
            <td>${escapeHtml(row.full_name || '-')}</td>
            <td>${escapeHtml(row.current_title || '-')}</td>
            <td>${escapeHtml(row.current_company || '-')}</td>
            <td>${escapeHtml(row.location || '-')}</td>
            <td>${emailText || '-'}</td>
            <td>${escapeHtml(row.phone || '-')}</td>
            <td>${row.linkedin_url ? `<a href="${escapeHtml(row.linkedin_url)}" target="_blank" rel="noopener noreferrer">LinkedIn</a>` : '-'}</td>
            <td>${escapeHtml(row.suggested_roles || '-')}</td>
            <td>${escapeHtml(row.top_match_role || '-')}</td>
            <td>${jobText}</td>
            <td><span class="${pillClass(row.status)}">${escapeHtml(row.status || 'sourced')}</span></td>
            <td>${escapeHtml(row.source || '-')}</td>
            <td>${escapeHtml(formatScore(row.match_score))}</td>
            <td>${resumeHtml}</td>
            <td>
              <div class="actions">
                <button class="btn btn-outline btn-small" onclick="window.updateProspectStatus('${row.pipeline_id}','contacted')">Contacted</button>
                <button class="btn btn-outline btn-small" onclick="window.updateProspectStatus('${row.pipeline_id}','interested')">Interested</button>
                <button class="btn btn-outline btn-small" onclick="window.updateProspectStatus('${row.pipeline_id}','not-interested')">Not Interested</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    window.updateProspectStatus = async function (pipelineId, nextStatus) {
      const { error } = await supabase
        .from('prospect_pipeline')
        .update({
          status: nextStatus,
          updated_at: new Date().toISOString()
        })
        .eq('id', pipelineId);

      if (error) {
        showNotice(error.message || 'Unable to update status.', 'error');
        return;
      }

      showNotice('Status updated successfully.', 'success');
      await loadData();
    };

    els.searchInput.addEventListener('input', renderRows);
    els.statusFilter.addEventListener('change', renderRows);
    els.roleFilter.addEventListener('input', renderRows);
    els.sourceFilter.addEventListener('input', renderRows);

    els.form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const full_name = els.fullName.value.trim();
      const current_title = els.currentTitle.value.trim();
      const current_company = els.currentCompany.value.trim();
      const location = els.location.value.trim();
      const personal_email = els.personalEmail.value.trim().toLowerCase();
      const phone = els.phone.value.trim();
      const linkedin_url = els.linkedinUrl.value.trim();
      const suggested_roles = els.suggestedRoles.value.trim();
      const top_match_role = els.topMatchRole.value.trim();
      const resumeFile = els.resumeFile.files[0];

      if (!full_name) {
        showNotice('Full name is required.', 'error');
        return;
      }

      els.saveProspectBtn.disabled = true;
      els.saveProspectBtn.textContent = 'Saving...';

      try {
        const { data: authData } = await supabase.auth.getSession();
        const recruiterEmail = authData?.session?.user?.email || null;

        const storageData = await uploadResume(resumeFile, personal_email || full_name);

        const prospectId = crypto.randomUUID();

        const prospectPayload = {
          id: prospectId,
          full_name,
          current_title: current_title || null,
          current_company: current_company || null,
          location: location || null,
          personal_email: personal_email || null,
          phone: phone || null,
          linkedin_url: linkedin_url || null,
          resume_url: storageData.resume_url,
          resume_path: storageData.resume_path,
          suggested_roles: suggested_roles || null,
          top_match_role: top_match_role || null
        };

        const { error: prospectError } = await supabase
          .from('prospects')
          .insert([prospectPayload]);

        if (prospectError) throw prospectError;

        const { error: pipelineError } = await supabase
          .from('prospect_pipeline')
          .insert([{
            prospect_id: prospectId,
            status: 'sourced',
            recruiter_email: recruiterEmail,
            source: 'manual',
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          }]);

        if (pipelineError) throw pipelineError;

        els.form.reset();
        showNotice('Candidate added to BuzzPool successfully.', 'success');
        await loadData();
      } catch (error) {
        showNotice(error?.message || 'Unable to save candidate.', 'error');
      } finally {
        els.saveProspectBtn.disabled = false;
        els.saveProspectBtn.textContent = 'Save Candidate';
      }
    });

    (async function init() {
      const user = await protectRecruiterPage();
      if (!user) return;
      await loadData();
    })();
  </script>
</body>
</html>
