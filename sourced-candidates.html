<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BuzzHire | Sourced Candidates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      margin: 0;
      background: #f8fbff;
      color: #0f172a;
    }

    .container {
      max-width: 1300px;
      margin: auto;
      padding: 24px;
    }

    h1 {
      color: #1e3a8a;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: white;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      color: #1e3a8a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 14px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f1f5f9;
      font-size: 12px;
      text-transform: uppercase;
      color: #64748b;
    }

    .chip {
      background: #eef2ff;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .candidate-name {
      font-weight: 800;
      color: #1e3a8a;
    }

    .small {
      font-size: 12px;
      color: #64748b;
    }

    .empty {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }

    select {
      padding: 6px;
      border-radius: 6px;
    }

    .inline-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <div>
      <h1>Sourced Candidates</h1>
      <div class="subtitle">Candidates sourced from BuzzHire pipeline</div>
    </div>

    <a href="recruiter-dashboard.html" class="btn">Back to Dashboard</a>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Title</th>
        <th>Company</th>
        <th>Job</th>
        <th>Client</th>
        <th>Match</th>
        <th>Location Rank</th>
        <th>Email</th>
        <th>LinkedIn</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="10" class="empty">Loading...</td></tr>
    </tbody>
  </table>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const SUPABASE_URL = "https://dilalntcxmvdcmwxjcct.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpbGFsbnRjeG12ZGNtd3hqY2N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTk4NTQsImV4cCI6MjA4OTQ3NTg1NH0.nlltxL-K-b0tsge2UR3VPPE0ZBPADuCY8pU_G_Ygmkw";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const tableBody = document.getElementById("tableBody");

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
  }

  async function loadData() {

    const { data, error } = await supabase
      .from("prospect_pipeline")
      .select(`
        id,
        status,
        match_score,
        location_rank,
        prospects (
          full_name,
          current_title,
          current_company,
          location,
          linkedin_url,
          work_email,
          personal_email
        ),
        jobs (
          title,
          client_name
        )
      `)
      .order("created_at", { ascending: false });

    console.log("PIPELINE DATA:", data);

    if (error) {
      tableBody.innerHTML = `<tr><td colspan="10">${error.message}</td></tr>`;
      return;
    }

    if (!data || !data.length) {
      tableBody.innerHTML = `<tr><td colspan="10" class="empty">No sourced candidates</td></tr>`;
      return;
    }

    tableBody.innerHTML = data.map(row => {

      const p = Array.isArray(row.prospects) ? row.prospects[0] : row.prospects || {};
      const j = Array.isArray(row.jobs) ? row.jobs[0] : row.jobs || {};

      const email = p.personal_email || p.work_email || "-";

      return `
        <tr>
          <td>
            <div class="candidate-name">${escapeHtml(p.full_name)}</div>
            <div class="small">${escapeHtml(p.location)}</div>
          </td>
          <td>${escapeHtml(p.current_title)}</td>
          <td>${escapeHtml(p.current_company)}</td>
          <td>${escapeHtml(j.title)}</td>
          <td>${escapeHtml(j.client_name)}</td>
          <td><span class="chip">${row.match_score}</span></td>
          <td>${row.location_rank}</td>
          <td>${escapeHtml(email)}</td>
          <td>${
            p.linkedin_url
              ? `<a href="${p.linkedin_url}" target="_blank" class="inline-link">Open</a>`
              : "-"
          }</td>
          <td>
            <select data-id="${row.id}" class="status-select">
              <option ${row.status==="sourced"?"selected":""}>sourced</option>
              <option ${row.status==="endorsed"?"selected":""}>endorsed</option>
              <option ${row.status==="interview"?"selected":""}>interview</option>
              <option ${row.status==="rejected"?"selected":""}>rejected</option>
            </select>
          </td>
        </tr>
      `;
    }).join("");

    bindStatusUpdates();
  }

  function bindStatusUpdates() {
    document.querySelectorAll(".status-select").forEach(select => {
      select.addEventListener("change", async (e) => {
        const id = e.target.dataset.id;
        const status = e.target.value;

        const { error } = await supabase
          .from("prospect_pipeline")
          .update({ status })
          .eq("id", id);

        if (error) {
          alert("Failed to update status");
        }
      });
    });
  }

  await loadData();

});
</script>

</body>
</html>
