<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TalentBuzz Create Profile - Sift V2</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f6f8fc;color:#17368c}
.wrap{max-width:900px;margin:auto;padding:24px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
h1{margin:0 0 6px}.muted{color:#64748b}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
input,select,textarea{width:100%;padding:12px;border:1px solid #dbe2ef;border-radius:12px}
button{padding:12px 16px;border:0;border-radius:12px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
.secondary{background:#0f172a}
#sift{position:fixed;right:20px;bottom:20px;width:88px;height:88px;border-radius:50%;background:url('logo.png') center/contain no-repeat,#fff;border:1px solid #dbe2ef;box-shadow:0 10px 25px rgba(0,0,0,.15);cursor:pointer;animation:float 3s infinite}
#panel{display:none;position:fixed;right:20px;bottom:118px;width:340px;background:#fff;border:1px solid #dbe2ef;border-radius:18px;padding:16px;box-shadow:0 18px 40px rgba(0,0,0,.15)}
@keyframes float{50%{transform:translateY(-8px)}}
@media(max-width:700px){.grid{grid-template-columns:1fr}#panel{width:calc(100vw - 24px);right:12px;bottom:110px}.wrap{padding:14px}}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h1>Create Your TalentBuzz Profile</h1>
<div class="muted">Original style preserved. Faster completion with Sift assistance.</div>
<div class="grid">
<div><input placeholder="Full Name"></div>
<div><input placeholder="Email"></div>
<div><input placeholder="Phone"></div>
<div><input placeholder="Location"></div>
<div><input placeholder="Current Role"></div>
<div><input placeholder="Years of Experience"></div>
<div style="grid-column:1/-1"><textarea rows="5" placeholder="Experience Summary"></textarea></div>
</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px">
<button onclick="saved()">Complete Profile</button>
<button class="secondary" onclick="resume()">Upload Resume</button>
</div>
</div>
</div>

<div id="sift" onclick="toggleSift()" title="Sift"></div>

<div id="panel">
<div style="font-weight:800;font-size:18px;margin-bottom:8px">Sift Assistant</div>
<div id="msg" class="muted" style="margin-bottom:12px">Need help completing your profile?</div>
<div style="display:grid;gap:8px">
<button onclick="recruiter()">Speak with Recruiter</button>
<button class="secondary" onclick="guide()">Guide Me</button>
</div>
</div>

<script>
let idle;
function toggleSift(){
 const p=document.getElementById('panel');
 p.style.display=p.style.display==='block'?'none':'block';
}
function say(t){document.getElementById('msg').innerText=t;document.getElementById('panel').style.display='block';}
function recruiter(){window.location='mailto:careers@talentbuzz.pro?subject=Need Help Completing Profile';}
function guide(){say('Fill your core details first, then upload resume for faster recruiter matching.');}
function saved(){alert('Profile saved demo');say('Great job. Recruiters can now review your profile.');}
function resume(){say('Uploading a resume improves matching speed and quality.');}
function resetIdle(){
 clearTimeout(idle);
 idle=setTimeout(()=>say('Need help finishing? I can connect you to a recruiter or guide you.'),8000);
}
['mousemove','keydown','click','scroll','touchstart'].forEach(e=>document.addEventListener(e,resetIdle,{passive:true}));
resetIdle();
setTimeout(()=>say('Hi, I’m Sift. I can help you finish your profile faster.'),1800);
</script>
</body>
</html>
